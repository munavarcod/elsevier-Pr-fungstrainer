tiger Patient • Richtiger Patient\n• Richtiges Arzneimittel • Richtiges Arzneimittel\n• Richtige • Richtige Dosierung/Konzentration\nDosierung/Konzentration • Richtige Applikationsart\n• Richtige Applikationsart • Richtiger Zeitpunkt\n• Richtiger Zeitpunkt • Richtige Dokumentation\n• Richtige Dokumentation • Richtige Anwendungsdauer\n• Richtige Aufbewahrung\n• Richtige Entsorgung\n• Richtiges Risikomanagement (z. B.\nHygienestandard)\nBei Herrn Braun zu beachtende Besonderheiten\nBei Herrn Braun wurde eine Depression diagnostiziert. Da er bereits einen\nSuizidversuch hinter sich hat, ist es notwendig, dass er alle seine Medikamente\ngestellt bekommt. Diese dürfen nicht in seinem Zimmer aufbewahrt werden.\nDie Pflegefachperson stellt die entsprechenden Medikamente und bringt sie\ndirekt zu Herrn Braun, der sie unter Aufsicht einnimmt. Die Medikamente\ndürfen nicht im Zimmer stehen gelassen werden. Eine Mundkontrolle bringt\nSicherheit, dass Herr Braun die Medikamente auch geschluckt hat.\nAusreichend Wasser erleichtert das Schlucken und beugt einer Aspiration vor.\nTipp\nMittlerweile werden in verschiedenen Einrichtungen…"}}]},{"num":10,"title":"Siebtes Prüfungsbeispiel","tag":"tag3","cases":[{"setting":"Stationäre Akutpflege","title":"„Jeder sieht mich nackt“","text":"„Jeder sieht mich nackt“\nSie sind Pflegefachperson auf einer internistischen Station eines\nBielefelder Krankenhauses der Maximalversorgung und haben\nheute an Silvester Frühdienst. Bei der Übergabe erfahren Sie, dass\nSie heute mit der Auszubildenden Julia Burkhart für Frau Maria\nSchlosser zuständig sind. Der Nachtdienst übergibt Ihnen folgende\nInformationen:\n„Frau Schlosser wurde 1982 geboren und wurde gestern von der\ninternistischen Intensivstation zu uns verlegt. Die\nEinweisungsdiagnose vor 10 Tagen war eine akute biliäre\nPankreatitis. Sie hat einen nicht implantierten zentralen\nVenenverweilkatheter (ZVK), über den die parenterale Ernährung\nund die Schmerztherapie laufen. Sie hat weiterhin\nNahrungskarenz mit schluckweise Wasser, ein Kostaufbau ist ab\nmorgen geplant. Des Weiteren liegt bei ihr ein transurethraler\nBlasenverweilkatheter. Die Mobilisation an den Bettrand ist\nmöglich, weitere Mobilisationsmaßnahmen werden aufgrund von\nSchwäche und Kreislaufproblemen bisher nicht durchgeführt.\nFrau Schlosser benötigt Unterstützung bei der Körperpflege am\nBettrand und bei der Ausscheidung auf dem Toilettenstuhl. Sie hat\neine dreijährige Tochter, die sie sehr vermisst. Die Tochter kommt\nheute mit Frau Schlossers Ehemann erstmals zu Besuch, da ihr der\nBesuch nach den internen Klinikregeln auf der Intensivstation\nnicht erlaubt war.“\nAls Sie Frau Schlossers Zimmer betreten, sitzt diese am\nBettrand und trinkt einen Schluck Wasser. Als sie Sie sieht,\nverzieht sie leicht das Gesicht und seufzt. Sie begrüßen Frau\nSchlosser und stellen sich und die Auszubildende vor. Nach der\nErhebung der Vitalzeichen fragen Sie Frau Schlosser nach ihrer\naktuellen Schmerzsituation. Genervt antwortet Frau Schlosser:\n„5“, und verdreht dabei die Augen. „Ständig fragt mich das\njemand. Als ob das das Wichtigste wäre. Ich habe seit 10 Tagen\nmeine Tochter nicht mehr gesehen. Nicht mal an Heiligabend\nwollte man sie zu mir lassen. Das ist so furchtbar. Und was ich…","questions":[{"num":1,"points":12,"text":"Frau Schlosser antwortet auf die Frage nach ihrer\naktuellen Schmerzsituation: „5.“ Nennen Sie das\nInstrument der Schmerzeinschätzung, das Frau Schlosser\nim Verlauf ihres Krankenhausaufenthalts kennengelernt\nhat (1 P.), und erklären Sie dieses und seine Anwendung (6\nP.). Verdeutlichen Sie auch, was Frau Schlosser mit\n„Ständig fragt mich das jemand“ meint (2 P.) und welcher\nSinn hinter dieser Art der Erhebung steht (3 P.)."},{"num":2,"points":6,"text":"Im Expertenstandard „Schmerzmanagement in der Pflege“\nwerden Prozesskriterien beschrieben. Nennen und\nerklären Sie die Prozesskriterien, die Sie im Rahmen der\nVersorgung von Frau Schlosser erfüllen."},{"num":3,"points":10,"text":"Sie ergänzen die Pflegeinformationen von Frau Schlosser\nund beschreiben das Pflegephänomen „Scham“ bei ihr.\nErklären Sie, was unter Scham verstanden wird (4 P.), und\nbenennen Sie im Sinne einer prozesshaften Pflege\nRessourcen, mögliche Ziele und Pflegemaßnahmen (je 2\nP.), um diesem Pflegephänomen zu begegnen."},{"num":4,"points":9,"text":"Frau Schlosser hat eine akute biliäre Pankreatitis.\nErklären Sie, was darunter zu verstehen ist (3 P.) und\nwelche möglichen Ursachen es gibt (4 P.), und begründen\nSie, welche Ursache bei Frau Schlosser zutrifft (2 P.)."},{"num":5,"points":15,"text":"Das Pankreas erfüllt wesentliche Funktionen im\nmenschlichen Körper. Erklären Sie die zwei wesentlichen\nFunktionen des Pankreas (6 P.) und welche Funktion bei\nFrau Schlosser gestört ist (1 P.). Begründen Sie dies\nanhand von Frau Schlossers Symptomen (8 P.)."},{"num":6,"points":7,"text":"Frau Schlosser freut sich auf den bevorstehenden\nKostaufbau. Begründen Sie anhand der\nKrankheitssituation, warum Frau Schlosser eine\nNahrungskarenz hat (2 P.), und nennen Sie Frau Schlosser\nfünf Ernährungsratschläge (5 P.) für die Zukunft."},{"num":7,"points":5,"text":"Frau Schlosser klagt über Juckreiz am ganzen Körper.\nErklären Sie, wie der Juckreiz zustande kommt (3 P.), und\nführen Sie zwei Pflegemaßnahmen auf, die den Juckreiz\nlindern (2 P.)."},{"num":8,"points":10,"text":"Die Auszubildende Julia meint, dass, man ja mal eine\nAusnahme hätte machen und Frau Schlossers Tochter an\nWeihnachten zu ihr auf die Intensivstation hätte lassen\nkönnen. Nehmen Sie Stellung zu dieser Aussage (2 P.) und\nbeschreiben Sie den Prozess Ihrer ethischen\nEntscheidungsfindung anhand eines von Ihnen gewählten\nModells (8 P.)."},{"num":9,"points":10,"text":"„Entschuldigen Sie, ich höre mir gerade selbst beim\nMeckern zu. Ich bin eigentlich ein ganz umgänglicher\nMensch, aber diese blöde Pankreatitis hat mich\nvollkommen aus der Bahn geworfen. Ich weiß gar nicht\nmehr, wie ich mich verhalten soll.“ Frau Schlossers\nVerhalten deutet daraufhin, dass sie unter Stress steht.\nErklären Sie die Stresssituation, in der sich Frau Schlosser\nbefindet, anhand eines Stressbewältigungsmodells."},{"num":10,"points":10,"text":"Die Auszubildende Julia Burkhart fragt Sie, was man alles\nbeim Umgang mit dem zentralvenösen Katheter beachten\nmuss. Erklären Sie ihr fünf Empfehlungen des RKI im\nUmgang mit zentralvenösen Kathetern, welche für die\nPflege relevant sind."},{"num":11,"points":6,"text":"Sie möchten Frau Schlosser hinsichtlich ihrer Fatigue-\nSymptomatik beraten. Stellen Sie sechs Maßnahmen dar,\nwelche sie zur Reduzierung dieser Symptomatik\ndurchführen könnte."}],"answers":{"1":"• Die Pflegefachperson führt bei festgestellten Schmerzen, zu\nerwartenden Schmerzen oder schmerzbedingten Problemen ein\nAssessment mittels geeigneter Instrumente durch, bei dem auch zu\nklären ist, ob es sich um akute und/oder chronische Schmerzen\nhandelt. ([…] fragen Sie Frau Schlosser nach ihrer aktuellen\nSchmerzsituation.)\n• Die Pflegefachperson beteiligt sich aktiv und gemeinsam mit den an der\nVersorgung beteiligten Berufsgruppen und dem Menschen mit\nSchmerzen und ggf. seinen Angehörigen unter Berücksichtigung seines\nindividuellen Bedarfs und seiner Selbstmanagementkompetenzen an\nder Entwicklung oder Überprüfung eines individuellen\nBehandlungsplans, der medikamentöse und/oder nicht\nmedikamentöse Maßnahmen enthält. ([…] dass Sie ihre\nSchmerzsituation bei der am Vormittag stattfindenden Visite mit der\nbehandelnden Ärztin besprechen.)\n• Die Pflegefachperson koordiniert die Maßnahmen des\ninterprofessionellen Teams. Sie stellt die Durchführung der\nmedikamentösen Maßnahmen auf Basis der ärztlichen Verordnung\nsicher. (Bevor Sie Frau Schlosser bei der Körperpflege unterstützen,\nverabreichen Sie ihr noch die verordneten Schmerzmittel über den\nZVK […])","3":"Scham\nScham ist ein Gefühl, das entsteht, wenn sich eine Person in Verlegenheit\ngebracht, herabgewürdigt oder missverstanden fühlt. Insbesondere in der\nPflege kommt es durch ein hohes Maß an Intimität, Vertrauen und\nVerletzlichkeit zu Situationen, die schambehaftet sein können.\nZu ermittelnde Schritte im Rahmen der prozesshaften Pflege\n• Ressourcen:\n– Frau Schlosser kann ihre Gefühle äußern.\n– Frau Schlosser erkennt ihr Hilfebedürfnis in der\nKrankheitssituation und lässt Unterstützung zu.\n• Ziele:\n– Frau Schlossers Privatsphäre ist in allen Pflegesituationen für sie\nzufriedenstellend gewahrt.\n– Frau Schlosser kann selbst bestimmen, wer sie in Pflegesituationen\nunterstützt.\n• Pflegemaßnahmen:\n– Bei jeder körpernahen bzw. entblößenden Pflegemaßnahme\nwerden abschirmende bzw. abdeckende Materialien verwendet wie\nz. B. Stellwände, Handtücher etc.\n– Frau Schlosser wird für jede Pflegemaßnahme nur so weit wie\nnötig entkleidet.\n– Frau Schlosser kann ihre eigene Kleidung anziehen.","4":"Akute biliäre Pankreatitis\nDie akute biliäre Pankreatitis ist eine plötzlich einsetzende Entzündung des\nPankreas mit Selbstandauung (Autolyse) des Organs und Beeinträchtigung\nseiner Funktion. Sie ist oft Folge von Gallensteinen im Gallengang. Dadurch\nkommt es zum Verschluss des gemeinsamen Ausführungsgangs von Pankreas\nund Galle. Das enzymreiche Pankreassekret kann nicht ablaufen, und die\nEnzyme verbleiben zu lange in den Pankreasgängen und aktivieren sich, sodass\nes zur Selbstverdauung des Pankreas und damit auch zur Entzündung des\nGewebes kommt.\nMögliche Ursachen\n• Alkoholabusus\n• Gallensteine\n• Fettreiches Essen\n• Medikamente\n• Erhöhte Blutfettwerte\n• …\nUrsache bei Frau Schlosser\nBei Frau Schlosser sind Gallensteine die Ursache. Dies geht aus dem Begriff\n„biliär“ in der Diagnose hervor.","5":"Funktionen des Pankreas\n• Exokrine Funktion: Produktion von Verdauungssäften, die für die\nAufschlüsselung und Zerkleinerung der Nahrung im Darm notwendig\nsind.\n• Endokrine Funktion: Hormonbildung: Insulin und Glukagon zur\nRegulation des Blutzuckerspiegels.\nBei Frau Schlosser ist die exokrine Funktion gestört.\nBei Frau Schlosser auftretende Symptome\n• Heller (acholischer) Stuhl, da Gallenflüssigkeit, welche den Stuhl\ndunkel färbt, im Darm fehlt und Bilirubin nicht über den Stuhl\nausgeschieden wird („[…] hatte ich gestern endlich wieder Stuhlgang,\nund der sah ganz komisch aus“).\n• Dunkler bis brauner Urin, da überschüssiges Bilirubin über die Nieren\nausgeschieden wird („Ständig sehe ich meinen eigenen Urin, und der\nist auch noch so eklig braun“).\n• Gelbfärbung der Haut aufgrund von Bilirubinablagerungen („Ich bin\nnicht nur gelb geworden […]“).\n• Juckende Haut entsteht als „cholestatischer Juckreiz“ durch Bilirubin\nund Gallensalze, die über die Blutbahnen überall im Körper und damit\nauch in der Haut verteilt werden („Ständig juckt die Haut am ganzen\nKörper“).\n• Vorrangig im Oberbauch auftretende Bauchschmerzen werden von den…","6":"Entstehung des Juckreizes\nDa das Bilirubin nicht ausreichend über den Stuhl ausgeschieden werden\nkann, verteilt es sich über die Blutbahn im ganzen Körper und lagert sich auch\nin der Haut ab. Dies führt zu Gelbfärbung (Ikterus) und Juckreiz (Pruritus).\nDer Juckreiz entsteht durch die Ablagerung von Substanzen wie Bilirubin und\nGallensalzen und den Abbauprozess dieser Stoffe, die vom Körper als\nGiftstoffe wahrgenommen und normalerweise über die Gallenflüssigkeit\nausgeschieden werden.\nPflegemaßnahmen\n• Kühlende Waschungen mit kaltem Wasser, Pfefferminztee oder\nEssigwasser\n• Hautpflege mit gekühlter Creme, um den Hautzustand intakt und\nwiderstandsfähig zu halten und die Elastizität sicherzustellen\n• Keine beengende Kleidung tragen und natürliche Materialien gegenüber\nsynthetischen Stoffen bevorzugen","8":"Stellungnahme\nAuch wenn das Krankenhaus vermutlich gute Gründe hatte, keinen Besuch\nzu Frau Schlosser zu lassen, wäre dieser für sie sicher gut gewesen und hätte\nden Heilungsprozess unterstützen können. Wichtig wäre gewesen, Frau\nSchlosser die Maßnahme zu begründen, da sie offensichtlich nicht verstanden\nhat, warum ihre Tochter nicht zu ihr kommen konnte.\nModell der ethischen Entscheidungsfindung\nPrinzipienorientierte Ethik (vier Dimensionen):\n• Selbstbestimmung: Frau Schlosser hat das Recht auf Besuch und\nkann für sich entscheiden, ob dieser unterstützend oder schädigend ist.\n• Schadensvermeidung: Frau Schlosser erlebt die Krankheitssituation\nals sehr belastend. Hier würde ein Besuch der Tochter zur\nVerbesserung der Stimmung beitragen. Zu den Gründen des\nKrankenhauses, keinen Besuch zuzulassen, wird in der Fallsituation\nkeine Angabe gemacht. Möglich wäre z. B., Frau Schlosser zu schonen\noder sowohl die Patienten als auch die Angehörigen zu schützen (z. B.\nvor einer Corona-Infektion).\n• Fürsorge: Pflegerisches Fachwissen und Handlungen sollen auf den\nEinzelfall ausgerichtet werden und nicht von Routinehandlungen\nbeeinflusst werden. Frau Schlosser vermisst ihre Tochter, und der…","9":"Herangezogen wird beispielhaft das transaktionale Stressmodell nach Lazarus,\ndas versucht, die individuellen Unterschiede im Stresserleben zu erklären.\n• Ein Stressor trifft auf einen Menschen: Erkrankung Pankreatitis.\n• Die primäre Bewertung beantwortet die Frage: „Ist der Stimulus für\nmich eine Bedrohung (noch nicht eingetretene Schädigung), eine\nSchädigung (bereits eingetreten) oder eine Herausforderung (etwas\nZukünftiges, kann negativ oder positiv sein)?“\nFrau Schlossers primäre Bewertung ist, dass der Stressor für sie eine\nSchädigung darstellt, da sie bereits an der Pankreatitis erkrankt ist und\ndies negativ wahrnimmt („[…] aber diese blöde Pankreatitis hat mich\nvollkommen aus der Bahn geworfen“).\n• Die sekundäre Bewertung ist die Antwort auf die Frage, ob genügend\nRessourcen für die Bewältigung des Stressors vorhanden sind.\nFrau Schlosser hat nicht genügend Ressourcen, um den Stressor\nPankreatitis zu bewältigen („Ich weiß gar nicht mehr, wie ich mich\nverhalten soll“).\n• Es kann keine Bewältigung stattfinden und dadurch entsteht Stress.\nWeitere mögliche Stressmodelle, die herangezogen werden können:\n• Reiz-Reaktions-Theorie (nach Walter Cannon)…","10":"• Schulung: Vermittlung von Wissen und Training von Fähigkeiten\n• Maßnahmen bei Anlage eines ZVK → maximale Barrieremaßnahmen\nund Hautantiseptik\n• Verband an der Kathetereintrittsstelle: Antisepsis und\nVerbandwechselintervalle\n• Manipulation und Antisepsis an Hubs und Zuspritzstellen\n• Wechselintervall von Infusionssystemen (Aspekt der\nInfektionsprävention)\n• Infektionsprävention bei der Zubereitung/Herstellung von\nintravenösen Arzneimitteln/Infusionslösungen\n\n11. Sie möchten Frau Schlosser hinsichtlich ihrer Fatigue-\nSymptomatik beraten. Stellen Sie sechs Maßnahmen dar, welche sie\nzur Reduzierung dieser Symptomatik durchführen könnte. 6\nPunkte\n• Frau Schlosser sollte informiert sein, dass die Fatigue eine normale\nSymptomatik bei ihrem Krankheitsbild und bei d"}}]},{"num":11,"title":"Achtes Prüfungsbeispiel","tag":"tag3","cases":[{"setting":"Ambulante Langzeitpflege","title":"„Damit hatten wir nicht gerechnet!“","text":"„Damit hatten wir nicht gerechnet!“\nZum Wechsel der Stomaplatte fahren Sie als Pflegefachperson\noder Ihre Kolleginnen und Kollegen eines ambulanten\nPflegedienstes in Reutlingen alle 2 Tage zu Walter Bode.\nHerr Bode ist ein sehr freundlicher, 83-jähriger Mann, der im\nletzten Jahr sowohl seine Frau als auch einen seiner Söhne verlor.\nEr hat eine sehr große Familie, und zwei weitere Söhne bewohnen\nmit ihm ein Eigenheim im ländlichen Raum. Bis zum Tod seiner\nEhefrau stand Herr Bode mitten im Leben, danach fielen erste\nDefizite in der Selbstversorgung auf. Dennoch war er bis auf\nwenige unterstützende Maßnahmen wie z. B. Hilfe beim Duschen\nund Stellen der Medikamente selbstständig. Erst nachdem bei ihm\nim letzten Jahr ein Tumor im Dickdarm festgestellt und aufgrund\ndessen Teile des Darms entfernt und ein künstlicher Darmausgang\nangelegt worden war, ist Herrn Bodes pflegerischer\nUnterstützungsbedarf erheblich gestiegen. Im weiteren Verlauf\nkam es zu einer Rezidivbildung des Tumors, doch eine erneute\nOperation lehnte Herr Bode ab. Aufgrund des Tumorwachstums\ntreten bei Herrn Bode immer wieder Unregelmäßigkeiten bei der\nStuhlausscheidung, Blutbeimengungen im Stuhl und Schmerzen\nim Bauchbereich auf.\nAn manchen Tagen ist Herr Bode sehr geschwächt, mehrfach\nwurden Anzeichen einer Anämie festgestellt. Seit es ihm so\nschlecht geht, kümmern sich seine Familienangehörigen und Sie\nals Mitarbeitende des ambulanten Pflegedienstes täglich bzw. alle\n2 Tage um ihn. Eine seiner Töchter und eine Enkeltochter\nunterstützen ihn abwechselnd bei der Körperpflege und\nmotivieren ihn zum Essen und Trinken, wobei sich das Essen seit\nwenigen Tagen durch fehlenden Appetit und Übelkeit auf ein\nMinimum beschränkt. Durch den Gewichtsverlust und seine\nGesamtsituation sieht Herrn Bodes Gesicht eingefallen aus. Im\nGespräch äußern die Kinder immer wieder: „Damit hatten wir\nnicht gerechnet! Warum geht das alles nur so schnell? Was\nkönnen wir für unseren Vati tun, damit er nicht so leiden muss?“…","questions":[{"num":1,"points":20,"text":"Beraten Sie Herrn Bodes Familienangehörige bezüglich\nfünf seiner tumorbedingten Symptome (inklusive\nErklärung) (10 P.) und ordnen Sie diesen Symptomen\njeweils zwei mögliche therapeutische Maßnahmen zu (10\nP.)."},{"num":2,"points":15,"text":"Beschreiben Sie Aufgaben und Arbeitsweise eines SAPV-\nTeams (6 P.) und deren Bedeutung für die palliative\nVersorgung (3 P.) und vergleichen Sie diese mit der\nstationären Palliativversorgung (6 P.)."},{"num":3,"points":10,"text":"Gehen Sie auf die Rechte schwerstkranker und sterbender\nMenschen (Charta zur Betreuung schwerstkranker und\nsterbender Menschen) ein (5 P.) und vergleichen Sie diese\nmit den entsprechenden Ansätzen in der Pflege-Charta\n(Charta der Rechte hilfe- und pflegebedürftiger Menschen)\n(5 P.)."},{"num":4,"points":10,"text":"Erläutern Sie die Vorgehensweise in der Notfallsituation,\nin der Sie Herrn Bode mit stärksten Tumorschmerzen\nvorfinden."},{"num":5,"points":20,"text":"Zählen Sie die einzelnen Punkte der 6-R-Regel auf (6 P.)\nund ordnen Sie diesen die Informationen zur Medikation\nvon Herrn Bode zu (14 P.)."},{"num":6,"points":17,"text":"Beschreiben Sie die subkutane Injektion des\nBedarfsmedikaments bei Herrn Bode inklusive\nVorbereitung, Durchführung und Nachbereitung."},{"num":7,"points":8,"text":"Nennen Sie neben der Medikation weitere\nschmerzreduzierende Maßnahmen für Herrn Bode."}],"answers":{"1":"Tumorbedingte Kurze Erklärung Therapeutische\nSymptome Maßnahmen\nAppetitlosigkeit Eine wichtige Ursache ist\n• Wunschessen\ndie Tumorerkrankung\nanbieten\nselbst, insbesondere weil\n• Essen\nbei einem Dickdarmtumor\nappetitanregend\noft auch ein Völlegefühl\nanrichten\nwahrgenommen wird. Bei\nHerrn Bode hat auch die\nÜbelkeit Einfluss darauf\nGewichtsverlust Ein typisches Symptom bei\n• Regelmäßige\nTumorerkrankungen, da\nGewichtskontrolle\ndas Tumorgewebe einen\n• Hochkalorische\ngroßen Energiebedarf\nNahrung\naufzeigt und auch für die\n• Leicht verdauliche\nZellneubildung Nährstoffe\nNahrung\nund Energie benötigt\nwerden\nSchmerzen Tumorbedingte Schmerzen\n•\nsind keine Seltenheit.\nSchmerzreduzierend\nAnfangs verläuft\ne Medikamente\nDarmkrebs symptomfrei,\n• Anwendung von\ndurch verlegte\nWärme\nDarmabschnitte und\n• Beruhigende\nzeitweise auftretende\nMaßnahmen\nDarmverschlüsse kommt es\n•\nspäter zu einer\nSchmerzreduzierend\nübermäßigen Aktivität der\ne Positionierung\nPeristaltik und kolikartigen\nBauchschmerzen\nTumorbedingte Kurze Erklärung Therapeutische\nSymptome Maßnahmen\nStuhlbeimengungen Aufgrund des durch die\n• Stuhlbeobachtung\nTeilentfernung des\n• Ursachen\nDickdarms verkürzten\nherausfinden (z. B.…","2":"Tipp\nDie spezialisierte ambulante Palliativversorgung\n(SAPV) ist eine wichtige Säule in der Palliativmedizin und\nPalliativpflege, die im ambulanten Bereich aktiv ist. Das\nSAPV-Team ist ein multidisziplinäres Team, welches eine\noptimierte Versorgung für sterbende Menschen zu Hause\nzum Ziel hat. Eine Versorgung wird nach Diagnose einer\nlebensverkürzenden Erkrankung durch den Hausarzt\nmöglich und finanziert.\nAufgaben und Arbeitsweise\nDie Aufgaben des SAPV-Teams erstrecken sich über:\n• Schmerzreduzierung\n• Begleitung in der Sterbephase\n• Beschäftigung\n• Entlastung und Entspannung\n• Einbeziehen und Unterstützen von Angehörigen (über den Tod hinaus)\n• Alternative Therapieformen\n• Spirituelle Unterstützung\n• Angst und Qualen nehmen\nDas multidisziplinäre SAPV-Team arbeitet mit der ambulanten Pflege und\nden Haus- und Fachärzten zusammen und konzentriert sich dabei auf seinen\nAufgabenbereich. Die Pflege des SAPV-Teams ist stark bedürfnisorientiert und\nweicht bei Bedarf von den zuvor geplanten und angeordneten\nTherapiemaßnahmen (z. B. Standardmedikation) ab. Die Symptomkontrolle ist\nein wichtiger Bestandteil, das Lebensende soll so angenehm wie möglich…","3":"Rechte schwerstkranker und sterbender Menschen\n1. Recht auf ein Sterben unter würdigen Bedingungen\n2. Recht auf eine umfassende medizinische, pflegerische, psychosoziale\nund spirituelle Betreuung und Begleitung\n3. Recht auf angemessene, qualifizierte und bei Bedarf multiprofessionelle\nBehandlung und Begleitung\n4. Recht, nach dem allgemein anerkannten Stand der Erkenntnisse\nbehandelt und betreut zu werden\n5. Recht auf Berücksichtigung etablierter und anerkannter internationaler\nEmpfehlungen und Standards zur Palliativversorgung\nVergleich der beiden ethischen Verständnisgrundlagen (Charta\nzur Betreuung schwerstkranker und sterbender Menschen und\nCharta der Rechte hilfe- und pflegebedürftiger Menschen [Pflege-\nCharta])\nGemeinsamkeiten:\n• Beides sind Anweisungen zu ethischem Handeln in Pflegesituationen.\n• Beide sollen Rahmenbedingungen schaffen, die die pflegerische\nVersorgung verbessern.\n• Beide benennen Rechte von Menschen mit pflegerischem\nUnterstützungsbedarf.\n• Beide beinhalten das Recht auf ein würdevolles Sterben und qualitativ\nhochwertige Pflege.\nUnterschiede:\n• Die Pflege-Charta bezieht sich auf die Pflege aller Menschen mit…"}}]},{"num":12,"title":"Neuntes Prüfungsbeispiel","tag":"tag3","cases":[{"setting":"Stationäre Langzeitpflege","title":"„Keine Luft!“","text":"„Keine Luft!“\nSie sind als Pflegefachperson in einem Berliner Pflegeheim\nangestellt und betreuen u. a. Aishe Özdemir. Sie ist eine 78-jährige\naus der Türkei stammende Pflegebedürftige, die in Deutschland\ngut integriert ist. Neben ihr gibt es in Ihrer Einrichtung noch\nweitere aus anderen Ländern stammende zu pflegende Menschen,\nmit denen sich Frau Özdemir gut versteht und mit denen sie ggf.\nauch auf Türkisch kommuniziert.\nFrau Özdemir lebte über viele Jahre mit ihrem Mann in einer\nkleinen Wohnung. Nachdem dieser über Jahrzehnte viel geraucht\nhatte, starb er vor etwa 2 Jahren an einem Lungentumor. Auch\nFrau Özdemir leidet unter einer Lungenerkrankung und ist\ndadurch in ihrem Alltag stark eingeschränkt, weshalb sie seit\neinem Jahr im Pflegeheim lebt. Sie leidet an einer chronisch-\nobstruktiven Lungenerkrankung (COPD) und benötigt beinahe\ndurchgängig Sauerstoff, den sie über eine Nasensonde aufnimmt.\nAngefangen hatte es vor etwa 3 Jahren mit immer wieder\nauftretendem Husten und Schnupfen, und erst nach ein paar\nMonaten und immer stärker ausgeprägter Atemnot erhielt Frau\nÖzdemir die Diagnose durch einen Lungenspezialisten. Seit\neinigen Wochen kann sie sich selbst in ihrem Zimmer kaum noch\nohne Sauerstoffgerät bewegen. Ins Bad wagt sie sich manchmal\nohne Sauerstoff, um dort etwas mehr Bewegungsfreiheit zu haben.\nDurch die Abhängigkeit von der Sauerstoffzufuhr ist sie in ihrem\nAlltag und vor allem in der Möglichkeit, sich aus ihrem Zimmer\nherauszumobilisieren, stark eingeschränkt, was sie oft sehr traurig\nmacht. Gern würde sie mehr Zeit außerhalb des Pflegeheims\nverbringen und sich die vielen Sehenswürdigkeiten Berlins noch\nmal ansehen. Auch das Abhusten von zähflüssigem Sekret\nempfindet Frau Özdemir als sehr unangenehm. 3 × täglich\ninhaliert sie mit Mucosolvan, um besser abhusten zu können.\nFrau Özdemir hat drei Kinder – einen Sohn und zwei Töchter.\nDiese würden ihre Mutter gern bei ihrem Wunsch, das Heim öfter…","questions":[{"num":1,"points":20,"text":"Analysieren Sie fünf Pflegeprobleme von Frau Özdemir\naufgrund ihres Krankheitsbilds (5 P.) und ordnen Sie\njedem Problem jeweils ein Pflegeziel (5 P.) und zwei\nPflegemaßnahmen zu (10 P.)."},{"num":2,"points":10,"text":"Arbeiten Sie fünf typische Symptome der COPD heraus (5\nP.) und ordnen Sie diesen therapeutische Maßnahmen zu\n(5 P.)."},{"num":3,"points":10,"text":"Beschreiben Sie Ihr Handeln in der Notfallsituation von\nFrau Özdemir von Ihrem Eintreffen im Bad bis zum\nEintreffen des Rettungsdienstes."},{"num":4,"points":12,"text":"Erklären Sie den ethischen Konflikt, der aufgrund von\nFrau Özdemirs Wunsch, das Pflegeheim zu verlassen, um\nmehr von der Außenwelt zu sehen, für die beteiligten\nPersonen besteht (2 P.). Arbeiten Sie im Rahmen einer\nethischen Reflexion Lösungsideen aus verschiedenen\nPerspektiven aus und bewerten Sie diese (10 P.)."},{"num":5,"points":12,"text":"Geben Sie mögliche Schwierigkeiten an, die aufgrund der\nSprachbarriere bei Frau Özdemir auftreten können (4 P.),\nund ordnen Sie jeweils zwei Lösungsideen zu (8 P.)."},{"num":6,"points":8,"text":"Erläutern Sie, warum das Einbeziehen von kulturellen\nBesonderheiten in die Pflege aus ethischer Sicht wichtig\nist."},{"num":7,"points":10,"text":"Entwerfen Sie eine Liste mit zehn wichtigen Hinweisen zur\nSauerstofftherapie und deren Umsetzung."},{"num":8,"points":8,"text":"Beschreiben Sie die Umsetzung der Mucosolvan-Inhalation\nmit einem elektrischen Inhalationsgerät als\nbehandlungspflegerische Maßnahme bei Frau Özdemir."},{"num":9,"points":10,"text":"Schätzen Sie die Bedeutung von Familiensystemen im Fall\nder Familie Özdemir ein (4 P.) und erstellen Sie konkrete\nUnterstützungsmöglichkeiten für Frau Özdemir in der\naktuellen Situation (6 P.)."}],"answers":{"1":"Typische Symptome Therapeutische Maßnahmen\nDyspnoe mit zunehmendem\n• Spezielle Atemtherapie\nAtemwiderstand\n• Nutzung von Atemtrainern\n• Körperliches Training\nObstruktive Atmung mit Überblähung\n• Reduzierung von Noxen (z. B.\nRauchen) als Prävention\n• Prophylaktische Impfungen\ngegen Pneumokokken und\nInfluenza\nChronischer produktiver Husten\n• Hustentraining – richtiges\nAbhusten\n• Inhalation\n• Sekretfördernde Medikation\nStörung der Sekretbeförderung\n• Förderung der Sekretbildung\ndurch erhöhte\nFlüssigkeitsaufnahme\n• Inhalation\n• Sekretmanagement\nGestörter Gasaustausch mit arteriellem Sauerstofftherapie\nSauerstoffmangel (Hypoxie)\nMangelernährung, Muskelabbau und\n• Ernährungsberatung\nGebrechlichkeit bei älteren COPD-\n• Bewegungsförderung\nPatienten","3":"• Erfassen der Situation: Frau Özdemir liegt mit akuter Atemnot auf\ndem Badezimmerfußboden. Die Pflegehelferin Magda scheint mit ihr\nohne Sauerstoffversorgung ins Bad gegangen zu sein. Durch einen\nerhöhten Sauerstoffbedarf kam es zur akuten Atemnot.\n• Einschätzen der Notfallsituation, z. B. mittels xABCDE-Schema.\n– Kontrolle, ob Blutungen vorhanden sind (Exsanguination)\n– Kontrolle, ob die Atemwege frei sind (Airway)\n– Einschätzung der Atemqualität (Breathing)\n– Einschätzung der Kreislaufsituation durch Messen von Puls und\nBlutdruck (Circulation)\n– Einschätzung von Bewusstsein und Orientierung (Disability)\n– Einschätzung des Hautzustands und der Temperatur\n(Environment)\n• Nach der Einschätzung der Notfallsituation erfolgen passende Erste-\nHilfe-Maßnahmen:\n– Bei vorhandenen Blutungen werden die Wunden steril abgedeckt\nund später dokumentiert und dem Hausarzt mitgeteilt.\n– Verlegte Atemwege sind im Fall von Frau Özdemir eher\nunwahrscheinlich, sollte sich jedoch ein Fremdkörper im\nMundraum befinden, wird versucht, diesen zu entfernen.\n– Magda Koslowski anweisen, Sauerstoffgerät und Sauerstoffsonde\nzu bringen, und unverzüglich Frau Özdemir Sauerstoff\nverabreichen.…","4":"Ethischer Konflikt\nFrau Özdemirs Wunsch, das Pflegeheim zu verlassen, um sich\nSehenswürdigkeiten in Berlin anzusehen, ist absolut nachvollziehbar. Dass ihre\nKinder dieses Vorhaben ebenfalls befürworten, ist verständlich. Dem\ngegenüber steht die fachliche Einschätzung des Pflegepersonals, dass ein\nVerlassen des Pflegeheims ohne Sauerstoffversorgung nicht möglich ist. Damit\nbesteht der Konflikt in dem Widerspruch zwischen Wunsch des zu pflegenden\nMenschen und dessen Angehörigen und der pflegefachlichen Einschätzung,\nalso zwischen dem Autonomie- und dem Fürsorgeprinzip.\nDurch die fehlende Sauerstoffzufuhr kann es zu Atemnot und\nBewusstseinsstörung kommen, weshalb das Verlassen der Pflegeeinrichtung\nohne Sauerstoff nicht befürwortet werden kann – Nichtschadensprinzip.\nEthische Reflexion\n• Benennung des ethischen Problems: Das ethische Problem\nbesteht in dem nicht so einfach erfüllbaren Wunsch von Frau Özdemir\nund ihren Kindern, Ausflüge mit Frau Özdemir innerhalb Berlins zu\nmachen. Doch ohne technische Geräte zur Sauerstoffversorgung ist\nFrau Özdemir nicht in der Lage, das Heim zu verlassen. Der Vorfall im\nBad verdeutlicht, wie sehr sie auf den Sauerstoff angewiesen ist und…","5":"Schwierigkeiten Lösungsideen\nAussage von Pflegepersonal\n• Laut, deutlich und in kurzen, einfachen\nwird nicht verstanden\nSätzen sprechen\n• Auf Gegenstände zeigen, die gemeint\nsind\n• Mimik und Gestik unterstützend\neinsetzen\nFrau Özdemir kann ihren\n• Gezieltes Nachfragen bei\nWunsch nicht gut\nMissverständnissen\nverständlich ausdrücken\n• Dolmetscher einbeziehen (z. B. eine\nandere türkische Bewohnerin, die\nbesser deutsch spricht)\nSprichwörter werden nicht\n• Keine Sprichwörter nutzen\nverstanden\n• Sprichwörter erklären\n• Türkische Sprichwörter erklären lassen\nund in die Kommunikation einfließen\nlassen\nKulturbezogene\n• Nach Wünschen fragen\nBesonderheiten werden nicht\n• Besonderheiten erklären lassen\nverstanden\nIsolation aufgrund der\n• Integration von Frau Özdemir\nSprachbarriere\n• Gespräche anbieten\n• Gespräche mit anderen\ntürkischsprachigen Bewohnern\nvermitteln","6":"• Ziel der Sauerstofftherapie ist es, die Sauerstoffkonzentration im Blut zu\nerhöhen.\n• Eine ärztliche Anordnung zur Sauerstofftherapie muss vorliegen, nur im\nNotfall ist alternativ eine Sauerstoffgabe bis zum Eintreffen eines\nArztes möglich.\n• Die ärztliche Anordnung sollte den Patientennamen, die\nSauerstoffquelle, Art der Verabreichung, Dosierung und die Dauer der\nVerabreichung beinhalten.\n• Im Notfall darf bis zum Eintreffen des Arztes maximal 2–3 l/Min.\nSauerstoff verabreicht werden.\n• Sauerstoff wird aus Sauerstoffgeräten, im Krankenhaus teilweise auch\naus Wandarmaturen entnommen.\n• Die Dosierung erfolgt über ein Flowmeter. Die Einhaltung der\nverordneten Menge/Dosis ist zu beachten.\n• Ab einer Sauerstoffdosis von 6 l/Min. muss der Sauerstoff angewärmt\nwerden, dies erfolgt über spezielle Sauerstoffsysteme.\n• Sauerstoff ist ein trockenes Gas, welches in hoher Konzentration die\nSchleimhäute der Atemwege angreifen und austrocknen kann. Deshalb\nist ein Anfeuchten der Luft sinnvoll.\n• Auf eine hygienische Arbeitsweise ist im Umgang mit der\nSauerstofftherapie zu achten, dazu gehört auch der Austausch der\nzuführenden Systeme und Masken.…","8":"• Vorbereitung:\n– Anordnung prüfen.\n– Materialien vorbereiten. Benötigt werden Inhalationsgerät,\nMucosolvan als Inhalationslösung, Zuleitungsschlauch, Mund-\nNasen-Maske, Papiertaschentücher oder Zellstoff.\n– Frau Özdemir bitten, sich in eine bequeme sitzende Position zu\nbegeben. Bei Bedarf dabei unterstützen.\n– Das Inhalat (Mucosolvan) in der verordneten Dosis in den\nZerstäuber des Inhalationsgeräts geben, Zuleitung und Maske\nanschließen.\n• Durchführung:\n– Frau Özdemir informieren und bitten, die Maske aufzusetzen. Bei\nBedarf dabei unterstützen.\n– Frau Özdemir bitten, durch den Mund tief ein- und auszuatmen,\ndamit das Inhalat tief in die Bronchien gelangen kann.\n– Die Inhalation ist abgeschlossen, wenn die angeordnete Zeit\nabgelaufen oder das Inhalat komplett aufgebraucht ist.\n• Nachbereitung:\n– Frau Özdemir bitten, die Maske abzusetzen und kräftig\nabzuhusten. Taschentücher oder Zellstoff zur Aufnahme des\nSputums und ggf. Abtrocknen des Gesichts reichen.\n– Maske und Zerstäuber mit Wasser abspülen, Materialien\naufräumen.\n– Durchführung dokumentieren.","9":"Bedeutung von Familiensystemen für Familie Özdemir\n• Familiensysteme sind Personengruppen, deren Mitglieder durch Geburt\noder Heirat miteinander verbunden sind. Die Familienbeziehungen\nwerden durch die Mitglieder etabliert, aufrechterhalten und erkennbar\ngemacht, indem sie miteinander kommunizieren.\n• Die Familie wird als festes Gefüge von mehreren Personen betrachtet,\ndie sich gegenseitig beistehen. Insbesondere bei türkischen Familien\nist dieses Gefüge besonders stark ausgeprägt, und die Familienehre\nstellt einen wichtigen Baustein ihres Persönlichkeitsverständnisses dar.\n• Innerhalb der Familie herrschen gewisse Regeln und Hierarchien. Der\nRespekt vor dem Alter spielt bei türkischstämmigen Familien eine\ngrößere Rolle als in den meisten deutschstämmigen Familien.\nZwischen den Familienmitgliedern bestehen wechselseitige\nInteraktionen und Abhängigkeiten: Während Frau Özdemir ihre\nKinder, als sie noch klein waren, versorgt und gepflegt hat, sehen diese\nes nun als Selbstverständlichkeit, ihre Mutter bestmöglich zu\nunterstützen.\nInsbesondere südländische Familien versuchen, sich familienintern zu\norganisieren (im Sinne der Familienehre) und grenzen sich ggf. eher gegenüber…"}}]},{"num":13,"title":"Zehntes Prüfungsbeispiel","tag":"tag3","cases":[{"setting":"Ambulante Langzeitpflege","title":"„Das roch schlimmer als in einer Raucherkneipe“","text":"„Das roch schlimmer als in einer Raucherkneipe“\nJulia Schwartzkopf ist Auszubildende zur Pflegefachfrau und\nabsolviert aktuell ihren Einsatz in der ambulanten Langzeitpflege\nin Blieskastel. Heute fährt Sie eine Tour mit der Praxisanleiterin\nMartina Vetter, die für die Anleitungstour den\nBeobachtungsschwerpunkt „Umgebungsfaktoren und daraus\nresultierende Veränderungen des Gesundheitszustands“ festlegt.\nAls Erstes geht es zu Herrn Boris Putow. Julia Schwartzkopf fasst\nihre Beobachtungen nach der ersten Begegnung wie folgt\nzusammen:\n„Herr Putow lebt mit seiner Exfrau Natalie Putow zusammen.\nWarum sie noch zusammenleben und sie sich das mit ihrem\nExmann antut, habe ich jedoch nicht verstanden. Aber das geht\nmich auch nichts an. Ich fand die Wohnung sehr unangenehm. Am\nliebsten wäre ich beim Betreten sofort wieder rausgegangen. Es\nroch schlimmer als in einer Raucherkneipe. Neben dem Gestank\nvon Wodka, Bier und Zigarettenrauch sah es auch fürchterlich aus.\nÜberall lag Müll herum, es gab kaum Möbel. In der\nDokumentation habe ich die Pflegediagnose,Der Patient empfindet\nein Verlangen, Suchtstoffe zu konsumieren‘ gefunden. Frau Putow\nberichtete mir, dass ihr aus Russland stammender Exmann schon\nseit seiner Jugend regelmäßig Wodka in großen Mengen\nkonsumiert. Früher waren mehrmals in der Woche seine\nrussischen Freunde da und tranken teilweise bis zur\nBewusstlosigkeit. Aus ihrer Sicht ist das auch der Grund, warum er\nseiner Arbeit als Dachdecker nicht mehr nachgehen kann. Ich\nfinde das schrecklich – mit nur 52 Jahren ist er ein Pflegefall, der\nnicht zur Ruhe kommt, abends nicht ohne Alkohol einschlafen\nkann und seine Ausscheidungen nicht immer im Griff hat. Er sieht\nkeine Notwendigkeit, sich richtig zu waschen, und seine\nchronische Wunde am rechten Unterschenkel verheilt bei den\nhygienischen Zuständen auch nicht. Trotz regelmäßigen Spülens\nmit Prontosan, Abdecken mit Mullkompressen und Verbinden\nwerden die Wunden am Unterschenkel immer größer und sind…","questions":[{"num":1,"points":12,"text":"Die Alkoholsucht ist der Ausgangspunkt für Herrn Putows\ngesundheitliche Einschränkungen. Nennen Sie sechs\nSymptome von Herrn Putow, die mit der Alkoholsucht in\nVerbindung gebracht werden können (6 P.), und\nbegründen Sie diese jeweils (6 P.)."},{"num":2,"points":10,"text":"Erklären Sie, warum es oftmals schwierig ist,\nalkoholabhängige Menschen wie Herrn Putow bei täglichen\nVerrichtungen zu unterstützen und sie dazu zu beraten."},{"num":3,"points":16,"text":"Erklären Sie die Komplikationen, die bei Herrn Putow\ndurch die Alkoholintoxikation bereits bestehen oder noch\nentstehen können."},{"num":4,"points":10,"text":"Beschreiben Sie Maßnahmen im Rahmen der Ersten Hilfe\nvom Auffinden des bewusstlosen Herrn Putow bis zum\nEintreffen des Rettungsdienstes."},{"num":5,"points":8,"text":"Begründen Sie den Zusammenhang zwischen der\nAlkoholintoxikation und der Bewusstlosigkeit in der\naktuellen Situation, indem Sie auf die Wirkungsweise des\nAlkohols eingehen."},{"num":6,"points":8,"text":"Ihnen ist bewusst, dass Herrn Putows täglicher\nAlkoholkonsum seine Gesundheit gefährdet. Beschreiben\nSie die bestehende ethische Konfliktsituation unter\nZuhilfenahme der passenden ethischen Prinzipien."},{"num":7,"points":6,"text":"Julia nimmt das direkte Wohnumfeld von Herrn Putow als\nsehr unhygienisch wahr. Erläutern Sie die\nZusammenhänge zwischen einer unhygienischen\nUmgebung und einer erhöhten Infektionsgefahr."},{"num":8,"points":15,"text":"Beschreiben Sie Möglichkeiten, Herrn Putows Exfrau in\ndie Pflege mit einzubeziehen (10 P.), und bewerten Sie, ob\ndies eine gute Idee ist (5 P.)."},{"num":9,"points":15,"text":"Beschreiben Sie den standardisierten Verbandwechsel am\nrechten Unterschenkel von Herrn Putow."}],"answers":{"1":"• Herr Putow ist übermäßigen Alkoholkonsum seit Jahren gewöhnt;\nbereits seit seiner Jugend konsumiert er regelmäßig hochprozentigen\nAlkohol wie Wodka. Sowohl kulturell als auch durch seinen Freundes-\nund Bekanntenkreis wird es als „normal“ betrachtet, hochprozentigen\nAlkohol in größeren Mengen zu konsumieren. Vermutlich haben auch\nschon seine Eltern Alkohol getrunken, was zur erhöhten Akzeptanz des\nKonsums geführt haben kann. Zudem ist eine erbliche Veranlagung\nmöglich. Es gibt und gab in Herrn Putows sozialen Umfeld also kaum\nHinweise, dass sein Verhalten falsch sein könnte. Wenn der\nPflegedienst ihm dies nun deutlich machen will, wird er es ggf. nicht\nglauben. Die zuvor durch eine veränderte Sicht und Bewertung\naufgebaute Scheinwelt kann nicht so einfach zerstört werden.\n• Für Herrn Putow ist der Alkoholkonsum Ritual und fester Lebensinhalt.\nViele andere Dinge haben sich in seinem Leben dem Konsum bzw.\nMissbrauch von Alkohol untergeordnet. Es besteht kein oder maximal\nein sehr geringes Verständnis dafür, dass seine gesundheitlichen\nEinschränkungen in einem direkten Zusammenhang mit seinem\nAlkoholmissbrauch stehen. Durch diese fehlende Einsicht ist für ihn…","3":"• Vergiftungserscheinungen, die das Gehirn und das dort befindliche\nAtemzentrum beeinträchtigen, akut zu Bewusstlosigkeit führen und\nlebensbedrohlich sein können.\n• Der Körper kann den Alkohol als Giftstoff erkennen und löst als\nnatürliche Schutzreaktion einen Brechreiz aus. Bei Erbrechen unter\nAlkoholeinfluss ist die Gefahr einer Aspiration stark erhöht, selbst\neine Erstickung ist in der Folge möglich.\n• Durch dauerhaften Konsum prägt sich eine Sucht aus. Diese besteht\nbei Herrn Putow aufgrund jahrelangen Alkoholmissbrauchs. Einfach\nmit dem Trinken aufzuhören ist nicht mehr möglich.\n• Verwahrlosung, da die Aufmerksamkeit irgendwann nur noch auf\ndem Alkoholkonsum liegt und sowohl die Körperpflege wie auch das\nSauberhalten des Wohnumfelds eine untergeordnete Rolle spielen.\n• Gesundheitliche Komplikationen in verschiedenen\nOrgansystemen. Dazu gehören u. a. Erkrankungen der Leber, der\nBauchspeicheldrüse, des Magens, des Herzens und der Muskulatur.\nDer Alkohol als Giftstoff schädigt das Gewebe vieler Organe, und es\nkommt zu Entzündungen und anderen Erkrankungen.\n• Alkoholmissbrauch ist einer der häufigsten Auslöser von\nKrebserkrankungen.…"}}]},{"num":14,"title":"Elftes Prüfungsbeispiel","tag":"tag3","cases":[{"setting":"Stationäre Akutpflege","title":"„Tooor!“","text":"„Tooor!“\nSie arbeiten als Pflegefachperson im Städtischen Krankenhaus\nGörlitz. Heute, am Sonntag, haben Sie Spätdienst auf der\nKinderstation. Gerade wird die zehnjährige Anni Brüdiger vom\nAufwachraum auf Ihre Station gebracht.\nAnni hatte sich am Nachmittag beim Fußballspiel offene\nFrakturen am linken Unterarm zugezogen. Da beide Knochen\ndisloziert waren, musste sie operiert werden. Die OP verlief\nkomplikationslos. Ihr wurden zwei Fixateure externe angebracht.\nDie beiden Drainagen sollen in den nächsten 2 Stunden alle 30\nMinuten kontrolliert werden. Der Wechsel des Wundverbands\nerfolgt am 2. postoperativen Tag. Bis dahin sind eine allgemeine\nBeobachtung und die Sichtkontrolle des Verbands angeordnet. Bei\nSchmerzen kann Anni Ibuprofen® 200 mg alle 6 Stunden oral als\nTabletten bekommen. Für die nächsten 2 Stunden wurde die\nhalbstündliche Kontrolle der Vitalwerte angeordnet. Anschließend\nsoll für 2 Stunden eine stündliche Kontrolle erfolgen.\nBevor Sie die ärztlichen Anordnungen ausarbeiten, beschließen\nSie, als Erstes zu Ihrer kleinen Patientin zu gehen. Deren Eltern\nsind auf dem Weg, aber bislang noch nicht eingetroffen. Von der\nNarkose noch etwas benommen, schaut Anni Sie an und fragt:\n„Was ist denn mit meinem Arm passiert? Und was sind da für\nkomische Stäbe drin? Ich habe Durst! Kann ich bitte was trinken?“\nSie kontrollieren zuerst die Vitalwerte und reichen Anni\nanschließend ein Getränk. Aus der Übergabe vom Aufwachraum\nwissen Sie, dass Anni bereits dort schluckweise getrunken hat.\nAnni klagt nach dem Trinken über starke Schmerzen, wenn sie\nihren operierten Arm bewegt, und ihr laufen ein paar Tränen\nübers Gesicht. Auf einer Schmerzskala von 0 bis 10 ermitteln Sie\neinen Wert von 8 bis 9. Die Vitalwerte befinden sich im\nNormbereich.\nInzwischen sind auch die Eltern eingetroffen. Der besorgte\nVater bestürmt Sie mit Fragen: „Schwester, wie geht es meiner\nTochter? Wird sie wieder richtig gesund? Wie lange bleiben die…","questions":[{"num":1,"points":15,"text":"Analysieren Sie die Handlungssituation hinsichtlich der\nakuten Schmerzen der Patientin (5 P.). Erklären Sie, wie\nSie den Pflegeprozess in der aktuellen Situation gestalten\nwerden (10 P.)."},{"num":2,"points":15,"text":"Erklären Sie den Prozess der Wundheilung (10 P.). Gehen\nSie auf mögliche Komplikationen bei Anni ein (5 P.)."},{"num":3,"points":15,"text":"Arbeiten Sie die ärztlichen Anordnungen heraus (5 P.).\nBeschreiben Sie den Ablauf einer fachgerechten\nWundversorgung bzw. eines fachgerechten\nVerbandwechsels (10 P.)."},{"num":4,"points":20,"text":"Während des Fußballspiels ist Anni gestürzt und hat eine\nFraktur am Unterarm erlitten. Begründen Sie, warum\ndiese Frakturform einen Notfall darstellt (10 P.). Geben Sie\nfünf verschiedene Frakturarten an (5 P.) und nennen Sie\nfünf sichere Frakturzeichen (5 P.)."},{"num":5,"points":15,"text":"Erklären Sie den Eltern Möglichkeiten, ihre Tochter nach\nihrer Entlassung zu Hause bei der Körperpflege und\nErnährung zu unterstützen (10 P.). Nennen Sie dabei zu\nbeachtende hygienische Maßnahmen (5 P.)."},{"num":6,"points":10,"text":"Erläutern Sie die ethischen Prinzipien, nach denen Anni\ngepflegt werden soll. Beachten Sie dabei insbesondere das\nPrinzip von Autonomie und Selbstbestimmung."},{"num":7,"points":10,"text":"Annis Eltern befinden sich aktuell in einer belastenden\nSituation. Beschreiben Sie Möglichkeiten, wie die Eltern\nmit dieser Situation umgehen können, und nennen Sie\nmögliche Lösungsansätze."}],"answers":{}}]},{"num":15,"title":"Zwölftes Prüfungsbeispiel","tag":"tag3","cases":[{"setting":"Stationäre Langzeitpflege","title":"„Seine PEG ist ihm peinlich“","text":"„Seine PEG ist ihm peinlich“\nDer 76-jährige Josef Müller lebt seit dem Tod seiner Frau vor 2\nJahren im Pflegeheim. Dort wird er regelmäßig von seinen alten\nFreunden aus dem Kegelclub und von seinen beiden Söhnen\nbesucht. Klaus, der ältere der beiden Söhne, hat die\nVorsorgevollmacht und Betreuungsverfügung für seinen Vater. Es\ngibt deswegen aber keinen Streit in der Familie, alle verstehen sich\ngut. Überhaupt ist dem aufgeschlossenen Herrn Müller ein\nharmonisches Miteinander wichtig, und ohne seine Söhne hätte er\nden Tod seiner Frau nicht so gut verkraftet. Vor ca. 10 Wochen\nerlitt Herr Müller einen großen Mediainfarkt (Hirninfarkt). Er\nkam zur intensivmedizinischen Behandlung sofort ins örtliche\nKrankenhaus und wurde von dort nach 4 Wochen in eine\nRehabilitationseinrichtung überführt. Nach 6 Wochen Reha ist für\nden heutigen Vormittag seine Rückkehr ins Pflegeheim geplant.\nBei der Übergabe des Frühdienstes geben Sie als\nverantwortliche Pflegefachperson die wichtigsten Details an Ihre\nKolleginnen und Kollegen weiter: „Herr Müller hatte nach seinem\nSchlaganfall mit einer Aphasie, einer ausgeprägten rechtsseitigen\narm- und beinbetonten Hemiparesesymptomatik sowie einer\nausgeprägten Dysphagie zu kämpfen. Nach meinem letzten\nTelefonat mit der Reha weiß ich nun, dass sich die Aphasie\ngebessert hat und kaum noch Spracheinschränkungen vorliegen.\nAllerdings blieb die rechtsseitige Lähmung bestehen, und auch die\nSchluckbeschwerden sind so massiv geblieben, dass Herrn Müller\nbereits im Krankenhaus eine PEG gelegt wurde. Er wird mit dieser\nzu uns kommen, doch er hadert damit sehr, lehnt sie ab und zieht\nsich zunehmend sozial zurück, weil sie ihm peinlich ist. Um den\nEinstichkanal haben sich wohl auch erste Infektionszeichen\ngebildet. Wir müssen uns entsprechend darauf einstellen.“ Mit\ndiesen Worten beenden Sie die Übergabe und beginnen mit den\nletzten Vorbereitungen für Herrn Müllers Rückkehr.","questions":[{"num":1,"points":8,"text":"Analysieren Sie tabellarisch die vorliegende\nHandlungssituation nach biografisch-familiären, sozialen,\nemotionalen und aktuellen pflegerelevanten Aspekten von\nHerrn Müller. Geben Sie für jeden Bereich zwei Aspekte\nan.\nBiografisch- Soziale Emotionale Pflegerelevante\nfamiliäre Aspekte Aspekte Aspekte Aspekte"},{"num":2,"points":20,"text":"Entwerfen Sie für vier aktuelle Probleme eine komplette,\nübersichtlich gestaltete Pflegeplanung.\nPflegeproblem Ressource Pflegeziel Pflegemaßnahmen"},{"num":3,"points":8,"text":"Ordnen Sie den vier Pflegeproblemen aus Aufgabe 2 je ein\npassendes ganzheitliches Strukturelement (ATL, ABEDL,\nSIS-Modul) zu und begründen Sie Ihre Auswahl."},{"num":4,"points":4,"text":"Herr Müller hadert mit seiner PEG-Anlage und möchte sie\nzeitnah wieder „loswerden“. Erläutern Sie das Dilemma, in\nwelchem sich a) Herr Müller (2 P.) und b) Sie sich als\nPflegefachperson (2 P.) befinden."},{"num":5,"points":10,"text":"Beschreiben Sie fünf wichtige Aspekte, die bei der\nMedikamentengabe über die PEG für Sie als\nPflegefachperson zu berücksichtigen sind, und begründen\nSie diese jeweils."},{"num":6,"points":8,"text":"Erklären Sie die Grundsätze des Bobath-Konzepts bei\nSchlaganfallpatienten mit Hemiparese (4 P.) und nennen\nSie vier Prinzipien, die bei der Pflege zu beachten sind (4\nP.)."},{"num":7,"points":12,"text":"Nennen Sie die fünf typischen Anzeichen, die für eine\nEntzündung sprechen, in deutscher sowie lateinischer\nFachsprache (10 P.) und erklären Sie den Unterschied\nzwischen exogener und endogener Infektion (2 P.)."},{"num":8,"points":30,"text":"Erklären Sie den standardmäßigen Verbandwechsel bei\neiner PEG-Anlage, indem Sie die Arbeitsschritte der\nVorbereitung einschließlich der Grundsätze des\nVerbandwechsel bei einer PEG, die benötigten Materialien,\ndie Durchführung in Einzelschritten und die\nNachbereitung beschreiben (25 P.). Fassen Sie in einem\nzweiten Schritt die wichtigsten Punkte der Durchführung\ndes PEG-Verbandwechsels bei einer entzündeten\nEintrittsstelle wie bei Herrn Müller vorliegend zusammen\n(5 P.)."}],"answers":{}}]}]};


/* ── STORAGE ── */
const SK='pfl_v2';
function ld(){try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch{return{}}}
function sv(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch{}}

function saveRes(tag,chNum,ci,res){
  const d=ld();
  d[tag+'_'+chNum+'_'+ci]=res;
  const today=new Date().toISOString().slice(0,10);
  const yd=new Date(Date.now()-864e5).toISOString().slice(0,10);
  if(d._la!==today&&d._la!==yd)d._str=1;
  else if(d._la===yd)d._str=(d._str||0)+1;
  d._la=today;
  sv(d);
}
function getRes(tag,chNum,ci){return ld()[tag+'_'+chNum+'_'+ci]||null;}

/* ── TOAST ── */
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2800);
}

/* ── SCREEN ── */
function show(id){
  document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

/* ── EXPORT/IMPORT ── */
function doExport(){
  const d=ld();
  const blob=new Blob([JSON.stringify({v:1,dt:new Date().toISOString().slice(0,10),d},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='pfl_fortschritt_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);
  toast('Fortschritt exportiert ✅');
}
function doImport(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const p=JSON.parse(e.target.result);
      const imp=p.d||p;const ex=ld();const mg={...ex};
      Object.keys(imp).forEach(k=>{
        if(k.startsWith('_'))mg[k]=imp[k];
        else if(!mg[k])mg[k]=imp[k];
        else if((imp[k]?.pct||0)>=(mg[k]?.pct||0))mg[k]=imp[k];
      });
      sv(mg);renderHome();toast('Importiert ✅');
    }catch{toast('Fehler beim Import ❌');}
    inp.value='';
  };
  r.readAsText(f);
}
function resetAll(){
  if(!confirm('Gesamten Fortschritt zurücksetzen?'))return;
  localStorage.removeItem(SK);renderHome();toast('Zurückgesetzt ✅');
}

/* ── HOME ── */
function renderHome(){
  const pr=ld();
  document.getElementById('s-streak').textContent=(pr._str||0)+'🔥';
  let done=0;
  ['tag1','tag2','tag3'].forEach(t=>{
    DB[t].forEach(ch=>ch.cases.forEach((_,ci)=>{if(getRes(t,ch.num,ci))done++;}));
  });
  document.getElementById('s-done').textContent=done;

  const c=document.getElementById('tcards');
  c.innerHTML='';

  const defs=[
    {id:'tag1',lbl:'Tag 1 – Prüfungstag 1',sub:'Pflegeprozess & Pflegewissenschaft',em:'1️⃣',dot:'d1',fill:'f1'},
    {id:'tag2',lbl:'Tag 2 – Prüfungstag 2',sub:'Kommunikation & Gesundheitsförderung',em:'2️⃣',dot:'d2',fill:'f2'},
    {id:'tag3',lbl:'Tag 3 – Prüfungstag 3',sub:'Rahmenbedingungen & Professionalität',em:'3️⃣',dot:'d3',fill:'f3'},
  ];

  defs.forEach((td,ti)=>{
    const chs=DB[td.id];
    const totCases=chs.reduce((s,c)=>s+c.cases.length,0);
    const doneCases=chs.reduce((s,ch)=>s+ch.cases.filter((_,ci)=>getRes(td.id,ch.num,ci)).length,0);
    const pct=totCases?Math.round(doneCases/totCases*100):0;

    const div=document.createElement('div');
    div.className='tcard';

    let chHTML='';
    chs.forEach(ch=>{
      const cd=ch.cases.filter((_,ci)=>getRes(td.id,ch.num,ci)).length;
      const ct=ch.cases.length;
      const pts=ch.cases.reduce((s,c)=>s+c.questions.reduce((s2,q)=>s2+q.points,0),0);
      let bc='bdg-new',bt='Neu';
      if(cd===ct&&ct>0){bc='bdg-done';bt='✓ Fertig';}
      else if(cd>0){bc='bdg-part';bt=cd+'/'+ct+' gemacht';}
      chHTML+=`<div class="chbtn" onclick="openChapter('${td.id}',${ch.num})">
        <div class="chnum">${ch.num}</div>
        <div class="chinfo">
          <div class="chn">${h(ch.title)}</div>
          <div class="chm">${ct} Fall${ct>1?'fälle':'fall'} · ${pts} Punkte</div>
        </div>
        <div class="chbdg ${bc}">${bt}</div>
      </div>`;
    });

    div.innerHTML=`
      <div class="thead" onclick="toggleTag(${ti})">
        <div class="tdot ${td.dot}">${td.em}</div>
        <div class="tinfo"><div class="ttl">${td.lbl}</div><div class="tsub">${td.sub} · ${doneCases}/${totCases} Fälle</div></div>
        <div class="tchev" id="chev${ti}">›</div>
      </div>
      <div class="tpbar"><div class="tpfill ${td.fill}" id="tpf${ti}" style="width:${pct}%"></div></div>
      <div class="tbody" id="tbody${ti}">
        <div class="tsec">
          <div class="tsecl">✍️ Schriftliche Prüfung</div>
          <div class="chl">${chHTML}</div>
        </div>
        <div class="soon">🗣️ Mündliche Prüfung <span class="soon-chip">demnächst</span></div>
        <div class="soon" style="padding-bottom:12px;">🤝 Praktische Prüfung <span class="soon-chip">demnächst</span></div>
      </div>`;
    c.appendChild(div);
  });
  // Auto-expand tag1
  const tb=document.getElementById('tbody0');
  const ch=document.getElementById('chev0');
  if(tb&&!tb.classList.contains('open')){tb.classList.add('open');ch.classList.add('open');}
}

function toggleTag(ti){
  const tb=document.getElementById('tbody'+ti);
  const ch=document.getElementById('chev'+ti);
  const op=tb.classList.toggle('open');
  ch.classList.toggle('open',op);
}

/* ── CHAPTER / CASES ── */
let CUR_TAG,CUR_CH,CUR_CI,CUR_CASE,CUR_CHAPTER;

function openChapter(tag,chNum){
  CUR_TAG=tag;CUR_CH=chNum;
  CUR_CHAPTER=DB[tag].find(c=>c.num===chNum);
  if(!CUR_CHAPTER)return;
  const tN={tag1:'Tag 1',tag2:'Tag 2',tag3:'Tag 3'};
  document.getElementById('ctitle').textContent='Kapitel '+chNum+': '+CUR_CHAPTER.title;
  document.getElementById('csub').textContent=tN[tag]+' · Schriftliche Prüfung';
  const lst=document.getElementById('caselist');
  lst.innerHTML='';
  CUR_CHAPTER.cases.forEach((cas,ci)=>{
    const res=getRes(tag,chNum,ci);
    const totPts=cas.questions.reduce((s,q)=>s+q.points,0);
    const pct=res?res.pct:0;
    const prog=res?100:0;
    const note=res?getNote(pct):{n:'-',l:'',emoji:'',col:'var(--tx3)'};
    const div=document.createElement('div');
    div.className='case-card';
    div.innerHTML=`
      <div class="case-top">
        ${settingBadge(cas.setting)}
        <div class="case-title">${h(cas.title)}</div>
        <div class="case-meta">${cas.questions.length} Aufgaben · ${totPts} Punkte${res?' · <span style="color:'+note.col+';font-weight:600">'+note.emoji+' Note '+note.n+' ('+pct+'%)</span>':''}</div>
      </div>
      <div class="cpbar"><div class="cpfill" style="width:${prog}%"></div></div>`;
    div.onclick=()=>openCase(ci);
    lst.appendChild(div);
  });
  show('s-cases');
}

function settingBadge(s){
  const sl=(s||'').toLowerCase();
  let cls='s-def',lbl=s||'Pflege';
  if(sl.includes('stationäre langzeit')){cls='s-sl';lbl='🏥 Stat. Langzeitpflege';}
  else if(sl.includes('ambulante langzeit')){cls='s-al';lbl='🚗 Amb. Langzeitpflege';}
  else if(sl.includes('stationäre akut')){cls='s-sa';lbl='🚨 Stat. Akutpflege';}
  else if(sl.includes('ambulante akut')){cls='s-aa';lbl='🚑 Amb. Akutpflege';}
  return `<span class="sbadge ${cls}">${lbl}</span>`;
}

function h(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── FALLSITUATION ── */
function openCase(ci){
  CUR_CI=ci;CUR_CASE=CUR_CHAPTER.cases[ci];
  if(!CUR_CASE)return;
  document.getElementById('ftitle').textContent='Kapitel '+CUR_CH+' · '+CUR_CASE.setting;
  document.getElementById('fsub').textContent=CUR_CASE.questions.length+' Aufgaben';

  // Title
  const tEl=document.getElementById('fquote');
  tEl.textContent=CUR_CASE.title||'Fallsituation';

  // Text body (remove leading title line if duplicated)
  let txt=CUR_CASE.text||'';
  // The text starts with the title - show it all
  document.getElementById('ftext').textContent=txt;
  show('s-fall');
}

/* ── QUIZ ── */
let QI=0,RATINGS=[],REVEALED=[];

function startQuiz(){
  if(!CUR_CASE)return;
  QI=0;
  RATINGS=new Array(CUR_CASE.questions.length).fill(null);
  REVEALED=new Array(CUR_CASE.questions.length).fill(false);
  document.getElementById('qtitle').textContent=CUR_CASE.title||'Aufgaben';
  document.getElementById('qsub').textContent=CUR_CASE.setting||'';
  show('s-quiz');
  renderQ();
}

function renderQ(){
  const q=CUR_CASE.questions[QI];
  const total=CUR_CASE.questions.length;
  document.getElementById('qprog').style.width=(QI/total*100)+'%';

  const ans=CUR_CASE.answers[String(q.num)]||'';
  const isRevealed=REVEALED[QI];
  const prevRating=RATINGS[QI];

  // Determine method: key-points if answer has list items
  const bullets=(ans.match(/\u2022|^\s*[-–]\s/gm)||[]).length;
  const lines=(ans.match(/\n/g)||[]).length;
  const method=(bullets>=2||lines>=3)&&q.points<=15?2:1;

  // Build key points for method 2
  let kpLines=[];
  if(method===2&&ans){
    kpLines=ans.split('\n')
      .map(l=>l.trim().replace(/^[\u2022\-–]\s*/,''))
      .filter(l=>l.length>5&&l.length<300)
      .slice(0,12);
  }

  const body=document.getElementById('qbody');
  body.innerHTML='';
  body.scrollTop=0;

  // Counter
  a(body,'div','qctr',`Aufgabe ${QI+1} von ${total}`);

  // Meta
  const op=getOp(q.text);
  const meta=a(body,'div','qmeta');
  a(meta,'span','qpts',q.points+(q.points===1?' Punkt':' Punkte'));
  if(op)a(meta,'span','qop',op);

  // Question
  a(body,'div','qtxt',q.text);

  if(method===1){
    // Textarea
    const ta=document.createElement('textarea');
    ta.className='notes';
    ta.placeholder='Eigene Stichworte notieren…';
    body.appendChild(ta);

    // Reveal button
    const rb=a(body,'button','rev-btn',ans?'👁 Erwartungshorizont anzeigen':'💡 Musterlösung anzeigen');
    rb.id='rev-btn';
    rb.onclick=()=>doReveal();

    // Answer box
    const ab=a(body,'div','ans-box'+(isRevealed?'':' hidden'));
    ab.id='ans-box';
    a(ab,'div','ans-lbl','Erwartungshorizont');
    const at=a(ab,'div','ans-txt');
    at.id='ans-txt';
    at.textContent=ans||'Bitte im Buch-Erwartungshorizont nachschlagen.';
  } else {
    // Method 2: Key Points
    a(body,'div','kp-hint','✓ Markiere die Punkte, die du kennst – dann sieh die vollständige Antwort:');
    const kpw=a(body,'div','kp-wrap');
    kpw.id='kp-wrap';
    kpLines.forEach((line,ii)=>{
      const row=a(kpw,'div','kp-row');
      row.id='kpr-'+ii;
      a(row,'div','kp-cb');
      const kt=a(row,'div','kp-txt');
      kt.textContent=line;
      row.onclick=()=>{row.classList.toggle('chk');};
    });

    const rb=a(body,'button','rev-btn',ans?'👁 Vollständige Antwort anzeigen':'💡 Musterlösung anzeigen');
    rb.id='rev-btn';
    rb.onclick=()=>doReveal();

    const ab=a(body,'div','ans-box'+(isRevealed?'':' hidden'));
    ab.id='ans-box';
    a(ab,'div','ans-lbl','Vollständige Musterlösung');
    const at=a(ab,'div','ans-txt');
    at.id='ans-txt';
    at.textContent=ans||'Bitte im Buch-Erwartungshorizont nachschlagen.';
  }

  // Rating
  const rw=a(body,'div','rate-wrap'+(isRevealed?'':' hidden'));
  rw.id='rate-wrap';
  a(rw,'div','rate-lbl','Wie gut konnte ich diese Aufgabe beantworten?');
  const rr=a(rw,'div','rate-row');
  const by=a(rr,'button','rate-btn r-y'+(prevRating==='y'?' sel':''),'✓');
  a(by,'span',null,'Verstanden');by.onclick=()=>rate('y');
  const bp=a(rr,'button','rate-btn r-p'+(prevRating==='p'?' sel':''),'△');
  a(bp,'span',null,'Teilweise');bp.onclick=()=>rate('p');
  const bn=a(rr,'button','rate-btn r-n'+(prevRating==='n'?' sel':''),'✗');
  a(bn,'span',null,'Wiederholen');bn.onclick=()=>rate('n');

  // Next button
  const isLast=QI===total-1;
  const nb=a(body,'button','next-btn'+(prevRating?' ':' hidden'),isLast?'📊 Ergebnis ansehen':'Nächste Aufgabe →');
  nb.id='next-btn';
  nb.onclick=isLast?showResult:()=>{QI++;renderQ();};
}

function a(parent,tag,cls,txt){
  const el=document.createElement(tag);
  if(cls)el.className=cls;
  if(txt!==undefined)el.textContent=txt;
  if(parent)parent.appendChild(el);
  return el;
}

function getOp(txt){
  const ops=[['Begründen','Begründen'],['Erläutern','Erläutern'],['Erklären','Erklären'],
    ['Nennen','Nennen'],['Entwickeln','Entwickeln'],['Ermitteln','Ermitteln'],
    ['Beschreiben','Beschreiben'],['Analysieren','Analysieren'],['Vergleichen','Vergleichen'],
    ['Definieren','Definieren'],['Bewerten','Bewerten'],['Geben Sie an','Geben Sie an'],
    ['Stellen Sie','Stellen Sie'],['Arbeiten Sie','Herausarbeiten'],['Interpretieren','Interpretieren'],
    ['Erschließen','Erschließen'],['Listen Sie','Aufzählen'],['Zählen Sie','Aufzählen']];
  const tl=txt.toLowerCase();
  for(const[k,l]of ops){if(tl.startsWith(k.toLowerCase())||tl.indexOf(k.toLowerCase()+' sie')>=0)return l;}
  return '';
}

function doReveal(){
  REVEALED[QI]=true;
  const ab=document.getElementById('ans-box');
  const rb=document.getElementById('rev-btn');
  const rw=document.getElementById('rate-wrap');
  if(ab)ab.classList.remove('hidden');
  if(rb)rb.style.display='none';
  if(rw)rw.classList.remove('hidden');
}

function rate(val){
  RATINGS[QI]=val;
  document.querySelectorAll('.rate-btn').forEach(b=>{b.classList.remove('sel');});
  const cls={y:'r-y',p:'r-p',n:'r-n'}[val];
  const btn=document.querySelector('.'+cls);
  if(btn)btn.classList.add('sel');
  const nb=document.getElementById('next-btn');
  if(nb)nb.classList.remove('hidden');
}

/* ── RESULT ── */
function getNote(pct){
  if(pct>=92)return{n:1,l:'Sehr gut',emoji:'🏆',col:'#2e7d32',bg:'#e8f5e9',bc:'#2e7d32'};
  if(pct>=81)return{n:2,l:'Gut',emoji:'⭐',col:'#2e7d32',bg:'#e8f5e9',bc:'#2e7d32'};
  if(pct>=67)return{n:3,l:'Befriedigend',emoji:'👍',col:'#e65100',bg:'#fff3e0',bc:'#e65100'};
  if(pct>=50)return{n:4,l:'Ausreichend',emoji:'📝',col:'#e65100',bg:'#fff3e0',bc:'#e65100'};
  if(pct>=30)return{n:5,l:'Mangelhaft',emoji:'📖',col:'#c62828',bg:'#ffebee',bc:'#c62828'};
  return{n:6,l:'Nicht bestanden',emoji:'❌',col:'#c62828',bg:'#ffebee',bc:'#c62828'};
}

function showResult(){
  const qs=CUR_CASE.questions;
  const totalPts=qs.reduce((s,q)=>s+q.points,0);
  let earned=0;
  RATINGS.forEach((r,i)=>{
    if(r==='y')earned+=qs[i].points;
    else if(r==='p')earned+=qs[i].points*0.5;
  });
  const pct=totalPts?Math.round(earned/totalPts*100):0;
  const note=getNote(pct);
  saveRes(CUR_TAG,CUR_CH,CUR_CI,{pct,pts:earned,total:totalPts,note:note.n,rated:RATINGS.filter(Boolean).length});

  document.getElementById('rsc').textContent=Math.round(earned);
  document.getElementById('rof').textContent='von '+totalPts;
  const msgs={1:['Ausgezeichnet! 🏆','Perfekte Leistung!'],2:['Sehr gut! ⭐','Stark – weiter so!'],
    3:['Befriedigend 👍','Grundlagen sitzen – Schwachstellen üben.'],
    4:['Ausreichend 📝','Bestanden! Mehr Übung empfohlen.'],
    5:['Mangelhaft 📖','Erwartungshorizont nochmals durcharbeiten.'],
    6:['Nicht bestanden ❌','Alle Antworten nochmals erarbeiten.']};
  document.getElementById('rtitle').textContent=msgs[note.n][0];
  document.getElementById('rsub').textContent=msgs[note.n][1];
  const nb=document.getElementById('rnbox');
  nb.style.cssText='margin:12px 13px 0;border-radius:12px;border:2px solid '+note.bc+';background:'+note.bg+';padding:12px 15px;text-align:center;';
  nb.innerHTML='<div class="nn" style="color:'+note.col+'">Note '+note.n+'</div><div class="nl" style="color:'+note.col+'">'+note.emoji+' '+note.l+' · '+pct+'% ('+Math.round(earned)+'/'+totalPts+' Punkte)</div>';

  const fc=document.getElementById('rfocus');fc.innerHTML='';
  const noR=RATINGS.map((r,i)=>({r,i,q:qs[i]})).filter(x=>x.r==='n');
  const ptR=RATINGS.map((r,i)=>({r,i,q:qs[i]})).filter(x=>x.r==='p');
  if(noR.length){
    const t=document.createElement('div');t.className='focus';
    t.innerHTML='<div class="focus-h">❌ Wiederholen:</div>';
    noR.forEach(({q,i})=>{const fi=document.createElement('div');fi.className='fi';fi.innerHTML='<div class="fibdg fb-n">✗ Nicht verstanden</div><div class="fiq">A'+(i+1)+' ('+q.points+'P): '+h(q.text.slice(0,120))+(q.text.length>120?'…':'')+'</div>';t.appendChild(fi);});
    fc.appendChild(t);
  }
  if(ptR.length){
    const t=document.createElement('div');t.className='focus';
    t.innerHTML='<div class="focus-h">△ Vertiefen:</div>';
    ptR.forEach(({q,i})=>{const fi=document.createElement('div');fi.className='fi';fi.innerHTML='<div class="fibdg fb-p">△ Teilweise</div><div class="fiq">A'+(i+1)+' ('+q.points+'P): '+h(q.text.slice(0,120))+(q.text.length>120?'…':'')+'</div>';t.appendChild(fi);});
    fc.appendChild(t);
  }
  if(!noR.length&&!ptR.length)fc.innerHTML='<div style="text-align:center;padding:14px;font-size:14px;color:var(--tx2)">🎉 Alle Aufgaben beantwortet!</div>';
  document.getElementById('retry-btn').onclick=startQuiz;
  show('s-result');
}

/* ── INIT ── */
renderHome();
</script>
</body>
</html>
