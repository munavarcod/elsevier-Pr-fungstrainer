Ronnys Rechte“\nSie arbeiten als Pflegefachperson bei dem Ambulanten\nPflegedienst „Care for Child“ in Essen.\nHeute haben Sie die Nachmittagsroute einer Kollegin\nübernommen und als erstes besuchen Sie Ronny Bergmann, einen\ndreizehnjährigen Jungen. Aus den Unterlagen erfahren Sie:\nRonny litt bei seiner Geburt an einer unerklärlichen Asphyxie\nund ist seither schwer behindert und chronisch krank. Er kann\nnicht laufen, sitzen und sprechen. Zudem hat er Asthma\nbronchiale und Schluckstörungen.\nSeine Mutter pflegt ihr Kind von Beginn an zu Hause. Dies kann\nsich die Familie auch nur leisten, weil der Vater von Ronny ein\nerfolgreicher Geschäftsmann ist, der seine eigene Firma leitet.\nAllerdings ist Herr Bergmann deshalb oft nicht zu Hause, sodass\nFrau Bergmann auf sich alleingestellt ist. Dies überfordert sie\nzunehmend.\nInzwischen ist Ronny vollständig immobil, die Mobilisation in\nseinen Spezialstuhl gestaltet sich immer schwieriger, da die\nKontrakturen an Armen und Beinen stark ausgeprägt sind.\nAufgrund der ausgeprägten Schluckstörungen wird Ronny über\neine perkutane endoskopische Gastrostomie-Sonde (PEG-Sonde)\nernährt. Außerdem hat er einen suprapubischen Katheter.\nFrau Bergmann möchte sich gerne um alles selbst kümmern, um\nihrem Sohn trotz allem ein schönes Leben zu ermöglichen. Dies\nzeigt sich auch darin, dass sie den ambulanten Pflegedienst\nlediglich für die Versorgung der pflegetechnischen Maßnahmen\nengagiert hat und die Körperpflege, Mobilisation und\nNahrungsaufnahme selbst durchführt. Die ständige körperliche\nund psychische Belastung ist ihr inzwischen anzusehen. Hinzu\nkommt, dass die Familie keine sozialen Kontakte gepflegt hat, da\nRonny immer an erster Stelle kam. Auch Ronny hat keine\nFreunde. Frau Bergmann vermied den Kontakt mit anderen\nKindern, um ihn keinem Spott auszusetzen.\nAls Sie das Haus der Familie Bergmann betreten, hören Sie Frau\nBergmann schreien: „Ronny, jetzt mach, was ich dir sage. Ich\nkann langsam nicht mehr!“","questions":[{"num":1,"points":8,"text":"Ordnen Sie die Aussage von Frau Bergmann in das\nKommunikationsmodell von Schulz von Thun ein (8 P.)."},{"num":2,"points":15,"text":"Ermitteln Sie drei Pflegeprobleme von Ronny und\nformulieren Sie für jedes Problem eine Ressource, ein\nentsprechendes Pflegeziel und je zwei Pflegemaßnahmen\n(je 5 P.)."},{"num":3,"points":9,"text":"Wenden Sie die Theorie der „Familien- und\numweltbezogenen Pflege“ von Friedemann auf die Familie\nBergmann an. Erklären Sie hierzu die Theorie (3 P.), und\ninterpretieren Sie die Familiensituation anhand der\nPropositionen zu den Konzepten Familie und Pflege (6 P.)."},{"num":4,"points":6,"text":"Zählen Sie sechs Bedingungen auf, welche Sie im Umgang\nmit künstlichen Ausgängen und deren Zu- und Ableitungen\nbeachten müssen (6 P.)."},{"num":5,"points":6,"text":"Erklären Sie Frau Bergmann die unterschiedlichen\nUnterstützungsangebote für pflegende Angehörige (6 P.)."},{"num":6,"points":6,"text":"Erläutern Sie Kinderrechte aus der UN-\nKinderrechtskonvention, die auf Ronnys Situation\nzutreffen (6 P.)."}],"answers":{"2":"• Pflegeproblem:\n– Ronny hat aufgrund dauerhafter Immobilität Kontrakturen an Armen\nund Beinen.\n• Ressource:\n– Ronny lässt Mobilisation und Bewegungsübungen zu.\n• Pflegeziel:\n– Verbesserung der Durchblutung an den Gewebestrukturen.\n• Pflegemaßnahmen:\n– Passive Bewegungsübungen der Gelenke viermal täglich.\n– Mobilisation in den Spezialstuhl mindestens dreimal täglich.\n• Pflegeproblem:\n– Ronny hat aufgrund von Asthma bronchiale und Immobilität ein\nerhöhtes Pneumonierisiko.\n• Ressource:\n– Ronny lässt Lagerungen zu.\n• Pflegeziel:\n– Förderung der Atemtätigkeit.\n• Pflegemaßnahmen:\n– A-, V- und T-Lagerung im Wechsel mindestens dreimal täglich für\njeweils 15–30 Minuten.\n– 135-Grad-Lagerung dreimal täglich.\n• Pflegeproblem:\n– Ronny hat aufgrund der Immobilität ein erhöhtes Dekubitusrisiko.\n• Ressource:\n– Ronny lässt Lagerungen und Mobilisation zu.\n• Pflegeziel:\n– Die Hautflora bleibt intakt.\n• Pflegemaßnahmen:\n– Tägliche Kontrolle der gesamten Haut\n– 30-Grad-Lagerung beziehungsweise Positionierung im zweistündigen\nRhythmus\n• Pflegeproblem:\n– Ronny hat aufgrund der Immobilität und der Sonden-Nahrung ein\nerhöhtes Obstipations-Risiko.\n• Ressource:…","3":"• Definition Theorie (3 Punkte):\n– Friedemann erkannte die Notwendigkeit der Veränderung in der Pflege\nund Betreuung – von der pathogenetischen zur salutogenetischen\nSichtweise.\n– Ihre Pflegesituationen integrieren Familienmitglieder in den\nPflegeprozess.\n– Außerdem begleiten Pflegende bei ihrer Theorie Familien der\nPflegebedürftigen in umweltbedingten oder familiären Krisen.\n• Propositionen zum Konzept Pflege (jeweils 2 Punkte):\n– Die Pflege ist eine Dienstleistung auf allen Systemebenen (Individuum,\nInteraktionssysteme, Familien, Organisationen, Gemeinden und\nBevölkerung), d. h. die Pflegefachperson von Ronny muss im Hinblick\nauf ihre Rolle und Pflegemaßnahmen die Familie und vernetzten\nSysteme der Umwelt einbeziehen.\n– Das Ziel der Pflege ist der Prozess, der das Streben nach Kongruenz im\nSystem erleichtert oder ermöglicht. Das Ziel des Empfängersystems ist\ndie Gesundheit, d. h. dass nicht das Ziel an sich ausschlaggebend ist,\nsondern der Weg dorthin von der Pflegefachperson genauer betrachtet\nwerden muss. Die Pflegefachperson von Ronny muss darauf achten,\nweitere Erkrankungen zu vermeiden, statt diese dann zu bekämpfen.…","4":"• Händedesinfektion vor geplanten Maßnahmen\n• Handschuhe tragen\n• Aseptische Arbeitsweise beim Legen oder bei der Manipulation am System\n• Herstellerangaben z. B. zur Liegedauer beachten\n• Keine routinemäßigen Wechsel durchführen\n• System regelmäßig auf Durchgängigkeit prüfen\n• Freiliegende Öffnungen so kurz wie möglich offenhalten","5":"• Finanzielle Unterstützung (Pflegegeld)\nDie Pflegeversicherung zahlt das sogenannte Pflegegeld, wenn sich Betroffene\nentscheiden, von Angehörigen, Freunden oder anderen ehrenamtlich\nTätigen versorgen zu lassen.\n• Kombinationsleistung\nUm eine optimale, auf die individuellen Bedürfnisse abgestimmte Pflege zu\ngewährleisten, ist es möglich, den Bezug von Pflegegeld mit der\nInanspruchnahme von ambulanten Pflegesachleistungen zu kombinieren.\nDas Pflegegeld vermindert sich in diesem Fall anteilig im Verhältnis zum\nWert der in Anspruch genommenen ambulanten Sachleistungen.\n• Tagespflege und Nachtpflege\nPflegebedürftige können auch in Einrichtungen der Tagespflege oder der\nNachtpflege gepflegt werden. Unter Tagespflege und Nachtpflege\n(teilstationäre Versorgung) versteht man die zeitweise Betreuung im\nTagesverlauf in einer Pflegeeinrichtung.\n• Soziale Absicherung der Pflegeperson\nDie Pflegeversicherung zahlt für pflegende Angehörige u. a. Beiträge zur\nRentenversicherung sowie Rentenversicherungsbeiträge.\n• Pflegekurse für Angehörige\nDie Pflegekassen führen für Personen, die Angehörige pflegen oder sich\nehrenamtlich um Pflegebedürftige kümmern, unentgeltlich Schulungskurse\ndurch.…","6":"• Recht auf Gleichheit: Alle Kinder haben die gleichen Rechte. Kein Kind darf\nbenachteiligt werden.\n• Recht auf Gesundheit: Jedes Kind hat das Recht, gesund zu leben. Das\numfasst ausreichende Ernährung, sauberes Trinkwasser, medizinische\nBehandlung, Schutz vor Umweltverschmutzung und mehr.\n• Recht auf Spiel und Freizeit: Kinder haben das Recht zu spielen, sich zu\nerholen und künstlerisch tätig zu sein.\n• Recht auf besondere Fürsorge und Förderung bei Behinderung: Kinder mit\nBehinderungen haben das Recht auf besondere Fürsorge und Förderung.\nLiteratur\n1. Amnesty international. Kinderrechte. O.J. Aus:\nhttps://www.amnesty.at/themen/kinderrechte/ (letzter Zugriff:\n08.04.2023).\n2. Bundesministerium für Gesundheit. Pflege zu Hause: Finanzielle\nUnterstützung und Leistungen für die ambulante Pflege. 2022. Aus:\nhttps://www.bundesgesundheitsministerium.de/pflege-zu-\nhause.html (Letzter Zugriff: 08.04.2023).\n3. Deutsches Netzwerk für Qualitätsentwicklung in der Pflege (DNQP).\nNationaler Expertenstandard Dekubitusprophylaxe in der Pflege. 2. Akt.\nhttps://www.dnqp.de/expertenstandards-und-\nauditinstrumente/#c18067 (Letzter Zugriff: 08.04.2023).\n4. Helms F. Verstopfung. 2023.…"}}]},{"num":9,"title":"Sechstes Prüfungsbeispiel","tag":"tag1","cases":[{"setting":"Stationäre Akutpflege","title":"„Mama, mein Bauch tut so weh“","text":"„Mama, mein Bauch tut so weh“\nSie arbeiten als Pflegefachperson in der St. Johannes Kinderklinik\nin Bernbach auf einer chirurgischen Station. Bei der Übergabe des\nNachtdienstes erfahren Sie über die Patientin Lea Steininger: „Lea\nist 12 Jahre alt und kam gestern gegen 22 Uhr in Begleitung ihrer\nMutter in die Notaufnahme aufgrund starker kolikartiger\nBauchschmerzen. Daraufhin folgte die Anlage einer\nVenenverweilkanüle wegen möglicher Schmerzmittel. Blutwert\nwar unauffällig. Danach wurde sie stationär aufgenommen. Ihre\nDiagnose lautet: Akutes Abdomen. Lea wollte ohne ihre Mutter\nhierbleiben und hat nachts mehrfach starke Ängste vor\nOperationen geäußert.“\nSie gehen in Leas Zimmer zur Vitalzeichenkontrolle. Leas\nMutter ist bereits da. Lea sitzt in Schonhaltung in ihrem Bett und\nschaut auf ihr Handy. Sie antwortet auf Ihre Frage, wie es ihr geht,\nmit weinerlicher Stimme: „Ich habe so eine große Angst vor einer\nOperation, aber ich will einfach nur das dieses Bauchweh\naufhört. Ich halte es nicht mehr aus“. Leas Mutter fügt hinzu: „Ja,\nwas ist denn eigentlich hier los? Niemand hat Lea bisher\nuntersucht! Wenn eh nichts gemacht wird, können wir ja auch\nwieder gehen“. Sie versuchen die Mutter zu beruhigen und messen\nLeas Vitalzeichen. Ihre Temperatur ist bei 38,5 Grad.\nGegen 11 Uhr erfahren Sie von der Stationsärztin Dr. Sommer,\ndass bei den Untersuchungen bisher nichts festgestellt wurde und\nLea noch ein paar Tage zur Beobachtung auf Station bleiben soll.\nWährend Dr. Sommer ein langes Gespräch mit Frau Steininger\nführt, sind Sie allein mit Lea, ihrer Bettnachbarin Luisa und deren\nMutter. Luisas Mutter fragt Sie neugierig: „Wissen Sie denn\nwirklich nicht, was mit der kleinen Lea los ist?“","questions":[{"num":1,"points":8,"text":"Erklären Sie die SMART-Regel für korrekte Pflegeziele,\nindem Sie die einzelne Bedeutung der Buchstaben\naufzählen (5 P.). Formulieren Sie anschließend drei\nPflegeziele für Lea (3 P.)."},{"num":2,"points":6,"text":"Erklären Sie die Begriffe subjektive und objektive\nInformationen (2 P.), und nennen Sie jeweils zwei\nBeispiele (4 P.), die Ihnen die Informationssammlung\nbezüglich Lea möglich machen."},{"num":3,"points":8,"text":"Nennen Sie die vier Ebenen der Kommunikation (4 P.)\nnach Schulz von Thun und analysieren Sie Leas Aussage:\n„Ich habe so eine große Angst vor Operationen“\ndahingehend (4 P.)."},{"num":4,"points":4,"text":"Luisas Mutter fragt Sie, was mit Lea los ist. Diese\nInformation ist vertraulich. Es gibt jedoch Ausnahmen bei\nder Verletzung der Schweigepflicht. Nennen und\nbegründen Sie zwei dieser Ausnahmen (4 P.)."},{"num":5,"points":4,"text":"Nennen Sie vier allgemeine Maßnahmen im Umgang mit\nLea, um eine Beeinträchtigung ihrer Entwicklungsphase zu\nverhindern (4 P.)."},{"num":6,"points":8,"text":"Nennen Sie vier ABEDL (4 P.) nach Krohwinkel und\nüberlegen Sie sich zu jedem ABEDL ein Beispiel bezüglich\nder pflegerischen Unterstützung von Lea (4 P.)."},{"num":7,"points":5,"text":"Lea äußert Schmerzen. Nennen Sie die beiden\nSchmerzarten (2 P.) und ordnen Sie Leas Schmerz einer\nArt zu (1 P.). Zählen Sie zwei Unterschiede zwischen den\nSchmerzarten auf (2 P.)."},{"num":8,"points":7,"text":"Leas Mutter wirkt sehr unzufrieden mit der Situation.\nDurch die unzureichende Kommunikation wurde die\nQualität der Pflege beeinflusst. Nennen Sie vier\nInstrumente (4 P.), um die Qualität im Krankenhaus\nüberprüfbar zu machen. Nennen Sie anschließend die drei\nQualitätsebenen nach Donabedian (3 P.)."}],"answers":{"1":"Die einzelnen Buchstaben der SMART-Regel besagen Folgendes:\n• S: spezifisch\n• M: messbar\n• A: akzeptiert\n• R: realisierbar\n• T: terminierbar\nPflegeziele:\n• Die Patientin ist in zwei Tagen schmerzfrei.\n• Die Patientin hat bis Ende des Krankenhausaufenthaltes\nBewältigungsstrategien entwickelt, die ihr helfen, ihre Ängste vor\neiner Operation zu reduzieren.\n• Die Patientin schläft bis in zwei Tagen nachts mindestens sechs\nStunden durch.","2":"• Subjektive Information geben die persönliche Ansicht einer\nPerson, ihre Einschätzung und Empfindungen wieder. Beispiele:\nBefragung der Patientin unter Beachtung der Rechte der Patientin,\nBefragung der Mutter unter Beachtung der Rechte von\nAngehörigen, gezielte Beobachtung der Patientin\n• Objektive Information sind messbar und können überprüft\nwerden. Beispiele: Anwendung von Assessmentinstrumenten wie\nz. B. Schmerzskala, Pflege- und Überleitungsberichte,\nKrankengeschichte und Untersuchungsergebnisse, Kontrolle der\nVitalzeichen","3":"• Sachinhalt: „Ich habe Angst.“\n• Appell: „Hilf mir, damit ich keine Angst mehr habe.“\n• Beziehung: „Hör mir zu, ich bin deine Patientin.“\n• Selbstoffenbarung: „Ich bin verunsichert, da ich noch nie eine\nOperation hatte.“","4":"• Kooperation mit Kinderschutzstellen: Informationen bei\neinem Verdacht auf Kindesmisshandlungen müssen an das\nJugendamt weitergegeben werden.\n• Infektionsschutzgesetz: Meldungen von bestimmten\nInfektionskrankheiten müssen an das Gesundheitsamt\nweitergegeben werden.","5":"• Pflegende wahren die Intimsphäre von Lea.\n• Informationen werden Lea altersgerecht vermittelt.\n• Absprachen werden mit Lea gemeinsam getroffen.\n• Die Unterstützung der Selbstständigkeit von Lea steht im\nMittelpunkt.\n• Pflegende stellen in Absprache mit dem Arzt Kontakt zu anderen\nBerufsgruppen her wie Psychologen, Pädagogen.\n• Altersgerechte Beschäftigungsangebote wie z. B. Kicker, Musik oder\nBücher werden gestaltet.","6":"Z. B.:\n• Kommunizieren können: Vertrauen zu Lea aufbauen, indem\nman sich Zeit für Gespräche nimmt.\n• Sich bewegen können: Lea das Angebot machen, mit ihrer\nMutter oder durch Begleitung einer Pflegekraft an die frische Luft\nzu gehen.\n• Sich pflegen können: Lea anbieten, ihre eigenen Pflegemittel zu\nverwenden und zuvor Schmerzmittel verabreichen nach\nArztanordnung, sodass Lea sich soweit es geht selbstständig\npflegen kann.\n• Ausscheiden können: Lea ballaststoffreiche und leicht\nverdauliche Kost anbieten, Intimsphäre wahren.\n• Ruhen, schlafen, entspannen können: Lea Zeit für sich selbst\ngeben, Pflegetätigkeiten bündeln.\n• Soziale Kontakte und Beziehungen sichern und gestalten\nkönnen: Lea über die Besuchszeiten informieren, sodass sie\nFreude zu sich einladen kann.","7":"• Akute Schmerzen: Diese äußern sich als kurze und plötzlich\nauftretende Schmerzen; das Ziel bei akuten Schmerzen ist die\nBeseitigung der Ursachen. Leas Schmerz ist ein Akutschmerz.\n• Chronische Schmerzen: Sie sind langanhaltend wiederkehrend\n(länger als 3–6 Monaten); das Ziel bei chronischen Schmerzen ist\ndie Minderung der Beeinträchtigung.","8":"• Instrumente des Qualitätsmanagements:\nRisikomanagement, Pflegevisiten, Checklisten, Qualitätszirkel,\nUmsetzung des PDCA-Zyklus, Fehlermanagement\n• Drei Ebenen nach Donabedian: Struktur-, Prozess- und\nErgebnisqualität\nLiteratur\n1. Deutsches Netzwerk für Qualitätsentwicklung in der Pflege\n(Hrsg.). Expertenstandard Schmerzmanagement in der\nPflege. Akt. 2020. Osnabrück: DNQP, 2020.\n2. Elsevier GmbH (Hrsg.). Checklisten Pflegeplanung 5. Aufl.\nMünchen: Elsevier, 2019.\n3. Schwerdt C. Pflegeplanung. Formulierungshilfen für\nProbleme, Ressourcen, Ziele und Maßnahmen. 5. Aufl.\nHamburg: Handwerk und Technik, 2022.\n4. Weigert J. Qualitätsmanagement: Ein praktischer Leitfaden\nfür die ambulante, teil- und vollstationäre Altenpflege. 3. Aufl.\nHannover: Schlüterscher, 2019."}},{"setting":"Stationäre Langzeitpflege","title":"„Hilfe, da ist ein Mann“","text":"„Hilfe, da ist ein Mann“\nSie arbeiten als Pflegefachperson im sächsischen Altenpflegeheim\n„Abendsonne“. Heute haben Sie Spätdienst im Wohnbereich 2.\nFrau Elfriede Schneider wohnt seit vielen Jahren in diesem\nWohnbereich. Sie ist 69 Jahre alt und hat morgen Geburtstag. Ihre\nbeiden Kinder wollen sie morgen Nachmittag besuchen und zu\nKaffee und Kuchen ausführen. Frau Schneider ist seit 20 Jahren\ngeschieden, zu ihrem Ex-Mann besteht nur sehr selten\npersönlicher Kontakt. Manchmal ruft Herr Schneider an und\nerkundigt sich nach ihr. Frau Schneider ist eine freundliche Dame,\ndie gern ein kleines Schwätzchen mit dem Personal hält. Durch\nihre fortgeschrittene Arthrose in beiden Knien ist sie nicht mehr so\ngut auf den Beinen. Mit ihrem Rollator fühlt sie sich aber sicher\ngenug, auf dem Wohnbereich umherzulaufen. Dennoch benötigt\nsie für die Bewältigung des Alltags regelmäßige Unterstützung.\nAufgrund ihrer Schmerzen in den Knien vermag Frau Schneider\nden Transfer in ihr Bett nicht allein bewältigen. Da sie zudem\nadipös ist (Größe 168 cm, Gewicht 92 kg), kann sie sich im Bett\nkaum drehen. Frau Schneider weiß, wie beschäftigt das\nPflegepersonal ist und bittet darum selten um Hilfe. Vor einigen\nJahren wurde bei ihr eine paranoide Schizophrenie festgestellt.\nDiese äußert sich besonders in Belastungs- und Stresssituationen\ndurch visuelle und akustische Halluzinationen. Dann wirkt Frau\nSchneider geistig abwesend und realitätsfern. Ihre Kollegin hatte\nzur Schichtübergabe geäußert: „Irgendwie wirkt Frau Schneider\nheute seltsam!“, ohne weiter darauf einzugehen. Zum Abendessen\nsitzt Frau Schneider an ihrem Tisch, isst und trinkt fast gar nichts.\nSie hören sie seufzen „Ach, ich alte Frau kann doch gar nichts\nmehr!“ Sie setzen sich zu ihr, um sie aufzumuntern. Dabei\nerwähnen Sie den Besuch der Kinder am nächsten Tag. Frau\nSchneider lächelt Sie dankbar an. Während des abendlichen\nDuschens fallen Ihnen die fahrigen Bewegungen und der immer…","questions":[{"num":1,"points":10,"text":"Analysieren Sie die Situation hinsichtlich der\npflegerelevanten Informationen (9 P.) und stellen Sie diese\nübersichtlich dar (1 P.)."},{"num":2,"points":10,"text":"Erklären Sie das Krankheitsbild der Schizophrenie (3 P.)\nund nehmen Sie dabei Bezug zu den Symptomen der\nBewohnerin (7 P.)."},{"num":3,"points":10,"text":"Beschreiben Sie ihr kommunikatives Vorgehen in der\nakuten Situation. Beachten Sie dabei das Krankheitsbild\nvon Frau Schneider (10 P.)."},{"num":4,"points":10,"text":"Wählen Sie eine Alternstheorie aus, die Sie für die\nMaßnahmenplanung bei Frau Schneider als passend\nerachten. Erklären (5 P.) und begründen (5 P.) Sie Ihre\nEntscheidung."},{"num":5,"points":10,"text":"Nennen Sie zehn Maßnahmen, die Sie ergreifen, um Frau\nSchneider in ihrem Alltag zu unterstützen (10 P.)."}],"answers":{"2":"• Eigene Emotionen in der Situation werden erkannt. Die Emotionen\nvon Frau Schneider, wie z. B. ihre Angst, können eingeordnet\nwerden. In der Kommunikation mit der Bewohnerin werden die\nGrundprinzipien der Empathie, Wertschätzung, Achtsamkeit und\nKongruenz beachtet.\n• Die Halluzination und die Angst von Frau Schneider werden ernst\ngenommen. Sie empfindet das tatsächlich so. Lügen werden\nvermieden. Keine Debatten über unterschiedliche\nWahrnehmungen. Unterschiedliche Meinungen dürfen sein.\n• Gefühlvolle Ablenkung mit neutralen Themen. Dabei wird aktiv\nzugehört und Blickkontakt gehalten. Bei guter Beziehung zur\nBewohnerin mit Initialberührungen arbeiten. Ruhige Tonlage und\nmäßige Lautstärke der Stimme tragen zur Beruhigung der\nBewohnerin bei.\n• Wenn es die Bewohnerin wünscht, kann über deren Gefühlslage in\nder akuten Situation gesprochen werden, ohne dabei auf die\nWahnvorstellungen einzugehen.\n• Sicherheit anbieten, indem darauf verwiesen wird, dass Fenster\nund Türen verschlossen werden.\n• Auf eigene Sicherheit achten, da schizophrene Patienten unter\nUmständen zu affektiven Ausbrüchen neigen.","4":"• Alternstheorien beschreiben den Alterungsprozess und deren\nAuswirkungen auf den Menschen aus unterschiedlichen\nBlickwinkeln. Demnach sind z. B. defizitorientierte Theorien von\nden ressourcenorientierten Theorien zu unterscheiden.\n• So betrachten die biologischen Theorien des Alterns, diesen\nProzess als generellen Abbau physiologischer und psychologischer\nFähigkeiten. Dieser Funktionsverlust sei zeitanhängig und\nirreversibel, führe letztlich zum Tod.\n• Die Theorien erfolgreichen Alterns versuchen dagegen\nMöglichkeiten zu finden, um defizitäre Funktionen\nwiederherzustellen bzw. noch bestehende Funktionen\naufrechtzuerhalten. Im Kompensationsmodell z. B. werden unter\nZeitzuwendung, Aufmerksamkeit und Übung bisherige Strategien\nund entsprechende Fertigkeiten entweder neu erworben oder\nanders eingesetzt.\n• Frau Schneider leidet neben einer paranoiden Schizophrenie unter\nAdipositas und Arthrose in beiden Knien. Mit dem Fokus auf die\nbestehenden Defizite wäre eine weitere Verschlechterung\ninsbesondere des psychischen Zustandes von Frau Schneider zu\nbefürchten. Sie äußerte bereits, dass sie als alte Frau gar nicht\nmehr kann. Demnach ist eine ressourcenorientierte Alternstheorie…","5":"• Kontinuierliche Bezugspflege schafft Vertrauen und ein\nSicherheitsgefühl\n• Aufbau einer guten Beziehung unter Wahrung von Nähe und\nDistanz\n• Kommunikative Angebote wie z. B. Gespräche über Wünsche und\nTräume\n• Einbezug von anderen Professionen wie Alltagsgestalter,\nErgotherapeuten etc.\n• Mit Einstiegshilfen oder Niedrigbett Transfer erleichtern\n• Erlernen von Lagerungsmöglichkeiten, ggf. über technische\nAssistenzsysteme\n• Durch Teilnahme an Auswahl und Zubereitung der Nahrung z. B.\nGewichtsreduktion erleichtern\n• Für eine Förderung der Mobilität, Schmerzreduktion durch\nMedikation nach ärztlicher Anordnung\n• Bewegungsangebote z. B. Sitz-Tanz erleichtern die\nGewichtsabnahme\n• Angebote zur Stressreduktion z. B. durch Entspannungstechniken\nwie Autogenes Training\n• Kinder mit einbeziehen, regelmäßigen Kontakt ermöglichen ggf.\nüber Technik wie PC\n• Je nach Interessen neue Hobbys erlernen, wie z. B. malen,\nHandarbeiten, Rätseln"}}]},{"num":10,"title":"Siebtes Prüfungsbeispiel","tag":"tag1","cases":[{"setting":"Stationäre Akutpflege","title":"(Fallsituation)","text":"„Jetzt schwächelt auch noch die andere Hälfte meines\nHerzens“\nJaqueline Arent ist 59 Jahre alt und leidet seit ein paar Jahren an\neiner Linksherzinsuffizienz. Anfangs hatte Jaqueline Arent an\neinen Infekt gedacht, da sie ständig Rasselgeräusche in der Lunge\nsowie eine Belastungsdyspnoe hatte und sie in schlechten Phasen\nvermehrt ihre Atemhilfsmuskulatur einsetzen musste. Erst als die\neingeschränkte Leistungsfähigkeit und die schnelle Ermüdung\nhinzukamen, ist sie doch zum Hausarzt gefahren. Dieser hat eine\nLinksherzinsuffizienz diagnostiziert und Frau Arent mit\nMedikamenten gut eingestellt. Nun ein paar Jahre später bemerkt\nSie wieder deutliche Veränderungen an ihrem Körper. Ihre Beine\nund Füße sind abends vermehrt dicker, sodass sich Abdrücke von\nihren Schuhen und Socken an den Beinen und Füßen abzeichnen.\nZudem hat sie in den letzten Wochen an Gewicht zugenommen,\ndass schiebt sie aber auf die ungesunde Ernährung durch die\nstressigen Arbeitstage. Das Rauchen hat sie auch wieder\nangefangen. Jaqueline Arent arbeitet mittlerweile als Bauleiterin\nbei einem großen Bauunternehmer und hat ein großes Projekt\nübertragen bekommen, auf das sie besonders stolz ist. Aus diesem\nGrund achtet Frau Arent nicht so sehr auf die Symptome, wie es\nihr der Hausarzt empfohlen hat. Bei einem Besuch auf der\nGroßbaustelle wird Jaqueline Arent zunächst schwindelig und\nbittet Ihren Kollegen und guten Freund um ein Glas Wasser. Als\ndieser wiederkommt hat Frau Arent bereits starke Luftnot, wird\nganz blau im Gesicht und drückt sich die Hände gegen die Brust.\nEntsetzt wählt ein Kollege den Notruf.\nSie arbeiten auf der kardiologischen Station in der stationären\nAkutpflege. In diesen Bereich wird Frau Arent nach der\nVersorgung in der Ambulanz stationär aufgenommen. Die Ärzte\nhaben eine dekompensierte globale Herzinsuffizienz mit einem\nLungenödem diagnostiziert. Sie übernehmen gemeinsam mit der\nAuszubildenden Verena Muck die Versorgung von Frau Arent. Als…","questions":[{"num":1,"points":4,"text":"Listen Sie vier pflegerelevante Informationen auf, welche\nSie aus dem Fall entnehmen können (4 P.)."},{"num":2,"points":15,"text":"Erarbeiten Sie für Frau Arent eine Pflegeplanung mit drei\nPflegeproblemen (3 P.), jeweils einer Ressource (3 P.),\neinem Pflegeziel (3 P.) und zwei Pflegemaßnahmen (6 P.)."},{"num":3,"points":4,"text":"Corbin und Strauss haben das Trajectory-Work-Modell mit\ndem Schwerpunkt chronisch-kranke Menschen entwickelt.\nDazu wurden von Corbin und Strauss acht Phasen\nentwickelt. Nennen Sie vier der acht Phasen (4 P.)."},{"num":4,"points":5,"text":"Begründen Sie mithilfe des Modells von Corbin und\nStrauss, in welcher Phase sich Frau Arent Ihrer\nEinschätzung nach befindet (1 P.). Begründen Sie Ihre\nAuswahl mit zwei Argumenten (4 P.)."},{"num":5,"points":7,"text":"Definieren Sie den Unterschied zwischen einer Links-,\nRechts- und Globalinsuffizienz (3 P.) und nennen Sie vier\ntypische Diagnostikmöglichkeiten für die Erkrankung (4\nP.)."},{"num":6,"points":8,"text":"Ordnen Sie den vier NYHA-Stadien (New York Heart\nAssociation) die subjektiven Beschwerden (4 P.) und die\nAussagen zum Herzminutenvolumen korrekt zu (4 P.).\nNYHA Subjektive Beschwerden und\nStadium Herzminutenvolumen (HMV)\nI\nII\nIII\nIV\n• Beschwerden treten schon in Ruhe auf\n• HMV reicht bis zu einer leichten Belastung aus\n• Körperliche Beschwerden bei mittelschwerer körperlicher\nBelastung\n• HMV unter Belastung normal\n• Herzerkrankung ohne körperliche Beschwerden\n• HMV ist in Ruhe reduziert\n• Körperliche Beschwerden bei leichter körperlicher Belastung\n• HMV ist bereits bei Belastung reduziert"},{"num":7,"points":6,"text":"Erklären Sie Frau Arent mit drei Aspekten, wie sie sich bei\neiner dekompensierten Herzinsuffizienz richtig ernähren\nund worauf sie achten sollte (6 P.)."},{"num":8,"points":4,"text":"Legen Sie mit zwei unterschiedlichen Argumenten dar,\nwarum das Thema Rauchentwöhnung bei Frau Arent so\nwichtig ist (4 P.)"},{"num":9,"points":9,"text":"Erklären Sie der Auszubildenden Verena Muck, wie die\nHerzbettpositionierung funktioniert, da diese für Frau\nArent beschwerdelindernd und atemerleichternd ist.\nBerücksichtigen Sie bei Ihrer Ausführung mit jeweils drei\nAspekten die Schwerpunkte: was beachtet werden muss (3\nP.), die Wirkung (3 P.) und mögliche Kontraindikationen\n(3 P.)."},{"num":10,"points":4,"text":"Nennen Sie die drei ursächlichen Virchow-Faktoren für die\nEntstehung einer Thrombose (3 P.). Welcher Faktor trifft\nauf Frau Arent zu (1 P.)?"},{"num":11,"points":3,"text":"Begründen Sie, warum Sie im Rahmen der\nThromboseprophylaxe bei Frau Arent besonders vorsichtig\nsein müssen (3 P.)."},{"num":12,"points":6,"text":"Erläutern Sie drei pflegerische Maßnahmen, die bei Frau\nArent wichtig sind, da Sie aktuell mit Diuretika behandelt\nwird (6 P.)."},{"num":13,"points":4,"text":"Nennen Sie vier Körperregionen, welche bedingt durch die\nBettruhe von Frau Arent besonders dekubitusgefährdet\nsind (4 P.)."},{"num":14,"points":13,"text":"Der Stationsarzt bittet Sie am nächsten Tag Frau Arent zu\nmehreren Themen zu beraten. Ermitteln Sie zunächst vier\nStrategien, um eine geeignete Atmosphäre für eine\nBeratung zu ermöglichen (4 P.). Beraten Sie Frau Arent\nausführlich mit jeweils drei Aspekten zum Thema\nSelbstkontrolle der Vitalparameter, selbstständige\nGewichtskontrolle und Bewegungsförderung (9 P.)."},{"num":15,"points":4,"text":"Geben Sie vier Beobachtungskriterien an, welche auf eine\nExsikkose hinweisen (4 P.)."},{"num":16,"points":4,"text":"„Oh nein, ich hoffe ich komme schnell wieder auf die\nBeine, jetzt wo beide Herzkammern geschwächt sind?\nKann ich nicht mit Unterstützung nach Hause und vom\nHausarzt behandelt werden?“ (Zeile 46 ff.). Interpretieren\nSie diese Aussage (4 P.)."}],"answers":{"1":"• Beine sind ödematös\n• Raucht wieder\n• Pathologische Vitalparameter: Herzfrequenz 145, Blutdruck 90/50\nmmHg, Sauerstoffsättigung von 98 % unter 3 Litern\nSauerstofftherapie pro Minute\n• Dyspnoe\n• Bettruhe (bedingt durch die geringe körperliche Belastung und\nschnelle Erschöpfung)\n• Exsikkosegefahr (Diuretika)","2":"4. Begründen Sie mithilfe des Modells von Corbin und Strauss,\nin welcher Phase sich Frau Arent Ihrer Einschätzung nach\nbefindet (1 P.). Begründen Sie Ihre Auswahl mit zwei\nArgumenten (4 P.). 5 Punkte\nPhase:\nAkute Phase\nBegründung:\n• Im Fall wird deutlich, dass Frau Arent bedingt durch das neue\ngroße Projekt und ihre Funktion als Bauleiterin, die\nKrankheitssymptome seit einiger Zeit nicht mehr beachtet und\nerkennt.\n• Die Krankheit führt zu einer notfallmäßigen Aufnahme in die\nstationäre Akutpflege.\n• Die aktuellen neuen Beeinträchtigungen machen ihr sehr zu\nschaffen.\n• Die krankheitsbedingten Belastungen und Komplikationen nehmen\nzu.","5":"Definitionen und Unterschiede:\n• Linksherzinsuffizienz → Die Herzschwäche liegt in der linken\nHerzkammer vor.\n• Rechtsherzinsuffizienz → Die Herzschwäche liegt in der rechten\nHerzkammer vor.\n• Globalinsuffizienz → Die Herzschwäche liegt in beiden\nHerzkammern vor.\nDiagnostik:\n• (Langzeit-)EKG\n• Belastungsuntersuchungen:\n– Belastungs-EKG\n– Myokardszintigrafie\n– Stressechokardiografie\n• Echokardiografie\n• Labor (Blutabnahme)\n• Ggf. Herzkatheteruntersuchung mit Koronarangiografie","6":"NYHA Subjektive Beschwerden und\nStadium Herzminutenvolumen (HMV)\nI\n• Herzerkrankung ohne körperliche Beschwerden\n• HMV unter Belastung normal\nII\n• Körperliche Beschwerden bei mittelschwerer\nkörperlicher Belastung\n• HMV reicht bis zu einer leichten Belastung aus\nIII\n• Körperliche Beschwerden bei leichter körperlicher\nBelastung\n• HMV ist bereits bei Belastung reduziert\nIV\n• Beschwerden treten schon in Ruhe auf\n• HMV ist in Ruhe reduziert","7":"Die Ernährung wird bei einer dekompensierten Herzinsuffizienz zunächst\numgestellt:\n• nicht blähende, leicht verdauliche und eiweißreiche Kost\nermöglichen,\n• mehrmals am Tag kleinere Mahlzeiten anbieten,\n• Trinkmenge wird auf 1,5 Liter pro Tag reduziert → Getränke über\nden Tag gut einteilen,\n• Kochsalzmenge dauerhaft reduzieren, nicht nachsalzen und auf\nsalzige Lebensmittel verzichten.","8":"• Bei einer Herzinsuffizienz gilt das Rauchen als Risikofaktor. Aus\ndiesem Grund sollten die Pflegefachpersonen eine\nRauchentwöhnung vorschlagen.\n• Wenn Frau Arent mit dem Rauchen aufhört, so reduziert sie\nsignifikant ihr Risiko zu sterben.\n• Das Risiko einer Hospitalisierung kann ebenfalls signifikant\nreduziert werden.\n• Rauchen ist bei einer Herzinsuffizienz schädlich, da es die\nKurzatmigkeit weiter verschlechtert, da durch das Rauchen die\nErythrozyten weiter blockiert werden.","9":"Virchow-Trias:\n• Veränderungen in der Zusammensetzung des Blutes (Blutfaktor:\nVeränderung der Blutzusammensetzung bzw. erhöhte\nBlutgerinnungsneigung)\n• Veränderungen der Strömungsgeschwindigkeit des Blutes\n(Kreislauffaktor: Mangelhafte Blutzirkulation bzw. verlangsamter\nvenöser Rückfluss)\n• Veränderungen an der Gefäßwand\n(Gefäßwand-/Endothelschädigung)\nFallbezogener Faktor bei Frau Arent:\nBei Frau Arent spielt der Kreislauffaktor (verlangsamter venöser\nRückfluss) bedingt durch ihre Herzinsuffizienz eine wesentliche Rolle.","11":"• Frau Arent hat, bedingt durch ihre dekompensierte\nHerzinsuffizienz ausgeprägte Unterschenkelödeme.\n• „Kompressionsstrümpfe“ sind durch die Ödeme meist zu eng und\nschnüren die Beine von Frau Arent weiter ein.\n• Wenn eine Kompression stattfinden muss, dann werden die Beine\ngewickelt. Sie sollten auf jeden Fall vorher mit dem Arzt klären,\ninwieweit der vermehrte Flüssigkeitsrückstrom und die zusätzliche\nBelastung des Herzens für Frau Arent gefährlich werden könnten.\n• Aus den oben genannten Gründen werden alle Maßnahmen im\nRahmen der Thromboseprophylaxe mit dem Arzt im Vorhinein\nabgesprochen.","12":"• Eine tgl. Vitalzeichenkontrolle (Blutdruck und Puls) sind wichtig,\num eine Exsikkose frühzeitig zu erkennen und gegensteuern zu\nkönnen.\n• Die regelmäßigen (anfangs täglichen) Gewichtskontrollen zeigen\nauf, ob die Dosierung der Diuretika bei Frau Arent ausreichen und\nWirkung zeigen.\n• Frau Arent führt zusätzlich eine Flüssigkeitsbilanzierung durch, um\ndie Ein- und Ausfuhr zu kontrollieren und eine Über- oder\nUnterdosierung frühzeitig zu erkennen.\n• Verabreichung der Diuretika möglichst morgens, damit Frau\nArents nachts nicht so oft zur Toilette muss und ausreichend\nSchlaf erhält.\n• Beobachtung des Hautturgors und der Ödeme.","13":"• Schulterblatt\n• Wirbelsäule (Vorsprünge durch die Wirbel-Dornfortsätze)\n• Kreuzbein\n• Schulterblätter\n• Ferse.","14":"Strategien für eine geeignete Beratungsatmosphäre:\n• Aktives Zuhören und Konzentration nur auf Frau Arent\n• Ausreichend Zeit einplanen\n• Empathisches Verhalten\n• Interesse und Zuwendung für Frau Arent\n• Perspektivwechsel durchführen und sich auch mal in die Lage von\nFrau Arent hineinversetzen\n• Nach Ressourcen suchen\nSelbstkontrolle der Vitalparameter:\n• Stressige Situationen vermeiden, welche die Vitalparameter\npathologisch beeinflussen können (diese Situationen in einem\nTagebuch notieren und reduzieren)\n• Blutdruck und Puls immer zur gleichen Zeit und unter den gleichen\nBedingungen kontrollieren und die Werte in einem\nTagebuch/Protokoll notieren\n• Bei Veränderungen der Parameter frühzeitig den Hausarzt\naufsuchen\nGewichtskontrolle:\n• Tägliche Gewichtskontrolle einführen, da Frau Arent bereits\nmehrfach wegen Ihrer Herzinsuffizienz in der stationären\nAkutpflege war\n• Gewichtskontrolle immer unter den gleichen Bedingungen\ndurchführen: immer um dieselbe Uhrzeit und mit ähnlicher\nBekleidung, z. B nur in Unterwäsche oder im Schlafanzug\n• Gewicht in einem Protokoll notieren und zu den Arztbesuchen\nmitnehmen\n• Bei starken und schnellen Gewichtsveränderungen frühzeitig den…","15":"• Durst/Leistungsabfall\n• Konzentrierter Urin und/oder harter Stuhl\n• Trockene Schleimhäute\n• Verwirrtheit\n• Niedriger Blutdruck, schneller Puls, Schwindel\n• Hautturgor ist vermindert\n• Abgeschlagenheit\n• Vigilanzminderung\n\n1. AMBOSS. Herzinsuffizienz. 2023. Aus:\nhttps://www.amboss.com/de/wissen/Herzinsuffizie\nnz (letzter Zugriff: 08.04.2023).\n2. Bundesärztekammer (BÄK), Bundesärztekammer (KBV),\nArbeitsgemeinschaft der Wissenschaftlichen Medizinischen\nFachgesellschaften (AWMF). NVL Chronische\nHerzinsuffizienz. 2019. Aus:\nhttps://www.leitlinien.de/themen/herzinsuffizienz/3\n-auflage (letzter Zugriff: 08.04.2023).\n3. Bundesärztekammer (BÄK), Arbeitsgemeinschaft der\nWissenschaftlichen Medizinischen Fachgesellschaften\n(AWMF). NVL Herzschwäche. Warum es hilft, aufs Rauchen\nzu verzichten. 2019. Aus: https://www.patienten-\ninformation.de/medien/patientenblaetter/herzi"}}]},{"num":11,"title":"Achtes Prüfungsbeispiel","tag":"tag1","cases":[{"setting":"Ambulante Langzeitpflege","title":"„Es ist alles grau in meinem Leben“","text":"„Es ist alles grau in meinem Leben“\nSie begegnen Henriette Oelschläger als Klientin des ambulanten\nDienstes, in dem Sie Ihren Facheinsatz absolvieren. Frau\nOelschläger ist 71 Jahre alt, verwitwet und lebt alleine in einer\nDreizimmerwohnung im vierten Stock eines Mietshauses in\nMünster. Mit ihrem einzigen Sohn hat sie seit Jahren keinen\nKontakt mehr. Sie hat Ihnen einmal erzählt, dass sie in dem Haus,\nwo sie wohnt, niemanden kennt. In der Pflegedokumentation\nlesen Sie folgende Diagnosen: Herzinsuffizienz, chronisch venöse\nInsuffizienz, Gonarthrose bds., Z. n. Alkoholabusus, reaktive\nDepression, V. a. Schlafstörungen. Bei den Medikamenten, die Sie\nrichten, finden sich u. a. ein Antidepressivum (Citalopram®) und\nein Schlafmittel (Ximovan®).\nFrau Oelschläger wirkt auf Sie ungepflegt und im Alltag\nüberfordert. Sie weist ausgeprägten Körper- und Mundgeruch auf,\ndie Haare wirken strähnig und die Wohnung sieht nicht sehr\nsauber aus. Eigentlich würden Sie gerne etwas sauber machen,\naber Ihre Anleiterin, Frau Heller, hat sie auf das Leistungspaket\nverwiesen, das für Frau Oelschläger vorgesehen ist. In diesem\nRahmen ist es ist nur vorgesehen, dass Sie das Bett machen. Sie\nwird lediglich dreimal in der Woche bei der Körperpflege\nunterstützt, will aber auch da nur das Nötigste gemacht haben.\nSie halten Frau Oelschlägers Wohnsituation nicht für optimal:\nIm Haus gibt es keinen Aufzug, es liegen lose Teppiche auf dem\nBoden, die Gonarthrose macht Frau Oelschläger im Alltag,\nbesonders beim Treppensteigen, sehr zu schaffen. Dadurch trinkt\nsie beispielsweise nur Leitungswasser, da sie Getränke in Flaschen\nnicht transportieren kann. Sie selbst würde allerdings nie aus ihrer\nWohnung ausziehen wollen, die ihr ein Gefühl von Heimat gibt.\nEines Tages haben Sie etwas Zeit und unterhalten sich mit Frau\nOelschläger. Sie erzählt: „Irgendwie macht mir nichts mehr\nFreude, in meinem Leben ist alles grau.“ Als Sie ihr entgegnen, sie\nsolle doch mal aus dem Fenster schauen und das schöne Wetter…","questions":[{"num":1,"points":6,"text":"Was bedeuten die Abkürzungen „bds.“, „Z. n.“ und „V. a.“\n(je 2 P.)."},{"num":2,"points":18,"text":"Ordnen Sie drei pflegerelevante Informationen den\npassenden Themenfeldern der SIS® zu (je 2 P.),\nformulieren Sie jeweils passende pflegefachliche\nEinschätzungen (je 2 P.) und einen jeweils passenden\nVerständigungsprozess (je 2 P.)."},{"num":3,"points":4,"text":"Beschreiben Sie das Krankheitsbild „reaktive Depression“\n(4 P.)."},{"num":4,"points":14,"text":"Es gibt unterschiedliche Antidepressiva. Erläutern Sie zwei\nWirkmechanismen (je 4 P.) und nennen Sie drei\nangestrebte Wirkungen (je 2 P.)."},{"num":5,"points":8,"text":"Nehmen Sie Stellung zu Frau Hellers Aussagen:\n„Außerdem werden die meisten Suizide nicht mit\nMedikamenten und auch nicht während einer aktuellen\nKrise verübt.“ (je 4 P.)."},{"num":6,"points":8,"text":"Woher kommt die Unsicherheit der Auszubildenden, ob sie\netwas sagen darf? (2 P.) Erläutern Sie den rechtlichen\nKontext (6 P.)."},{"num":7,"points":8,"text":"Neben den rechtlichen Regelungen befindet sich die\nAuszubildende in einem ethischen Dilemma. Beschreiben\nSie dieses ausführlich (8 P.)."},{"num":8,"points":12,"text":"Beurteilen Sie die Äußerung der Auszubildenden bezüglich\ndes guten Wetters. Welche Absicht steckt dahinter (4 P.),\ninwieweit ist sie passend bzw. unpassend zum\nKrankheitsbild (4 P.) und was wäre eine passendere\nFormulierung (4 P.)?"},{"num":9,"points":8,"text":"Die ambulante Langzeitpflege ist in mancher Hinsicht\nanders strukturiert als andere Versorgungsbereiche.\nWelche Rolle spielen Leistungspakete im Rahmen der\nambulanten Langzeitpflege? Erläutern Sie den Begriff (2\nP.) und das dahinterstehende Konzept (6 P.)."},{"num":10,"points":14,"text":"Vergleichen Sie Frau Oelschlägers Versorgungssituation in\nder ambulanten Langzeitpflege mit einer passenden\nVersorgungsform Ihrer Wahl (4 P.). Beachten Sie dabei\ninsbesondere die Stichpunkte Barrierefreiheit,\nIsolationsneigung, Aktivierung, Versorgungssituation und\nMedikamentenmanagement (je 2 P.)."}],"answers":{"1":"• „bds.“ bedeutet beidseits\n• „Z. n.“ bedeutet Zustand nach\n• „V. a.“ bedeutet Verdacht auf","2":"Themenfeld 2 Mobilität und Beweglichkeit\n• Beobachtung: „Im Haus gibt es keinen Aufzug, es liegen lose\nTeppiche auf dem Boden, die Gonarthrose macht Frau Oelschläger\nim Alltag, besonders beim Treppensteigen, sehr zu schaffen.“\nPflegefachliche Einschätzung: Frau Oelschläger zeigt Einschränkungen\nbei der Bewegung, Isolationsgefahr und Sturzgefahr.\nVerständigung: Frau Oelschläger lehnt jegliche Hilfestellung ab. Sie\nakzeptiert die Beratung über die Sturzgefahr, will aber ihre Teppiche\nliegenlassen. Die Isolationsgefahr empfindet sie nicht so.\nThemenfeld 3 Krankheitsbezogene Anforderungen und\nBelastungen\n• Beobachtung: „Die Nachttischschublade steht offen und Sie\nbemerken, dass sich darin eine Schüssel mit vielen gesammelten\nTabletten und Kapseln befindet.“\nPflegefachliche Einschätzung: Eventuell gibt es bei Frau Oelschläger\nPolypharmazie. Vielleicht besteht die Gefahr einer suizidalen\nMedikamentenintoxikation.\nVerständigung: Noch keine Maßnahme, eine Beratung über das\nAnsammeln von Medikamenten ist erforderlich. Beim Eindruck einer\nsuizidalen Absicht müsste das Thema angesprochen werden.\nThemenfeld 4 Selbstversorgung\n• Beobachtung: „Wirkt auf Sie ungepflegt und im Alltag überfordert.…","3":"Zwei Wirkmechanismen:\n• Antidepressiva wirken am synaptischen Spalt von Neuronen. Sie\nbeeinflussen das Gleichgewicht der Neurotransmitter,\ninsbesondere das Vorhandensein des Neurotransmitters\nSerotonin. Die eine Wirkweise von Antidepressiva wirkt sich auf\ndie Produktion von Serotonin aus, sodass relativ mehr Serotonin\nin der Synapse zur Verfügung steht.\n• Die zweite Wirkweise besteht darin, dass gezielt die\nWiederaufnahme von Serotonin am postsynaptischen Teil\nverhindert wird (so genannte selektive Serotonin-\nWiederaufnahmehemmer, SSRI). Damit steht Serotonin relativ\nlänger im synaptischen Spalt zur Verfügung.","5":"• Suizidmethode: Verschiedene Untersuchungen in\nunterschiedlichen Ländern zeigen, dass der Suizid durch\nIntoxikation (meist Medikamentenüberdosierung) die häufigste\nSuizidmethode ist. Diese Aussage von Frau Heller trifft also nicht\nzu.\n• Suizidzeitpunkt: Suizide werden meist nicht in einer aktuellen\nKrise, sondern dann verübt, wenn die Betroffenen Kraft genug\nhaben, um sich zum Suizid aufraffen zu können. Diese Aussage\nvon Frau Heller ist also korrekt.","6":"Eigentlich besteht gegenüber der Patientin eine Pflicht zum Schweigen (§\n203 StGB Verletzung von Privatgeheimnissen), da sie ein zum\npersönlichen Lebensbereich gehörendes Geheimnis im Rahmen ihrer\nTätigkeit als Angehörige eines Heilberufs weitergibt.\nDiese Pflicht ist hier allerdings außer Kraft gesetzt, weil\n• sie das Geheimnis im Rahmen ihres Pflegeauftrags an eine\nebenfalls beauftragte Person weitergibt;\n• weil sie ggf. im nicht geäußerten Interesse der Pflegebedürftigen\nhandelt (§§ 677–687 BGB Geschäftsführung ohne Auftrag)\nDabei ist der Tatbestand der unterlassenen Hilfeleistung (§ 323c StGB)\nnicht relevant, weil es (noch) keine Gefahr oder Not erkennbar ist.","7":"Die Auszubildende befindet sich neben rechtlichen Bedenken auch in\neinem ethisch begründeten Dilemma. Sie will einerseits behilflich sein und\nsomit die Forderung des ICN-Kodex erfüllen, die Sicherheit und Fürsorge\nvon Pflegebedürftigen zu gewährleisten. Gleichzeitig schreibt ihr dieser\nKodex neben den Bestimmungen des StGB vor, dass personenbezogene\nDaten vertraulich behandelt werden. Dazu kommt, dass jeder Mensch ein\nRecht auf autonome Entscheidungen und ein Recht auf Unvernunft hat.\nDieses Recht gilt auch bei selbstschädigendem Verhalten. Letzten Endes\nkonkurrieren Fürsorge und Autonomie miteinander.","8":"Der Hinweis der Auszubildenden auf das schöne Wetter entspringt der\nAbsicht, mit einer gängigen Formulierung einer Aufhellung der Stimmung\nvon Frau Heller zu bewirken. In üblichen Pflegesituationen ist ein solcher\nHinweis angebracht, gerade in der stationären Langzeitpflege, wo die\nWahrnehmung des Wetters direkt angeregt werden kann. Im\nPflegezusammenhang mit Frau Heller ist dieser Versuch der\nStimmungsaufhellung nicht angebracht, da depressiv erkrankte Menschen\nfür solche Hinweise im Allgemeinen nicht empfänglich sind. Vielmehr\nkönnte für Frau Heller der Eindruck entstehen, sie solle sich doch über das\nWetter freuen, obwohl sie ganz anders in sich empfindet. Das könnte eine\ninnere Entfernung stabilisieren, gerade bei einer reaktiven Depression,\nhinter der ein Auslöser steht. Eine passendere Formulierung wäre in einer\nvalidierenden Grundhaltung formuliert, z. B. „Ich habe den Eindruck, dass\netwas Sie bedrückt. Möchten Sie mit mir sprechen? Ich kann mir etwas\nZeit für Sie nehmen.“. Das pflegerische Angebot zielt dann weniger auf\nAblenkung ab als auf akzeptierendes Interesse mit einer kongruenten\nGesprächshaltung.","9":"In der ambulanten Langzeitversorgung werden Leistungen nicht als\nEinzelleistungen erfasst und finanziert. Neben der grundsätzlichen\nUnterscheidung zwischen Grund- und Behandlungspflege (SGB 2XI und\nSGB 2V) werden zusammengehörige Leistungen der Grundpflege\nund/oder der Hauswirtschaft zu Leistungskomplexen, den\nLeistungspaketen, zusammengefasst. Jedes Leistungspaket beinhaltet alle\nTätigkeiten, die nach allgemeiner Lebenspraxis und nach fachlichem\nStandard zusammengehören. Es kann auch – auf Wunsch der\nPflegebedürftigen – mehr als einmal pro Tag gebucht werden. Die\nentsprechenden Leistungen können je nach der individuellen Situation in\nForm von vollständiger oder teilweiser Übernahme, Anleitung oder\nÜberwachung der Ausführung erbracht werden.\nDas Leistungskomplexsystem ist also ein System zur Vergütung von\nLeistungen in der ambulanten Langzeitpflege. Dabei unterscheiden sich\nder Inhalt und die Anzahl der Leistungskomplexe von Bundesland zu\nBundesland zum Teil deutlich. Die Rahmenverträge und\nVergütungsvereinbarungen des jeweiligen Bundeslands regeln das\njeweilige System der Leistungskomplexe. Durch dieses System wird…","10":"1. ICN. International Council of Nurses. Der ICN-Ethikkodex für\nPflegefachpersonen. Deutsche Fassung 2021. Aus:\nhttps://www.dbfk.de/media/docs/download/Allgeme"}}]},{"num":12,"title":"Neuntes Prüfungsbeispiel","tag":"tag1","cases":[{"setting":"Stationäre Langzeitpflege","title":"„Ist nicht einfach bei so vielen Diagnosen“","text":"„Ist nicht einfach bei so vielen Diagnosen“\nMartin Spranger, 71 Jahre, wohnt seit einem Jahr im städtischen\nPflegeheim Tiergarten. Im Lauf der Jahre hat er immer mehr\nDiagnosen bekommen. Angefangen hat es, als er 48 Jahre alt war,\nmit der Diagnose multiple Sklerose, auf die er lange warten\nmusste. Zehn Jahre später wurde bei ihm eine COPD\ndiagnostiziert. Als starker Raucher und ehemaliger Bäcker hatten\nihm viele eine solche Erkrankung prophezeit. Dazu leidet er unter\nHerzinsuffizienz NYHA 3 und Hypertonie. Seine jüngste Diagnose\nist ein Diabetes mellitus Typ 2. Diese Diagnose wurde gestellt,\nnachdem Herr Spranger berichtet hat, dass er oft starken Durst\nverspürt. Da Metformin® als orales Antidiabetikum ausscheidet\nund die BZ-Werte schwanken, beschließt der Hausarzt eine\nmoderate Insulintherapie mit vorheriger BZ-Kontrolle und\nabgestufter Dosierung. Herr Spranger ist in seinem Alltag\neingeschränkt. Er erzählt Ihnen: „Die vielen Krankheiten machen\nmir im Augenblick nicht so viele Sorgen. Ich brauche zwar Hilfe,\naber das ist eben so. Aber ich bin immer so müde. Früher war ich\nkraftvoll und konnte Bäume ausreißen. Außerdem kann ich mich\nnicht mehr so konzentrieren wie früher. Wenigstens kann ich\nmich noch verständlich machen, wenn auch mühsam. Sie hätten\nmal meine Stimme hören sollen, wie sie früher war. Jetzt ist alles\nanders…“ Sie beschließen, diese Aussagen in die SIS® zu\nübernehmen, die gerade turnusmäßig überarbeitet wird. Ihnen\nfällt auf, dass bisher bei keinem Themenfeld ein\nVerständigungsprozess abgebildet ist. Das wollen Sie bei der\nÜberarbeitung verbessern, weil Sie davon überzeugt sind, dass\ndies zu den Grundgedanken der Strukturierten\nInformationssammlung (SIS®) gehört. Im Themenfeld 3 wird\ndarauf hingewiesen, dass Herr Spranger sechs verschiedene\nMedikamente bekommt und dass hier eine besondere\nBeobachtung stattzufinden hat. Bei den Medikamenten sind auch\nTabletten, die zur Reduktion der Dosis geteilt werden. Sie haben…","questions":[{"num":1,"points":14,"text":"Nennen Sie 14 mögliche Beobachtungsaspekte, die sich aus\nHerrn Sprangers Diagnosen ergeben können (14 P.)."},{"num":2,"points":8,"text":"Erklären Sie, weshalb Herrn Spranger häufig\nMedikamente nicht infrage kommen. Nennen Sie den\nFachbegriff bei seiner Medikation (2 P.), die Definition (2\nP.) und erklären Sie den pharmazeutischen Mechanismus\n(4 P.)."},{"num":3,"points":10,"text":"Nennen Sie die zentralen Grundgedanken der SIS® (2 P.).\nErklären Sie den Begriff Verständigungsprozess (4 P.) und\nerläutern Sie, wie er mit den zentralen Grundgedanken\nzusammenhängt (4 P.)."},{"num":4,"points":4,"text":"Beschreiben Sie die zwei Betrachtungsweisen im Erleben\nchronisch Erkrankter, die Grypdonck charakterisiert (4\nP.)."},{"num":5,"points":12,"text":"Bilden Sie für Grypdoncks Aussage „To lift life above\nillness“ vier auf die Fallsituation bezogene Beispiele (4 P.)\nund begründen Sie diese (8 P.)."},{"num":6,"points":8,"text":"Herr Spranger fühlt sich durch seine Tochter\nbevormundet. Erklären Sie die innerpsychische\nKonstellation zwischen Tochter und Vater anhand des\npassenden theoretischen Ansatzes (4 P.) und zeigen Sie\nvier Folgen für die Pflegesituation auf (4 P.)."},{"num":7,"points":8,"text":"„Wenigstens kann ich mich noch verständlich machen,\nwenn auch mühsam. Sie hätten mal meine Stimme hören\nsollen, wie sie früher war. Jetzt ist alles anders …“ (Zeile\n17 ff.). Nennen Sie den Fachbegriff für diese\nKommunikationseinschränkung (1 P.) und beschreiben Sie\nsieben Anregungen zur Gestaltung einer adäquaten\nKommunikation (7 P.)."},{"num":8,"points":8,"text":"Nennen Sie die ungünstigen Faktoren in Bezug auf Herrn\nSprangers Fatigue (2 P.). Machen Sie innerhalb Ihrer\nBeratung sechs Vorschläge für seine Alltagsgestaltung (6\nP.)."},{"num":9,"points":8,"text":"Erläutern Sie ausführlich die Voraussetzungen für eine\nTeilung von Tabletten laut Bundesinstitut für Arzneimittel\nund Medizinprodukte (BfArM) und\nArzneimittelkommission der Deutschen Apotheker (ABDA)\n(8 P.)."},{"num":10,"points":12,"text":"Sie wollen Herrn Spranger dabei unterstützen, sich selbst\nden Blutzucker zu messen und das Insulin zu injizieren.\nNennen Sie vier Voraussetzungen für die eigenständige\nDurchführung von Herrn Spranger (4 P.). Planen Sie die\nnotwendigen Schritte für Ihre Schulung (6 P.). Wie\nschließen Sie eine Eigengefährdung weitgehend aus (2 P.)?"},{"num":11,"points":4,"text":"Erklären Sie den Begriff Generalvollmacht (2 P.) und\nführen Sie je einen Vor- bzw. Nachteil auf (je 1 P.)."},{"num":12,"points":4,"text":"Erläutern Sie, warum es sinnvoll ist, neben einer\nGeneralvollmacht eine Patientenverfügung abzufassen. (4\nP.)."}],"answers":{"1":"Es handelt sich hier um den Begriff Polypharmazie. Polypharmazie\nbedeutet die gleichzeitige und dauerhafte medikamentöse Therapie mit\nmehreren Arzneimitteln. Es gibt keine international anerkannte\nDefinition, meistens geht man von vier, fünf oder mehr Medikamenten\naus.\nMedikamente haben neben ihrer Haupt- auch Wechsel- und\nunerwünschte Arzneimittelwirkungen. Gerade bei der Polypharmazie\nkönnen sich diese unterschiedlichen Wirkungen verstärken, neutralisieren\noder abschwächen. Damit können manche Medikamente – obwohl\nnotwendig – nicht bei entsprechender Konstellation verabreicht werden.","3":"Der zentrale Grundgedanke der SIS besteht in der Überzeugung, dass in\nder Dokumentation des Pflegeprozesses die Perspektive der zu pflegenden\nMenschen (hilfsweise der Bezugspersonen) eine besondere und\nausdrücklicher Rolle spielen muss. Der Verständigungsprozess findet sich\nin den Themenfeldern wieder: Es wird eine pflegefachliche Einschätzung\ngegeben, die Perspektive der zu pflegenden Person geschildert und\nschließlich in einem Verständigungs- und Aushandlungsprozess die\nbeiden Perspektiven zueinander gebracht. Mit diesem\nVerständigungsprozess wird die Sicht des zu pflegenden Menschen\nausdrücklich berücksichtigt, weil\n• die Expertise des zu pflegenden Menschen für seinen eigenen\nZustand Gehör findet,\n• die Entscheidungsautonomie des zu pflegenden Menschen gestärkt\nwird und\n• zugelassen wird, dass fehlende Compliance oder abweichende\nWünsche im Pflegeprozess ernstgenommen werden.","4":"• Chronisch erkrankten Menschen können ihre Situation unter dem\nAspekt „Funktionieren im Alltag“ betrachten. Dies bedeutet,\ndass die Defizite und mögliche Ressourcen im Vordergrund stehen\nund auch Mittelpunkt von pflegerischen Handlungen sind.\nPflegefachpersonen sorgen dafür, dass die Betroffenen ihre\nalltäglichen Aufgaben so gut wie möglich selbst besorgen und\nkompensieren Selbstpflegedefízite.\n• Chronisch erkrankte Menschen können ihre Situation auch unter\ndem Aspekte des Erlebens von Lebensqualität betrachten.\nHier steht nicht das Funktionieren im Vordergrund, sondern eine\nstabile, selbstbestimmte und würdevolle Gesamtsituation, die\nDefizite integriert und eine erlebte Balance zwischen\nBeeinträchtigung und Qualität beinhaltet.","5":"1. Beispiel Müdigkeit: Herr Spranger soll seine Müdigkeit nicht\nmehr so einschneidend für seinen Alltag erleben. Ein Symptom wie\ndie Fatigue wirkt sich negativ auf das Erleben des gesamten Alltags\naus. Dadurch können sich Betroffene weniger leistungsfähig und\nunwert fühlen und ihre Ressourcen nicht mehr erkennen.\nMaßnahmen, die der Fatigue entgegenwirken, verändern den Blick\nauf die eigene Person, die nicht mehr nur durch dieses Symptom\nbestimmt wird.","2":"Es handelt sich hier um das theoretische Konzept der filialen Reife, das\nvon Margret Blenkner 1965 beschrieben worden ist. Dieses Konzept ist\nsehr vielschichtig und geht von der Annahme aus, dass erwachsene Kinder\nim Alter von ca. 40–50 Jahren realisieren müssen, dass sie nicht mehr\nuneingeschränkt auf die Unterstützung der Eltern zurückgreifen können,\nwenn sie selbst physische, psychische oder emotionale Krisensituationen\ndurchleben. Die Eltern benötigen umgekehrt verstärkt Hilfe und\nUnterstützung, wenn die eigenen Fähigkeiten altersbedingt nachlassen.\nDie filiale Reife beschreibt nun eine Entwicklungsaufgabe, in der die\nKinder gegenüber den Eltern nicht eine Form von elterlich-\nvormundschaftlicher Rolle einnehmen, sondern in der die Beteiligten eine\ngänzlich neue Form von Beziehung mit veränderter emotionaler\nGrundlage und neuartigem Rollenverständnis eingehen. Diese neue Form\nder Beziehung stellt sich allerdings nicht automatisch ein, sie verlangt\nnach aktiver Beziehungsarbeit und dem Zurücklassen alter\nKindheitsmuster. Gleichzeitig bereiten sich die Eltern darauf vor,\neigene Verantwortung eventuell abzugeben und die eigene…","8":"Voraussetzungen:\n• Motorische Voraussetzungen: Grob- und Feinmotorik vorhanden\n• Visuelle Voraussetzungen: Details und Schrift erkennen\n• Kognitive Voraussetzungen: Handlung und Zusammenhänge\nverstehen können\n• Motivationale Voraussetzungen: für eine gelingende\nPatientenschulung muss Herr Spranger motoviert sein\nPlanung:\n• Demonstrieren: dabei erklären, auf Besonderheiten hinweisen, auf\nTeilaspekte wie Hygiene besonders hinweisen\n• Nachmachen lassen mit enger Kontrolle, zeitnahem Feedback,\nHinweis auf Komplikationen\n• Üben lassen, ggf. an einem Hilfsmedium, Fragen besprechen,\nengmaschige Vitalwertkontrolle, Erfolgskontrolle in festgelegten\nZeiträumen\nEigengefährdung ausschließen:\n• Ansprechpartner sein\n• Handlung immer wieder nachkontrollieren und Werte überwachen","11":"Eine Generalvollmacht ist eine Ermächtigung, dass eine Person den\nVollmachtgeber in allen möglichen Angelegenheiten rechtlich wirksam\nvertritt. Sofern keine Einschränkung getroffen werden, gilt die\nGeneralvollmacht also in allen rechtlich zulässigen\nVertretungshandlungen.\n• Vorteil: Eine Generalvollmacht ermöglicht im Notfall schnelle\nHandlungsmöglichkeit (z. B. Zustimmung zu einem operativen\nEingriff).\n• Nachteil: Eine Generalvollmacht erfordert ein solides\nVertrauensverhältnis zum Vollmachtsempfänger (da die\nVollmacht missbraucht werden kann).","12":"• Eine Generalvollmacht an sich ist eine uneingeschränkte\nHandlungsvollmacht anstelle des Vollmachtgebers.\n• Für medizinische Notfälle und Grenzbereiche wird die\nPatientenverfügung formuliert, die die Grenzen der dann\ndurchzuführenden Behandlungen"}}]},{"num":13,"title":"Zehntes Prüfungsbeispiel","tag":"tag1","cases":[{"setting":"Ambulante Langzeitpflege","title":"„Das brauche ich aber noch!“","text":"„Das brauche ich aber noch!“\nSie arbeiten als Pflegefachperson im ambulanten Pflegedienst\n„Herbst“ in der Oberlausitz. Zu Ihren Klienten zählt die 50-jährige\nAnnelies Peters. Sie wohnt allein in einer kleinen\nDreizimmerwohnung im vierten Obergeschoss ohne Aufzug.\nAufgrund von Diabetes mellitus Typ 1 ist jeden Morgen eine\nBlutzuckermessung nüchtern angeordnet. Danach bekommt Frau\nPeters täglich morgens und abends Insulin nach Plan injiziert. Die\ntäglichen bezugspflegerischen Aufgaben gestalten sich oft recht\nschwierig. Frau Peters redet wenig und wirkt sehr verschlossen.\nNeuen Mitarbeitern des Pflegedienstes tritt sie sehr ängstlich\ngegenüber. Männliche Pfleger lehnt Frau Peters regelrecht ab,\ndiese dürfen die Wohnung nicht betreten. Die Wohnung der\nKlientin ist mit Unmengen von Dingen vollgestellt. So finden sich\nbereits im Eingangsbereich viele Kartons aufgestapelt. In der\nKüche liegen zahlreiche Verpackungen von Nahrungsmitteln,\nsortiert nach Farben und Größen. In den Wohnbereich führt ein\nschmaler Weg Richtung Sitzecke vor dem Balkon. Rechts und links\ndes Weges türmen sich ebenfalls Kisten, Kartons und Zeitschriften\nauf. Ihnen fällt beim heutigen Besuch der unangenehme Geruch\nim Wohnzimmer auf. Sie fragen Frau Peters danach. „Ach, das\nwird wohl das Katzenfutter sein. Irgendwann werde ich mir eine\nKatze halten und das Futter war gerade im Angebot.“ Frau Peters\nbestellt alle ihre Dinge online. Sie mag es überhaupt nicht, unter\nMenschen zu gehen. Einkaufen in einem Geschäft bereitet ihr so\nviel Unbehagen, dass sie dies seit Jahren vermeidet. Unter\nMenschen bekommt Frau Peters regelmäßig Panikattacken.\nDaraufhin wurde bei ihr eine soziale Phobie diagnostiziert. Auf\nIhre Frage hin, ob Sie jemanden zur Unterstützung beim\nAufräumen schicken sollen, entgegnet Frau Peters: „Ach nein! Das\nbrauche ich aber noch alles. So viel ist es doch gar nicht. Das ist\nmein Leben. Ich habe doch sonst nichts weiter.“\nIn der nächsten Fallberatung wird die Klientin Frau Peters…","questions":[{"num":1,"points":10,"text":"Frau Peters befindet sich in einer besonderen\nLebenssituation. Analysieren Sie ihre Lage hinsichtlich\nihrer Ressourcen (5 P.) und Probleme (5 P.)."},{"num":2,"points":10,"text":"Erklären Sie das Krankheitsbild soziale Phobie (5 P.) und\ndessen Zusammenhang mit dem Messie-Syndrom (5 P.)."},{"num":3,"points":10,"text":"Entwickeln Sie Ziele für die Versorgung von Frau Peters;\ndiese sollen aber für alle Beteiligten passen. Beachten Sie\ndabei die SMART-Regel (10 P.)."},{"num":4,"points":10,"text":"Für Frau Peters sollten Interventionen geplant werden, die\nsie in ihrem Alltag unterstützen. Beschreiben Sie mögliche\nund akzeptable Maßnahmen, die Sie als Pflegefachperson\nergreifen können (10 P.)."},{"num":5,"points":10,"text":"Nennen Sie die vier kommunikativen Grundhaltungen, die\nSie anwenden, um die Autonomie der Klientin zu wahren\n(4 P.). Beschreiben Sie davon eine ausführlich vor dem\nHintergrund der Fallsituation (6 P.)."},{"num":6,"points":10,"text":"Frau Peters wohnt zurzeit in nicht unbedingt\ngesundheitsförderlichen Verhältnissen. Erläutern Sie fünf\ndrohende Gefahren, wenn sich an ihrer momentanen\nSituation nichts ändert (je 2 P.)."},{"num":7,"points":10,"text":"Um den Konflikt im Team zu lösen, wenden Sie die\nkollegiale Beratung an. Beschreiben Sie den Ansatz (2 P.)\nund erstellen Sie dazu ein entsprechendes Konzept im\nÜberblick (8 P.)."},{"num":8,"points":20,"text":"Entscheiden Sie sich für eine fachliche kommunikative\nMöglichkeit, um Frau Peters zu helfen (5 P.). Entwickeln\nSie dazu ein entsprechendes adressatengerechtes Angebot\n(15 P.)."},{"num":9,"points":10,"text":"Frau Peters kann ihre Angelegenheiten teilweise nicht\nselbst besorgen. Beschreiben Sie, welche rechtliche Lösung\n(mit Rechtsquelle) hier greift (2 P.). Stellen Sie die\nwichtigsten Regelungen im Überblick dar (8 P.)."}],"answers":{"1":"• Frau Peters verfügt über die folgenden Ressourcen. Sie ist 50 Jahre\nalt und wohnt in einer Dreiraumwohnung. Frau Peters kann sich\nkommunikativ mitteilen und selbstständig bewegen. Sie versorgt\nsich selbstständig mit Nahrung und hat Wünsche, wie z. B. sich\neine Katze zu halten. Frau Peters wird durch einen ambulanten\nPflegedienst versorgt.\n• Folgende Probleme werden für Frau Peters analysiert. Sie redet\nwenig und wirkt verschlossen. Ihre Wohnung liegt im vierten\nObergeschoss ohne Aufzug. Gegenüber neuem Pflegepersonal ist\nsie ängstlich. Männliche Pfleger lehnt sie ab. Aufgrund ihrer\nsozialen Phobie geht sie nicht mehr aus dem Haus. Sie bestellt alle\nWaren online, bringt aber den Müll bzw. die Verpackungen nicht\naus der Wohnung. Frau Peters sammelt viele Dinge, weil sie der\nMeinung ist, diese noch zu brauchen. Sie hat keine Einsicht, dass\naufgeräumt werden muss. Auch der unangenehme Geruch des\nKatzenfutters bringt sie nicht zur Einsicht.","2":"• Die soziale Phobie ist eine spezifische Phobie, die sich auf\nbestimmte Situationen eingrenzen lässt. Menschen mit einer\nsozialen Phobie fühlen sich der Bewertung und Betrachtung von\nanderen Menschen ausgesetzt und entwickeln eine Angst davor.\nUnter Menschen bekommt Frau Peters regelmäßig Panikattacken.\nDaraufhin vermeidet sie Situationen mit Menschen. So geht sie\nseit Jahren nicht mehr einkaufen. Auch dem Pflegepersonal\ngegenüber redet sie wenig und wirkt verschlossen. Sie reagiert\nängstlich auf neue Mitarbeiter des Pflegedienstes.\n• Als Messiesyndrom wird bezeichnet, wenn die betreffende Person\neinen starken Drang besitzt, Gegenstände anzuhäufen und\naufzubewahren. Sie kann sich nicht von diesen Dingen trennen.\nMit der Zeit hat sie immer weniger Platz, die gesammelten Dinge\nunterzubringen.\n• Frau Peters geht aus Angst nicht mehr unter Menschen. Sie verlässt\nihre Wohnung nur im äußersten Notfall. Da sie aber z. B.\nNahrungsmittel benötigt, bestellt sie diese online. Sie schafft es\nallerdings nicht, die Verpackungen aus der Wohnung zu bringen,\nschließlich könnte sie Menschen begegnen. Davor hat sie Angst.\nAlso sammelt sie alles, was sie bestellt. Da diese Strategie Wirkung…","3":"• Mit der SMART-Regel werden die Ziele so formuliert, dass sie\nspezifisch, messbar, attraktiv, realistisch und auf eine bestimmte\nZeit bezogen werden.\n• Frau Peters ist kommunikativ. Sie bewegt sich täglich zwei Stunden\nlang. Die Klientin hält die vitalen Funktionen des Lebens aufrecht.\nSie fühlt sich jeden Tag, ihren Wünschen und Bedürfnissen\nentsprechend, sauber und gepflegt. Frau Peters isst täglich\nausgewogene und abwechslungsreiche Kost und trinkt 1,5 l\nFlüssigkeit am Tag. Die Klientin kann selbstständig ausscheiden.\nSie ist jeden Tag witterungsgerecht und nach ihren Wünschen\nbekleidet. Frau Peters hat einen regelmäßigen Schlaf-Wach-\nRhythmus. Täglich beschäftigt sich die Klientin mit ihren Hobbys.\nSie fühlt sich als Frau. Die Klientin fühlt sich in ihrer Umgebung\nsicher und erkennt Gefahren. Frau Peters pflegt soziale Kontakte.\nSie sieht ihrer Zukunft positiv entgegen.","4":"• Frau Peters werden Gespräche angeboten. So können Beratungs-\nbzw. Informationsgespräche für Aufklärung sorgen. Themen wie z.\nB. ihre Ernährung, auch in Hinsicht auf den bestehenden Diabetes\nund Ernährungsgewohnheiten können angesprochen werden.\n• Frau Peters wird zwei Mal täglich zu Bewegungsübungen\nangeleitet. Darüber hinaus wird die Möglichkeit zu gemeinsamen\nSpaziergängen angeboten.\n• Nach ärztlicher Anordnung kann das Messen der Vitalwerte\nwährend der Durchführung der behandlungspflegerischen\nAufgaben mit eingebunden werden.\n• Nach den Wünschen und Bedürfnissen von Frau Peters kann diese\nin der Grundpflege angeleitet werden.\n• Frau Peters kann eine gemeinsame Auswahl bzw. Unterstützung\nbeim Kauf von Nahrungsmitteln angeboten werden. Dabei sollte\nauf ihre Vorlieben eingegangen werden. Zur Unterstützung bei den\ngemeinsamen Einkäufen kann die soziale Betreuung hinzugezogen\nwerden.\n• Hobbys und Vorlieben können durch Biografiearbeit ermittelt\nwerden; optimalerweise können neue gefunden werden, damit\nsich Frau Peters selbst beschäftigen kann.\n• Männliche Pflegepersonen werden vorerst nicht zu Frau Peters\ngeschickt.\n• Frau Peters soll in einem Gespräch auf die Möglichkeit eines…","5":"• Kommunikative Grundhaltungen sind Empathie,\nWertschätzung, Achtsamkeit und Kongruenz.\n• Unter Autonomie wird verstanden, dass der Mensch die Fähigkeit\nbesitzt, seine Ziele frei zu bestimmen und dementsprechend zu\nhandeln. Die persönliche Freiheit und Selbstbestimmung sowie\ndas Recht, eine eigene Meinung zu haben, diese frei einzubringen\nund dabei als Individuum respektiert zu werden, ist darin\neingeschlossen.\n• Mit Kongruenz ist gemeint, dass der Mensch echt, unverfälscht\nund oder mit Transparenz agiert. Frau Peters kann nur wachsen,\nwenn ihr die Pflegekräfte so entgegentreten, wie sie sind. Das\nschließt allerdings eine wertschätzende, empathische und\nachtsame Grundeinstellung gegenüber allen Menschen, auch Frau\nPeters, unabdingbar mit ein. Ihr Lebensstil darf nicht abschätzig\nbetrachtet werden. Sie sollte einfach als Mensch angesehen\nwerden. Man kann über seine Gefühle offen reden, immer unter\nBeachtung der Ich-Botschaften, d. h. ohne Vorwürfe und\nAnklagen. Um Vertrauen aufzubauen, ist es wichtig, weder von\n„oben herab“ zu reden, noch sich hinter Floskeln und Fassaden zu\nverstecken. Mit nonverbaler Kommunikation wird Inkongruenz\nsofort entlarvt.","6":"• Durch diese Vermeidung von sozialen Kontakten verliert sie ihre\nsozialen Kompetenzen immer weiter. Sie ist in einem Teufelskreis\ngefangen. Es besteht die Gefahr des Hospitalismus aufgrund ihrer\nsozialen Isolation.\n• Im schlimmsten Fall droht ihr eine Depression, da sie völlig allein\nlebt und keinerlei soziale Kontakte hat.\n• Frau Peters bestellt sich ihre Nahrungsmittel online. Damit besteht\ndie Gefahr einer Fehl- bzw. Mangelernährung. Auch hinsichtlich\nihres bestehenden Diabetes mellitus ist auf eine\nabwechslungsreiche und ausgewogene Ernährung zu achten.\n• Durch die angesammelten Dinge können Infektionskrankheiten\nentstehen. Das Katzenfutter riecht sehr stark übel. Parasiten\nkönnen ebenfalls zum Problem für Frau Peters werden, da der\nMüll nicht beseitigt wird.\n• Durch ständige Online-Einkäufe besteht die Gefahr des\nübermäßigen Konsums, der in einer Überschuldung der Klientin\nmünden kann.\n• Sollte durch den Unrat Ungeziefer angelockt werden und sich\nausbreiten, droht Frau Peters unter Umständen die Kündigung der\nWohnung.","7":"• Kollegiale Beratung stellt ein strukturiertes Beratungsgespräch\nin einer Gruppe dar, in dem ein Teilnehmer von den übrigen\nTeilnehmern nach einem feststehenden Ablauf mit verteilten\nRollen beraten wird.\n• Voraussetzungen für eine kollegiale Beratung sind zum einen ein\nregelmäßiger, feststehender Termin, eine ungestörte, angenehme\nAtmosphäre, maximal zehn Teilnehmer. Zudem sollte die\nTeilnahme freiwillig und aktiv sein, damit ein\nVertrauensverhältnis, Offenheit, gegenseitiger Respekt und\nWertschätzung möglich sind.\n• Dargestellt wird symbolisch eine kollegiale Beratung nach dem\nModell von Tietze. In der Startphase werden die Rollen\nFallerzähler, Moderator, Schreiber und Berater untereinander\nverteilt. Der Fallerzähler stellt den Fall der Klientin Frau Peters\nvor. Durch erkundende Frage unterstützt der Moderator. Um das\nVerständnis zu unterstützen, stellen die Berater dazu Fragen. Der\nFallerzähler formuliert eine Schlüsselfrage, wobei ihn dabei der\nModerator unterstützt. In der nächsten Phase wird eine geeignete\nMethode ausgewählt, damit eine Lösung gefunden werden kann.\nLösungen und Alternativen werden gesammelt, indem die Berater…","8":"• Mithilfe eines Informations- oder Beratungsgesprächs kann\nFrau Peters Hilfe zur Selbsthilfe angeboten werden. Da hierbei die\nkommunikativen Grundhaltungen Beachtung finden, kann\nVertrauen aufgebaut werden. Die Sorgen und Ängste von Frau\nPeters werden ernst genommen und sachlich betrachtet, sodass\nFrau Peters im besten Fall selbst zu Einsicht gelangt und ihr\nVerhalten aus eigenem Antrieb ändert.\n• Im Folgenden wird ein Beratungsgespräch exemplarisch\ndargestellt. Durch die bisherige regelmäßige Betreuung besteht ein\nguter und freundlicher Kontakt zur Klientin.\n• Begrüßung/Smalltalk, sich auf den Menschen einstellen, Beziehung\nherstellen: „Guten Tag Frau Peters, wir kennen uns ja bereits. Ich\nbin Frau A und betreue Sie regelmäßig. Was haben Sie denn\nheute schon so gemacht? …“\n• Beratungsbedarf/-bedürfnis feststellen, Daten und Informationen\nsammeln, wahrnehmen, beobachten, Fragen stellen und erzählen\nlassen, Problem benennen und besprechen: „Bei unserem letzten\nTreffen habe Sie mir erzählt, dass Sie sich oft so allein fühlen. Da\nich mir Sorgen um Sie mache, möchte ich Sie heute gern zu\ndiesem Thema beraten. Sind Sie damit einverstanden? Erzählen…","9":"• Es greift die Betreuung nach §§ 1814 ff. BGB.\n• Eine Betreuung wird eingerichtet, wenn ein Mensch seine\nAngelegenheiten ganz oder teilweise nicht selbst besorgen kann.\nEr muss volljährig sein.\n• Zuständig ist das jeweilige Betreuungsgericht.\n• Dieses legt für die Betreuung so genannte Aufgabenkreise fest, z. B.\nAufenthaltsbestimmung, Vermögensverwaltung, Post- und\nFernmeldewesen.\n• Der Betreuer muss geeignet sein, z. B. ein Angehöriger, Bekannter,\nein Betreuungsverein oder ein Berufsbetreuer.\n• Die Betreuung geschieht im Interesse des Betreuten und wird vom\nBetreuungsgericht überprüft."}}]},{"num":14,"title":"Elftes Prüfungsbeispiel","tag":"tag1","cases":[{"setting":"Stationäre Akutpflege","title":"„Ich werde für immer verstümmelt aussehen“","text":"„Ich werde für immer verstümmelt aussehen“\nWalli Sulaiman ist sieben Jahre alt und an einem\nSamstagnachmittag mit seiner Familie im städtischen Park\nunterwegs. Wallis Vater bereitet auf einem Grill das Abendessen\nvor. Da es sehr windig ist, nimmt der Vater flüssigen\nGrillanzünder. Beim Anzünden entsteht eine große Stichflamme,\ndie Walli im Gesicht, an den Oberarmen und am Oberkörper trifft\nund zu schweren Verbrennungen führt. Sabrina Meyer, eine\nPflegefachfrau im Feierabend, wird auf den Unfall aufmerksam\nund leistet Erste Hilfe.\nDie Mutter Sakina Sulaiman wählt währenddessen den Notruf.\nWalli wird mit seinen Verletzungen in die nächstgrößere\nKinderklinik mit einer Verbrennungseinheit geflogen. Dort wird er\nsofort operiert und versorgt. Noch im Operationssaal erhält Walli\neinen zentralen Venenkatheter, eine Magenablaufsonde und einen\ntransurethralen Blasenkatheter.\nSie betreuen Walli Sulaiman seit ein paar Tagen auf der\nkinderchirurgischen Station. Sie haben Spätdienst. Walli klingelt\ndirekt nach Ihrem Dienstbeginn und bittet um ein Schmerzmittel.\nDie Mutter ist seit dem Unfall nicht von Wallis Seite gewichen und\nschnauzt Sie an: „Nun machen Sie schon, er hat Schmerzen. Und\nbringen Sie das richtige Medikament mit!“. Ohne eine Antwort zu\ngeben, verlassen Sie das Zimmer.\nDa in der nächsten halben Stunde der aseptische\nVerbandwechsel ansteht, verabreichen Sie das verordnete\nBedarfsmedikament der WHO-Stufe 3. Sie bringen das\nMedikament ins Zimmer und versuchen Walli für den\nbevorstehenden Verbandwechsel zu motivieren. Walli dreht sich\nweg und nuschelt: „Ich werde für immer verstümmelt aussehen.\nAlle werden mich in der Schule als Monster bezeichnen. Lasst\nmich bloß alle in Ruhe.“ Sie zeigen Walli eine lange Narbe an\nIhrem Arm und sagen: „Dann machen wir eine Monster-AG auf.\nIch zeige dir gleich noch, wie du dich vor dem Verbandwechsel\nentspannen kannst.“ Walli fängt an zu lächeln. Er fragt: „Kennst\ndu auch etwas, was gegen mein Jucken hilft?“ Sie antworten…","questions":[{"num":1,"points":12,"text":"Erläutern Sie vier vorrangige Pflegeprobleme (8 P.) und\njeweils eine passende Ressource (4 P.) zu der Fallsituation\nvon Walli Sulaiman."},{"num":2,"points":8,"text":"Arbeiten Sie zu den in Aufgabe 1 benannten\nPflegeproblemen je zwei Pflegeziele heraus (je 4 P.)."},{"num":3,"points":10,"text":"Entwickeln Sie für Walli Sulaiman aus zwei der oben\ngenannten Pflegeprobleme (Aufgabe 1) jeweils fünf\npflegerische Maßnahmen, die zum Erhalt und zur\nWiedererlangung von Wallis Alltagskompetenz beitragen\n(je 2 P.)."},{"num":4,"points":8,"text":"Nennen Sie zwei weitere Informationen, welche Sie zur\nGesamteinschätzung der Pflegesituation von Walli\nSulaiman und seiner Familie benötigen (4 P.). Erläutern\nSie, warum die ausgewählten Informationen\nhandlungsrelevant sind (4 P.)."},{"num":5,"points":4,"text":"Nennen Sie vier Maßnahmen, die Sabrina Meyer im\nRahmen der Ersten Hilfe bei Walli Sulaiman ergreift (4 P.)."},{"num":6,"points":4,"text":"Welches Assessment wählen Sie zur Schmerzbeobachtung\nund zur Schmerzeinschätzung für den siebenjährigen Walli\naus (2 P.). Wallis Bewusstseinslage ist nicht eindeutig\nerkennbar, da er noch am Unfallort sediert wurde.\nBegründen Sie Ihre Entscheidung (2 P.)."},{"num":7,"points":4,"text":"Nennen Sie zwei Opioide der WHO-Stufe 3, welche Sie\nWalli als Bedarfsmedikament geben dürften (4 P.)."},{"num":8,"points":6,"text":"Erläutern Sie zwei Entspannungsmethoden der\nnichtmedikamentösen Schmerztherapie (2 P.) und wie\ndiese jeweils wirken (2 P.). Nennen Sie zwei mögliche\nIndikationen (2 P.)."},{"num":9,"points":10,"text":"Definieren Sie den Unterschied zwischen akuten und\nchronischen Schmerzen nach dem passenden\nExpertenstandard (4 P.). Ermitteln Sie drei\nProzesskriterien, welche Sie als Pflegefachfrau bei Wallis\nPflege beachten müssen (6 P.)."},{"num":10,"points":4,"text":"Listen Sie zwei Maßnahmen auf, welche Walli zur\nLinderung seiner juckreizbedingten Beschwerden\nverhelfen können (je 2 P.)."},{"num":11,"points":4,"text":"Beim Wechsel von Wallis Verband wird die Non-Touch-\nTechnik angewendet. Erklären Sie das Prinzip."},{"num":12,"points":16,"text":"Erörtern Sie zwei in der Fallsituation vorkommende\nAspekte der gelungenen Kommunikation (je 4 P.) sowie\nzwei Kommunikationsbarrieren in der Interaktion und\nBeziehungsgestaltung (je 4 P.)."},{"num":13,"points":6,"text":"Walli Sulaiman und seine Mutter werden von Ihnen noch\nin der Versorgung mit dem Kompressionsanzug angeleitet.\nNennen Sie eine weitere Berufsgruppe, welche Sie\nhinzuziehen können (2 P.), und erklären Sie vier\npflegerische Maßnahmen im korrekten Umgang mit dem\nKompressionsanzug (4 P.)."},{"num":14,"points":4,"text":"„Dieser Unfall ruiniert noch meine ganze Familie!“ (Zeile\n37 f.). Setzen Sie sich mit dieser Aussage auseinander und\ngeben Sie zwei verschiedene Interpretationen an (je 2 P.)."}],"answers":{"1":"• Pflegeproblem 1: Bei Walli besteht aufgrund der\nHautschädigung eine hohe Infektionsgefahr.\n• Ressource: Bei Veränderungen an der Wunde oder an den\ndiversen Kathetern und Einstichstellen kann Walli die\nVeränderung äußern.\nOder\n• Pflegeproblem 2: Walli hat starke Schmerzen.\n• Ressource: Walli kann Schmerzen mitteilen und Hilfe einfordern.\nOder\n• Pflegeproblem 3: Aufgrund der bevorstehenden Narbenbildung\nkann es zu einer erhöhten Kontrakturgefahr im Oberkörperbereich\nkommen.\n• Ressource: Walli versteht die Bewegungsübungen und kann bei\ndiesen mithelfen.\nOder\n• Pflegeproblem 4: Walli hat durch den Volumenmangel eine\nAusscheidungsstörung.\n• Ressource: Walli kann trinken.\nOder\n• Pflegeproblem 5: Aufgrund der Verbrennungen besteht die\nGefahr einer Hypothermie.\n• Ressource: Walli kann Unwohlsein oder Kälteanzeichen äußern.","2":"• Pflegeproblem 1:\n– Intakte Wundheilung.\n– Walli akzeptiert die Verbandsmaterialien.\n• Pflegeproblem 2:\n– Walli akzeptiert die Maßnahmen der medikamentösen und\nnichtmedikamentösen Schmerztherapie.\n– Walli kann seine Schmerzen auf der NRS-/VRS-Skala\neinschätzen.\n• Pflegeproblem 3:\n– Die Gelenke am Oberkörper sind in ihren Freiheitsgraden\nweiterhin beweglich.\n– Walli ist bei Bewegungen schmerzfrei.\n• Pflegeproblem 4:\n– Die Flüssigkeitszufuhr ist gewährleistet.\n– Walli erkennt die Notwendigkeit zu trinken und schafft\nmindestens 2 Liter pro Tag.\n• Pflegeproblem 5:\n– Eine Körpertemperatur von 36,5 Grad wird gehalten.\n– Walli akzeptiert die Pflegemaßnahmen.","3":"• Pflegeproblem 1:\n– Vor jeglicher Manipulation an den Verbänden oder Zugängen\nHände desinfizieren\n– Wundverbände auf Durchnässung und/oder Abschnürung hin\nbeobachten\n– In keimarmer Umgebung unterbringen\n– Sterile Materialien beim Verbandwechsel und an den\nZugängen benutzen\n– Lage der Zugänge bei Schichtbeginn kontrollieren\n• Pflegeproblem 2:\n– Wallis Mimik und Gestik beobachten\n– Medikamente nach ärztlicher Anordnung geben\n– Körperwahrnehmung ermöglichen und verbessern\n– Schmerz mithilfe eines Schmerzassessments für Kinder\nerfassen\n– Basale Stimulation und/oder Kinästhetikkonzepte anwenden\n• Pflegeproblem 3:\n– Krankengymnastik nach ärztlicher Anordnung ermöglichen,\num Narbenkeloide vorzubeugen\n– Bei jeder pflegerischen Handlung die Gelenke am Oberkörper\ndurchbewegen\n– Aktive und assistive Bewegungsübungen anbieten\n– Narbenpflege ermöglichen (wenn die Wundheilung\nabgeschlossen ist)\n– Ergotherapie nach ärztlicher Anordnung ermöglichen\n• Pflegeproblem 4:\n– Bilanzierung durchführen\n– Getränkeprotokoll führen\n– Haut auf Ödeme hin beobachten\n– Intravenöse Volumensubstitution überwachen\n– Lieblingsgetränke von Walli erfragen und von den Eltern\nbringen lassen\n• Pflegeproblem 5:…","4":"Information Handlungsrelevanz\nBei der Familie Die Familie kann als Ressource für den\nSulaiman ist Heilungsprozess eingesetzt werden. Wenn der\nunklar, wie der Unfall von den Eltern noch nicht verarbeitet\nUnfall sich auf die wurde, kann es sein, dass diese Ressource\nfamiliäre Situation frühzeitig erschöpft ist, weil einer der Elternteile\nauswirkt und wie die Pflege nicht mehr mit übernehmen kann.\nder Vater den\nUnfall verarbeitet.\nEs ist ebenfalls Die Motivation, bei der Pflege zu unterstützen\nunklar, inwieweit oder mitzuhelfen, ist bei Walli reduziert. Da\nWalli mit den Verbrennungen zu einem langfristigen\nLangzeitfolgen Pflegebedarf führen, ist es wichtig, die\nseines Unfalls Unterstützung des zu pflegenden Kindes\nzurechtkommt. weiterhin zu fördern, sodass dieser gewillt ist,\nmitzuhelfen und seine Autonomie weiter\nauszubauen und Folgeschäden zu minimieren.\nEs ist unklar, Es ist wichtig, Walli auf die weiteren\ninwieweit ein Behandlungsschritte vorzubereiten. Ob z. B., eine\nanschließendes Rehabilitationsmaßnahme folgt oder auch ein\nweiteres ambulanter Akut-/Langzeitpflegedienst eingesetzt\nVersorgungssystem wird.\neingesetzt werden\nkann.","5":"• Kind aus der Gefahrenzone bringen\n• Oberkörperbekleidung entfernen (nur wenn möglich)\n• Wunde nach Möglichkeit kühlen (s. u. Kasten Achtung)\n• Kind beobachten und beruhigen\n• Wunde nach Möglichkeit steril abdecken\n• Kind in eine warme Decke wickeln, wenn vorhanden","6":"Assessment: Kindliche Unbehagens- und Schmerzskala (KUS-Skala)\nBegründung: Walli Sulaiman ist zwar schon sieben Jahre alt, aber\ndurch die Sedierung ist eine Selbsteinschätzung nur bedingt möglich. Die\nKUS-Skala ist eigentlich nur bis zum vierten Lebensjahr ausgelegt, kann\nhier aber aufgrund der Bewusstseinseinschränkung noch eingesetzt\nwerden. Mit der KUS-Skala als Fremdeinschätzungsinstrument können\nWallis Verhalten (Weinen/Gesichtsausdruck) sowie seine Haltung und\nMotorik beobachtet und bewertet werden.","7":"• Fentanyl\n• Morphin\n• Oxycodon","8":"Entspannungsmethoden:\n• Atementspannung\n• Autogenes Training\n• Massage\n• Meditation\nWirkung:\n• Stress- und Schmerzreduktion\n• Entspannungszeichen im vegetativen Nervensystem\n• Stimmungsaufhellung\n• Verbesserte Selbstkontrolle\nIndikation:\n• Angst\n• Innere Unruhe\n• Chronische Schmerzzustände\n• Präventiv (z. B vor Operationen).","9":"Akuter Schmerz Chronischer Schmerz\n„Akuter Schmerz ist ein „Von chronischem Schmerz spricht man,\nplötzlich auftretender wenn dieser dauerhaft oder wiederkehrend\nund über einen für mindestens drei Monate vorhanden ist\nbegrenzten Zeitraum und die akute Warnfunktion der\nandauernder Schmerz, physiologischen Schmerzwahr
