<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pflegeprüfung">
<meta name="theme-color" content="#1a4d8c">
<title>Pflegeprüfung – Schriftliche Prüfung</title>
<style>
:root{
  --bl:#1a4d8c;--bl-d:#0f3366;--bl-l:#eef3fa;
  --gn:#2e7d32;--gn-l:#e8f5e9;
  --am:#e65100;--am-l:#fff3e0;
  --rd:#c62828;--rd-l:#ffebee;
  --gy:#546e7a;--gy-l:#eceff1;
  --tx:#1a1a2e;--tx2:#455a64;--tx3:#90a4ae;
  --bg:#f4f6f9;--card:#fff;--bd:#dce3ed;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  --r:14px;--rs:9px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);color:var(--tx);font-size:15px;line-height:1.5;
  max-width:520px;margin:0 auto;position:relative;}
.sc{display:none;flex-direction:column;height:100%;overflow:hidden;
  position:absolute;inset:0;max-width:520px;margin:0 auto;background:var(--bg);}
.sc.on{display:flex;}
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* Header */
.hd{background:var(--bl);padding:calc(var(--st) + 12px) 16px 12px;flex-shrink:0;}
.hd-row{display:flex;align-items:center;gap:10px;}
.back{background:rgba(255,255,255,.15);border:none;border-radius:50%;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;font-size:17px;flex-shrink:0;transition:background .1s;}
.back:active{background:rgba(255,255,255,.3);}
.hd-t{font-size:16px;font-weight:600;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hd-s{font-size:11px;color:rgba(255,255,255,.7);margin-top:1px;}
.pbar{height:2px;background:rgba(255,255,255,.25);margin-top:8px;border-radius:1px;}
.pfill{height:100%;background:#fff;border-radius:1px;transition:width .4s;}

/* Home */
.hero{background:var(--bl);padding:4px 16px 20px;}
.hero-icon{font-size:40px;margin-bottom:8px;}
.hero-h{font-size:23px;font-weight:700;color:#fff;}
.hero-s{font-size:13px;color:rgba(255,255,255,.72);margin-top:4px;}
.hstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;}
.hs{background:rgba(255,255,255,.14);border-radius:10px;padding:9px 6px;text-align:center;}
.hs-n{font-size:19px;font-weight:700;color:#fff;}
.hs-l{font-size:10px;color:rgba(255,255,255,.65);margin-top:1px;line-height:1.3;}

.slbl{font-size:11px;font-weight:600;color:var(--gy);text-transform:uppercase;
  letter-spacing:.06em;padding:14px 16px 6px;}

/* Tag cards */
.tcards{display:flex;flex-direction:column;gap:8px;padding:0 14px;}
.tcard{background:var(--card);border-radius:var(--r);border:.5px solid var(--bd);overflow:hidden;}
.thead{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer;}
.thead:active{background:var(--bg);}
.tdot{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;
  justify-content:center;font-size:19px;flex-shrink:0;}
.d1{background:#e3f2fd;}.d2{background:#e8f5e9;}.d3{background:#fce4ec;}
.tinfo{flex:1;}
.ttl{font-size:14px;font-weight:600;}
.tsub{font-size:11px;color:var(--tx2);margin-top:2px;}
.tchev{font-size:14px;color:var(--tx3);transition:transform .2s;}
.tchev.open{transform:rotate(90deg);}
.tpbar{height:3px;background:var(--bd);}
.tpfill{height:100%;transition:width .3s;}
.f1{background:var(--bl);}.f2{background:var(--gn);}.f3{background:var(--rd);}
.tbody{display:none;border-top:.5px solid var(--bd);}
.tbody.open{display:block;}
.tsec{padding:10px 13px 4px;}
.tsecl{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.chl{display:flex;flex-direction:column;gap:5px;padding-bottom:10px;}
.chbtn{display:flex;align-items:center;gap:9px;background:var(--bg);
  border-radius:8px;padding:9px 11px;cursor:pointer;border:.5px solid var(--bd);transition:background .1s;}
.chbtn:active{background:var(--bl-l);}
.chnum{width:26px;height:26px;border-radius:50%;background:var(--bl-l);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--bl);flex-shrink:0;}
.chinfo{flex:1;}
.chn{font-size:12px;font-weight:600;}
.chm{font-size:10px;color:var(--tx3);margin-top:1px;}
.chbdg{font-size:10px;font-weight:600;padding:2px 7px;border-radius:100px;}
.bdg-done{background:var(--gn-l);color:var(--gn);}
.bdg-part{background:var(--am-l);color:var(--am);}
.bdg-new{background:var(--gy-l);color:var(--gy);}
.soon{display:flex;align-items:center;gap:8px;padding:8px 13px 12px;font-size:12px;color:var(--tx3);}
.soon-chip{background:var(--gy-l);color:var(--gy);font-size:10px;padding:2px 7px;border-radius:100px;font-weight:600;}

.io-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 14px 4px;}
.io-btn{border:none;padding:11px 8px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;}
.io-exp{background:var(--bl);color:#fff;}
.io-imp{background:var(--card);color:var(--bl);border:1.5px solid var(--bl);}
.rst-btn{margin:0 14px 20px;background:transparent;border:1.5px solid var(--bd);
  padding:10px;border-radius:100px;font-size:12px;color:var(--tx3);cursor:pointer;width:calc(100% - 28px);}
.rst-btn:active{background:var(--gy-l);}

/* Cases */
.case-list{padding:0 14px 20px;display:flex;flex-direction:column;gap:8px;}
.case-card{background:var(--card);border-radius:var(--r);border:.5px solid var(--bd);cursor:pointer;overflow:hidden;transition:transform .1s;}
.case-card:active{transform:scale(.98);}
.case-top{padding:12px 14px 10px;}
.sbadge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;
  padding:3px 9px;border-radius:100px;margin-bottom:6px;}
.s-sl{background:#e3f2fd;color:#0d47a1;}
.s-al{background:#e8f5e9;color:#1b5e20;}
.s-sa{background:#fff3e0;color:#bf360c;}
.s-aa{background:#fce4ec;color:#880e4f;}
.s-def{background:var(--gy-l);color:var(--gy);}
.case-title{font-size:14px;font-weight:600;line-height:1.35;margin-bottom:4px;}
.case-meta{font-size:11px;color:var(--tx3);}
.cpbar{height:3px;background:var(--bd);}
.cpfill{height:100%;background:var(--bl);transition:width .3s;}

/* Fallsituation */
.fall-wrap{padding:16px;}
.fall-title{font-size:18px;font-weight:700;color:var(--bl);margin-bottom:12px;line-height:1.35;}
.fall-text{font-size:13px;line-height:1.75;color:var(--tx);white-space:pre-wrap;word-wrap:break-word;}
.fall-actions{padding:0 16px 16px;display:flex;flex-direction:column;gap:8px;}

/* Buttons */
.btn-p{background:var(--bl);color:#fff;border:none;padding:14px 20px;
  border-radius:100px;font-size:15px;font-weight:600;cursor:pointer;width:100%;}
.btn-p:active{opacity:.88;}
.btn-s{background:var(--card);color:var(--tx);border:1.5px solid var(--bd);
  padding:12px 20px;border-radius:100px;font-size:14px;font-weight:600;cursor:pointer;width:100%;}
.btn-s:active{background:var(--bg);}

/* Quiz */
.qbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;}
.qctr{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.qmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.qpts{background:var(--bl-l);color:var(--bl);font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px;}
.qop{background:var(--gy-l);color:var(--gy);font-size:11px;font-weight:500;padding:3px 9px;border-radius:100px;}
.qtxt{font-size:16px;font-weight:600;line-height:1.5;margin-bottom:16px;white-space:pre-wrap;}

/* Method 1 – Reveal */
.notes{width:100%;min-height:80px;border:1.5px solid var(--bd);border-radius:var(--rs);
  padding:11px;font-size:13px;font-family:inherit;resize:none;color:var(--tx);margin-bottom:10px;}
.notes:focus{outline:none;border-color:var(--bl);}
.notes::placeholder{color:var(--tx3);}
.rev-btn{width:100%;background:var(--bl-l);color:var(--bl);border:1.5px solid var(--bl);
  padding:12px;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px;}
.rev-btn:active{background:var(--bl);color:#fff;}
.ans-box{background:var(--card);border-radius:var(--rs);border-left:3px solid var(--bl);
  border:.5px solid var(--bd);border-left:3px solid var(--bl);
  padding:13px;margin-bottom:13px;}
.ans-box.hidden{display:none;}
.ans-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--bl);margin-bottom:7px;}
.ans-txt{font-size:13px;line-height:1.65;color:var(--tx);white-space:pre-wrap;}

/* Method 2 – Key Points */
.kp-hint{font-size:12px;color:var(--tx2);margin-bottom:9px;}
.kp-wrap{background:var(--card);border-radius:var(--rs);border:.5px solid var(--bd);padding:0 12px;margin-bottom:10px;}
.kp-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:.5px solid var(--bd);cursor:pointer;}
.kp-row:last-child{border-bottom:none;}
.kp-cb{width:20px;height:20px;border:2px solid var(--bd);border-radius:5px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;}
.kp-row.chk .kp-cb{background:var(--gn);border-color:var(--gn);}
.kp-row.chk .kp-cb::after{content:"✓";color:#fff;font-size:12px;font-weight:700;}
.kp-txt{font-size:13px;line-height:1.5;color:var(--tx);flex:1;}
.kp-row.chk .kp-txt{color:var(--tx3);}

/* Rating */
.rate-wrap{margin-bottom:14px;}
.rate-wrap.hidden{display:none;}
.rate-lbl{font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:8px;text-align:center;}
.rate-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.rate-btn{border:none;padding:11px 6px;border-radius:var(--rs);font-size:13px;font-weight:600;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.rate-btn span{font-size:10px;font-weight:500;}
.r-y{background:var(--gn-l);color:var(--gn);}
.r-p{background:var(--am-l);color:var(--am);}
.r-n{background:var(--rd-l);color:var(--rd);}
.r-y.sel{background:var(--gn);color:#fff;}
.r-p.sel{background:var(--am);color:#fff;}
.r-n.sel{background:var(--rd);color:#fff;}

.next-btn{background:var(--bl);color:#fff;border:none;padding:14px;
  border-radius:100px;font-size:15px;font-weight:600;cursor:pointer;width:100%;
  margin-bottom:calc(20px + var(--sb));}
.next-btn.hidden{display:none;}

/* Result */
.rhero{background:var(--bl);padding:calc(var(--st)+36px) 20px 26px;text-align:center;}
.rring{width:92px;height:92px;border-radius:50%;background:rgba(255,255,255,.14);
  border:3px solid rgba(255,255,255,.32);display:flex;flex-direction:column;
  align-items:center;justify-content:center;margin:0 auto 13px;}
.rscore{font-size:27px;font-weight:700;color:#fff;}
.rof{font-size:12px;color:rgba(255,255,255,.62);}
.rtitle{font-size:20px;font-weight:700;color:#fff;}
.rsub{font-size:13px;color:rgba(255,255,255,.75);margin-top:4px;}
.nbox{margin:13px 13px 0;border-radius:12px;padding:13px 15px;text-align:center;}
.nn{font-size:27px;font-weight:700;}
.nl{font-size:14px;font-weight:600;margin-top:2px;}
.focus{padding:13px;}
.focus-h{font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:7px;}
.fi{background:var(--card);border-radius:var(--rs);border:.5px solid var(--bd);padding:11px;margin-bottom:5px;}
.fiq{font-size:12px;font-weight:500;line-height:1.4;color:var(--tx);}
.fibdg{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:100px;margin-bottom:4px;}
.fb-n{background:var(--rd-l);color:var(--rd);}
.fb-p{background:var(--am-l);color:var(--am);}
.ract{padding:12px 13px;display:flex;flex-direction:column;gap:8px;padding-bottom:calc(20px + var(--sb));}

/* Toast */
#toast{position:fixed;bottom:calc(22px + var(--sb));left:50%;transform:translateX(-50%);
  background:#111;color:#fff;padding:9px 20px;border-radius:100px;font-size:13px;
  font-weight:500;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div id="toast"></div>
<input type="file" id="fimp" accept=".json" style="display:none" onchange="doImport(this)">

<!-- HOME -->
<div class="sc on" id="s-home">
  <div style="background:var(--bl);padding-top:var(--st)"></div>
  <div class="body">
    <div class="hero">
      <div class="hero-icon">📋</div>
      <div class="hero-h">Pflegeprüfung</div>
      <div class="hero-s">Schriftliche Prüfung · Prüfungstraining</div>
      <div class="hstats">
        <div class="hs"><div class="hs-n" id="s-done">0</div><div class="hs-l">Fälle abgeschlossen</div></div>
        <div class="hs"><div class="hs-n">53</div><div class="hs-l">Fälle gesamt</div></div>
        <div class="hs"><div class="hs-n" id="s-streak">0🔥</div><div class="hs-l">Tage in Folge</div></div>
      </div>
    </div>
    <div class="slbl">Prüfungstage wählen</div>
    <div class="tcards" id="tcards"></div>
    <div class="io-row">
      <button class="io-btn io-exp" onclick="doExport()">📤 Exportieren</button>
      <button class="io-btn io-imp" onclick="document.getElementById('fimp').click()">📥 Importieren</button>
    </div>
    <button class="rst-btn" onclick="resetAll()">🗑 Fortschritt zurücksetzen</button>
  </div>
</div>

<!-- CASES -->
<div class="sc" id="s-cases">
  <div class="hd">
    <div class="hd-row">
      <button class="back" onclick="show('s-home');renderHome()">←</button>
      <div><div class="hd-t" id="ctitle"></div><div class="hd-s" id="csub"></div></div>
    </div>
  </div>
  <div class="body">
    <div class="slbl">Fallbeispiele</div>
    <div class="case-list" id="caselist"></div>
  </div>
</div>

<!-- FALLSITUATION -->
<div class="sc" id="s-fall">
  <div class="hd">
    <div class="hd-row">
      <button class="back" onclick="show('s-cases')">←</button>
      <div><div class="hd-t" id="ftitle"></div><div class="hd-s" id="fsub"></div></div>
    </div>
  </div>
  <div class="body">
    <div class="fall-wrap">
      <div class="fall-title" id="fquote"></div>
      <div class="fall-text" id="ftext"></div>
    </div>
    <div class="fall-actions">
      <button class="btn-p" onclick="startQuiz()">▶ Aufgaben beginnen</button>
      <button class="btn-s" onclick="show('s-cases')">← Zurück</button>
    </div>
  </div>
</div>

<!-- QUIZ -->
<div class="sc" id="s-quiz">
  <div class="hd">
    <div class="hd-row">
      <button class="back" onclick="show('s-fall')">✕</button>
      <div style="flex:1;overflow:hidden;">
        <div class="hd-t" id="qtitle"></div>
        <div class="hd-s" id="qsub"></div>
      </div>
    </div>
    <div class="pbar"><div class="pfill" id="qprog" style="width:0%"></div></div>
  </div>
  <div class="qbody" id="qbody"></div>
</div>

<!-- RESULT -->
<div class="sc" id="s-result">
  <div class="body">
    <div class="rhero">
      <div class="rring"><div class="rscore" id="rsc">0</div><div class="rof" id="rof">von 50</div></div>
      <div class="rtitle" id="rtitle"></div>
      <div class="rsub" id="rsub"></div>
    </div>
    <div id="rnbox"></div>
    <div id="rfocus"></div>
    <div class="ract">
      <button class="btn-p" id="retry-btn">Nochmal üben</button>
      <button class="btn-s" onclick="show('s-cases')">Andere Aufgabe</button>
    </div>
  </div>
</div>
<script>
const DB={"tag1":[{"num":4,"title":"Erstes Prüfungsbeispiel","tag":"tag1","cases":[{"setting":"Stationäre Langzeitpflege","title":"„Wäre ich mal eher ins St. Katharina gezogen“","text":"„Wäre ich mal eher ins St. Katharina gezogen“\nRico Röhl ist 72 Jahre alt und lebt schon seit einem Jahr im St.\nKatharina. Da er keine Bezugspersonen mehr hat und seine\nErkrankungen ihm immer mehr zu schaffen gemacht haben, hat er\nsich überlegt, in die stationäre Langzeitpflege zu ziehen.\nAngefangen hat seine „Zuckerkrankheit“, mit starkem Durstgefühl\nund einer hohen Ausscheidung pro Tag. Als dann noch Schwindel\nhinzukamen ist er zum Hausarzt gefahren. Dieser hat mithilfe\neiner Blutabnahme einen Diabetes mellitus Typ 2 diagnostiziert.\nNeben der Gabe oraler Antidiabetika ist auch eine Insulingabe als\nTherapieoption erforderlich. Da Herr Röhl sehr abgelegen im\nWald gewohnt hat und die Besuche seiner Nachbarn immer\nweniger wurden, war er mit der Medikation überfordert und nahm\ndiese nur unregelmäßig ein. Das führte zu einer Retinopathie,\nNephropathie und Polyneuropathie. Als der Hausarzt Herrn Röhl\nerneut ermahnte, besser auf sich aufzupassen, war das für ihn der\nausschlaggebende Punkt, endlich umzuziehen. Der Medizinische\nDienst hatte ihm bereits Pflegegrad 2 genehmigt.\nSie betreuen Herrn Röhl seit dem Einzug und kennen den\nBewohner gut. Er ist Ihnen freundlich zugewandt und immer offen\nfür Neues. Sein Hobby Kreuzworträtsel zu lösen, bringt Sie immer\nwieder auf neue Gesprächsthemen. Zudem nimmt Herr Röhl gerne\nan den Gemeinschaftsaktivitäten teil und nutzt vor allem die\nsportlichen Programmpunkte im Haus. Seit dem Einzug ist Herr\nRöhl aufgeblüht, froh über die vielen Kontakte und Hilfe bei der\nUnterstützung seiner Medikation. Nur der Wald fehlt ihm sehr.\nHeute findet die hausärztliche Visite statt und Sie als\nBezugspflegekraft von Herrn Röhl begleiten diese. Im letzten\nMonat sind die Blutzuckerwerte deutlich besser geworden, sodass\nder Hausarzt eine Umstellung der Medikation vorschlägt. Das\nInsulin wird pausiert und Herr Röhl wird mit den oralen\nDiabetikern und einer Ernährungsumstellung neu eingestellt. Der\nHausarzt bittet Sie gemeinsam mit Herrn Röhl ein…","questions":[{"num":1,"points":4,"text":"Geben Sie an, wofür die Abkürzung SIS® steht (1 P.) und\nnennen Sie drei der sechs möglichen Themenbereiche (3\nP.)."},{"num":2,"points":6,"text":"Wählen Sie drei mögliche Themenbereiche (s. Aufgabe 1)\naus und arbeiten Sie anschließend für Herrn Röhl mit\njeweils zwei Aspekten eine pflegefachliche Einschätzung\naus (6 P.)."},{"num":3,"points":8,"text":"Begründen Sie, welchem Pflegeproblem Sie bei Herrn Röhl\ndie höchste Priorität einräumen (4 P.) und erläutern Sie\nvier Pflegemaßnahmen, welche das Pflegeproblem\nminimieren können (4 P.)."},{"num":4,"points":8,"text":"Nennen Sie vier Ressourcen von Herrn Röhl (4 P.).\nBewerten Sie zudem die Ressourcen bezogen auf die\nFallsituation (4 P.)."},{"num":5,"points":6,"text":"Erklären Sie Herrn Röhl in einem Informationsgespräch,\nworauf er bei der Ernährung achten sollte. Geben Sie ihm\nfünf wichtige Informationen an die Hand (6 P.)."},{"num":6,"points":3,"text":"Nennen Sie drei Spätfolgen, welche unter dem\nThemenschwerpunkt Makroangiopathie bei Herrn Röhl\nnoch entstehen könnten (3 P.)."},{"num":7,"points":4,"text":"Stellen Sie mit zwei Aspekten dar, wofür die\nPflegeversicherung bei einer vollstationären Pflege Geld\nbezahlt (2 P.) und wie viel sie bei Herrn Röhl pro Monat\nübernimmt (2 P.)."},{"num":8,"points":9,"text":"Geben Sie an, ab welchen Werten man von einer\nHyperglykämie (2 P.) und wann man von einem\ndiabetischen Koma spricht (2 P.). Nennen Sie anschließend\nfünf Symptome, welche Sie Herrn Röhl aufzeigen, damit er\ndiese Gefahr frühzeitiger erkennen kann (5 P.)."},{"num":9,"points":2,"text":"„Und meinen Sie, dass eine erneute Diabetesschulung für\nmich sinnvoll wäre?“ (Zeile 38 f.). Beantworten Sie die\nFrage von Herrn Röhl und begründen Sie Ihre Antwort (2\nP.).\nErwachsener\n4.3. Fallsituation: Ambulante\nLangzeitpflege (50 Punkte)\nFallsituation\n„Den Kinobesuch hätte ich mir sparen können“\nElena Martínez ist 45 Jahre alt und leidet seit 15 Jahren an\nmultipler Sklerose (sekundäre-progrediente Form). Seit 5 Jahren\nverlaufen die Schübe immer schwerer. Seit dem letzten Schub ist\nsie auf einen Rollstuhl angewiesen, welcher sie in ihrem Alltag\nstark einschränkt. Zudem hat Elena Martínez ein"}],"answers":{"1":"Die Abkürzung SIS® steht für strukturierte Informationssammlung.\n• Kognitive und kommunikative Fähigkeiten\n• Mobilität und Beweglichkeit\n• Krankheitsbezogene Anforderungen und Belastungen\n• Selbstversorgung\n• Leben in sozialen Beziehungen\n• Das sechste Themenfeld ist variabel, je nach Setting:\n– Haushaltsführung (ambulant)\n– Wohnen und Häuslichkeit (stationäre Langzeitpflege)\n– Erhalt und Förderung von Alltagsfähigkeiten bzw. Sicherstellung von\nRückzugsbedürfnissen (Tagespflege)\n– Wahrung der Individualität während des Aufenthalts/erste\nEinschätzung zur weiteren Versorgung nach der Kurzzeitpflege\n(Kurzzeitpflege)","2":"Kognitive und kommunikative Fähigkeiten:\n• Kann sich äußern und Wünsche mitteilen\n• Ist zu allen vier Qualitäten orientiert\n• Ist den Pflegefachpersonen freundlich zugewandt und offen für Neues\nMobilität und Beweglichkeit:\n• Nimmt gerne an den sportlichen Programmpunkten teil\n• Zeigt hohe körperliche Aktivität\n• Kann sich selbstständig und frei in der Einrichtung bewegen\nKrankheitsbezogene Anforderungen und Belastungen:\n• Neue Wunde am kleinen Zeh\n• Verbesserung des Medikamentenmanagements\n• Umstellung der Medikation nach ärztlicher Anordnung\nSelbstversorgung:\n• Führt die Körperpflege selbstständig durch\n• Kann die Nahrung selbstständig aufnehmen\n• Informationsgespräch zum Thema Ernährung\nLeben in sozialen Beziehungen:\n• Hat keine Bezugspersonen mehr\n• Ist gerne mit der Frau Neubauer zusammen\n• „Blüht“ in der Einrichtung wieder auf und freut sich über die vielen Kontakte\nWohnen und Häuslichkeit (stationäre Langzeitpflege):\n• Ist freiwillig in die Einrichtung gezogen\n• Ihm fehlt seine frühere Waldumgebung","3":"Die höchste Priorität hat das Pflegeproblem der neuen Wunde am kleinen Zeh.\nDie Wunde deutet auf eine weitere Folgeerkrankung hin → Diabetisches\nFußsyndrom. Dieses entsteht durch die Schädigung von Nerven und Blutgefäßen. Es\nkommt zu Durchblutungsstörungen und bedingt durch seine Polyneuropathie auch\nzu Druckgeschwüren, die nicht oder erst spät bemerkt werden.\nPflegemaßnahmen:\n• Inspektion der Füße → Hautfarbe, Wärme, Verletzungen, Druckstellen,\nSchmerzen, Kribbeln oder Taubheitsgefühle.\n• Die Füße täglich mit körperwarmem Wasser waschen und diese anschließend\ngut abtrocknen.\n• Die Fußnägel lieber feilen als schneiden.\n• Die generelle Fußpflege sollte ein Podologe übernehmen.\n• Passendes Schuhwerk auswählen, z. B. spezielle Diabetikerschuhe.","4":"• Je nach Allgemeinzustand (AZ) soll Herr Röhl dokumentieren, ob das übliche\nEssverhalten eingehalten wird\n• Kohlenhydratmenge korrekt einschätzen:\n– Die Kohlenhydrate werden heute in Kohlenhydrateinheiten (KE)\nangegeben\n– 1 KE = ca. 10 g verwertbare Kohlenhydrate\n– Herr Röhl sollte Kohlenhydrattabellen/KE-Rechner nutzen, um diese\nauszurechnen\n• Mehrere kleine Mahlzeiten pro Tag zu sich nehmen\n• Kalorienfreie oder -arme Getränke bevorzugen\n• Lebensmittel mit einem niedrigen glykämischen Index bevorzugen, z. B.\nVollkornprodukte\n• Auswirkungen von Alkohol berücksichtigen und darüber aufklären\n• Übergewicht vorbeugen","6":"Die Leistungen der Pflegeversicherung bei einer vollstationären Pflege\numfassen:\n• Pflegebedingte Aufwendungen\n• Aufwendungen für Betreuung\n• Aufwendungen für Leistungen der medizinischen Behandlungspflege\nMaximale Leistung bei Pflegegrad 2:\n• 770 € pro Monat","8":"Hyperglykämie:\nDie Blutzuckerwerte liegen nüchtern > 110 mg/dl oder > 140 mg/dl zwei\nStunden nach der Mahlzeit.\nDiabetisches Koma:\nDie Blutzuckerwerte liegen zwischen > 400 mg/dl bis > 1000 mg/dl.\nHerr Röhl kann folgende Symptome aufweisen:Starken DurstTrockene Zunge\nund ExsikkoseBenommenheit bis zur BewusstlosigkeitAzetongeruch des\nAtemsSchock bis Koma.\n\n1. Bundesministerium für Gesundheit. Pflege im Heim. Aus:\nhttps://www.bundesgesundheitsministerium.de/pflegeimhei\nm.html (letzter Zugriff: 09.01.2023).\n2. Deutsche Diabetes Gesellschaft. S2k-Leitlinie Diagnostik, Therapie und\nVerlaufskontrolle des Diabetes mellitus im Alter. 2. Aufl. 2018. Aus:\nhttps://www.awmf.org/uploads/tx_szleitlinien/057-\n017l_S2k_Diabetes_mellitus_im_Alter_2018-09.pdf (letzter\nZugriff: 09.01.2023).\n3. EinSTEP. Schulungsunterlagen und Materialien zur Einführung und\nAnwendung des Strukturmodells. 2017. Aus: https://www.ein-\nstep.de/schulungsunterlagen/schulungsunterlagen/ (letzter\nZugriff: 09.01.2023)."}},{"setting":"Ambulante Langzeitpflege","title":"„Den Kinobesuch hätte ich mir sparen können“","text":"„Den Kinobesuch hätte ich mir sparen können“\nElena Martínez ist 45 Jahre alt und leidet seit 15 Jahren an\nmultipler Sklerose (sekundäre-progrediente Form). Seit 5 Jahren\nverlaufen die Schübe immer schwerer. Seit dem letzten Schub ist\nsie auf einen Rollstuhl angewiesen, welcher sie in ihrem Alltag\nstark einschränkt. Zudem hat Elena Martínez eine\nBlasenentleerungsstörung entwickelt. Nach der Stabilisierung des\nSchubs (vor 3 Wochen) wurde beim niedergelassenen Neurologen\nauf eine verlaufsmodifizierte Therapie umgestellt. Nun erhält Frau\nMartínez zum ersten Mal Interferon subkutan und\nImmunsuppressiva. Der Neurologe hat ihr zudem nahegelegt,\neinen Schwerbehindertenausweis zu beantragen.\nSeit fünf Jahren sind Sie mit Ihrem ambulanten\nLangzeitpflegeteam Avento für Elena Martínez zuständig. Als Sie\ndas Haus von Frau Martínez betreten, sitzt diese weinend am\nTisch. Sie gehen direkt auf ihre Kundin zu und versuchen sie mit\neinem Witz aufzumuntern und lachen am Ende lauthals auf. Frau\nMartínez schaut sie mit Tränen in den Augen an. „Lassen Sie es\ngut sein, Pflegefachfrau Anna, mit ist heute nicht zum Lachen.\nGestern wollte mir meine Freundin Katharina eine Freude\nmachen und hat mich zum Kinobesuch eingeladen. Doch\naufgrund von Treppen sind wir nicht ins Kino gekommen und ich\nhabe mich ziemlich ausgeschlossen gefühlt. Zudem hat der\nNeurologe gesagt, ich soll mir einen Schwerbehindertenausweis\nausstellen lassen. Meinen Sie, ich kann weiterhin als Arzthelferin\narbeiten?“\nSie sind heute bei ihr eingeplant worden, da Sie Frau Martínez\nin der s. c.-Injektion anleiten sollen, damit Sie in Zukunft die\nneuen Medikamente selbstständig verabreichen kann.\nAnschließend steht noch die Förderung der Bewegung im\nVordergrund. Trotz der Sorgen, die die Kundin geäußert hat, legen\nSie mit der Anleitungssituation los. Sie führen ihre Aufgaben\ngewissenhaft durch und verabschieden sich mit den Worten: „Ach,\nFrau Martínez, nehmen Sie es nicht so schwer, mit dem…","questions":[{"num":1,"points":8,"text":"Begründen Sie, warum die Förderung der Bewegung in der\npflegerischen Versorgung von Frau Martínez im\nVordergrund steht (2 P.). Nennen Sie anschließend sechs\npflegerische Maßnahmen, die Sie bei Frau Martínez im\nRahmen der multiplen Sklerose einsetzen können (6 P.)."},{"num":2,"points":6,"text":"Bei Frau Martínez und bei Menschen mit besonderen\nHerausforderungen kommt es bedingt durch die\nRollstuhlpflicht zu vielen Veränderungen. Ermitteln Sie\nsechs Einschränkungen (6 P.)."},{"num":3,"points":4,"text":"Geben Sie vier zentrale Begriffe und Konzepte der UN-\nBehindertenrechtskonvention wieder (4 P.)."},{"num":4,"points":3,"text":"Erklären Sie, drei Pflegemaßnahmen bei\nGlukokortikoiden, welche im Rahmen der\nkrankheitsbezogenen Besonderheiten eingeleitet werden\nmüssen (3 P.)."},{"num":5,"points":5,"text":"Nennen Sie das neu aufgetretene Pflegeproblem von Frau\nMartínez (1 P.) und entwickeln Sie vier Pflegemaßnahmen,\nwelche Sie mit ihr besprechen (4 P.)."},{"num":6,"points":14,"text":"Entwickeln Sie eine Anleitungssituation für Frau Martínez\nfür eine s. c.-Injektion. Gehen Sie zunächst mit vier\nAspekten auf die Vorbereitung ein (4 P.), anschließend\nführen Sie sechs Aspekte der Durchführung auf (6 P.) und\nschließen die Aufgabe mit vier Aspekten der Nachbereitung\n(4 P.)."},{"num":7,"points":4,"text":"Nennen Sie vier weitere Berufsgruppen, welche in der\ndauerhaften Therapie und Unterstützung hinzugezogen\nwerden können (4 P.)."},{"num":8,"points":4,"text":"Analysieren Sie zwei Kommunikationssituationen aus dem\nFall im Rahmen der Qualitätskontrolle (4 P.)."},{"num":9,"points":2,"text":"„Meinen Sie, ich kann weiterhin als Arzthelferin arbeiten\ngehen?“ (Zeile 21 f.). Interpretieren Sie diese Aussage (2\nP.)."}],"answers":{"2":"• Inklusion\n• Würde\n• Selbstbestimmung/Autonomie (individuelle)\n• Partizipation\n• Chancengleichheit\n• Empowerment\n• Barrierefreiheit\n• Disability Mainstreaming","4":"Bei der Substitution von Glukokortikoiden werden folgende\nPflegemaßnahmen durchgeführt:Anleitung zur eigenständigen\nTemperaturkontrolle, um Infektionen frühzeitig zu erkennenUlkusprophylaxe\nbedingt durch die Glukokortikoidtherapie nach ärztlicher AnordnungVermehrt\nMundpflege durchführen lassen, um die Soorgefahr zu minimierenBeratung zur\nPneumonie- und Obstipationsprophylaxe","5":"Das neu aufgetretene Pflegeproblem von Frau Martínez ist die\nBlasenentleerungsstörung.\nPflegemaßnahmen:\n• Blasentraining durch Verhaltenstherapie ermöglichen\n• Inkontinenzprodukte individuell auswählen und den Umgang damit schulen\n• Beckenbodentraining\n• EMG-Biofeedback\n• Intermittierender Selbstkatheterismus","6":"7. Nennen Sie vier weitere Berufsgruppen, welche in der dauerhaften\nTherapie und Unterstützung hinzugezogen werden können. 4\nPunkte\n• Physiotherapie\n• Ergotherapie\n• Logopädie\n• Psychologie\n• Pflegeberatung","8":"„Sie gehen direkt auf Ihre Kundin zu und versuchen sie mit einem Witz\naufzumuntern und lachen am Ende lauthals auf.“\nDiese Art der Begrüßung ist unangebracht, wenn die Kundin weinend am\nKüchentisch angetroffen wird. Zunächst sollte abgeklärt werden, warum Frau\nMartínez weint, und dann kann je nach Situation entsprechend reagiert werden.\n„Ach, Frau Martínez, nehmen Sie es nicht so schwer, mit dem\nSchwerbehindertenausweis bekommen Sie immerhin überall direkt einen\nParkplatz.“\nDie Aussage von Pflegefachfrau Anna ist nicht professionell. Einen\nSchwerbehindertenausweis zu beantragen und den neuen Grad der Einschränkung\nzu akzeptieren fällt Frau Martínez aktuell sehr schwer. Nun die Vorteile aufzuzählen,\nmacht die Situation nicht besser. Vor allem da die Pflegefachfrau Anna diesen Satz\nam Ende der Unterhaltung einsetzt und dann keine weitere Kommunikation mehr\nstattfindet. Elena Martínez wird mit dieser Aussage einfach in der Situation\nsitzengelassen.\nKompetenzen und Operatoren"}}]},{"num":5,"title":"Zweites Prüfungsbeispiel","tag":"tag1","cases":[{"setting":"Stationäre Langzeitpflege","title":"„Er wird nicht mehr der alte sein“","text":"„Er wird nicht mehr der alte sein“\nOtto Petermann ist 82 Jahre alt und lebt seit ein paar Tagen in der\nstationären Langzeitpflege „Sonnenschein“. Nach einem\nSchlaganfall mit einer Hemiparese rechts und einer ausgeprägten\nglobalen Aphasie war ein Leben allein zuhause in seiner\nEtagenwohnung nicht mehr möglich.\nPflegefachmann Jens Ströhmer betreut ihn seit dem Einzug. In\nder Pflegeprozessplanung steht die Förderung der Mobilität und\nder Kommunikationsfähigkeit im Vordergrund. Heute früh betreut\nJens Ströhmer gemeinsam mit der Auszubildenden Marie\nSluscaryk Herrn Petermann. Die morgendliche Mobilisation\ndauert lange und erfordert viel Unterstützung und Steuerung\ndurch Jens. Marie hat direkt Ideen, wie die Pflegesituation\nverändert werden kann, da sie das Konzept Bobath im\nTheorieunterricht kennengelernt hat.\nHerr Petermann kann sich nicht verständlich machen. Marie\nbemerkt, dass Jens vor der Zahnpflege das Zähneputzen mit\nMimik und Gestik vormacht. Der antwortet darauf: „Kamm,\nKamm“. Zum Frühstück wird Herr Petermann in den\nGemeinschaftsraum gebracht und das Frühstück wird ihm\nmundgerecht zubereitet. So kann er mit der linken Hand die\nNahrung selbstständig zu sich nehmen. Durch die globale Aphasie\nhat er wenig Anschluss gefunden, denn die anderen Bewohner\nverstehen ihn nicht.\nNach der Versorgung des Bewohners spricht Marie Jens\nStröhmer auf die eben erlebte Pflegesituation an: „Jens, wir haben\ngerade das Bobath-Konzept im Unterricht gehabt. Könnten wir\nHerrn Petermanns Transfer nicht entsprechend gestalten? Das\nwäre bestimmt nützlich.“ Jens gefällt die Idee. Er kennt den\nNamen Bobath, hat sich dann aber nicht weiter mit dem Konzept\nbeschäftigt. „Heute Mittag kommt die Tochter von Herrn\nPetermann. Da können wir Informationen sammeln und deine\nIdeen direkt in die Pflegeprozessplanung einbauen“. Gegen Mittag\nerscheint wie geplant die Tochter von Herrn Petermann. Sie ist\nbereits den Tränen nahe und beginnt das Gespräch: „Ach herrjeh,…","questions":[{"num":1,"points":6,"text":"Ermitteln Sie für Herrn Petermann eine Pflegeplanung,\nindem Sie ein Pflegeproblem (1 P.), eine Ressource (1 P.)\nund zwei passende Pflegemaßnahmen erarbeiten (4 P.)."},{"num":2,"points":5,"text":"Nennen Sie eine Pflegetheorie bzw. ein Pflegemodell zur\nSteuerung des Pflegeprozesses bei Herrn Petermann (1 P.)\nund begründen Sie Ihre Auswahl anhand von vier Aspekten\n(je 4 P.)."},{"num":3,"points":7,"text":"Definieren Sie den Begriff Aphasie (1 P.). Vergleichen Sie\ndie vier möglichen Aphasieformen mit jeweils einem\nMerkmal (2 P.) und planen Sie vier Maßnahmen, die Herrn\nPetermann im Alltag helfen können, mit der Aphasie\nbesser umzugehen (4 P.)."},{"num":4,"points":1,"text":"Warum haben Personen, die eine Schädigung der linken\nGehirnhälfte haben, ihre Defizite an der rechten\nKörperhälfte und umgekehrt (1 P.)?"},{"num":5,"points":1,"text":"Listen Sie zwei weitere Berufsgruppen auf, welche Herrn\nPetermann bei der Förderung seiner Autonomie helfen\nkönnen (1 P.)."},{"num":6,"points":8,"text":"Zählen Sie zwei Ziele auf, welche das Bobath-Konzept\nverfolgt (2 P.). Beschreiben Sie drei Maßnahmen, wie der\nTransfer und die Mobilisation nach Bobath konkret bei\nHerrn Petermann umgesetzt werden kann (6 P.)."},{"num":7,"points":8,"text":"Herr Petermann hat Anspruch auf einen Pflegegrad.\nStellen Sie mit jeweils zwei Merkmalen die beiden Begriffe\nPflegegeld und Pflegesachleistungen gegenüber (4 P.).\nDefinieren Sie zusätzlich den Begriff Entlastungsbetrag (2\nP.) und benennen Sie den Geldbetrag, welchen man für den\nVerbrauch von Pflegehilfsmitteln erhalten kann (2 P.)."},{"num":8,"points":2,"text":"„Ich bin einfach überfordert mit der Situation meines\nVaters.“ (Zeile 32 f.). Interpretieren Sie diese Aussage (2\nP.).\nErwachsener\n5.3. Fallsituation: Stationäre\nAkutpflege (50 Punkte)\nFallsituation\n„Jetzt auch noch das, meine Nieren sind nun auch\nkaputt“\nSusanne Brinkmann (61 Jahre alt) leidet schon seit Jahren an\neiner arteriellen Hypertonie und am Diabetes mellitus Typ 2. Die\nHaus- und Fachärzte haben Sie immer wieder darauf hingewiesen,\nwie wichtig es ist, dass Sie die Medikamente korrekt einnimmt und\ndie Therapiepläne einhält. Frau Brinkmann ist selbstständig als\nImmobilienmaklerin in Lüb"}],"answers":{"1":"Z. B.\n• Pflegeproblem: Herr Petermann benötigt Hilfe bei der Mobilisation in den\nToilettenstuhl.\n• Ressource: Herr Petermann kann die linke Körperhälfte bewegen und\nmithelfen.\n• Pflegemaßnahmen: Die Pflegefachperson wendet bei jeder Bewegung zur\nMobilisation das Bobath-Konzept an (s. u.), die Körperwahrnehmung wird\nbei allen Bewegungen v. a. beim Transfer gefördert (z. B. Spiegel benutzen),\nwährend der Mobilisation werden die beiden Körperhälften ganz bewusst\nmit „rechts“ und „links“ angesprochen.\nOder ein weiteres Beispiel für ein Pflegeproblem:\n• Pflegeproblem: Herr Petermann kann sich seine Mahlzeiten nicht\nselbstständig mundgerecht zubereiten und benötigt teilweise Hilfe bei der\nNahrungsaufnahme.\n• Ressource: Kann seine linke Hand und Arm bewegen.\n• Pflegemaßnahmen: gezielte Hilfsmittel einsetzen (z. B. Nagelbrett für Brote\nund Spezialbesteck) sodass eine einhändige Nahrungsaufnahme möglich ist,\ndie Konsistenz der Lebensmittel so auswählen, dass eine eigenständige\nNahrungsaufnahme weiterhin möglich bleibt und gefördert wird.","2":"Z. B.\n• das ABEDL-Strukturmodell (Aktivitäten, Beziehungen und existenziellen\nErfahrungen des Lebens) von Monika Krohwinkel","3":"Definition Aphasie: Nach einer abgeschlossenen Sprachentwicklung und intakten\nSprechwerkzeugen kommt es zu einer neu aufgetretenen Sprachstörung. Diese wird\nmeistens durch eine Schädigung im Gehirn, z. B. Schädelhirntrauma, Tumor oder\neinem Schlaganfall (häufigste Ursache) ausgelöst.\nAphasieform Merkmal\nAmnestische Aphasie\n• Starke Wortfindungsstörungen, die Betroffenen\numschreiben die Begriffe\n• Sprachverständnis und flüssige Sprechfähigkeit sind\nweiterhin vorhanden\n• Schreiben und Lesen sind wenig eingeschränkt\nBroca-\n• Grammatikalisch fehlerhafte Formulierungen\nAphasie/motorische\n• Sprachverständnis ist wenig eingeschränkt, keine\nbzw. expressive\nflüssige Sprache möglich\nAphasie\n• Schreiben und Lesen sind erheblich eingeschränkt\nGlobale Aphasie\n• Ist eine kombinierte Störung\n• Sprachverständnis und Sprechfähigkeit sind sehr\nstark eingeschränkt, selten flüssige\nSprachproduktion möglich\n• Schreiben und Lesen sind stark eingeschränkt oder\ngar nicht mehr möglich\nWernicke-\n• Sprachverständnis ist fehlend oder stark\nAphasie/sensorische\neingeschränkt\nbzw. rezeptive Aphasie\n• Die Sprache ist flüssig aber nicht zu verstehen und\nnicht sinnhaft, Wörter, die nicht passen, werden vom…","4":"Das liegt an den Pyramidenbahnen. Dies sind spezielle Nervenbahnen, die für die\nFeinmotorik und die willkürliche Motorik zuständig sind. Diese Nervenfasern\nkreuzen direkt hinter dem Austritt aus dem Gehirn zur anderen Seite. Daher werden\nnervliche Impulse zur gegenüberliegenden Seite gesendet und somit finden sich\nStörungen auf der konterlateralen (gegenüberliegenden) Seite.","5":"• Logopädie\n• Physiotherapie\n• Ergotherapie\n• Hausärzte\n• Neurologie\n• Musiktherapie (künstlerische Therapie)","6":"Ziele des Bobath-Konzeptes:\n• Erlernen automatisierter Bewegungsabläufe auf Grundlage physiologischer\nBewegungsmuster.\n• Optimierung aller Funktionen.\n• Selbstständigkeit und Handlungsfähigkeit der betroffenen Person im Alltag\nso weit wie möglich erhalten bzw. steigern.\n• Verbesserung der Haltungskontrolle und selektiven Bewegungen durch\nFazilitation.\n• Vermeidung von sekundären Schäden/Veränderungen, wie\nGelenkversteifungen oder Erlernen falscher Bewegungsmuster.\nMaßnahmen zum Transfer und Mobilisation für Herrn Petermann\nnach Bobath:\n• Herr Petermann wird beim Transfer und bei der Mobilisation aktiv\nmiteinbezogen, um den besten Trainingseffekt zu erlangen. Im Idealfall\nwird somit die Bewegungsfähigkeit der betroffenen Person gesteigert.\n• Bei der Mobilisation aus dem Bett in den Toilettenstuhl kann über die\nbetroffene Seite gearbeitet werden, um somit die Wahrnehmung dieser Seite\nzu fördern. Herr Petermann sollte dabei angeleitet werden, mit der weniger\nbetroffenen Seite die betroffene Seite zu stützen, um somit ebenfalls die\nWahrnehmung zu verbessern. Dies kann z. B. bedeuten, dass der betroffene\nArm mit der weniger betroffenen Hand angehoben wird.…","7":"Begriffe Merkmale\nPflegegeld\n• Der zu pflegende Mensch wird durch seine\nBezugspersonen, Nachbarn oder Ehrenamtliche im\nhäuslichen Umfeld versorgt.\n• Dafür erhalten die Bezugspersonen/der Pflegeempfänger\neine Geldleistung.\n• Es muss mind. Pflegegrad 2 vorliegen.\nPflegesachleistung\n• Ein ambulanter Pflegedienst übernimmt die Versorgung\ndes zu pflegenden Menschen.\n• Die festgelegten Beträge sind vom Pflegegrad abhängig.\n• Der ambulante Pflegedienst unterstützt die\nBezugspersonen im Alltag, um z. B. Beruf und\nPflege/Betreuung besser zu organisieren.\n• Es muss mind. Pflegegrad 2 vorliegen.\nEntlastungsbeitrag\n• Dieser Beitrag ist zweckgebunden und wird mit\nmonatlich 125€ vergütet.\n• Der Beitrag kann für eine teilstationäre Tages- oder\nNachtpflege, eine vorübergehende vollstationäre\nKurzzeitpflege oder Betreuungs- und hauswirtschaftliche\nVersorgungszwecke verwendet werden.\nPflegehilfsmittel\n• Ab dem 1. Pflegegrad steht dem Pflegeempfänger ein\nmonatliches Budget von 40€ im Monat für\nPflegehilfsmittel (z. B. Einmalhandschuhe oder\nVerbrauchsprodukte wie Einmalunterlagen) zu.\n\n1. AMBOSS. Aphasien - Klinische Anwendung. 2022. Aus:\nhttps://www.amboss.com/de/wissen/Aphasien_-…"}},{"setting":"Stationäre Akutpflege","title":"(Fallsituation)","text":"„Jetzt auch noch das, meine Nieren sind nun auch\nkaputt“\nSusanne Brinkmann (61 Jahre alt) leidet schon seit Jahren an\neiner arteriellen Hypertonie und am Diabetes mellitus Typ 2. Die\nHaus- und Fachärzte haben Sie immer wieder darauf hingewiesen,\nwie wichtig es ist, dass Sie die Medikamente korrekt einnimmt und\ndie Therapiepläne einhält. Frau Brinkmann ist selbstständig als\nImmobilienmaklerin in Lübeck und arbeitet viel. Da vergisst Sie\ndes Öfteren ihre Medikamente einzunehmen und ernährt sich\nzeitweise ungesund. Das Sportprogramm bleibt auch immer\nwieder auf der Strecke. In den letzten Wochen hat sich der\nGesundheitszustand von Frau Brinkmann deutlich verschlechtert.\nAls Sie ihrem Hausarzt die Symptome mitteilt, schickt dieser sie\ndirekt ins nächstliegende Krankenhaus. Seine Vermutung, Frau\nBrinkmann hat zusätzlich eine chronische Nierenerkrankung\nentwickelt. Diese soll zunächst stationär behandelt und therapiert\nwerden.\nSie arbeiten als Pflegefachperson auf der nephrologischen\nStation und sind für die Neuaufnahme von Frau Brinkmann\nzuständig. Frau Brinkmann zeigt einen reduzierten\nAllgemeinzustand auf. Sie ist sehr müde, hat Kopfschmerzen sowie\nstarken Juckreiz und zeigt eine deutliche Ödembildung an den\nBeinen. Zudem hat sie seit Tagen keinen Appetit und muss sich\nhäufig erbrechen. Die ersten diagnostischen Maßnahmen sind\nbereits in der Ambulanz gelaufen und die Nephrologen vermuten\nebenfalls eine chronische Nierenerkrankung. Als Sie fürs\nAnamnesegespräch das Zimmer betreten, liegt Frau Brinkmann\naufgelöst im Bett. Die Nachbarpatientin unterhält sich\nwährenddessen weiter mit Ihrem Ehemann. Frau Brinkmann sieht\nSie an und beginnt das Gespräch „Ach nee, ich mag keine weiteren\nFragen beantworten. Eben hat der Arzt mir gesagt, dass ich eine\ndauerhafte Dialysetherapie benötige. Zusätzlich muss ich meine\nErnährung und auch meine Flüssigkeitszufuhr umstellen. Wo soll\ndas alles hinführen?“\nSie setzen sich zu Frau Brinkmann ans Bett und beruhigen Sie…","questions":[{"num":1,"points":15,"text":"Arbeiten Sie bitte drei Pflegeprobleme mit jeweils einem\ngeeigneten Pflegeziel und je zwei entsprechenden\nPflegemaßnahmen für Frau Brinkmann aus (15 P.)."},{"num":2,"points":4,"text":"Wählen Sie für Frau Brinkmann eine der von Ihnen\ngeplanten Pflegeprobleme mit Pflegemaßnahmen aus,\nwelcher Sie die höchste Priorität einräumen (2 P.).\nBegründen Sie Ihre Auswahl (2 P.)."},{"num":3,"points":4,"text":"Frau Brinkmann bittet Sie, die verschiedenen\nNierenersatztherapien zu erläutern. Unterscheiden Sie mit\njeweils zwei Merkmalen die zwei Therapieformen\n(Hämodialyse und Peritonealdialyse), welche bei einer\nchronischen Nierenerkrankung angewendet werden\nkönnen (4 P.)."},{"num":4,"points":8,"text":"Erklären Sie Frau Brinkmann vier Pflegemaßnahmen,\nwelche Sie bei einer zukünftigen Shuntanlage und\nShuntpflege unbedingt berücksichtigen sollte (8 P.)."},{"num":5,"points":5,"text":"Geben Sie fünf Aussagen an, wie ein strukturiertes\nInformationsgespräch korrekt durchgeführt werden kann\n(5 P.)."},{"num":6,"points":6,"text":"Erläutern Sie jeweils drei Tipps zum Thema Ernährung (3\nP.) und Flüssigkeitshaushalt/-zufuhr (3 P.) während einer\nDialysetherapie, welche Sie Frau Brinkmann im\nInformationsgespräch mitgeben können."},{"num":7,"points":4,"text":"Erörtern Sie zwei Maßnahmen zur Qualitätsverbesserung\nin der vorliegenden Fallsituation (je 2 P.)."},{"num":8,"points":4,"text":"„Wo soll das alles hinführen?“ (Zeile 29). Setzen Sie sich\nmit dieser Aussage auseinander und geben Sie zwei\nverschiedene Interpretationen an (4 P.)."}],"answers":{"2":"Die höchste Priorität hat das Pflegeproblem der pathologischen Vitalparameter.\nWenn die Parameter nicht in den nächsten acht Stunden besser werden, kann es zu\nweiteren Problemen und Komplikationen führen. Aus diesem Grund sollte die\nPflegefachperson zunächst alle 30 Minuten die Vitalparameter ermitteln,\neinschätzen und den Arzt informieren, wenn diese nicht besser werden.","3":"Shuntpflege:\n• Tägliche Selbstinspektion des Shunts plus Palpation und Auskultation durch\ndas Pflegefachpersonal während des stationären Aufenthalts.\n• Keine Blutabnahme, Injektionen und Vitalzeichenkontrolle am Shuntarm\ndurchführen lassen und Pflegefachpersonen darauf hinweisen.\n• Hautpflege nur mit Wasser am Tag nach der Dialyse durchführen.\n• Keine Rasur am Shuntarm.\n• Den Shunt vor Sonneneinstrahlung schützen, nicht schwer heben und keine\neinschnürende oder beengende Kleidung am Shuntarm tragen.\n• Bei Gartenarbeiten Frau Brinkmann bitten, lange Handschuhe zu tragen, um\nden Shunt vor Verschmutzungen zu schützen.\nShuntanlage:\n• Für die Punktion werden speziell geschliffene Kanülen verwendet, die\ndas Gewebetrauma reduzieren und die Punktionsstelle gut abheilen lassen.","5":"Ernährung während einer Dialysetherapie:\n• Informieren Sie Frau Brinkmann darüber, dass Sie während der\nDialysepflicht reichlich Eiweiß zu sich nehmen sollte. Vor allem Produkte\nwie Fleisch, Fisch und Eier sind sehr eiweißhaltig und bieten sich an.\n• Während der Dialyse sollte Frau Brinkmann auf phosphatarme Kost achten.\n• Insgesamt erläutern Sie beim Informationsgespräch, dass die Kalorienzufuhr\nder Ernährung während einer Dialysetherapie auf 35–40 kcal/kg KG erhöht\nwerden sollte.\n• Die Kaliumzufuhr sollte beschränkt werden. Frau Brinkmann sollte das\nGemüse und Kartoffeln lange bewässern und das Kochwasser anschließend\nimmer abschütten.\nFlüssigkeitszufuhr während einer Dialysetherapie:\n• Die tägliche Flüssigkeitsmenge wird eingegrenzt, meistens auf das\nUrinvolumen vom Vortag plus 500 ml.\n• Frau Brinkmann bei starkem Durstgefühl Eiswürfel zum Lutschen anbieten,\num den Mund anzufeuchten, die Trinkmenge aber weiterhin reduziert zu\nhalten.\n• Geben Sie zusätzlich den Hinweis, dass Frau Brinkmann auf sehr salzhaltige\nund süße Lebensmittel verzichten sollte, da diese das Durstgefühl\nverstärken.\n• Den zu pflegenden Menschen Früchte- oder Kräutertees als Alternative\nanbieten.","7":"Datenschutz\n„Die Nachbarpatientin unterhält sich währenddessen weiter mit Ihrem\nEhemann“.\nBevor Pflegefachfrauen oder Pflegefachmänner ein Anamnesegespräch führen,\nmüssen Sie Begleitpersonen der Mitpatienten rausbitten. Wenn der Ehepartner\nsitzen bleibt, so muss Frau Brinkmann vorher ausdrücklich einwilligen, dass Sie\ndamit einverstanden ist, dass der Ehemann sämtliche Informationen mithören\nkann. Bei einem Anamnesegespräch werden sensible Themen angesprochen, die\nFrau Brinkmann dann ggf. nicht wahrheitsgemäß oder aus Schamgefühl gar nicht\nbeantwortet.\nAufklärung ärztlicher Tätigkeiten\n„Und was hat der Arzt eigentlich mit einer Shuntanlage gemeint, die er am\nliebsten Morgen machen möchte?“\nWenn Morgen schon die Shuntanlage geplant ist, so hat der Arzt Frau Brinkmann\nvorher über Anlass, Dringlichkeit, Umfang, Schwere, Risiken (hierzu zählen z. B.\nSchmerzen, Nebenwirkungen und Heilungschancen) und Nutzen in Ruhe\naufzuklären. Zudem fallen Aufklärungsgespräche in den Kernbereich des ärztlichen\nHandelns und darf nicht an Pflegefachpersonen delegiert werden. Die Aufklärung\nmuss zudem ausreichend vor dem Eingriff erfolgen, sodass Frau Brinkmann noch…"}}]},{"num":6,"title":"Drittes Prüfungsbeispiel","tag":"tag1","cases":[{"setting":"Stationäre Akutpflege","title":"„So sollte die Familienfeier nicht enden“","text":"„So sollte die Familienfeier nicht enden“\nAttila Demir und seine Familie haben sich schon seit Wochen auf\ndie Feier zum 70. Geburtstags des Opas gefreut. Sämtliche\nVerwandtschaft reist extra für dieses Ereignis an. Der Großvater\nhat ein schönes Lokal in Köln angemietet und die Enkel können\nsich draußen auf einem anliegenden Spielplatz mit Klettergerüsten\naustoben. Attila Demir ist mit seinen drei Geschwistern und sechs\nCousins nach dem Nachtisch direkt zum Spielplatz gerannt. Als sie\ngerade Fangen spielen, klettert Attila überstürzt auf das\nKlettergerüst, schaut am höchsten Punkt nach hinten, wie weit\nsein Cousin noch entfernt ist, hält sich nicht richtig fest und stürzt\ndrei Meter tief mit dem Kopf zuerst auf den harten Boden.\nDie Eltern von Attila hören den lauten Aufprall und den\nschrillen Aufschrei Ihres Sohnes im Restaurant und rennen direkt\nzum Spielplatz. Der Vater wählt währenddessen schon den Notruf.\nAls die Eltern am Klettergerüst und den geschockten Geschwistern\nund Cousins ankommen, liegt Attila bewusstlos am Boden. Attila\nDemir wird mit dem Rettungswagen und seiner Mutter in das\nnächstgelegene Kinderkrankenhaus gefahren. Nach über 60\nMinuten kommt Attila wieder zu sich. Er weiß zunächst nicht, wo\ner sich befindet, und klagt über starke Kopfschmerzen, Schwindel\nund Sehstörungen mit Doppelbildern. Ängstlich fragt er seine\nMutter, was denn passiert sei.\nIn der Notaufnahme kümmern sich direkt die Ärzte und\nPflegefachpersonen um Attila. Bei ihm wird ein gedecktes Schädel-\nHirn-Trauma diagnostiziert. Bedingt durch die lange\nBewusstlosigkeit und nur 10 Punkte auf der Glasgow Coma Scale\n(GCS) wird das SHT als Gehirnprellung/mittelschweres SHT 2.\nGrades vom Kinderarzt eingeteilt.\nAufgrund der Diagnose wird Attila Demir stationär auf Ihrer\nStation aufgenommen. Sie sind für sein Zimmer zuständig und\nbetreuen Attila am nächsten Morgen. Als Sie die Zimmertür\nöffnen, sehen Sie direkt, dass Attila an der Venenverweilkanüle am…","questions":[{"num":1,"points":12,"text":"Nennen Sie den Namen des Pflegemodells von Roper,\nTierney und Logan (1 P.) und geben Sie die fünf zentralen\nKonzepte des Pflegemodells an (5 P.). Abschließend\nnennen Sie sechs der zwölf Lebensaktivitäten aus dem\nPflegemodell (6 P.)."},{"num":2,"points":10,"text":"Entwickeln Sie für Attila Demir zwei Pflegeprobleme (2 P.)\nmit jeweils einer Ressource (2 P.) und einem Pflegeziel (2\nP.) sowie zwei Pflegemaßnahmen (4 P.)."},{"num":3,"points":2,"text":"Definieren Sie den Begriff „Minimal Handling“ (2 P.)."},{"num":4,"points":7,"text":"Die Pupillenkontrolle ist die wichtigste neurologische\nKontrolle bei einem SHT. Legen Sie mit vier Schritten dar,\nwie eine Pupillenkontrolle durchgeführt wird (4 P.) und\nführen Sie drei mögliche pathologische Veränderungen der\nPupillen auf (3 P.)."},{"num":5,"points":4,"text":"Begründen Sie, warum es im Fall von Attila Demir sinnvoll\nist eine Rehabilitationsmaßnahme anzuschließen (2 P.)\nund welche zwei weiteren Berufsgruppen, dort in der\nTherapie, zur Verfügung stehen werden (2 P.)."},{"num":6,"points":4,"text":"Erklären Sie, wofür die Glasgow Coma Scale eingesetzt\nwird (1 P.) und nennen Sie die drei Kategorien, mit denen\ndie Einschätzung durchgeführt wird (3 P.)."},{"num":7,"points":9,"text":"Erörtern Sie drei Maßnahmen zur Qualitätsverbesserung\nin der vorliegenden Fallsituation von Attila Demir (9 P.)."},{"num":8,"points":2,"text":"„Wird mein Junge denn wieder der alte werden?“ (Zeile\n47). Nehmen Sie zu der Aussage von Attilas Mutter Stellung\n(2 P.). Berücksichtigen Sie bei Ihrer Ausführung den\nSchwerpunkt der Folgeschäden/Dauerfolgen.\nÄlterer Mensch\n6.3. Fallsituation: Ambulante\nLangzeitpflege (50 Punkte)\nFallsituation\n„Der teure Perserteppich bleibt aber liegen“\nTrude Matz ist 89 Jahre alt und stolz, dass Sie immer noch in ihrer\nErdgeschosswohnung mit Ihrem Mann (95 Jahre) gemeinsam\nleben kann. Die drei Stufen vom Hof bis zur Eingangstür schaffen\ndie beiden mit viel Zeit und Geduld. In den letzten Wochen hat\nsich die O"}],"answers":{"1":"Z. B.\n• Pflegeproblem: Attila Demir ist aufgrund der eingeschränkten Bettruhe\ndekubitus- und pneumoniegefährdet.\n• Ressource: Kann sich bei Veränderungen oder Schmerzen bemerkbar\nmachen.\n• Pflegeziel: Freie Atemwege und Intakte Haut.\n• Pflegemaßnahmen:\n– Positionswechsel alle zwei Stunden durchführen.\n– Attila zu Mikropositionierungen anleiten.\n– Zum tiefen Durchatmen bei jeder Pflegetätigkeit anleiten.\nOder\n• Pflegeproblem: Attila ist in seinem Bewusstsein eingeschränkt.\n• Ressource: Wirkt wach und reagiert positiv auf die Pflegefachpersonen.\n• Pflegeziel: Attila ist zu allen Qualitäten am Ende seines\nKrankenhausaufenthaltes orientiert.\n• Pflegemaßnahmen:\n– Pupillenkontrolle nach ärztlicher Anordnung.\n– Attila bei jeder Pflegetätigkeit ansprechen und Fragen zur Orientierung\nstellen.\nOder\n• Pflegeproblem: Attila ist infektionsgefährdet.\n• Ressource: Kann sich bei Schmerzen an der Venenverweilkanüle melden.\n• Pflegeziel: Die orale Flüssigkeitszufuhr ist in den nächsten drei Tagen\ngewährleistet.\n• Pflegemaßnahmen:\n– Verbandwechsel der Venenverweilkanüle nach Standard des Hauses.\n– Händedesinfektion vor jeglicher Manipulation am Infusionssystem.…","3":"Unter dem Begriff „Minimal Handling“ versteht man, dass unnötige pflegerische\nund ärztliche Tätigkeiten vermieden werden. Es gilt das Prinzip des „Minimal\nHandling“, um möglichst wenig Manipulation des betroffenen Kindes in der\nAkutphase zu gewährleisten.","4":"Schritte der Pupillenkontrolle:\n• Anamnesegespräch (um vorherige Pupillendifferenzen zu klären)\n• Vorgehen erklären\n• Augen von Attila schließen lassen\n• Ein Auge öffnen und mit einer Pupillenleuchte Reaktion auf den Lichteinfall\nprüfen\n• Auge schließen und andere Seite überprüfen\n• Pupillen sollten sich beim Lichtreflex verengen\n• Dokumentation der Ergebnisse in der Akte des zu pflegenden Kindes\nVeränderungen der Pupillen:\n• Anisokorie: Der Durchmesser der Pupillen zeigt eine Seitendifferenz\n• Dyskorie: Die Pupille befindet sich nicht mehr in der physiologischen\nPosition und ist entrundet\n• Miosis: Pupille ist verengt\n• Mydriasis: Pupille ist geweitet.","5":"Durch die frühzeitige neurologische Rehabilitation können verloren gegangene\nkörperliche, geistige und sprachliche Fähigkeiten trainiert und wiedererlangt\nwerden.\nIn der Rehabilitation steht ein interdisziplinäres Team aus Mitarbeitenden der\nPhysiotherapie, Ergotherapie und Logopädie zur Verfügung.","6":"Einsatz der Glasgow Coma Scale:\nMit der international anerkannten Glasgow Coma Scale werden die (akuten)\nquantitativen Bewusstseinsstörungen ermittelt.\nPunktekategorien:\n• Augenöffnung\n• Verbale Kommunikation\n• Motorische Bewegung des zu pflegenden Menschen","7":"Infusionsmanagement\n„Als Sie die Zimmertür öffnen, sehen Sie direkt das Attila an der\nVenenverweilkanüle am rechten Handrücken eine Beule entwickelt hat.“\nDie Beule deutet auf ein Paravasat hin → bei einer Fehlpunktion/-lage läuft das\nMedikament bzw. die Infusion ins Gewebe und bildet eine Beule. Die\nVenenverweilkanüle sollte von der Pflegefachperson umgehend entfernt werden, um\nweitere Komplikationen zu verhindern.\nMonitoring\n„Während der Versorgung hat Attila immer wieder mit Kreislaufproblemen zu\nkämpfen, wobei das Monitoring nicht richtig angeschlossen ist“.\nDas Monitoring für die Überwachung der Vitalparameter in der Akutphase eines\nSHT sollte dauerhaft angeschlossen sein, um den Kreislauf und das Bewusstsein\nengmaschig zu überprüfen und bei Veränderungen direkt handeln zu können. Hier\nsollte die Pflegefachperson ebenfalls das Monitoring direkt überprüfen und korrekt\nanschließen.\nAufnahme der Bezugspersonen\n„Gegen Mittag kommt die Mutter zu Besuch, da Sie nicht mit aufgenommen\nwurde“.\nFür alle Beteiligten war der gestrige Unfall ein Schock und ein unerwartetes\nEreignis. Bei kleineren Kindern kann ein Elternteil in der stationären Akutpflege mit…"}},{"setting":"Ambulante Langzeitpflege","title":"„Der teure Perserteppich bleibt aber liegen“","text":"„Der teure Perserteppich bleibt aber liegen“\nTrude Matz ist 89 Jahre alt und stolz, dass Sie immer noch in ihrer\nErdgeschosswohnung mit Ihrem Mann (95 Jahre) gemeinsam\nleben kann. Die drei Stufen vom Hof bis zur Eingangstür schaffen\ndie beiden mit viel Zeit und Geduld. In den letzten Wochen hat\nsich die Osteoporose von Frau Matz verschlimmert. Sie bemerkt\nselbst einen „wackeligeren Gang“. Ihr Mann ist ebenfalls\nunsicherer im Gang geworden. Die Tochter Ingrid versucht schon\nseit Monaten, ihre Eltern zu überreden, in eine Pflege-WG oder in\ndie stationäre Langzeitpflege zu ziehen. Davon wollen die beiden\naber derzeit nichts wissen und verweigern dieses Thema. Trude\nMatz erzählt ihrer Tochter am Telefon: „Ingrid, nochmals, der\nteure Perserteppich bleibt liegen und auch meine Pantoffeln\nmöchte ich weiterhin tragen. Zudem macht Hans überall im Haus\ndas Licht an, damit wir abends beim Laufen besser sehen können\nund setzen unsere Brillen nun auch immer auf.“\nSie als Pflegefachmann sind seit ein paar Wochen für die\nEheleute Matz zuständig. Ihr ambulanter Langzeitpflegedienst\nVita übernimmt das gesamte Medikamentenmanagement und vor\nallem die Bereitstellung der Medikamente. Einmal in der Woche\nbieten Sie zudem ein Duschangebot im Rahmen der Körperpflege\nan. Durch den hohen Duschkabineneinstieg sind die Eheleute auf\nIhre Hilfe angewiesen. Die Körperpflege können sie größtenteils\nselbst durchführen. Die Tochter bezahlt die Pflege ihrer Eltern aus\neigener Tasche, da Sie durch die Entfernung von 500 km nicht\nimmer kommen kann und froh ist, dass Sie zweimal pro Woche\nnach den Eltern schauen. Nach einem Telefonat mit Ihnen als\nBezugspflegefachkraft bittet die Tochter Sie, eine Beratung zum\nThema Wohnverhältnisse und Sturzneigung bei ihren Eltern\ndurchzuführen. Dieses Angebot wollen Sie heute nach der\nKörperpflege anbieten und wenn gewünscht umsetzen. Da Sie\nheute mit der Auszubildenden Lea unterwegs sind, möchten Sie\nebenfalls die Bewegungsförderung mitbesprechen und passende…","questions":[{"num":1,"points":7,"text":"Nennen Sie die Pflegetheorie von Dorothea Orem (1 P.).\nDefinieren Sie die Begriffe vollständig kompensatorisches\nSystem (2 P.), teilweise kompensatorisches System (2 P.)\nund anleitend-unterstützendes System (2 P.)."},{"num":2,"points":6,"text":"Die Auszubildende Lea hat die Eheleute Matz beobachtet\nund für jedes Pflegesystem von D. Orem ein fallbezogenes\nBeispiel gefunden. Arbeiten Sie dieses jeweils heraus (6\nP.)."},{"num":3,"points":12,"text":"Ermitteln Sie die drei Sturzrisikofaktoren (3 P.) mit jeweils\ndrei konkreten Beispielen aus dem Expertenstandard\n„Sturzprophylaxe in der Pflege“ (9 P.)."},{"num":4,"points":5,"text":"Erklären Sie den Begriff „Sturzkaskade“ (5 P.)."},{"num":5,"points":7,"text":"Erschließen Sie für das Ehepaar Matz und deren\nPflegeproblem „Gangunsicherheit“ und „Sturzneigung“ ein\nPflegeziel (1 P.), zwei Ressourcen (2 P.) und vier\nsturzprophylaktische Maßnahmen (4 P.)."},{"num":6,"points":5,"text":"Geben Sie mit fünf Angaben an, wie ein Beratungsgespräch\nkorrekt dokumentiert wird (5 P.)."},{"num":7,"points":8,"text":"Vergleichen Sie die beiden vorgeschlagenen\nWohnmöglichkeiten, welche die Tochter für Ihre Eltern\nvorschlägt. Nennen Sie jeweils zwei Vor- und Nachteile der\nEinrichtung, um diese in der Beratung mitzuteilen (je 4 P.)."}],"answers":{"2":"Vollständig kompensatorisches System: Der ambulante Langzeitpflegedienst Vita\nübernimmt vollständig die Bereitstellung der Medikamente und das gesamte\nMedikamentenmanagement.\nTeilweise kompensatorisches System: Einmal in der Woche wird ein\nDuschangebot im Rahmen der Körperpflege angeboten. Durch den hohen\nDuschkabineneinstieg sind die Eheleute Matz auf professionelle Hilfe angewiesen.\nDie Körperpflege in der Dusche können Sie dann größtenteils selbst durchführen.\nAnleitend-unterstützendes System: Hier steht das Thema der Beratung im\nVordergrund. Die Themen Wohnverhältnisse und Sturzneigung sowie\nBewegungsförderung stehen im Fokus.","3":"Personenbezogene Sturzrisikofaktoren:\n• Angst vor Stürzen → „Post-Fall-Syndrom“\n• Depression\n• Funktionsbeeinträchtigungen (funktioneller und sensomotorischer\nFähigkeiten)\n• Gesundheitsprobleme, Bewusstseinsstörungen, Schwäche und Schwindel\n• Kontinenzprobleme\n• Sturzvorgeschichte\nMedikamentenbezogene Sturzrisikofaktoren:\n• Antihypertensiva\n• Polypharmazie (> 4 Medikamente)\n• Psychotrope Medikamente (Antidepressiva, Anxiolytika, Sedativa)\nUmgebungsbezogene Sturzrisikofaktoren:\n• Freiheitsentziehende Maßnahmen\n• Inadäquates Schuhwerk/zu weite Kleidung\n• Umgebung – Gefahrenquellen: Beleuchtung, Hindernisse und Kontraste","4":"Die Lebensgewohnheiten von Personen verändern sich im Alter durch\nKrankheiten oder natürliche Abbau-/Alterungsprozesse und führen zu\nungünstigeren Gegebenheiten. Dies führt dazu, dass sich eine Sturzkaskade\nentwickelt. Aus den Veränderungen resultieren Geh- und Balancestörungen,\nwelche die Sturzgefahr deutlich erhöhen. Aufgrund von vermehrten Stürzen\nkommt es bei der Person zu Frakturen, Verletzungen, Angst, verminderter\nMobilität und Aktivität. Durch die Einschränkungen wird die Lebensqualität\nreduziert und die Pflegedürftigkeit steigt. Je nach Schweregrad der\nVerletzungen kann ein Sturz auch tödlich enden.","5":"Pflegeziel:\n• Eheleute Matz sind in ihren Bewegungsabläufen sicher.\n• Eheleute Matz können sich selbstständig bewegen.\nRessource:\n• Können Maßnahmen, welche Ihnen mitgeteilt werden, umsetzen.\n• Schalten bereits selbstständig abends das Licht an.\n• Können gegenseitig bei einem Sturz Hilfe holen.\nSturzprophylaktische Maßnahmen:\n• Bieten Sie körperliches multidimensionales Training an.\n• Leiten Sie Kraft-, Balance-, Ausdauer-, Koordinationsübungen an.\n• Passen Sie die Wohnumgebung an: Perserteppich entfernen, Fußboden\nrutschfest gestalten.\n• Regen Sie an, dass Haltegriffe, rutschfeste Materialien montiert werden.\n• Arbeiten Sie darauf hin, dass richtige Schuhe angezogen und Pantoffeln\ngemieden werden.\n• Lassen Sie beim Gehen den aufrechten Gang mit geradem Rücken einüben.","6":"• Anwesende Personen bei der Beratung\n• Ausgehändigtes Material\n• Besprochene Empfehlungen\n• Veränderungen von bestehenden Pflegemaßnahmen\n• Datum der Beratung\n• Thema der Beratung\n• Unterschrift aller Beteiligten","7":"Wohnform Vorteile Nachteile\nPflege-WG\n• Weitere gleichaltrige • Finanzielle Belastung für die\nPersonen leben mit den Tochter steigt\nEheleuten zusammen • Eine Pflegefachperson ist nicht\n• Können sich in ihren rund um die Uhr verfügbar\neigenen Zimmern\njederzeit zurückziehen\nStationäre\n• Es kann an sportlichen • Der eigene\nLangzeitpflege\nGemeinschaftsaktivitäte Wohnraum/Eigentumswohnun\nn teilgenommen werden, g kann nicht mehr bewohnt\num die werden, es muss sich von\nBewegungsfähigkeit Möbeln und\nweiter zu fördern Einrichtungsgegenständen\n• Eine Pflegefachperson getrennt werden\nist jederzeit vor Ort • Ggf. kein Doppelzimmer frei, da\n80 % der Einrichtung\nEinzelzimmer sein müssen\nLiteratur\n1. Bundesministerium für Gesundheit (BMG). Alternative Wohnformen.\n2022. Aus:\nhttps://www.bundesgesundheitsministerium.de/themen/pfle\nge/online-ratgeber-pflege/leistungen-der-\npflegeversicherung/alternative-wohnformen.html (letzter\nZugriff: 15.02.2023).\n2. Deutsches Netzwerk für Qualitätsentwicklung in der Pflege (DNQP).\nExpertenstandard Sturzprophylaxe in der Pflege. Schriftreihe des\nDeutschen Netzwerks für Qualitätsentwicklung in der Pflege. 1. Akt.\nOsnabrück: DNQP, 2013.…"}}]},{"num":7,"title":"Viertes Prüfungsbeispiel","tag":"tag1","cases":[{"setting":"Ambulante Langzeitpflege","title":"„Einfach nur ekelig, dieser Beutel an meinem Bauch“","text":"„Einfach nur ekelig, dieser Beutel an meinem Bauch“\nOlle Bengtsson ist 55 Jahre alt, ist verheiratet, wohnt mit ihrem\nMann in Dessau und wird durch den ambulanten Pflegedienst\nScholl betreut. Herr Bengtsson leidet schon seit seinem 25.\nLebensjahr an Colitis ulcerosa. Besonders im letzten Jahr hatte er\nviele akute und fulminante Schübe mit stark blutigen Durchfällen,\nFieber und sehr schmerzhaften Stuhlgängen. Zudem haben die\nanhaltenden Bauch- und Darmschmerzen zu einer Appetitlosigkeit\ngeführt. Herr Bengtsson wurde wegen anhaltender Beschwerden\nvom Hausarzt ins nächstliegende Krankenhaus überwiesen. Die\nÄrzte entschieden sich, eine Proktokolektomie mit Anlage eines\nprominenten Ileostomas durchzuführen. Da Herr Bengtsson mit\nder Versorgung des Ileostomas aktuell noch überfordert ist, wurde\nein ambulanter Pflegedienst hinzugezogen.\nSie sind für Olle Bengtsson zuständig. Bei seinem Ileostoma\nwird jeden Tag das Stomaversorgungssystem gewechselt. Aktuell\nekelt sich Herr Bengtsson noch sehr über den „Stinkebeutel“ und\ndreht bei der Versorgung angewidert den Kopf zur Seite. Leider\nkommt es ab und zu vor, dass der Beutel abplatzt. Herr Bengtsson\nweiß sich dann nur mit Handtüchern zu helfen. Die parastomale\nHaut ist gerötet.\nSeit der OP hat Herr Bengtsson keinen Besuch mehr empfangen\nund sein Haus nicht mehr verlassen. Ihm ist es vor seinen\nFreunden sehr unangenehm einen künstlichen Darmausgang zu\nbesitzen. Seine Hobbys hat er stark eingeschränkt und geht mit\nseiner Frau nicht mehr zum Essen aus.\nEinen Monat später ist das Vertrauen zum Klienten ausgebaut\nund eine Anleitung zum eigenständigen Versorgungswechsel\nmöglich. Auch die Ehefrau darf beim Wechseln mittlerweile\nzusehen. Sie wirkt ziemlich hilflos und ist oft den Tränen nahe.\nWährend der Versorgung bittet Herr Bengtsson Sie um Rat. „Ach\nSchwester, was darf ich eigentlich jetzt essen und was nicht? Ab\nund zu habe ich das Gefühl, ich esse etwas und ein paar Stunden…","questions":[{"num":1,"points":15,"text":"Erläutern Sie drei vorrangige Pflegeprobleme von Ida\nMeier (6 P.) und arbeiten Sie jeweils ein Pflegeziel (3 P.)\nund zwei passende Pflegemaßnahmen (6 P.) aus."},{"num":2,"points":4,"text":"Listen Sie vier Kommunikationsregeln im Umgang mit\nFrau Meier auf (4 P.)."},{"num":3,"points":8,"text":"Erklären Sie zwei der vier in der Fallsituation genannten\nKonzepte mit jeweils vier Aspekten genauer (je 4 P.)."},{"num":4,"points":6,"text":"Vergleichen Sie die drei möglichen Wohnkonzepte für\ndemenziell veränderte Menschen. Definieren Sie die\nWohnform (3 P.), und nennen Sie jeweils ein Vorteil des\nWohnkonzepts (3 P.)."},{"num":5,"points":6,"text":"Erläutern Sie die Begriffe Agnosie, Apraxie sowie\nretrograde Amnesie (3 P.) mit jeweils einem konkreten\nBeispiel (3 P.)."},{"num":6,"points":6,"text":"Nennen Sie den Namen des Begutachtungsdienstes,\nwelcher für die Höhergruppierung zuständig ist (1 P.), und\nnennen Sie fünf der sechs Module, welche bei Frau Meier\nbegutachtet werden (5 P.)."},{"num":7,"points":5,"text":"„Frau Meier, das ist nicht Ihr Zimmer und ich bin nicht\nIhre Tochter Lena, sondern Nele die Auszubildende. Sie\nwissen doch, dass Sie in Zimmer 76 wohnen und nicht in\n74. Also raus aus dem Bett und mitkommen.“ (Zeile 9 ff.).\nBewerten Sie zunächst die Aussage (1 P.) und geben Sie\nanschließend eine ausführliche Interpretation an (4 P.).\nErwachsener\n7.3. Fallsituation: Ambulante\nLangzeitpflege (50 Punkte)\nFallsituation\n„Einfach nur ekelig, dieser Beutel an meinem Bauch“\nOlle Bengtsson ist 55 Jahre alt, ist verheiratet, wohnt mit ihrem\nMann in Dessau und wird durch den ambulanten Pflegedienst\nSchol"}],"answers":{"1":"Pflegeproblem:\nFrau Meier vergisst ihre Medikamente einzunehmen und versteckt diese.\nPflegeziel:\nFrau Meier erhält passend nach ärztlicher Anordnung ihre Medikamente.\nPflegemaßnahmen:\n• Medikamentenmanagement für Frau Meier übernehmen\n• Tabletten portionieren und nur noch zu den passenden Uhrzeiten austeilen\n• Tabletteneinnahme begleiten und überwachen\n• Wirkungen und Nebenwirkungen der Medikamente beachten und bei\nAuffälligkeiten ärztliche Rücksprache halten\nPflegeproblem:\nFrau Meier läuft zunehmend ziel- und rastlos durch die Einrichtung.\nPflegeziel:\nFrau Meier bleibt im Gemeinschaftsraum oder in der Einrichtung.\nPflegemaßnahmen:\n• Alternative Beschäftigungsangebote anbieten.\n• Frau Meier immer wieder ablenken.\n• Spaziergänge nach Möglichkeit begleiten.\n• Wenn Frau Meier abends/nachts erschöpft ist, Sitzmöglichkeiten anbieten\num sich zu regenerieren.","2":"• Freundliche und ruhige Umgebung schaffen\n• Frau Meier nicht korrigieren, wenn sie Gegenstände falsch benennt oder\nunangemessen spricht, z. B. Schätzchen\n• Blickkontakt halten und von vorne ansprechen, damit Frau Meier weiß, dass\nsie gemeint ist\n• Einfache Fragen stellen\n• Zeit zum Antworten geben","3":"„Eat by Walking“:\n• Menschen mit Demenz haben einen reduzierten Appetit.\n• Bedingt durch den ständigen Bewegungsdrang haben die Betroffenen einen\nerhöhten Kalorienbedarf.\n• An verschiedenen Orten einer Institution steht (hochkalorisches) Fingerfood\nbereit.\n• Über den gesamten Tag verteilt kann unterwegs Nahrung aufgenommen\nwerden.\n• Süße Lebensmittel werden am längsten wahrgenommen.\nDementia Care Mapping:\n• Ist ein Beobachtungsverfahren (entwickelt u. a. von Tom Kitwood).\n• Es werden das Verhalten und die Befindlichkeit von Betroffenen\neingeschätzt.\n• Ist vor allem für die stationäre Langzeitpflege geeignet.\n• „Mapper“ beobachten demenziell veränderte Menschen und kategorisieren\nihre Beobachtungen in einem vorgegebenen Kodierungsverfahren.\n• Die Beobachtungsskizze wird bewertet und pflegerische\nHandlungsempfehlungen abgeleitet.","4":"Konzept Beschreibung und Vorteil\nIntegratives\n• Menschen mit Demenz und andere zu pflegende Menschen\nWohnkonzept\nwohnen gemeinsam in einer Einrichtung, WG o. Ä.\n• Vorteil: Die Bewohner können voneinander profitieren.\nTeilsegregatives\n• Ähnelt dem integrativen Konzept. Zu bestimmten\nWohnkonzept\nAktivitäten des Tages werden die demenziell veränderten\nMenschen gemeinsam in ihren speziellen Bereichen betreut,\nz. B. der gemeinsame Mittagstisch, ein Demenzcafé.\n• Vorteil: Es kann speziell auf die Bedürfnisse jedes zu\npflegenden Menschen eingegangen werden.\nSegregatives\n• Eine Einrichtung/Bereich ist nur für zu pflegende Menschen\nWohnkonzept\nmit Demenz vorgesehen, z. B. Demenzdörfer, Demenz-WG.\n• Vorteil: Dies ermöglicht eine familienähnliche\nLebenssituation mit dem bestmöglichen Erhalt der\nAlltagskompetenzen.","5":"Agnosie: Bekannte Gegenstände und Örtlichkeiten werden wahrgenommen, aber\nnicht mehr erkannt, der Gebrauch von alltäglichen Dingen ist unbekannt.\nBeispiel: Frau Meier nutzt die Brille zum Haare kämmen.\nApraxie: Praktische Fähigkeiten gehen verloren.\nBeispiel: Handlungen der Körperpflege gehen verloren und werden verlernt.\nFrau Meier wäscht sich das Gesicht und vergisst es sich abzutrocknen.\nRetrograde Amnesie: Verlust der personalen Orientierung und weiten Teilen\nder Biografie.\nBeispiel: Die Person weiß nicht mehr, wie ihre Töchter heißen.","6":"Die Kommunikation der Auszubildenden Nele in der Situation mit Frau Meier im\nfalschen Zimmer ist unangebracht.\nNele ist dafür verantwortlich, Frau Meier einen würdevollen Alltag zu ermöglichen\nund das Bewusstsein als erwachsene, ernst genommene Person zu stärken. Aus\ndiesem Grund sollten Pflegefachpersonen und Auszubildende in der\nKommunikation mit demenziell veränderten Menschen jederzeit ein Gefühl von\nSicherheit und Geborgenheit vermitteln. Die Kommunikation dient hier als\n„Königsweg“. In der nächsten Situation sollte Nele sich vorab Unterstützung von\nihrer Praxisanleitung holen.\nLiteratur\n1. Deutsches Netzwerk für Qualitätsentwicklung in der Pflege (DNQP).\nExpertenstandard Beziehungsgestaltung in der Pflege von Menschen\nmit Demenz. Schriftreihe des Deutschen Netzwerks für\nQualitätsentwicklung in der Pflege. Osnabrück: DNQP, 2019.\n2. International Snoezelen Association (ISNA). Snoezelen. O.J. Aus:\nhttps://snoezelen-professional.com/de/ (letzter Zugriff:\n08.04.2023).\n3. Medizinischer Dienst. Pflegebegutachtung. O.J. Aus:\nhttps://www.medizinischerdienst.de/versicherte/pflegebegut\nachtung/ (letzter Zugriff: 21.02.2022).…"}}]},{"num":8,"title":"Fünftes Prüfungsbeispiel","tag":"tag1","cases":[{"setting":"Stationäre Akutpflege","title":"„Es ist einfach ab“","text":"„Es ist einfach ab“\nSie arbeiten als Pflegefachperson im sächsischen Krankenhaus\nZittau auf der chirurgischen Station. Zu Ihren Patienten zählt die\n29-jährige Conny Große. Frau Große ist ambitionierte\nHobbyreiterin und hatte sich bei einem Sturz schwere\nVerletzungen am rechten Unterschenkel zugezogen. Nach\nmehreren Operationen kam es zu massiven\nWundheilungsstörungen. Die Wunde entzündete sich derart, dass\nder Unterschenkel unterhalb des Knies amputiert werden musste.\nDie letzte Operation liegt zehn Tage zurück. Die Wunde verheilt\ngut. Die Nahtumgebung ist weiterhin gerötet. Exsudat wird noch\nwenig abgesondert. Die Drainagen sollen drei Wochen nach OP\nentfernt werden. Frau Große ist stabil und ihre Vitalwerte liegen\nim Normbereich. Schmerzen am Stumpf gibt sie auf der NRS im\nBereich von fünf bis acht an. Frau Große beschreibt die Schmerzen\nals dauerhaft brennend und teilweise akut stechend. Laut\närztlicher Anordnung erhält sie alle zwölf Stunden 30 mg\nOxycodon® und 600 mg Gabapentin®. Während Sie vorsichtig\nden Stumpf lagern, beschreibt Frau Große das wiederkehrende\nGefühl, dass im nicht mehr vorhandenen rechten Fuß ihre Zehen\njucken würden. Die gelernte Bankkauffrau macht sich zunehmend\ngroße Sorgen, wie es nun weitergeht. „Schwester, was soll ich\ndenn nur machen! Reiten geht ja wohl überhaupt nicht mehr und\ndie Arbeit erst. Meine geliebte Außendiensttätigkeit kann ich ja\nwohl vergessen. Ich bin absolut nutzlos geworden. Und so finde\nich auch nie einen Mann. Ich bin ein Krüppel.“ Weinend schließt\nFrau Große die Augen und scheint keine Antwort von Ihnen zu\nerwarten. Die zierliche, sonst so agile junge Frau wirkt\nhoffnungslos und verzweifelt. Ihnen geht die Situation von Frau\nGroße sehr nahe. Schließlich wurden Sie vor Jahren selbst mit\nsolch einer Situation einmal konfrontiert. Sie überlegen, wie Sie\nFrau Große helfen können. Die Verzweiflung der Patientin ist für\nSie greifbar und lässt Sie nicht los. Bereits zu Hause haben Sie mit…","questions":[{"num":1,"points":10,"text":"Analysieren Sie die Situation hinsichtlich Ressourcen und\nProblemen von Frau Große. Stellen Sie diese übersichtlich\ndar (10 P.)."},{"num":2,"points":15,"text":"Erläutern Sie Maßnahmen, damit die Lebensqualität von\nFrau Große gefördert werden kann. Gehen Sie dabei auch\nauf die Autonomie der Patientin ein (15 P.)."},{"num":3,"points":10,"text":"Beschreiben Sie Ihr kommunikatives Vorgehen in der\naktuellen Situation mit Frau Große. Beziehen Sie die\nkommunikativen Grundhaltungen ein (10 P.)."},{"num":4,"points":5,"text":"Erläutern Sie mögliche psychische Gefahren für Sie, wenn\nSie Ihr Verhalten nicht ändern (5 P.)."},{"num":5,"points":10,"text":"Mögliche Lösungen zu diesen Aufgaben finden Sie im\nErwartungshorizont → 17.5\nBeschreiben Sie mögliche Bewältigungsstrategien, um Ihre\neigene psychische Gesundheit zu erhalten bzw.\nwiederzuerlangen (10 P.).\nKind\n8.3. Fallsituation: Ambulante\nLangzeitpflege (50 Punkte)\nFallsituation\n„Ronnys Rechte“\nSie arbeiten als Pflegefachperson bei dem Ambulanten\nPflegedienst „Care for Child“ in Essen.\nHeute haben Sie die Nachmittagsroute einer Kollegin\nübernommen und als erstes besuchen Sie Ronny Bergmann, einen\ndreizehnjährigen Jungen. Aus den Unterlagen erfahren Sie:\nRonny litt bei seiner Geburt an einer "}],"answers":{"1":"• Ressourcen: Frau Große ist 29 Jahre und Hobbyreiterin. Als Bankkauffrau\narbeitet sie im Außendienst, was sie sehr gern macht. Sie kann sich verbal\nund nonverbal mitteilen. Frau Große ist zehn Tage nach der OP stabil und\nihre Vitalwerte liegen im Normbereich. Die Wunde verheilt gut.\n• Probleme: Frau Große ist in ihrer Mobilisation und Grundpflege, aufgrund\nder Unterschenkelamputation teilweise eingeschränkt. Sie gibt Schmerzen\nim Bereich von fünf bis acht an. Frau Große beschreibt Gefühle im nicht\nmehr vorhandenen Unterschenkel. Die Patientin wirkt hoffnungslos und\nverzweifelt. Sie gibt an, nicht zu wissen, wie es für sie weitergeht. Sie hat\nkeinen Partner.","2":"• Unter der Lebensqualität ist laut WHO die subjektive Wahrnehmung einer\nPerson über ihre Stellung im Leben in Relation zur Kultur und den\nWertesystemen, in denen sie lebt, und in Bezug auf ihre Ziele, Erwartungen,\nStandards und Anliegen zu verstehen.\n• Die Autonomie ist die Fähigkeit des Menschen, seine Ziele frei zu bestimmen\nund dementsprechend zu Handeln. Sie schließt persönliche Freiheit und\nSelbstbestimmung ein sowie das Recht, eine eigene Meinung zu haben, diese\nfrei einzubringen und dabei als Individuum respektiert zu werden.\n• Frau Große ist in ihrer Mobilisation aufgrund der Amputation eingeschränkt.\nWenn der Stumpf abgeheilt ist, kann eine vorläufige Prothese angepasst\nwerden. Diese Prothese ermöglicht es der Patientin wieder selbstständig zu\nlaufen. Massagen, Abklopfen und Vibrationen können nach dem\nHeilungsprozess den Stumpf weniger empfindlich machen, damit dieser gut\nbelastbar ist. Ein Physiotherapeut trainiert mit der Patientin das Gehen und\ndas Gleichgewicht. Hier sind vorerst Unterarmgehstützen zum Laufen\nangezeigt. Eine Schmerzmittelgabe nach ärztlicher Anordnung kann Frau\nGroße selbstständig durchführen. Leiten Sie sie dazu entsprechend an. Da…","3":"• Die Kommunikation mit Frau Große erfolgt entsprechend den „Vier Seiten\neiner Nachricht“ von Friedemann Schulz von Thun auf der Sachebene.\nDamit wird die Wahrung von Nähe und Substanz erreicht und\nMissverständnissen vorgebeugt. Mit ruhigem Ton wird gesprochen. Aktives\nZuhören und ein entsprechendes Feedback geben der Patientin Sicherheit\nund schafft Vertrauen. Mit dem Halten des Blickkontakts wird erreicht, dass\nFrau Große das Gefühl bekommt, ernst genommen zu werden, und dass\nauch wirklich zugehört wird. Mit Ich-Botschaften werden Vorwürfe und\nAnschuldigungen vermieden.\n• Die kommunikativen Grundhaltungen bestehen aus Empathie,\nWertschätzung, Achtsamkeit und Kongruenz. Empathisch wird der Patientin\nbegegnet, wenn versucht wird, sich in ihre Lage hineinzuversetzen und ihr\nGefühle anerkannt werden. Wichtig ist dabei, diese einfach anzuerkennen\nund nicht mitzuleiden. Die eigene positive Grundhaltung zum Menschen\nspiegelt sich in der Wertschätzung zu diesem wider. Verhalten und\nEmotionen von Frau Große werden so akzeptiert, wie sie sind, ohne dass sie\nbewertet werden. So fasst die Patientin Vertrauen und findet Sicherheit.…","4":"• Aus der Situation erwächst schnell eine psychische Überforderung. Die\nständige Beschäftigung mit der Situation der Patienten führt dazu, dass\nberuflich andere Patienten unter Umständen weniger Aufmerksamkeit\nerhalten. Kontakte mit Kollegen werden beeinträchtigt bzw. sogar\neingeschränkt, da sich ausschließlich mit der Patientin beschäftigt wird. Im\nprivaten Bereich kann nicht abgeschaltet werden. Die notwendige Erholung\ntritt nicht ein. Dann kann das in einen „Burnout-Syndrom“ gipfeln. Dieses\nAusbrennen ist ein Zustand totaler körperlicher, emotionaler und geistiger\nErschöpfung und geht mit verminderter Leistungsfähigkeit einher.\n\n5. Beschreiben Sie mögliche Bewältigungsstrategien, um Ihre eigene\npsychische Gesundheit zu erhalten bzw. wiederzuerlangen. 10\nPunkte\n• Persönliche Strategien können z. B. sein: Erkennen von eigenen Emotionen,\neigenes Verhalten reflektieren, eigene Wünsche und Bedürfnisse kennen\nund erfüllen, Nein-Sagen, Sport treiben, ausgewogene Ernährung,\nausreichend Schlaf, Achtsamkeit mit sich selbst, Psychohygiene, Gespräche,\nsoziales Netzwerk aufbauen, Entspannungstechniken erlernen und\nanwenden.\n• Berufliche Strategien sind z. B. Teamberatungen,…"}},{"setting":"Ambulante Langzeitpflege","title":"„Ronnys Rechte“","text":"„
