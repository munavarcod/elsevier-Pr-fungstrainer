nM für Metastasen – Fehlen oder 0 = kein Anhaltspunkt für\nVorhandensein von Fernmetastasen Fernmetastasen\nTipp\nDas TNM-System ist ein international standardisiertes\nKlassifizierungssystem zur Stadieneinteilung und\nVerlaufsdokumentation bei Organtumoren\n(Tumorstadienbestimmung).","3":"• Reihenfolge nach hygienischen Aspekten: grundsätzlich von der saubersten\nVersorgung zur schmutzigsten Versorgung.\n• Beginn beim Port, da dies eine aseptische Wunde ist (frei von\nEntzündungszeichen und durch eine Operation entstanden).\n• Dann folgt die Wundnaht am Bauch, da dies ebenfalls eine aseptische Wunde\nist.\n• Am Ende steht der Wechsel der Stomaversorgung an. Das Stoma ist eine\nKörperöffnung, aus der Stuhlgang ausgeschieden wird und damit auch\nBakterien (z. B. Escherichia coli), welche potenziell bei einer\nKeimverschleppung eine Infektion auslösen können.","1":"Definition\nPort: voll implantierbarer zentraler Venenkatheter. Dieser Venenkatheter liegt\nvollständig im Körper. Ein subkutan implantiertes Reservoir (Port) wird durch einen\nKatheter mit einer zentralen Vene verbunden. Dieses Reservoir muss durch eine\nNadel angestochen werden, um den Venenkatheter zugänglich zu machen.\nNotwendigkeit\nBei Frau Bach wurde die Portanlage notwendig, da sie zur Behandlung des\nKolonkarzinoms eine Chemotherapie erhält. Aufgrund der reizenden Substanzen\neiner Chemotherapie und der wiederholten notwendigen Punktion bietet sich der\nPort an, um der Klientin einen möglichst komplikationsfreien Alltag zwischen den\nGaben der Chemotherapie zu ermöglichen.","5":"Erklärung/Definition\n• Pflegediagnose: Eine Pflegediagnose umfasst eine exakte Darlegung der\naktuellen oder potenziellen Gesundheitsprobleme oder -herausforderungen\nvon Einzelpersonen oder Familien. Pflegefachpersonen dient die\nPflegediagnose als Grundlage für die Gestaltung individueller\nPflegestrategien, welche die Gesundheit fördern und die Bewältigung dieser\nProbleme unterstützen.\n• Körperbildstörung: psychische Gesundheitsstörung, bei der Personen eine\nverfälschte und häufig negative Auffassung von ihrem Körper haben. Dies\nführt häufig zu erheblichem Unbehagen, Unzufriedenheit und potenziell zu\nbeeinträchtigtem Verhalten in Bezug auf Essgewohnheiten oder körperliche\nAktivitäten.\nBestimmende Merkmale im Kontext einer Körperbildstörung\nMerkmale Frau Erklärung\nBach\n[…] dass sie das Vermeidet bei der Stomaversorgung, das Stoma anzusehen\nStoma nicht\nanschaut […]\n„Dieses Depersonalisierung des Körperteils durch den Gebrauch von\nunförmige Umschreibungen\nTeil, das da\nan meinem\nBauch hängt\n[…]“\n„[…] ich glaube,\nich bin\nwieder\nundicht.“\n„Ich will mich Lässt auf negative Gefühle gegenüber dem eigenen Körper (z.\ngar nicht damit B. Gefühl der Hilflosigkeit, Machtlosigkeit, Desinteresse …)…"}}]},{"num":8,"title":"Fünftes Prüfungsbeispiel","tag":"tag2","cases":[{"setting":"Stationäre Akutpflege","title":"„Auf einmal macht mein Herz schlapp!“","text":"„Auf einmal macht mein Herz schlapp!“\nSie arbeiten als Pflegefachperson auf der kardiologischen\nWachstation des Uniklinikums. Kurz nach der Übergabe meldet\nsich das Herzkatheterlabor bei Ihnen und bittet Sie, Herrn Lück\nnach der Herzkatheteruntersuchung abzuholen.\nIhre Kollegin Martha im Herzkatheterlabor berichtet: „Herr\nLück ist 57 Jahre alt und kommt über die Notaufnahme zu uns. Er\nhatte heute Mittag im Büro über starke Schmerzen im\nBrustbereich und über Dyspnoe geklagt. Im EKG war ein ST-\nHebungsinfarkt zu erkennen, und bei der Laboruntersuchung fiel\neine Erhöhung des Troponins auf. Herr Lück wurde als Notfall zu\nuns ins Herzkatheterlabor verlegt. Hier wurde über die Arteria\nfemoralis ein Stent gesetzt. Herr Lück war jederzeit kreislaufstabil.\nDie Einstichstelle ist mit einem Druckverband versorgt. Er soll 24\nStunden monitorüberwacht werden und hat absolute Bettruhe für\n12 Stunden.“\nAls Sie Herrn Lück auf die Station bringen, sagt er: „Mensch, auf\neinmal macht mein Herz schlapp! Eben war ich noch bei meinem\nLieblingsitaliener zum Mittagessen, und kurz danach liege ich\nschon im Krankenhaus. Ich habe mir in letzter Zeit schon öfters\ngedacht, dass der ganze Stress im Büro nicht gut für mich ist. Als\nChef einer kleinen Firma ist man eben für alles verantwortlich. Ich\nhabe immer wieder das Gefühl, dass mir alles über den Kopf\nwächst, und manchmal glaube ich, dass ich als Chef einfach nicht\ngeeignet bin. Zum Stressabbau esse ich dann gern Schokolade und\nChips. In den letzten Jahren habe ich dadurch schon ein paar\nPfund zu viel auf die Rippen bekommen. Rauchen ist ja auch nicht\nso gesund, aber meine zehn Zigaretten am Tag brauche ich\neinfach, um runterzukommen. Mein Hausarzt hat auch schon\ngesagt, dass ich abnehmen müsse, dann wäre auch mein\nBluthochdruck besser in den Griff zu bekommen. Aber dass diese\nSachen solche Auswirkungen haben können, kann ich gar nicht\nglauben.“\nAuf Station angekommen, versorgen Sie Herrn Lück. Im…","questions":[{"num":1,"points":5,"text":"Erläutern Sie, welche pflegerischen Maßnahmen Sie zur\nNachsorge der Herzkatheteruntersuchung bei Herrn Lück\neinleiten."},{"num":2,"points":4,"text":"Ermitteln Sie bei Herrn Lück die Risikofaktoren für eine\nkoronare Herzkrankheit."},{"num":3,"points":3,"text":"Beschreiben Sie Herrn Lück, wie es zu einem Herzinfarkt\nkommt."},{"num":4,"points":14,"text":"Erklären Sie den Entstehungsprozess von Stress (9 P.).\nBewerten Sie in diesem Zusammenhang Herrn Lücks\nAussage: „Ich habe immer wieder das Gefühl, dass mir\nalles über den Kopf wächst, und manchmal glaube ich, dass\nich als Chef einfach nicht geeignet bin“ (5 P.)."},{"num":5,"points":5,"text":"Geben Sie Herrn Lück Tipps zur Stressreduktion."},{"num":6,"points":9,"text":"Erläutern Sie die Stufen der Prävention (6 P.). Arbeiten Sie\nfür jede Stufe ein Beispiel aus dem Bereich koronare\nHerzerkrankungen aus (3 P.)."},{"num":7,"points":6,"text":"Sie beraten Herrn Lück zur Prävention eines Reinfarkts.\nZählen Sie geeignete Maßnahmen auf."},{"num":8,"points":4,"text":"Geben Sie an, welche Informationsquellen Sie zur\nErstellung der Pflegeanamnese nutzen."}],"answers":{"1":"• Kontrolle des Verbands und der Einstichstelle auf Blutung, Schwellung und\nSchmerz. Zeitschema der Kontrollen nach Standard der Klinik\n• Durchblutung (Fußpulse tasten; Möglichkeiten: Arteria poplitea, Arteria\ndorsalis pedis, Arteria tibialis posterior), Motorik und Sensibilität des Beines\nund des Fußes kontrollieren\n• Ruhigstellung der Leiste für 12 Stunden beachten. Das Kopfteil des Betts darf\nnicht hochgefahren werden. Zur Nahrungsaufnahme Bett in eine schiefe\nEbene bringen\n• Aufklärung und Information von Herrn Lück über die Gefahr der Nachblutung\nund das Einhalten der strikten Bettruhe\n• Bei Hämatombildung die Einblutung mit wasserfestem Stift umranden, um\ndas Fortschreiten des Hämatoms zu beobachten\n• Überwachung von Blutdruck, Puls, Atmung und Bewusstsein","2":"• Rauchen (10 Zigaretten pro Tag)\n• Übergewicht\n• Hypertonie\n• Männliches Geschlecht\n• Alter (> 45 Jahre)\nTipp\nDie Risikofaktoren für Arteriosklerose (Nikotinabusus,\nHypertonie, Diabetes mellitus, Fettstoffwechselstörungen,\nÜbergewicht, Bewegungsmangel, genetische Disposition,\nhöheres Lebensalter, männliches Geschlecht) gelten für alle\narteriellen Gefäßverengungen.\nJe nach Lokalisation entwickelt/entwickeln sich\n• koronare Herzkrankheit,\n• Schlaganfall, vaskuläre Demenz,\n• periphere arterielle Verschlusskrankheit (pAVK),\n• akute arterielle Verschlüsse, vor allem von Bauch-, Leisten-\nund Beinarterien.","3":"Entstehungsprozess von Stress (am Beispiel Stressmodell nach Lazarus)\n• Eine Person wird mit einem bestimmten Reiz (Stimulus) konfrontiert und\nnimmt eine Bewertung vor.\n• Bei der primären Bewertung entscheidet die Person, ob der Reiz für Sie\npositiv, irrelevant oder stresshaft ist.\n• Wird der Reiz als stresshaft empfunden, folgt eine Beurteilung, ob bereits ein\nSchaden oder Verlust eingetreten ist, eine Beeinträchtigung droht oder es sich\num eine positive Herausforderung handelt. Der Reiz ist in diesem Fall zwar\nstressend für die Person, aber erscheint lohnend.\n• Im Anschluss erfolgt in der sekundären Bewertung eine Einschätzung der\nBewältigungsmöglichkeiten, die für die Situation zur Verfügung stehen,\nz. B. Fähigkeiten der Person, aber auch materielle Ressourcen oder soziale\nUnterstützungsmöglichkeiten. Je weniger Ressourcen zur Bewältigung der\nSituation die Person sieht, umso stärker fällt die Stressreaktion aus.\n• Nach dem Bewertungsprozess folgen die Bewältigungshandlungen:\n– Diese können auf die Veränderung der Situation abzielen\n(problembezogenes/instrumentelles Coping), z. B. soziale\nUnterstützung einfordern, Zeitmanagement verbessern, nach…","5":"• Entspannungstechniken erlernen (z. B. Meditation, Achtsamkeit, progressive\nMuskelentspannung …)\n• Ablenkungen außerhalb der beruflichen Tätigkeit schaffen (z. B. Sport, Treffen\nmit Freunden, Vereinsarbeit …)\n• Verantwortung in der beruflichen Tätigkeit reduzieren bzw. verteilen (z. B.\nAufgaben delegieren, Stellvertretung einstellen …)\n• Berufliche Tätigkeit besser organisieren (z. B. Zeitmanagement überarbeiten,\nPriorisierung von Aufgaben überdenken …)","6":"• Stufe 1: Primäre Prävention\n– Hat zum Ziel, Krankheiten zu verhindern, Risiken zu senken oder zu\nminimieren.\n– Sie soll wirksam werden, wenn noch keine Krankheit eingetreten ist.\nBeispiele für primäre Prävention: Kampagnen gegen Rauchen, z. B. „rauchfrei“\nder BzGA, Kampagnen für gesunde Ernährung, z. B. 10 Regeln der\nvollwertigen Ernährung der DGE …\n• Stufe 2: Sekundäre Prävention\n– Hat zum Ziel, Krankheiten möglichst frühzeitig zu erkennen, bevor\nBeschwerden oder Krankheitssymptome auftreten.\n– Hierzu werden Screening-Untersuchungen, Gesundheitschecks und\nkrankheitsspezifische Früherkennungsuntersuchungen durchgeführt.\nBeispiele für sekundäre Prävention: Blutdruck- und Diabetesscreening,\nGesundheitschecks …\n• Stufe 3: Tertiäre Prävention\n– Richtet sich an Menschen, bei denen die Erkrankung bereits aufgetreten\nist, und behandelt wird.\n– Ziel ist es, eine Verschlechterung der Erkrankung zu vermeiden,\nFolgeschäden und Chronifizierungen abzumildern, Rückfälle zu\nverhindern.\nBeispiele für tertiäre Prävention: Herzsportgruppen, Stressreduktion,\nAufklärung des zu pflegenden Menschen über seine Erkrankung (z. B. mit\nMaterialien der Deutschen Herzstiftung), Selbsthilfegruppen …","7":"• Nikotinkarenz\n• Übergewicht reduzieren\n• Gesunde, salz- und fettarme Ernährung\n• Auf mäßigen Alkoholkonsum achten\n• Regelmäßige körperliche Aktivität (eigene Belastbarkeit einschätzen lernen)\n• Regelmäßige Einnahme der Medikation\n• Stress abbauen\n• Bestmögliche Einstellung der Hypertonie\n• Vorsorgeuntersuchungen wahrnehmen","8":"• Befragung des zu pflegenden Menschen bzw. seiner Angehörigen\n• Gezielte Beobachtungen des zu pflegenden Menschen (ggf. mit geeigneten\nAssessmentinstrumenten)\n• Erhobene Daten (Vitalzeichen etc.)\n• Krankengeschichte, Untersuchungsergebnisse und Einweisungsdiagnose\n• Ggf. Überleitungsberichte\n\n1. Ernst G, Franke A, Franzkowiak P. Stress und Stressbewältigung.\nBundeszentrale für gesundheitliche Aufklärung. 2022. Aus:\nwww.leitbegriffe.bzga.de/systematisches-ver\nzeichnis/allgemeine-grundbegriffe/stress-und-\nstressbewaeltigung (letzter Zugriff: 10.7.2023).\n2. Franzkowiak P. Prävention und Krankheitsprävention. Bundeszentrale\nfür gesundheitliche Aufklärung. 2022. Aus:\nwww.leitbegriffe.bzga.de/systematisches-\nverzeichnis/allgemeine-grundbegriffe/praevention-und-\nkrankheitspraevention (letzter Zugriff: 10.7.2023).\n3. Kommerell T et al. Gesundheitsförderung und Prävention. In: Menche N,\nKeller C, Teigeler B (Hrsg.). PflegeHeute. 8. A. München: Elsevier, 2023.\nS. 368–399.\n4. Menche N, Keller C. Pflege bei Herzerkrankungen. In: Menche N, Keller\nC, Teigeler B (Hrsg.). PflegeHeute. 8. A. München: Elsevier, 2023. S.\n502–535."}},{"setting":"Ambulante Langzeitpflege","title":"„Kopf – Herz – Hand“","text":"„Hilfe, ich habe so große Angst um meinen kleinen\nJungen!“\nSie arbeiten als Pflegefachperson für den ambulanten\nKinderlangzeitpflegedienst „Kopf – Herz – Hand“ in Mainz und\nbetreuen heute zum ersten Mal im Spätdienst den dreijährigen\nLinus. Vor rund 6 Wochen wurde bei dem Jungen nach langen\nKrankenhausaufenthalten in einer Münchner Spezialklinik die\nErkrankung Mukoviszidose diagnostiziert. Seit 4 Tagen ist die\nFamilie nun wieder zu Hause und wird seitdem 2 × täglich vom\nambulanten Pflegedienst unterstützt.\nVor Ihrer Tour erhalten Sie im Stützpunkt des Pflegedienstes\neine kleine Übergabe von Ihrer Kollegin Clara Schmitz, die heute\nVormittag bei der Familie war. Sie erzählt Ihnen: „Linus ist recht\nstabil. Einmal musste ich ihn absaugen, da er vermehrt und stark\nhustete. Aber dann ging es ihm schnell besser. Auch die\nInhalationen tun im sichtlich gut. Am Tag erhält Linus Sauerstoff\nüber eine Sauerstoffbrille, nachts hat er ein unterstützendes\nBeatmungsgerät und einen Heimmonitor zur Überwachung. Alle\n12 Stunden bekommt er das Medikament Orkambi®. Die Eltern\nsind in den Pflegetätigkeiten noch sehr unsicher. Du musst sie bei\nallen Tätigkeiten unterstützen und einbeziehen, damit sie es\nlernen. So wie ich es verstanden habe, arbeiten wohl beide und\nkönnen nicht immer zu Hause bei Linus sein. Die Familie wohnt\nerst seit einem Jahr in einem Einfamilienhaus mit Garten etwas\naußerhalb von München. Die Großeltern leben 150 km entfernt,\nund es ist keine familiäre Unterstützung vorhanden.“\nSie packen Ihre Sachen und machen sich auf den Weg zur\nFamilie. Linus’ Vater öffnet Ihnen die Tür. Ihr erster Eindruck\nmacht Sie stutzig, denn der Vater sieht müde und k. o. aus. Beim\nEintreten stellen Sie sich vor und fragen, ob alles in Ordnung sei.\nEr klagt: „Ich bin fix und fertig! Meine Frau ist heute den ersten\nTag wieder auf Arbeit, und Linus ist sehr unruhig – er merkt das.\nIch mache mir ständig Sorgen, dass er Atemnot hat. Ich weiß auch…","questions":[{"num":1,"points":10,"text":"Formulieren Sie zwei relevante Pflegeprobleme bei Linus\n(2 P.) und leiten Sie jeweils seine Ressourcen dazu ab (2\nP.). Geben Sie zu jedem Pflegeproblem ein individuelles\nPflegeziel und zwei geeignete Pflegemaßnahmen an (6 P.)."},{"num":2,"points":4,"text":"Erläutern Sie zwei Vorteile der Pflegeplanung für Linus\nund seine Eltern."},{"num":3,"points":13,"text":"Entwickeln Sie einen Vorschlag für die Gestaltung einer\nförderlichen Gesprächssituation (5 P.) im Rahmen eines\nInformationsgesprächs zum Thema zystische Fibrose und\ngeben Sie vier Themen an, die in der aktuellen Situation\nrelevant sind (4 P.). Erläutern Sie zwei davon ausführlich\n(4 P.)."},{"num":4,"points":8,"text":"Erklären Sie den Begriff der Salutogenese (4 P.) und\nskizzieren Sie zwei konkrete Punkte, wie Sie Linus’ Vater\nmithilfe des Modells unterstützen können (4 P.)."},{"num":5,"points":9,"text":"Informieren Sie Linus’ Vater über die drei Arten der\nPrävention (6 P.) und zählen Sie drei konkrete\nMaßnahmen auf, wie er seinen Sohn vor einer Infektion bei\nMukoviszidose schützen kann (3 P.)."},{"num":6,"points":3,"text":"Begründen Sie Linus’ Vater, weshalb die Inhalation bei\nMukoviszidose so wichtig ist."},{"num":7,"points":3,"text":"Nennen Sie Linus’ Vater drei Aspekte, die ihm bei der\nBeobachtung von Linus’ Atmung einen Hinweis auf\nDyspnoe geben können."}],"answers":{"2":"• Zeitersparnis und Patientenorientierung: Das zielgerichtete Setzen von\nPrioritäten erspart Zeit, der zu pflegende Mensch steht im Mittelpunkt der\nPflegeplanung.\n• Gezielter Einsatz von personellen Ressourcen und Materialien:\nDurch die verlässliche Feststellung des Pflegebedarfs können Ressourcen\nzielgerichtet dort eingesetzt werden, wo sie wirklich gebraucht werden.\n• Erwerb und Sicherung von Pflegekompetenz: Pflegemaßnahmen\nwerden durch die Pflegeplanung überprüft und der „Erfahrungsschatz“\nerweitert sich, Pflegeplanung schult die Fähigkeit, bewusst und begründet zu\nentscheiden.\n• Größere Effizienz und Überprüfbarkeit der Maßnahmen: Viele\nPflegemaßnahmen zeigen nur Wirksamkeit, wenn sie konstant und\nkonsequent durchgeführt werden. Durch die Evaluation können\nMitarbeiterzufriedenheit und Motivation gesteigert werden.","3":"Rahmenbedingungen für eine förderliche Gesprächssituation\n• Ruhiger Raum\n• Realistischen (aber begrenzten) Zeitraum dafür einplanen\n• Zeitpunkt zuvor absprechen (Betreuung von Linus gewährleisten)\n• Vertrauen schaffen (Der Vater sollte bereits Vertrauen zur Pflegefachperson\nhaben)\n• Inhalte vorab absprechen, dabei auf Wünsche eingehen\n• Regeln der Gesprächsführung beachten\nMögliche Themen für das Informationsgespräch\n• Ausgewogene Ernährung: Ein besonders hoher Bedarf an Kalorien und\nVitaminen muss berücksichtigt werden. Für Linus z. B. eignet sich sehr gut\nBrei mit viel Obst und Gemüse.\n• Aufenthalt im Freien: Die Eltern dahingehend beraten, Linus bei\nschlechtem Wetter im Haus zu lassen, jedoch bei klarem und gutem Wetter"}}]},{"num":9,"title":"Sechstes Prüfungsbeispiel","tag":"tag2","cases":[{"setting":"Stationäre Akutpflege","title":"(Fallsituation)","text":"„Ich weiß nicht, wie lange ich diesen Job noch machen\nkann“\nSie arbeiten als Pflegefachperson in einer Kinderklinik in\nMünchen. Zusammen mit ihrer Kollegin Ingrid haben Sie heute\nSpätdienst. Bei der Übergabe informiert Sie der Frühdienst, dass\nein Zugang angekündigt ist: „Ihr bekommt später noch Levin\nKohl, 7 Jahre alt, mit akuter Appendizitis. Im Moment ist er im OP\nzur Appendektomie, der Aufwachraum meldet sich bei euch, wenn\nihr ihn abholen könnt. Seine Mutter sitzt bereits im Warteraum\nund ist ziemlich aufgeregt.“\nBei Ihrem Rundgang sehen Sie auch kurz bei Frau Kohl vorbei,\nsie berichtet Ihnen: „Das ging jetzt alles so schnell! Die ganze\nNacht hatte Levin schon Bauchschmerzen und Übelkeit. Ich habe\nmir nicht so viel dabei gedacht, die Kinder haben ja oft Bauchweh.\nDen Tag über wurde es dann immer schlimmer, ein bisschen\nTemperatur hatte er auch, und dann hat uns der Kinderarzt direkt\nhierher geschickt.“ Sie bringen Frau Kohl eine Tasse Kaffee und\nversprechen ihr, sich sofort zu melden, wenn Levin abgeholt\nwerden kann.\nIm Stationszimmer sprechen Sie mit Ihrer Kollegin Ingrid.\nDiese ist frustriert: „So sehr ich meinen Job auch liebe, ich weiß\necht nicht mehr, wie lange ich das noch machen kann. Die ganze\nZeit muss ich einspringen, meine Familie kriegt schon die Krise,\nwenn das Telefon klingelt und die Klinik dran ist. Aber ich will\neuch Kollegen auch nicht hängen lassen. Und dann der ganze\nStress hier auf Station, gestern konnte ich mal wieder keine Pause\nmachen. Ich kann manchmal nach der Schicht gar nicht mehr\nabschalten. Die Klinik müsste da auch mal mehr für uns\nMitarbeiter tun.“ Da klingelt das Telefon, und der Aufwachraum\nbittet Sie, Levin abzuholen.\nDer Kollege dort macht eine Übergabe, dann nehmen Sie Levin\nmit auf Station. Levin wirkt noch ein bisschen müde, ansonsten\nhat er die Operation gut überstanden.","questions":[{"num":1,"points":3,"text":"Erläutern Sie kurz die Diagnose akute Appendizitis."},{"num":2,"points":6,"text":"Ermitteln Sie die Symptome, die bei Levin aufgetreten sind\n(3 P.), und nennen Sie drei weitere (3 P.)."},{"num":3,"points":4,"text":"Zählen Sie auf, welche Informationen die Übergabe des\nKollegen aus dem Aufwachraum enthalten muss."},{"num":4,"points":6,"text":"Geben Sie Beobachtungskriterien für die postoperative\nVersorgung von Levin an."},{"num":5,"points":8,"text":"Nehmen Sie Stellung zu der Aussage Ihrer Kollegin „So\nsehr ich meinen Job auch liebe, ich weiß echt nicht mehr,\nwie lange ich das noch machen kann“ (5 P.) und zählen Sie\nweitere Belastungen des Pflegeberufs auf (3 P.)."},{"num":6,"points":7,"text":"Nennen Sie Möglichkeiten der betrieblichen\nGesundheitsförderung, die der Kinderklink zur Stärkung\nder Gesundheit ihrer Mitarbeiter zur Verfügung stehen."},{"num":7,"points":10,"text":"Erklären Sie, wie eine kollegiale Beratung zum Umgang mit\nbelastenden Situationen abläuft."},{"num":8,"points":6,"text":"Skizzieren Sie die Schritte des EBN-Prozesses zur\nUmsetzung von wissenschaftlichen Ergebnissen in die\nPflegepraxis."}],"answers":{"1":"Der EBN-Prozess läuft in folgenden Schritten ab:\n1. Aufgabenstellung (Wer ist für die Aufgabe zuständig?)\n2. Fragestellung (Die Formulierung einer konkreten Frage hilft,\ndie Recherche einzugrenzen.)\n3. Literaturrecherche (Suche nach Forschungsartikeln, die\nAntworten auf die Fragestellung geben.)\n4. Kritische Beurteilung (Die Forschungsartikel werden anhand\nvon Gütekriterien auf ihre Qualität bewertet.)\n5. Implementierung (Die Forschungsergebnisse werden in die\nPraxis umgesetzt.)\n6. Evaluation (Die Umsetzung wird beurteilt, und ggf. wird der\nEBN-Prozess von Neuem durchlaufen.)\nTipp\nFür eine kritische Beurteilung von\nForschungsergebnissen werden die Gütekriterien\nfür qualitative und quantitative Forschungen\nangewendet.\n• Quantitative Forschung: Objektivität, Validität,\nReliabilität\n• Qualitative Forschung: Glaubwürdigkeit,\nFolgerichtigkeit, Angemessenheit\nLiteratur\n1. Bendig H. Gesundheit für Pflegekräfte im Berufsalltag.\nEmpfehlungen für die betriebliche\nGesundheitsförderung und Prävention in der Pflege.\nInitiative Gesundheit und Arbeit (iga). 2017. Aus:\nwww.iga-\ninfo.de/fileadmin/redakteur/Veroeffentlichun\ngen/iga_Wegweiser/Dokumente/iga-…","3":"• Bewusstsein (Ist der zu pflegende Mensch ansprechbar? Ist\nder zu pflegende Mensch orientiert? Gegebenenfalls: Ist die\nPupillenreaktion normal?)\n• Schmerzen (Hat der zu pflegende Mensch Schmerzen? Wo\nund wie stark sind die Schmerzen?)\n• Atmung (Wie sind Atemrhythmus, -tiefe und -frequenz des zu\npflegenden Menschen? Ist der zu pflegende Mensch blass\noder zyanotisch?)\n• Herz- und Kreislauffunktion (Kontrolle von Blutdruck und\nPuls)\n• Körpertemperatur (Messintervall an den Zustand und letzten\nWert des zu pflegenden Menschen anpassen)\n• Urinausscheidung (Zu pflegende Menschen ohne\nDauerkatheter sollten bis 8 Stunden nach der OP\nSpontanurin gelassen haben)\n• Venöse Zugänge (auf Durchgängigkeit und\nEntzündungszeichen kontrollieren)\n• Wundverband (auf Nachblutungen und Schmerzen\nkontrollieren)","5":"Stellungnahme\nMit der Aussage zeigt sich, dass die Kollegin bei ihrer Tätigkeit\nverschiedenen Belastungen ausgesetzt ist. Sie nennt im Verlauf des\nGesprächs mehrere Beispiele, die sie zweifeln lassen, ob sie die\nAnforderungen bewältigen kann. Wobei sich ihre Überlastung eher\nauf die Arbeitsrahmenbedingungen bezieht.\nMögliche Belastungen im Pflegeberuf\n• Hohe körperliche Belastung\n• Hoher Krankenstand\n• Mangelnde Einarbeitung\n• Hohes Arbeitsaufkommen\n• Keine Dienstplansicherheit\n• Unscharf definierte Aufgabenbereiche\n• Personaleinsparungen\n• Verkürzung der Verweildauer von zu pflegenden Menschen\n• Stress mit Kollegen und Vorgesetzten\n• Gewalt gegen Pflegefachpersonen\n• Emotionale Belastungen (Ekel, Scham, Frustration …)","6":"• Ziel der kollegialen Beratung ist es, eine Lösung für eine\nkonkrete berufliche Schlüsselfrage zu entwickeln.\n• Die kollegiale Beratung hat feste Rollen, die in jeder Sitzung\nneu verteilt werden können:\n– Fallerzähler: hat den Beratungs-/Unterstützungsbedarf.\n– Moderator: leitet die Sitzung, achtet auf das Einhalten\nder Regeln.\n– Protokollant: protokolliert und fasst die wesentlichen\nSchritte zusammen.\n– Berater: Alle anderen Teilnehmer bringen Ideen,\nGedanken, Erfahrungen ein.\n• Ablauf der kollegialen Beratung in sechs Phasen:"}},{"setting":"Stationäre Langzeitpflege","title":"„Elsbeth-Stift“","text":"Wenn alles zu viel wird …\nSie arbeiten als Pflegefachperson in der psychiatrischen\nRehaklinik „Elsbeth-Stift“ in Stuttgart. Als Sie Ihren Frühdienst\nbeginnen, werden Sie über Herrn Frei informiert, der gestern\nNachmittag für 4 Wochen in die Einrichtung gekommen ist. Herr\nFrei ist ein 58-jähriger Geschäftsmann, der sich aufgrund von\nBurn-out in stationäre Behandlung begeben hat. Er ist seit 5\nJahren Chief Officer in einem großen Unternehmen mit 7000\nMitarbeitenden, verheiratet und hat eine Tochter. Diese ist von\nGeburt an geistig behindert und lebt in einer Einrichtung für\nKinder mit Behinderung.\nSeit einem Jahr fühlt sich Herr Frei permanent angespannt und\nüberfordert. Die regelmäßigen Besuche bei seiner Tochter in der\nPflegeeinrichtung wurden für ihn immer mehr zur Belastung, da\ner auch am Wochenende und im Urlaub an seinem Laptop saß und\nE-Mails bearbeitete. Seine Ehefrau warf ihm vor, sich nicht um\nseine Tochter zu kümmern und sie mit allen Problemen allein zu\nlassen. Langsam schlich sich bei Herrn Frei Erschöpfung ein,\nsowohl psychisch als auch körperlich.\nDer Druck in der Arbeit stieg durch die Corona-Pandemie und\nden Konflikt zwischen der Ukraine und Russland zunehmend an,\nda der Fachkräftemangel und die Inflation auch das Unternehmen\nstark beeinträchtigt, für das er die Verantwortung trägt. Das\nständige Kämpfen um die Liquidität führte dazu, dass ihm Zweifel\nan seiner Kompetenz kamen. Seine Arbeitsleistung fiel immer\nmehr ab. Der Konflikt mit seiner Ehefrau führte letztendlich dazu,\ndass er ihr zuliebe in die Behandlung einwilligte.\nAls Sie am Morgen Herrn Freis Zimmer betreten, fällt Ihnen\nsofort auf, dass dessen Fingernägel und -kuppen abgekaut und\nblutig sind. Er sitzt gebeugt auf seinem Bett, hält sich sein rechtes\nOhr zu und scheint starke Schmerzen zu haben. Sie wissen bereits,\ndass er unter einem Tinnitus leidet.\n„Haben Sie wieder Ohrenschmerzen, Herr Frei?“, sprechen Sie\nihn an. Er entgegnet unwirsch: „Lassen Sie mich doch in Ruhe, Sie…","questions":[{"num":1,"points":10,"text":"Ordnen Sie die Kommunikation zwischen sich als\nPflegefachperson und Herrn Frei anhand der fünf Axiome\nvon Paul Watzlawick ein."},{"num":2,"points":10,"text":"Geben Sie Herrn Freis Anzeichen eines Burn-outs an (6 P.)\nund nennen Sie vier weitere (4 P.)."},{"num":3,"points":3,"text":"Erklären Sie den Unterschied zwischen einem Burn-out\nund einer Depression."},{"num":4,"points":6,"text":"Analysieren Sie Herrn Freis Burn-out-Auslöser\nhinsichtlich seiner Lebenssituation und seines\nArbeitsplatzes."},{"num":5,"points":5,"text":"Nennen Sie Herrn Frei fünf Vorteile seines Aufenthalts in\nder psychiatrischen Rehaklinik."},{"num":6,"points":6,"text":"Beraten Sie Herrn Frei zu möglichen Maßnahmen nach\nseinem Klinikaufenthalt in Bezug auf seine private sowie\nberufliche Situation."},{"num":7,"points":10,"text":"Definieren Sie das biopsychosoziale Modell von Engel (1 P.)\nund erörtern Sie dessen drei Dimensionen (je 3 P.) anhand\nHerrn Freis Situation."}],"answers":{"2":"Anzeichen, die bei Herrn Frei auftreten\n• Anhaltende Anspannung und Überforderung\n• Psychische und körperliche Erschöpfung\n• Zweifel an der eigenen Kompetenz\n• Abfall der Arbeitsleistung\n• Tinnitus\n• Abgekaute Fingernägel und -kuppen\nWeitere Anzeichen\n• Entspannung in der Freizeit nicht mehr möglich\n• Konzentrationsstörungen\n• Schlafstörungen\n• Frustgefühle und Gefühl der inneren Leere\n• Schuldgefühle","3":"Eine Depression unterscheidet sich im Schweregrad von einem\nBurn-out. Schlafstörungen, Suizidalität und Erschöpfung sind bei\nder Depression viel stärker ausgeprägt. Von einem Burn-out kann\nman sich zudem besser erholen als von einer Depression.","4":"Analyse der Lebenssituation\nWas stresst? Wo liegen körperliche und seelische Grenzen? Was\nmuss sich ändern?\n• Herr Frei hat einen anstrengenden Job mit sicherlich einer\n60-Stunden-Woche.\n• Dazu kommt die familiäre Situation mit einer behinderten\nTochter.\n• Herr Frei ist über 50 Jahre und damit auch körperlich nicht\nmehr so leistungsfähig.\n• Herr Frei muss darüber nachdenken, ob er in dieser\nberuflichen Position bleiben kann, da er anscheinend den\nAnforderungen des Unternehmens und gleichzeitig denen\nseiner Ehefrau nicht mehr genügen kann; evtl. sind Letztere\nauch gar nicht seine Ansprüche.\nArbeitsplatzanalyse\nIst das Arbeitspensum überhaupt zu bewältigen? Wo liegen äußere\nund innere Gründe für das Überforderungsgefühl?\n• Die berufliche Position des Chief Officer ist sicherlich sehr\nanstrengend und erfordert ein hohes Maß an\nEinsatzbereitschaft und Flexibilität.\n• Das Arbeitspensum wird mit zunehmenden Krisen, z. B.\nCorona, Ukrainekonflikt, immer mehr.\n• Herr Frei scheint Ansprüchen nicht mehr zu genügen. Er\nmuss sich damit auseinandersetzen, ob es seine Ansprüche\nsind oder die anderer.\n• Eventuell haben sich Herrn Freis Einstellungen und…","5":"• Herr Frei hat die Chance, sich auf sich selbst zu\nkonzentrieren.\n• Es gibt keine Ablenkung von außen, er muss keinerlei\nalltäglichen Pflichten nachkommen. Somit ist sein\nKlinikaufenthalt eine Auszeit von seinem Leben und seinen\nbisherigen Belastungen.\n• Vor Ort spricht er mit anderen Burn-out-Betroffenen, Ärzten\nund Therapeuten in Einzel- und Gruppengesprächen.\n• Er sieht die Probleme anderer Betroffener und erhält so eine\nneue Perspektive auf seine persönlichen Schwierigkeiten im\nAlltag. So ist unter Umständen ein Lernen aus den Fehlern\nder anderen möglich.\n• Er kann zahlreiche Therapieangebote wie Ergo- oder\nKunsttherapie sowie Sport- und Entspannungsangebote\nwahrnehmen.","6":"Private Situation\n• Selbstfürsorge steigern: z. B. für ausreichend Schlaf,\nBewegung und gesunde Ernährung sorgen\n• Sich wohlwollender und weniger kritisch begegnen, z. B. sich\nhäufiger loben, täglich positive Selbstkommentare für das\neigene Handeln finden und aufschreiben, mit Ehefrau über\nGefühle sprechen\n• Zeit nehmen für „kreatives Nichtstun“, gemeinsame Besuche\nder Tochter mit seiner Ehefrau einplanen\n• Möglichkeiten finden, die für die Entspannung förderlich\nsind, z. B. Entspannungsverfahren wie autogenes Training,\nprogressive Muskelentspannung, in die Natur gehen\nArbeit\n• Hilfe suchen für die Bewältigung der Aufgaben, klärende\nGespräche über Änderungsbedarfe am Arbeitsplatz führen\n• Grenzen setzen gegenüber überzogenen\nArbeitsanforderungen und, falls dies nicht möglich ist, über\neinen Wechsel/berufliche Alternativen nachdenken\n• Möglichst regelmäßig Pausen einlegen\n• Erreichbarkeit über Handy, soziale Medien, E-Mail\nreduzieren","7":"Definition\nDas biopsychosoziale Modell sieht das Individuum auch in seinem\nbiografischen Gewordensein vor dem Hintergrund seiner Lern- und\nBeziehungsgeschichte und nicht nur die Entstehung der Krankheit.\nEs umfasst drei Dimensionen:\n• Biomedizinische Dimension: Der Körper wird als\nMaschine gesehen. Krankheiten werden eindimensional\nbeschrieben, indem von außen beobachtbare, objektive\npathologische Befunde und Funktionsstörungen erhoben\nwerden.\nBezug zu Herrn Frei: Das Burn-out wurde anhand von\nzahlreichen Symptomen wie anhaltende Anspannung und\nÜberforderung, psychische und körperliche Erschöpfung,\nZweifel an der eigenen Kompetenz festgestellt, woraufhin er\nsich zur Behandlung in eine psychiatrische Rehaklinik\nbegeben hat.\n• Psychologische Dimension: Krankheit wird aus der\nsubjektiven und individuellen Innensicht des Individuums\nbeschrieben, d. h., auf dieser Dimension wird der Mensch\nmit seinen Gefühlen, Gedanken sowie seinem Verhalten und\nmit der Vorstellung, die er sich selbst von der Entstehung\nseiner Krankheit und deren Heilung macht, beschrieben.\nBezug zu Herrn Frei: Die Analyse von Herrn Freis Lebens-\nund Arbeitssituation führt dazu, die Hintergründe und auch…"}}]},{"num":10,"title":"Siebtes Prüfungsbeispiel","tag":"tag2","cases":[{"setting":"Stationäre Akutpflege","title":"„Auf einmal bin ich chronisch krank“","text":"„Auf einmal bin ich chronisch krank“\nSie arbeiten als Pflegefachperson auf einer internistischen Station\nin Hamburg und sind nach 3 freien Tagen im Frühdienst. Sie sind\nim blauen Bereich eingeteilt, in dem sie auch Frau Aziza Hassan\nbetreuen.\nBei der morgendlichen Übergabe berichtet Ihnen Ihre Kollegin\nJanine Hürtzler: „Frau Hassan ist eine 37-jährige Patientin. Sie\nkam vor 2 Tagen per Rettungswagen aufgrund einer\nVerschlechterung des Allgemeinzustands und eines quälenden\nJuckreizes in die Klinik. Sie hat starke Beinödeme und laut eigener\nAussage in den letzten Monaten 13 kg zugenommen. Sie dachte,\ndass die geschwollenen Beine vom vielen Stehen kämen – sie\narbeitet nämlich als Friseurin. Bis auf die kurzen Rauchpausen\nsteht sie wohl immer. Frau Hassan verspürte schon seit Längerem\nein starkes Durstgefühl und kam in den letzten Monaten nach\nDienstschluss ungewohnt müde und schlapp nach Hause. Sie\nwurde wegen des anhaltenden Juckreizes und der nicht\nweggehenden Müdigkeit zunehmend verzweifelter und ließ sich\ndeshalb einweisen. Heute Nacht war sie sehr unruhig, ging immer\nwieder zum Rauchen.\nDie Vitalwerte sind wie folgt: Größe 161 cm, Gewicht 88 kg/KG,\nBlutdruck 160/95 mmHg, Puls 108/Min., BZ 202 mg/dl, HbA1c\n8,8 %. Die Zuckerwerte waren bislang immer erhöht. Die Familie\nist vor 9 Jahren nach Deutschland immigriert. Frau Hassan, ihr\nMann und die gemeinsamen 9-jährigen Zwillinge sind in\nDeutschland sowohl privat, beruflich sowie schulisch gut\nintegriert.“\nSie sind bei der morgendlichen Arztvisite dabei. Als Letztes\ngehen Sie zu Frau Hassan, die heute die Diagnosestellung erhält:\nEin Diabetes mellitus Typ 1 und eine diabetische Nephropathie\nmit Niereninsuffizienz im Stadium 4 wurden diagnostiziert. Der\nbehandelnde Arzt klärt Frau Hassan über die Erkrankungen und\nmögliche Therapieansätze auf. Frau Hassan ist fassungslos und\nfängt sofort an zu weinen. Nach einigen Sekunden des\nNachdenkens äußert sie: „Ich habe als 9-jähriges Kind schon…","questions":[{"num":1,"points":4,"text":"Erklären Sie Frau Hassan das Krankheitsbild Diabetes\nmellitus Typ 1 (2 P.) und zeigen Sie ihr ihre Symptome (2\nP.) auf."},{"num":2,"points":3,"text":"Sie werden von Frau Hassan nach der Ursache des\nDiabetes mellitus Typ 1 gefragt: „Aber woher habe ich das\ndenn nur?“ Skizzieren Sie die Krankheitsentstehung."},{"num":3,"points":4,"text":"Geben Sie Frau Hassan in Ihrem Informationsgespräch\nneben der Niereninsuffizienz vier weitere diabetische\nFolgeerkrankungen an."},{"num":4,"points":5,"text":"Erklären Sie Frau Hassan den Zusammenhang zwischen\nihrem Diabetes mellitus Typ 1 und der diabetischen\nNephropathie."},{"num":5,"points":4,"text":"Neben einem Informationsgespräch, wie Sie es bei Frau\nHassan durchführen, gibt es in der Pflege die Möglichkeit\nder Beratung. Das Beratungsgespräch soll immer als\nAngebot wahrgenommen werden. Nehmen Sie zu diesem\nGrundsatz Stellung."},{"num":6,"points":10,"text":"Das Beratungsgespräch wird in fünf Phasen eingeteilt.\nZählen Sie diese auf (5 P.) und ermitteln Sie anschließend\nein mögliches Beratungssignal von Frau Hassan (2 P.).\nFormulieren Sie zudem vier Rahmenbedingungen für ein\nförderliches Gespräch (3 P.)."},{"num":7,"points":3,"text":"Frau Hassan leidet an zwei chronischen Erkrankungen.\nDefinieren Sie den Begriff chronische Erkrankung."},{"num":8,"points":16,"text":"Das Modell „Bewältigung chronischer Krankheit“ von\nCorbin und Strauss widmet sich der adäquaten Versorgung\nchronisch Erkrankter. Nennen (8 P.) und erklären (8 P.)\nSie die acht Phasen des Trajekt-Modells."},{"num":9,"points":4,"text":"Ordnen Sie Frau Hassan einer Phase im Trajekt-Modell zu\n(1 P.) und begründen Sie Ihre Entscheidung (3 P.)."},{"num":10,"points":12,"text":"Im Akuteinsatz findet zur Pflegeprozessgestaltung das\nbekannte Sechs-Schritt-Modell von Fiechter und Meier\nAnwendung. Nennen Sie die sechs Schritte (6 P.) und\nbeschreiben Sie das Hauptmerkmal jedes einzelnen\nSchritts (6 P.)."},{"num":11,"points":12,"text":"Formulieren Sie drei Pflegeprobleme anhand des PÄS-\nSchemas inklusive Ressource am Beispiel von Frau\nHassan. Ein Pflegeproblem davon soll präventiv\nausgerichtet sein."},{"num":12,"points":6,"text":"Die Pflegediagnosen lassen sich in verschiedene Typen\neinteilen. Nennen Sie neben der problemfokussierten\nPflegediagnose die beiden weiteren Typen (2 P.) und\nerklären Sie die Zielbeschreibung (4 P.)."},{"num":13,"points":8,"text":"Die Einführung von Pflegediagnosen wird in Deutschland\nteils kontrovers diskutiert. Stellen Sie je drei Pro- und\nContra-Argumente für die Einführung von Pflegediagnosen\ngegenüber (6 P.) und setzen Sie sich mit dieser\nProblemstellung auseinander (2 P.)."},{"num":14,"points":6,"text":"Sie führen mit Frau Hassan gegen Ende ihres\nKlinikaufenthalts ein Informationsgespräch bezüglich\nihrer Niereninsuffizienz im Stadium 4. Informieren Sie\nFrau Hassan über drei Ernährungsgrundsätze in diesem\nStadium."},{"num":15,"points":3,"text":"Frau Hassan benötigt aufgrund einer anschließenden\nRehabilitation Hilfestellungen bei der Versorgung ihrer\nKinder. Zeigen Sie ihr drei Möglichkeiten zur Bewältigung\nder Alltagsherausforderungen auf."}],"answers":{"1":"Diabetes mellitus Typ 1\n• Verursacht durch eine (meist) autoimmun bedingte\nZerstörung der insulinproduzierenden B-Zellen\n(Langerhans-Inseln) des Pankreas.\n• Dadurch herrscht ein absoluter Insulinmangel im Pankreas.\nSymptome\n• Starkes Durstgefühl\n• Müdigkeit und Schlappheit","2":"• Diabetische Makro- und Mikroangiopathie\n– pAVK\n– Apoplex\n– KHK\n• Diabetische Nephropathie\n• Diabetische Retinopathie\n• Diabetische Neuropathie\n• Diabetisches Fußsyndrom","4":"Aufgrund des nicht gut eingestellten Diabetes mellitus und des in der\nFolge hohen Blutzuckerspiegels\n• bilden sich Ablagerungen insbesondere in den kleinen\nBlutgefäßen der Niere → eingeschränkte Filterfunktion →\ndiabetische Angiopathie → Arteriosklerose, die langfristig zu\neiner Schädigung der Nieren und deren Filterfunktion führt,\n• werden die Wände der Nierenkörperchen geschädigt; diese\nwerden durchlässiger, die Filterfunktion ist geschädigt,\nsodass größere Stoffe (wie Proteine) in den Harn gelangen\nkönnen.","5":"• Die Pflegefachperson formuliert Ratschläge als Angebot,\ndabei erarbeitet sie zusammen mit dem zu pflegenden\nMenschen die notwendigen Interventionen.\n• Die Pflegefachperson zeigt mehrere Alternativen auf.\n• Der zu pflegende Mensch erhält dadurch\nEntscheidungsspielräume und kann eine Auswahl treffen.\n• Damit wird vermieden, dass\n– er sich bedrängt fühlt und\n– Ratschläge ablehnt → Abwehrhaltung.\n• Beratungen schlagen fehl, wenn diese dem zu pflegenden\nMenschen das Gefühl der Hilflosigkeit vermitteln.","6":"Ablauf einer gelungenen Beratung\n• Kontaktphase\n• Analysephase\n• Angebotsphase\n• Prüfungsphase\n• Abschlussphase\nBeratungssignal\n• „Wer kümmert sich um meine Kinder?“\nDas Kontaktthema ist hier die Kinderversorgung während des\nKlinikaufenthalts und evtl. darüber hinaus.\n• „Wie soll das eigentlich mit mir weitergehen?“\nDas Kontaktthema ist hier die Aufklärung über den weiteren\nKlinikaufenthalt und darüber hinaus, ggf.\nEntlassungsmanagement, Reha …\nRahmenbedingungen eines förderlichen Gesprächs\n• Ruhiger Raum\n• Störungen abstellen\n• Gespräch auf Augenhöhe\n• Sich der Gesprächsbereitschaft versichern\n• Für eine entspannte Atmosphäre sorgen, evtl. Getränke\nanbieten …"}}]},{"num":11,"title":"Achtes Prüfungsbeispiel","tag":"tag2","cases":[{"setting":"Ambulante Langzeitpflege","title":"„Er ist nicht mehr derselbe wie früher“","text":"„Er ist nicht mehr derselbe wie früher“\nSie arbeiten als Pflegefachperson beim ambulanten Pflegedienst\n„Stern“ im Münchner Umland. Auf Ihrem Tourenplan steht heute\nein Beratungsbesuch bei Familie Hesse. Die Familie wohnt in\neinem kleinen Haus mit Garten am Dorfrand.\nAuf Ihr Klingeln öffnet Frau Hesse die Tür und bittet Sie in eine\nsehr aufgeräumte und gepflegte Wohnung. Im Wohnzimmer sitzt\nHerr Hesse auf dem Sofa. Er wirkt abwesend und reagiert kaum\nauf Ihre Begrüßung. Frau Hesse beginnt sofort das Gespräch: „Es\nist ja so schön, dass Sie heute vorbeikommen. Wir bekommen nur\nnoch selten Besuch. Und raus unter Leute komme ich auch kaum\nnoch. Früher bin ich regelmäßig in die Kirche gegangen, aber das\ngeht jetzt auch nicht mehr. Meinen Mann kann ich nicht mehr\nalleine lassen. Unsere Kinder wohnen in Berlin und Hamburg. Sie\ntun sich sehr schwer mit der Krankheit meines Manns. Er ist halt\neinfach nicht mehr derselbe wie früher.“\nSie bitten Frau Hesse, den Krankheitsverlauf ihres Mannes kurz\nzu beschreiben. „Angefangen hat alles vor 3 Jahren. Zuerst hat er\nhäufiger als normal seinen Autoschlüssel vergessen oder die Brille.\nDa denkt man sich noch nicht viel, kann ja jedem mal passieren.\nAber dann wurde es immer schlimmer, er ging ohne Schuhe aus\ndem Haus, vergaß vereinbarte Termine, einmal stellte er das Auto\nab und fand es nicht mehr. Auch seine Persönlichkeit veränderte\nsich, er war ein aufgeschlossener und lebenslustiger Mensch und\nwurde immer in sich gekehrter und misstrauischer. Als er im\nUrlaub völlig orientierungslos in unserem Hotel umherirrte, war\nmir klar, wir müssen zum Arzt. Der Neurologe stellte dann schnell\nAlzheimer fest. Das war ein harter Schlag für uns, mein Mann war\ndamals 65 Jahre alt und gerade erst in Rente gegangen. Wir hatten\neigentlich viel vor für unseren Ruhestand.\nDanach wurde es immer schlechter, seit einem Jahr kommt er\nauch mit kleinen Dingen im Alltag nicht mehr zurecht – vom\nBrotschmieren bis zur Körperpflege. Ständig vergisst er, seine…","questions":[{"num":1,"points":3,"text":"Herr Hesse hat Demenz vom Typ Alzheimer. Nennen Sie\ndrei weitere Demenzformen."},{"num":2,"points":5,"text":"Ermitteln Sie Symptome einer Demenz bei Herrn Hesse."},{"num":3,"points":5,"text":"Analysieren Sie die Belastungen, denen Frau Hesse als\npflegende Angehörige ausgesetzt ist."},{"num":4,"points":4,"text":"Stellen Sie dar, welche Möglichkeiten Frau Hesse hat, um\nbesser mit den Belastungen umgehen zu können."},{"num":5,"points":12,"text":"A. Antonovsky stellt in seinem Modell der Salutogenese das\nKohärenzgefühl als wichtigen Faktor zur Bewältigung\nbelastender Situationen dar. Erläutern Sie die\nKomponenten des Kohärenzgefühls (6 P.). Analysieren Sie\ndie Situation von Frau Hesse bezogen auf das\nKohärenzgefühl (3 P.) und entwerfen Sie Ideen zur\nStärkung der Komponenten (3 P.)."},{"num":6,"points":15,"text":"Benennen Sie die Formen von Gewalt in der Pflege (5 P.)\nund geben Sie je zwei Beispiele an (10 P.)."},{"num":7,"points":9,"text":"Formulieren Sie Tipps zur Prävention von Gewalt für das\nEhepaar Hesse."},{"num":8,"points":8,"text":"Nennen Sie Beispiele für freiheitsentziehende\nMaßnahmen."},{"num":9,"points":4,"text":"Bewerten Sie die Aussage von Frau Hesse „Hör jetzt auf,\nsonst sperr’ ich dich wieder in ein Zimmer ein!“."},{"num":10,"points":12,"text":"Sie legen für Herrn Hesse eine strukturierte\nInformationssammlung (SIS) an. Führen Sie die\nThemenfelder (6 P.) auf und ermitteln Sie Pflegebedarfe\nbei Herrn Hesse (6 P.)."},{"num":11,"points":7,"text":"Beschreiben Sie Zugangswege zur Erlebniswelt von\nMenschen mit Demenz basierend auf dem\npsychobiografischen Pflegemodell von E. Böhm."},{"num":12,"points":4,"text":"Erläutern Sie, wie eine validierende Begegnung im Sinne\nder Integrativen Validation (IVA) ablaufen kann."},{"num":13,"points":8,"text":"Geben Sie Frau Hesse Handlungsempfehlungen zum\nUmgang mit ihrem Ehemann."},{"num":14,"points":4,"text":"Zählen Sie auf, welche Möglichkeiten es zur Aktivierung\nvon Menschen mit Demenz gibt."}],"answers":{"1":"• Vaskuläre Demenz\n• Lewy-Körperchen-Demenz\n• Frontotemporale Demenz\n• Demenz bei Chorea Huntington\n• Normaldruckhydrozephalus\n• Mischformen","2":"• Orientierungsstörungen in der Wohnung\n• Nichterkennen vertrauter Personen\n• Verlust von Alltagsfähigkeiten\n• Verlust von Erinnerungen\n• Persönlichkeitsveränderungen\n• Aggressives Verhalten","3":"• 24-Stunden-Betreuung des Ehemanns.\n• Wenig Zeit für das Ausleben eigener Interessen.\n• Sozialer Rückzug (wenig Kontakt nach außen).\n• Psychische Belastung (Verlust von gemeinsamen\nErinnerungen).\n• Lebenspläne für den Ruhestand können nicht realisiert\nwerden.\n• Aggressives Verhalten des Ehemanns ihr gegenüber.","4":"Komponenten des Kohärenzgefühls\n• Gefühl der Verstehbarkeit: das Gefühl, dass eigene Leben\nverstehen und ordnen zu können.\n• Gefühl der Handhabbarkeit: das Gefühl, dass einem\ngenügend Ressourcen zur Verfügung stehen, um die\nAnforderungen und Belastungen im Leben im Wesentlichen\nbewältigen zu können.\n• Gefühl der Sinnhaftigkeit: das Grundgefühl, dass das\neigene Leben sinnvoll ist und die auf einen zukommenden\nAnforderungen es wert sind, Energie zu investieren.\nAnalyse der Situation von Frau Hesse\n• Gefühl der Verstehbarkeit: Frau Hesse äußert im\nGespräch ihre Unsicherheit darüber, wie die Krankheit\nweiter fortschreitet und auf was sie sich in den nächsten\nMonaten einstellen muss.\n• Gefühl der Handhabbarkeit: Die Aussage von Frau Hesse\n„An manchen Tagen habe ich das Gefühl, ich schaffe das alles\nnicht“ zeigt, dass sie das Gefühl hat, dass ihre Ressourcen\nnicht immer ausreichen, um die Belastungen zu bewältigen.\n• Gefühl der Sinnhaftigkeit: Frau Hesse spricht von ihrem\nVertrauen auf Gott, der wisse, weshalb sie diese Situation\nerlebe. Das lässt den Schluss zu, dass Frau Hesse durch ihren\nGlauben Sinn im Leben empfindet.\nIdeen zur Stärkung des Kohärenzgefühls von Frau Hesse…","6":"• Körperliche Gewalt\n– Grob anfassen, schlagen, kratzen oder schütteln\n– Unbequem positionieren\n– Unerlaubt oder häufig freiheitsentziehende Maßnahmen\nanwenden\n• Psychische Gewalt\n– Unangemessen ansprechen: anschreien, schimpfen oder\nrügen\n– Missachten oder ignorieren\n– Demütigen oder beileidigen\n• Vernachlässigung\n– Schlecht pflegen oder medizinisch versorgen\n– Unzureichend im Alltag helfen\n– Emotionale Bedürfnisse übergehen\n• Finanzielle Ausnutzung\n– Unbefugt über persönliches Vermögen verfügen\n– Zu Geldgeschenken überreden oder nötigen\n– Geld oder Wertgegenstände entwenden\n• Intime Übergriffe\n– Schamgefühle oder Intimsphäre verletzen\n– Sexuelle Andeutungen machen\n– Intimkontakte verlangen oder erzwingen","7":"• Selbstbestimmung beachten: Jeder Mensch, auch ein\npflegebedürftiger, hat das Recht, über sich selbst zu\nentscheiden. Auch wenn die Handlungen für andere sinnlos\noder unvernünftig wirken.\n• Sicherheit geben: Rituale und feste Abläufe geben\nSicherheit und beugen aggressivem Verhalten vor.\nUnklarheit, was mit einem und um einen herum geschieht,\nführt zu Unsicherheit und kann die betroffene Person\nwütend machen. Alle Handlungen sollten deshalb immer\nerklärt werden.\n• Zeitdruck vermeiden: Die Zeit im Nacken zu haben kann\nbei pflegenden Angehörigen zu einer Eskalation einer\nangespannten Situation führen. Deshalb genügend Pausen\nund Pufferzeiten einplanen, um Zeitdruck zu vermeiden.\n• Für schöne Momente im Alltag sorgen: Gemeinsame\npositive Erlebnisse können Kraft für den Alltag geben.\nBeispiele: gemeinsam Fotoalben ansehen, Nähe\nwiederherstellen über die Pflege hinaus.\n• Hilfe annehmen: Überlastung kann zu aggressivem\nVerhalten gegenüber dem zu pflegenden Menschen führen.\nDeshalb ist es sehr wichtig, dass sich pflegende Angehörige\nAuszeiten nehmen und Hilfe annehmen.\n• Beherrschung bewahren: Wut und Aggression sind ganz\nnatürliche Gefühle, die auch in der Pflege entstehen können.…","8":"• Anbringen eines Fixierungsgurts\n• Anbringen von beidseitigen Bettgittern\n• Stecktisch am Mobilisationsstuhl\n• Wegnahme der Rufvorrichtung\n• Wegnahme des Fortbewegungsmittels (Rollator, Stock,\nRollstuhl)\n• Abschließen des Zimmers\n• Zu pflegenden Menschen in einen tiefen Sessel oder auf ein\ntiefes Sofa setzen, aus dem bzw. von dem er ohne Hilfe nicht\naufstehen kann\n• Vorenthalten von Mitteln zur Orientierung (Brille, Hörgerät)\n• Postertapeten, die Türen verdecken\n• Sedierung durch Medikamente","9":"Durch das Einschließen in ein Zimmer kann sich Herr Hesse nicht\nmehr frei bewegen. Jede Handlung, die einen Menschen daran\nhindert, seinen Aufenthaltsort aus freiem Willen zu verlassen, ist als\nfreiheitsentziehende Maßnahme zu bewerten. Da Frau Hesse im\nVerlauf des Gesprächs auch ihre Hilflosigkeit und Unsicherheit\nthematisiert, sollten mit ihr im Beratungsgespräch\nHandlungsalternativen zu freiheitsentziehenden Maßnahmen\nbesprochen werden.","10":"• Themenfeld 1\nKognitive und kommunikative Fähigkeiten: Herr Hesse\nist aufgrund seiner Erkrankung in seiner Orientierung stark\neingeschränkt. Er ist zeitlich und örtlich nicht orientiert und\nerkennt seine Ehefrau häufig nicht.\n• Themenfeld 2\nMobilität und Bewegung: In der Bewegung ist Herr Hesse\nwenig eingeschränkt, er kann vom Sofa aufstehen und ohne\nweitere Hilfsmittel in der Wohnung herumgehen. Aufgrund\nseiner Einschränkung in der Orientierung besteht aber eine\nSturzgefahr.\n• Themenfeld 3\nKrankheitsbezogene Anforderungen und\nBelastungen: Herr Hesse ist nicht in der Lage, die\nkrankheitsbezogenen Anforderungen selbstständig zu\nbewältigen, und ist auf die Unterstützung von Frau Hesse\nangewiesen. Bei der Medikamenteneinnahme muss er von\nseiner Ehefrau unterstützt werden.\n• Themenfeld 4\nSelbstversorgung: Herr Hesse ist laut seiner Ehefrau stark\nin seiner Selbstversorgung eingeschränkt, er benötigt Hilfe\nbei der Körperpflege und bei der Bereitstellung der Nahrung.\n• Themenfeld 5\nLeben in sozialen Beziehungen: Herr Hesse hat kaum\nnoch Kontakte außer seiner Ehefrau. Seine Kinder kommen\nselten zu Besuch. Er zeigt immer wieder aggressives\nVerhalten seiner Ehefrau gegenüber.…","11":"• Sozialisation: In welcher Kultur und Gesellschaft ein\nMensch gelebt hat, prägt ihn und kann ein\nAnknüpfungspunkt für den Zugang zu ihm sein (z. B.\nKindheit, Familie, Kindergarten, Schule, Ausbildung, eigene\nFamilie, Arbeitsleben).\n• Mutterwitz/Humor: Mit Spaß und Humor erreicht man\nMenschen mit Demenz leichter als über den Verstand.\n• Seelische und soziale Grundbedürfnisse: Erreicht man\nden Menschen kognitiv nicht mehr, sind die individuellen\nBedürfnisse eine wichtige Grundlage für den\nBeziehungsaufbau (z. B. Gespräche über Essen,\ngemeinsames Kochen etc.).\n• Prägungen: Erlernte, sich wiederholende\nVerhaltensnormen, Rituale, die Sicherheit geben.\n• Triebe/Antriebe: Wenn den Menschen hauptsächlich seine\nTriebe bewegen, kann das ein Zugangsweg sein. Körperliche\nTriebe sind beispielsweise Hunger, Schlaf, Sexualtrieb.\nSeelische Triebe können Macht, Demut, Schönheit oder\nPflicht sein.\n• Intuition: Die Intuition bleibt trotz kognitiver Einbußen\nerhalten. So kann ein Mensch mit Demenz trotz seiner\nEinschränkungen beispielsweise die ungewohnte Umgebung\nim Pflegeheim wahrnehmen und sich unsicher und unwohl\nfühlen.\n• Urkommunikation: Auch wenn die verbale…","12":"• Versuchen Sie, Ihren Ehemann so anzunehmen, wie er ist.\n• Nehmen Sie negatives Verhalten nicht persönlich.\n• Vermeiden Sie Diskussionen und Machtkämpfe.\n• Konfrontieren Sie Ihren Ehemann nicht mit seinen Defiziten.\n• Versuchen Sie, über Körpersprache zu kommunizieren, Worte\nverfehlen häufig ihre Wirkung.\n• Geben Sie Ihrem Ehemann genügend Zeit zu reagieren.\n• Akzeptieren Sie die Erlebniswelt Ihres Ehemanns.\n• Vermeiden Sie Belehrungen und Zurechtweisungen.\n• Versuchen Sie, Ihren Alltag mit Ritualen zu gestalten, diese\ngeben Sicherheit.\n• Behalten Sie die vertraute Ordnung in der Wohnung bei.","14":"• Körperliche Aktivierung: Sitztanz, Yoga, Spaziergang …\n• Kreative Aktivierung: Singen, Malen, Handarbeiten,\nGeschichten erzählen, Besuch von Festen, Theaterbesuch …\n• Alltagspraktische Aktivierung: gemeinsam kochen,\nGartenbeete anlegen, Blumen dekorieren …\n• Spirituelle Aktivierung: Besuch von religiösen\nVeranstaltungen, Teilnahme an Gottesdiensten …\nLiteratur\n1. Derrer-Merk E, Kommerell T. Pflege von älteren\nMenschen. In: Menche N, Keller C, Teigeler B (Hrsg.).\nPflegeHeute. 8. A. München: Elsevier, 2023. S. 448–\n473.\n2. EinSTEP. Einführung des Strukturmodells in der\nambulanten, stationären und teilstationären\nLangzeitpflege. Berlin: 2019. Aus: www.ein-\nstep.de/fileadmin/content/documents/poolFolie\nnset_EinSTEP_FIN_Version_2.0_17052019_K.\npdf (letzter Zugriff 12.7.2023).\n3. Faltermaier T. Salutogenese. Bundeszentrale für\ngesundheitliche Aufklärung. 2020. Aus:\nwww.leitbegriffe.bzga.de/alphabetisches-\nverzeichnis/salutogenese (letzter Zugriff:\n12.7.2023).\n4. Kohl R, Menche N. Pflege bei neurologischen und\nneurochirurgischen Erkrankungen. In: Menche N, Keller\nC, Teigeler B (Hrsg.). PflegeHeute. 8. A. München:\nElsevier, 2023. S. 1088–1147.…"}}]},{"num":12,"title":"Neuntes Prüfungsbeispiel","tag":"tag2","cases":[{"setting":"Stationäre Langzeitpflege","title":"„Ich hätte mit dem Rauchen aufhören sollen“","text":"„Ich hätte mit dem Rauchen aufhören sollen“\nSie arbeiten als Pflegefachperson im Seniorenheim „Abendsonne“.\nEiner der Bewohner ist Horst Pfeiffer. Herr Pfeiffer lebt erst seit\nKurzem im Seniorenheim. Er ist 70 Jahre alt und leidet unter\nDiabetes mellitus Typ 2 und einer pAVK. Bei einer Größe von 180\ncm wiegt er 120 kg. Er hat damit einen BMI von 37. Nach einem\nKrankenhausaufenthalt und einer geriatrischen Rehabilitation ist\ner Anfang des Monats bei Ihnen eingezogen. Eigentlich hatte er\ngehofft, wieder nach Hause gehen zu können. Aber seine\nWohnung ist leider wenig rollstuhlgerecht.\nAls Sie zu Beginn des Frühdiensts Herrn Pfeiffer aufsuchen, um\nihn zu wecken, liegt er nicht mehr im Bett. Er ist schon\naufgestanden und anscheinend unterwegs. Sie vermuten ihn beim\nRauchen auf dem Balkon und finden ihn dort auch. Da sie selbst\netwas Zeit haben, stellen Sie sich zu Herrn Pfeiffer und rauchen\nebenfalls eine Zigarette.\nHerr Pfeiffer spricht Sie darauf lachend an und meint: „Endlich\nmal jemand, der nicht immer mit dem Zeigefinger mein Rauchen\nbelehrend kommentiert. Mein Leben lang habe ich mir erst von\nmeiner Frau, dann von meinen Kindern und jetzt von allen im\nKrankenhaus und in der Reha anhören müssen, wie schädlich das\nRauchen für mich ist. Als ob ich das nicht wüsste. Gerade jetzt,\nnachdem die mir vor 7 Monaten das Bein unterhalb des Knies\nabnehmen mussten, ist mir doch eh bewusst, in was ich mich da\nreingeritten habe. Das war schon ein ganz schöner Schock, als der\nArzt mir sagte, dass das Bein abgenommen werden muss. Ich bin\nzwar selbst schuld gewesen, aber da musste ich doch ziemlich\nlange mit mir kämpfen, bis ich der Operation zugestimmt habe.\nSeitdem ist ja auch nichts mehr, wie es war. Immer wenn ich mal\neine gute Zeit nach der OP hatte, in der die blöden Schmerzen im\nabgeschnittenen Fuß wieder weg waren, dann ist nach kurzer Zeit\nwieder etwas anderes dazugekommen. Erst wollte der Stumpf\nnicht heilen, und dann waren da ständig Wassereinlagerungen im…","questions":[{"num":1,"points":8,"text":"Herr Pfeiffer leidet an einer chronischen Erkrankung.\nNennen Sie vier Merkmale von chronischen Erkrankungen\n(4 P.) und belegen Sie diese anhand der Fallsituation (4 P.)."},{"num":2,"points":14,"text":"Der Verlauf von chronischen Erkrankungen kann anhand\ndes Trajekt-Modells nach Corbin und Strauss beschrieben\nwerden. Nennen und erklären Sie fünf Phasen des Modells\n(10 P.) und wenden Sie vier davon auf die Fallsituation in\nBezug auf die Amputation an (4 P.)."},{"num":3,"points":4,"text":"Herr Pfeiffer leidet an der Erkrankung pAVK. Beschreiben\nSie, was darunter verstanden wird (4 P.)."},{"num":4,"points":8,"text":"Die Erkrankung pAVK wird durch verschiedene\nRisikofaktoren begünstigt. Nennen Sie fünf Risikofaktoren\nund belegen Sie anhand der Fallsituation, welche davon\nauf Herrn Pfeiffer zutreffen (8 P.)."},{"num":5,"points":5,"text":"Bewerten Sie den Sachverhalt, dass Herr Pfeiffer seinen\nStumpf mit einer Handbürste massiert, um die\nWundheilung durch eine bessere Durchblutung zu fördern\n(5 P.)."},{"num":6,"points":8,"text":"Sie helfen Herrn Pfeiffer bei der morgendlichen\nVersorgung im Bad. Erklären Sie begründet, auf was Sie\nbei der Stumpfpflege achten müssen (8 P.)."},{"num":7,"points":8,"text":"Bewerten Sie die Aussage von Herrn Pfeiffers Sohn „[…]\noder den Weg zum Balkon und aus der Eingangstür so\ngestalten, dass er nicht mehr raus zum Rauchen kommt?“\naus rechtlicher (4 P.) und ethischer Perspektive (4 P.)."},{"num":8,"points":16,"text":"Herrn Pfeiffers Sohn würde es seinem Vater gern\nermöglichen, wieder nach Hause zu ziehen. Er ist jedoch\nbesorgt, „wie das zu Hause funktionieren könnte“. Beraten\nSie den Sohn zu den vier Möglichkeiten der ambulanten\nVersorgung/Unterstützung (8 P.). Gestalten Sie dabei das\nBeratungsgespräch dem Setting und der Situation\nentsprechend (8 P.)."},{"num":9,"points":11,"text":"Stellen Sie je zwei Vor- und zwei Nachteile (8 P.) der\nambulanten und der stationären Versorgung von Herrn\nPfeiffer gegenüber. Geben Sie danach eine begründete\nEmpfehlung für das weitere Versorgungssetting von Herrn\nPfeiffer (3 P.)."},{"num":10,"points":14,"text":"Verfassen Sie für Herrn Pfeiffer ein aktuelles\nPflegeproblem nach dem PÄS-Format (3 P.). Zeigen Sie\nzwei Ressourcen von Herrn Pfeiffer auf (4 P.), beschreiben\nSie ein angestrebtes Pflegeziel nach den SMART-Kriterien\n(5 P.) und dazu passend zwei Pflegemaßnahmen (2 P.)."},{"num":11,"points":4,"text":"Sie führen den Verbandwechsel an Herrn Pfeiffers Stumpf\ndurch. Nennen Sie vier allgemeine Kriterien, auf welche\nSie bei der Wundversorgung achten müssen."}],"answers":{}}]},{"num":13,"title":"Zehntes Prüfungsbeispiel","tag":"tag2","cases":[{"setting":"Ambulante Langzeitpflege","title":"„Pflegeengel“","text":"Wenn Helfen zum Verhängnis wird\nSie arbeiten seit 2 Jahren als Pflegefachperson beim ambulanten\nPflegedienst „Pflegeengel“ in Eisfeld. Seit Beginn Ihrer Tätigkeit\nbetreuen Sie Herrn Wiedemann, einen 72-jährigen Witwer. Daher\nwissen Sie, dass Herr Wiedemann in einer kleinen Wohnung\nmitten in der Stadt lebt und von seiner Tochter, Frau Weiß, zu\nHause gepflegt wird. Sie ist zu ihrem Vater gezogen, als er\npflegebedürftig wurde, da sie ihn nicht in ein Pflegeheim verlegen\nlassen wollte. Aus diesem Grund hat sie ihre Arbeitszeit um die\nHälfte reduziert.\nEin Blick in seine Akte verrät, dass bei Herrn Wiedemann vor\nmehr als 2 Jahren ein interkranielles Aneurysma festgestellt\nwurde. Er hatte damals plötzlich starke Kopfschmerzen und wurde\nsehr schnell in das nahe gelegene Universitätsklinikum\neingeliefert, da er nicht mehr ansprechbar war. Dort stellte man\neine Subarachnoidalblutung fest. Höchstwahrscheinlich eine Folge\nvon Herrn Wiedemanns dauerhaft entgleistem Hypertonus. Das\nAneurysma wurde damals umgehend im Rahmen eines operativen\nEingriffs mit einem Metallklipp verschlossen. Seither hat Herr\nWiedemann eine rechtsseitige Hemiparese einschließlich\nFazialisparese und eine Aphasie.\nFrau Weiß kann ihren Vater nicht gut verstehen und fragt sehr\noft nach. Dies ärgert Herrn Wiedemann, sodass er ihr gegenüber\naggressiv wird. Sie streiten deshalb sehr oft. Mitunter auch\ndeshalb, weil Herr Wiedemann sich bei der täglichen Mobilisation\nin den Stuhl nicht helfen lassen will. Er hat zwar einen Rollator,\nallerdings nie gelernt, sich mit diesem adäquat fortzubewegen.\nEbenso wenig hat er gelernt, sich selbst an den Bettrand zu setzen.\nWegen seiner Ungeduld achtet er auch nicht auf mögliche\nStolperfallen. Wenn ihm seine Tochter helfen will, resigniert Herr\nWiedemann und bleibt im Bett. Dies führte in letzter Zeit dazu,\ndass er nicht mehr aus dem Bett zu bewegen war. Seine Gelenke\nbeginnen langsam zu versteifen, und seine Haut weist deutliche…","questions":[{"num":1,"points":5,"text":"Erklären Sie Frau Weiß die Entstehung der\nsubarachnoidalen Blutung ihres Vaters."},{"num":2,"points":8,"text":"Arbeiten Sie im Rahmen Ihrer Beratung von Frau Weiß die\nUnterschiede zwischen einer Aphasie und einer Dysarthrie\nheraus (4 P.) und ordnen Sie ein, um welche Art von\nAphasie es sich bei Herrn Wiedemann handelt (4 P.)."},{"num":3,"points":8,"text":"Erläutern Sie Frau Weiß vier mögliche Verhaltensweisen\nim Umgang mit ihrem Vater bezüglich der Aphasie."},{"num":4,"points":8,"text":"Analysieren Sie Herrn Wiedemanns potenzielles Problem\nder Sturzgefahr anhand einer Pflegeplanung, indem Sie ein\nProblem formulieren sowie eine Ressource, ein Ziel und\nfünf geeignete Maßnahmen erfassen."},{"num":5,"points":10,"text":"Erörtern Sie Frau Weiß, weshalb es sinnvoll wäre, ihren\nVater unter kinästhetischen Gesichtspunkten zu bewegen."},{"num":6,"points":8,"text":"Ermitteln Sie mit Frau Weiß Verhaltensweisen im Umgang\nmit Herrn Wiedemanns derzeitiger Situation in Bezug auf\nseine Hemiparese, seine Demotivation und seine Non-\nAdhärenz."},{"num":7,"points":12,"text":"Schildern Sie Frau Weiß die Art der Inkontinenz ihres\nVaters (3 P.) und drei mögliche Maßnahmen (3 P.), dieser\nentgegenzuwirken, und erklären Sie ihr sechs\nAuswirkungen dieser Pflegediagnose auf Herrn\nWiedemann (6 P.)."},{"num":8,"points":12,"text":"Begründen Sie Therapieangebote durch drei weitere\nBerufsgruppen des Gesundheitswesens, die Frau Weiß bei\nder Versorgung ihres Vaters entlasten können."},{"num":9,"points":4,"text":"Nennen Sie Frau Weiß die Abdeckung der Kosten für die\nInanspruchnahme von Therapien weiterer Berufsgruppen\ndes Gesundheitswesens."},{"num":10,"points":9,"text":"Setzen Sie Frau Weiß drei weitere Unterstützungsangebote\nauseinander, auf welche sie als pflegende Angehörige\nAnspruch hat."},{"num":11,"points":7,"text":"Entwickeln Sie unter Bezugnahme der Unterstützungs-\nund Erholungsangebote für pflegende Angehörige mit Frau\nWeiß eine Strategie für ihre Gesundheitsprävention."},{"num":12,"points":9,"text":"Beschreiben Sie Frau Weiß die Vorteile eines Kurses für\npflegende Angehörige."}],"answers":{}}]},{"num":14,"title":"Elftes Prüfungsbeispiel","tag":"tag2","cases":[{"setting":"Stationäre Akutpflege","title":"„Aufgeben wäre für mich einfacher“","text":"„Aufgeben wäre für mich einfacher“\nSie arbeiten als Pflegefachperson in der „Kinderklinik am\nSchönberg“ auf einer kinderonkologischen Station. Seit 2 Tagen ist\nder 13-jährige Timmi mit seiner Mutter, Frau Thurnwald, für den\nnächsten Chemozyklus wieder bei Ihnen auf Station. Sie kennen\nTimmi und seine Familie bereits von seinen letzten\nKrankenhausaufenthalten. Timmi wurde von seiner Kinderärztin\nzur weiteren Abklärung direkt in die Klinik überwiesen. Für die\nFamilie war das ein Schock, da lediglich die vergrößerten\nLymphknoten am Hals und in der Achselhöhle untersucht werden\nsollten. Das Blutbild zeigte eine Anämie, eine Leukopenie und eine\nThrombozytopenie, woraufhin eine Knochenmarksbiopsie\ndurchgeführt wurde, die den Verdacht einer ALL bestätigte.\nBereits ein paar Stunden nach der Diagnosestellung erhielt\nTimmi die erste Intensivchemotherapie, die über insgesamt 7\nMonate geplant war. Doch Timmis Chemoplan wurde bereits\nmehrmals aufgrund der schweren und fast tödlichen\nNebenwirkungen überdacht und abgeändert. Timmi hat seitdem\neine PEJ-Sonde und wegen der vielen Infusionen einen\nPortkatheter. Zu kämpfen hat er im Moment besonders mit\nschlimmen Entzündungen der Mundhöhle – ohne einen\nMorphinperfusor könnte es Timmi nicht aushalten.\nSie kennen Timmi als einen lustigen, lebensfrohen Teenager,\nder sich nicht beklagt und vor allem nicht aufgibt. Einmal sagte er\nzu Ihnen: „Aufgeben wäre für mich zwar einfacher, aber für meine\nEltern nicht. Deshalb kämpfe ich.“\nDie Mutter wird auch dieses Mal über Nacht bei Timmi bleiben.\nBesuche kann er während der Chemo kaum bekommen, wegen des\nInfektionsrisikos von Kinderkrankheiten auch nicht von seinen\nzwei jüngeren Brüdern. Dafür dürfen seine Großeltern manchmal\nbei ihm sein.\nVon seinem Patenonkel hat Timmi ein Tablet bekommen, das\nihm während der Isolationsmaßnahmen helfen soll, sich die Zeit\nzu vertreiben. So kann er mit seinem besten Freund Max ein wenig\nzocken und per Video telefonieren. Max erzählt ihm dann, was in…","questions":[{"num":1,"points":12,"text":"Beschreiben Sie Timmis Krankheitsbild (4 P.). Stellen Sie\nanschließend die unterschiedlichen Leukämieformen (8\nP.) gegenüber."},{"num":2,"points":6,"text":"Begründen Sie, weshalb Timmi Symptome der Anämie,\neine Blutungsneigung sowie eine Infektanfälligkeit zeigt."},{"num":3,"points":13,"text":"Geben Sie an, aus welchem Grund Timmi isoliert werden\nmuss (2 P.), und beschreiben Sie, um welche Isolation es\nsich handelt (2 P.). Nennen Sie die zu berücksichtigenden\nPrinzipien dieser Isolation (3 P.) und erschließen Sie je\nzwei konkrete Pflegemaßnahmen, die Sie bei Timmi\ndurchführen (6 P.)."},{"num":4,"points":4,"text":"Erklären Sie die Wirkung von Zytostatika (2 P.) und geben\nSie die Ziele (2 P.) einer Chemotherapie an."},{"num":5,"points":8,"text":"Timmi hat durch die Zytostatikatherapie mit einigen\nNebenwirkungen zu kämpfen. Geben Sie zwei\npflegerelevante Nebenwirkungen von Timmi an (2 P.) und\nleiten Sie daraus je drei pflegerische Maßnahmen ab (6 P.)."},{"num":6,"points":6,"text":"Arbeiten Sie drei bei Timmi vorliegende Ressourcen\nheraus und begründen Sie deren Nutzen für die\npflegerische Versorgung."},{"num":7,"points":6,"text":"Erklären Sie Timmi vier Risiken, die sich durch seine\nManipulation an der Spritzenpumpe ergeben können (4\nP.), und begründen Sie ihm Ihre Handlungsanweisung auf\nder Grundlage von zwei rechtlichen Vorschriften des\nMedizinprodukterecht-Durchführungsgesetzes (MPDG) (2\nP.)."},{"num":8,"points":4,"text":"Bei der Visite spricht Dr. Brunner über eine präventive\nTherapie nach Abschluss der Chemotherapie. Bestimmen\n(1 P.) und begründen (2 P.) Sie die Präventionsform und\ngeben Sie in Bezug auf Timmi das Ziel an (1 P.)."},{"num":9,"points":4,"text":"Erläutern Sie Frau Thurnwald den Einfluss von zwei\nalterstypischen Entwicklungsmerkmalen auf das Verhalten\nvon Timmi."},{"num":10,"points":8,"text":"Beurteilen Sie die Aussage der Mutter: „Du hast hier gar\nnichts zu entscheiden! Du bist ein Kind, und ein krankes\nnoch dazu!“ (4 P.) Beziehen Sie sich dabei auch auf die\nEuropean Association for Children in Hospital (EACH-\nCharta) (4 P.)."},{"num":11,"points":4,"text":"Kranke Kinder wie Timmi haben besondere Bedürfnisse,\ndie im Krankenhausalltag zu berücksichtigen sind.\nAnalysieren Sie vier Bedürfnisse."},{"num":12,"points":9,"text":"Erläutern Sie Ihre Haltung als beratende Person auf der\nGrundlage des personenzentrierten Beratungsansatzes\nnach C. Rogers in Bezug auf das Gespräch mit Timmi und\nseiner Mutter."},{"num":13,"points":10,"text":"Begründen Sie auf der Basis des Evidence-based Nursing\n(EBN) Ihr Handeln, Ingwertee zu kochen."},{"num":14,"points":6,"text":"Nennen Sie die sechs Schritte des EBN-Prozesses."}],"answers":{}}]},{"num":15,"title":"Zwölftes Prüfungsbeispiel","tag":"tag2","cases":[{"setting":"Stationäre Langzeitpflege","title":"„Die neuen Tabletten sind toll“","text":"„Die neuen Tabletten sind toll“\nSie arbeiten als Pflegefachperson im Seniorenheim „Erlensteg“ in\nBremen und haben heute Ihren ersten Arbeitstag nach einem\nzweiwöchigen Urlaub. Bei der Übergabe haben Sie erfahren, dass\nheute die Bewohnerin Christa Ludwig aus dem Krankenhaus\nwieder zurück zu Ihnen verlegt wird. Dahin wurde Sie vor 10\nTagen vom Rettungsdienst gebracht, nachdem Sie sich nach einem\nSturz den Oberschenkelhals gebrochen hatte.\nIhre Kollegin berichtet Ihnen Folgendes: „Da habe ich gleich\nden Rettungsdienst gerufen, als ich Frau Ludwig am Boden\ngefunden habe. Sie muss ja immer mit ihrem Rollator allein laufen\nund geht dabei sowieso schon stark nach vorn gebeugt. Ständig\nsage ich ihr, dass sie sich gerade hinstellen soll. Und dann hat sie\nan diesem Tag auch mal wieder vergessen, die Bremsen am\nRollator festzustellen. Leider hat sie sich beim Sturz dann den\nrechten Oberschenkelhals gebrochen. Ist ja auch kein Wunder bei\nihrer Osteoporose. Auf jeden Fall wurde sie operiert und musste\ndann noch im Krankenhaus bleiben. Du musst dir dann mal den\nVerlegungsbericht durchlesen, was alles im Krankenhaus mit ihr\ngemacht wurde. Gestern hatte die Station angerufen und schon\nmal die Schmerzmedikamente durchgegeben, damit wir\nrechtzeitig ein BtM-Rezept von der Hausärztin ausstellen lassen\nkönnen. Die kommt heute Nachmittag vorbei. Jetzt hat die arme\nFrau Ludwig zu ihren alten Schmerzen auch noch die von der\nFraktur dazubekommen.“\nFrau Ludwig wird gegen Mittag liegend vom\nKrankentransportdienst zu Ihnen ins Seniorenheim gebracht. Der\nTransfer von der Transportliege in ihr Bett kann nur unter\nMithilfe der Rettungssanitäter bewerkstelligt werden. Beim\nTransfer verzieht Frau Ludwig das Gesicht und stöhnt leise vor\nsich hin. Als sie im Bett liegt und die Rettungssanitäter gegangen\nsind, setzen Sie sich zu Frau Ludwig.\nSie fragen Frau Ludwig als Erstes nach ihren Schmerzen, worauf\nsie antwortet: „Ach, ich weiß gar nicht mehr, was genau jetzt wie…","questions":[{"num":1,"points":7,"text":"Frau Ludwig leidet an Osteoporose. Erklären Sie, was\ndarunter verstanden wird (4 P.) und wie „die alten\nSchmerzen im Rücken“ bei Frau Ludwig darauf\nzurückzuführen sind (3 P.)."},{"num":2,"points":4,"text":"Bewerten Sie begründet die Aussage Ihrer Kollegin\n„Ständig sage ich ihr, dass sie sich gerade hinstellen soll“\nin Bezug auf die Grunderkrankung von Frau Ludwig."},{"num":3,"points":6,"text":"Frau Ludwig spricht von „alten“ und „neuen“ Schmerzen.\nErklären Sie, was damit in Bezug auf die Typisierung von\nSchmerzen gemeint sein könnte."},{"num":4,"points":10,"text":"Nennen und belegen Sie anhand der Fallsituation fünf\nRisikofaktoren für eine Osteoporose-Erkrankung."},{"num":5,"points":8,"text":"Neben dem physiologischen Prozess der\nSchmerzwahrnehmung durch das Nervensystem spielen\nauch andere Faktoren eine Rolle bei der\nSchmerzempfindung. Nennen Sie vier beeinflussende\nFaktoren (4 P.) und belegen Sie diese am Beispiel von Frau\nLudwig (4 P.)."},{"num":6,"points":8,"text":"Im Gespräch fragen Sie Frau Ludwig nach ihren\nSchmerzen. Sie antwortet: „Eigentlich ist es wie immer.\nMir tut was weh.“ Bewerten Sie begründet diese Form der\nSchmerzerfassung (4 P.) und stellen Sie eine andere, für\nFrau Ludwig passende Form der Schmerzerfassung vor (4\nP.)."},{"num":7,"points":14,"text":"Verfassen Sie für Frau Ludwig ein aktuelles Pflegeproblem\nnach dem PÄS-Format (Problem, Ätiologie, Symptome) (3\nP.), zeigen Sie zwei Ressourcen von Frau Ludwig auf (2 P.),\nbeschreiben Sie ein angestrebtes Pflegeziel nach den\nSMART-Kriterien (5 P.) und dazu zwei passende\nPflegemaßnahmen (4 P.)."},{"num":8,"points":12,"text":"Im Expertenstandard „Schmerzmanagement in der Pflege“\nwerden die Struktur, der Prozess und das Ergebnis des\nSchmerzmanagements beschrieben. Nennen Sie je zwei\nPunkte der Struktur- (2 P.), der Prozess- (2 P.) und der\nErgebniskriterien (2 P.) und verdeutlichen Sie diese am\nBeispiel von Frau Ludwig (6 P.)."},{"num":9,"points":9,"text":"Frau Ludwig bekam im Krankenhaus Betäubungsmittel\n(BtM) verschrieben. Erklären Sie, was darunter\nverstanden wird (3 P.) und welche gesetzlichen\nGrundlagen den Umgang mit BtM regeln (2 P.), und\nnennen Sie vier Besonderheiten im Umgang mit BtM (4 P.)."},{"num":10,"points":6,"text":"Erklären Sie Frau Ludwig begründet, auf welche\nBesonderheiten in der Ernährung sie in Bezug auf ihre\nGrunderkrankung Osteoporose achten sollte."},{"num":11,"points":6,"text":"Frau Ludwig ist bereits gestürzt. Beschreiben Sie, was\nunter dem Post-Fall-Syndrom verstanden wird und welche\nAuswirkungen dies auf Frau Ludwig haben kann."},{"num":12,"points":10,"text":"Frau Ludwig ist bereits gestürzt. Nennen Sie fünf\nMaßnahmen der Sturzprophylaxe und begründen Sie,\nwarum Sie diese bei Frau Ludwig anwenden."}],"answers":{}}]}],"tag3":[{"num":4,"title":"Erstes Prüfungsbeispiel","tag":"tag3","cases":[{"setting":"Stationäre Langzeitpflege","title":"„Warum schreien Sie denn so?“","text":"„Warum schreien Sie denn so?“\nSie arbeiten als Pflegefachperson im Seniorenpark „Wintertraum“\nin der Oberlausitz. In Ihrem Frühdienst wird Frau Ingrid Wusel\naus dem Krankenhaus zurückverlegt. Die agile Frau Wusel ist 91\nJahre alt und noch recht selbstständig. Sie hat eine Tochter, die sie\nregelmäßig besucht. Frau Wusel ist freundlich und redet gern mit\nihren Mitbewohnern und dem Personal. Aufgrund ihres Alters\nsieht und hört sie allerdings immer schlechter. Leider lehnt sie\nsowohl eine Brille als auch ein Hörgerät ab, da sie diese ihrer\nMeinung nach noch nicht benötigen würde.\nAus diesem Grund ist Frau Wusel auch am gestrigen Vormittag\ngestürzt. Sie wurde am Boden liegend neben dem Stuhl\naufgefunden. Am Kopf blutete sie aus einer klaffenden ca. 2 cm\ngroßen Wunde so stark, dass die diensthabende Pflegefachperson\nden Notruf tätigte. Bis zum Eintreffen des Rettungsdienstes wurde\nversucht, mit trockenen Kompressen die Blutung am Kopf zu\nstillen. Ihre Kollegin blieb die gesamte Zeit bei der Bewohnerin\nund beruhigte diese. Zur Beobachtung musste Frau Wusel über\nNacht im Krankenhaus bleiben. Zum Glück trug sie nur ein paar\nSchürfwunden an beiden Knien, eine Platzwunde am Kopf sowie\neine leichte Gehirnerschütterung davon. Die Kopfplatzwunde\nmusste genäht werden.\nSie nehmen Frau Wusel wieder in Empfang. „Na ja, das mit dem\nSehen ist schon so eine Sache. Der Stuhl hat doch da noch nie\ngestanden!“, sagt Frau Wusel zu Ihnen in lautem Tonfall. Während\nSie Frau Wusel in ihr Zimmer begleiten, reden Sie beruhigend auf\nsie ein. „Ja, sagen Sie mal, warum schreien Sie denn so? Ich bin\ndoch nicht taub!“, beschwert sich daraufhin Frau Wusel bei Ihnen.\nSie mäßigen Ihre Lautstärke und fragen Frau Wusel, ob sie noch\netwas benötige. Als sie dies verneint, gehen Sie zurück ins\nDienstzimmer. Bevor Frau Wusels Tochter in 2 Stunden zu Besuch\nkommt, möchten Sie die Unterlagen aus dem Krankenhaus\ndurchsehen. Die Tochter war am Telefon sehr aufgeregt und…","questions":[{"num":1,"points":10,"text":"Analysieren Sie die Handlungssituation hinsichtlich der\nNotfallsituation, in der sich Frau Wusel befand (5 P.), und\nschätzen Sie mögliche Folgen für die Bewohnerin ab (5 P.)."},{"num":2,"points":10,"text":"Stellen Sie die individuelle Patientenbetreuung von Frau\nWusel unter Beachtung der ethischen Prinzipien dar (5 P.).\nGehen Sie auf die Bedeutung der individuellen Pflege ein (5\nP.)."},{"num":3,"points":10,"text":"Erklären Sie die Wirkungsweise von Schmerzmitteln (5 P.).\nNennen Sie das Stufenschema der WHO (5 P.)."},{"num":4,"points":10,"text":"Beschreiben Sie eine standardisierte Wundversorgung (5\nP.). Nennen Sie fünf Kriterien der Wundeinschätzung (5\nP.)."},{"num":5,"points":10,"text":"Mittels eines Gesprächs wollen Sie Frau Wusels aufgeregte\nTochter unterstützen. Nennen Sie die Informationen, die\nSie ihr geben (5 P.). Erklären Sie, was in der\nKommunikation mit ihr zu beachten ist (5 P.)."}],"answers":{"1":"Aus folgenden Gründen handelt es sich um eine Notfallsituation:\nEine Notfallsituation stellt eine drohende Gefährdung der körperlichen Unversehrtheit\ndes Menschen dar. Frau Wusels physische wie auch psychische Gesundheit ist durch den\nSturz gefährdet bzw. beeinträchtigt. Sie erlitt dadurch Schürfwunden an beiden Knien sowie\neine stark blutende Platzwunde am Kopf. Psychisch könnte sie in den „Teufelskreis“ der\nSturzangst rutschen.\nPhysische Gefahren bestehen für Frau Wusel hinsichtlich des Sturzes darin, dass die\nPlatzwunde am Kopf auf ein mögliches Schädel-Hirn-Trauma hinweisen kann. Ein Schädel-\nHirn-Trauma kann zu einem lebensbedrohlichen Ereignis werden und geht häufig mit\nKopfschmerzen einher. Schmerzen können Frau Wusel auch die Schürfwunden an beiden\nKnien bereiten. Zudem können Wunden u. U. einer Wundheilungsstörung unterliegen.\nPsychische Gefahren bestehen in der Entstehung eines „Teufelskreises der\nSturzangst“. Frau Wusel wird sich aufgrund des Sturzereignisses weniger bewegen. Dies\nführt zu einer Rückbildung von Muskulatur, Sehnen und Bändern. Das Gleichgewicht wird\nweniger trainiert. Wenn Frau Wusel dann doch aufsteht und gehen möchte, wird sie sehr…","2":"Individuelle Patientenbetreuung\nFolgende vier Prinzipien gilt es aus ethischer Sicht in der Pflege zu beachten:\n• Autonomieprinzip\n• Wohltuens- bzw. Fürsorgeprinzip\n• Nicht-Schadens-Prinzip\n• Gerechtigkeitsprinzip\nIndividuelle Pflege bedeutet demnach – auch für Frau Wusel –, dass das Recht auf\nSelbstbestimmung (Autonomie) darin begründet liegt, dass sie selbstständig über bzw. bei\nihrer Pflege entscheiden darf. So darf sie Brille und Hörgerät ablehnen, sollte aber dennoch\nüber die Gefahren aufgeklärt werden, um dem Prinzip der Fürsorge gerecht zu werden.\nDennoch darf ihr nach dem Prinzip des Nichtschadens z. B. die Brille nicht aufgezwungen\nwerden, wenn sie dies vehement ablehnt. Frau Wusel erhält – wie alle anderen Bewohner\nauch – die für sie notwendigen und auf sie abgestimmten Unterstützungsmaßnahmen und\npflegerischen Leistungen. Damit wird das Prinzip der Gerechtigkeit erfüllt.\nBedeutung der individuellen Pflege\nJeder Mensch hat unterschiedliche Wünsche und Bedürfnisse, die in seinen ganz\nindividuellen Erfahrungen begründet sind. Das trifft ebenso auf Frau Wusel zu. In der\nPflege sind ihre ganz individuellen Wünsche und Bedürfnisse zu berücksichtigen. Diese…","3":"Wirkungsweise von Schmerzmitteln\nDie Wirkungsweise von Schmerzmitteln, auch Analgetika genannt, können unterschieden\nwerden in nicht opioide und opioide Schmerzmittel. Die nicht opioiden Schmerzmittel\nblockieren die COX-Enzyme. Somit wird der Botenstoff Prostaglandin nicht mehr\nhergestellt und das Schmerzsignal zum Gehirn kann nicht ausgelöst werden. Die opioiden\nSchmerzmittel binden dagegen direkt an den Rezeptoren im zentralen Nervensystem wie\nGehirn bzw. Rückenmark und an den Rezeptoren im peripheren Nervensystem. Opioide\nkann der Körper auch als sogenannte Endorphine selbst herstellen. Opioide Analgetika\nfallen unter das Betäubungsmittelgesetz, da sie oft ein hohes Abhängigkeitspotenzial\nbesitzen.\nStufenschema nach WHO\nLaut WHO werden auf der ersten Stufe Nicht-Opioid-Analgetika (ggf. zusätzlich Co-\nAnalgetika) verabreicht. Sollte diese Gabe nicht (mehr) ausreichend sein, werden auf Stufe\nzwei niederpotente Opioid-Analgetika und Nicht-Opioid-Analgetika verordnet. Auch hier\nkönnen ggf. zusätzlich Co-Analgetika verabreicht werden. Auf der dritten Stufe des WHO-\nStufenschemas werden hochpotente Opioid-Analgetika und Nicht-Opioid-Analgetika…","4":"Standardisierte Wundversorgung\nEine standardisierte Wundversorgung erfolgt nach dem Standard der jeweiligen\nEinrichtung und unter Berücksichtigung der ärztlichen Anordnung. Gegebenenfalls wird ein\nWundmanager hinzugeholt.\nNach der ersten äußeren Einschätzung der Wunde desinfiziert sich die Pflegefachperson\nihre Hände und zieht Schutzhandschuhe an. Sofern erforderlich, müssen bei einer frischen\nWunde starke Blutungen gestillt werden, während bei bestehenden Wunden der alte\nWundverband abgelöst und verworfen wird. Wenn nötig, wird die Wunde mit einer\nWundspüllösung so lange gespült, bis z. B. keine Fremdkörper mehr sichtbar sind.\nAnschließend wird die Wunde mit einer geeigneten Wundauflage abgedeckt und diese\nfixiert, sofern sie nicht selbsthaftend ist.\nKriterien der Wundeinschätzung\n• Wundort\n• Wundart\n• Wundgröße\n• Wundfläche\n• Wundtiefe\n• Wundrand\n• Wundumgebung\n• Wundgeruch\n• Wundexsudat\n• Von der Wunde ausgehende Schmerzen","5":"1. Evangelischer Fachverband für Arbeit und soziale Integration (EFAS).\nGrundlagen Kommunikation und Kommunikationstechniken. Handout. Aus:\nwww.efas-\nweb.de/files/teges/Teges_Handout_Kommunikation_FINAL_SCRE\nEN.pdf (letzter Zugriff: 20.7.2023).\n2. Stiftung ZQP. Pflege-Charta. Schulungsmaterial. Aus:\nwww.zqp.de/angebot/pflege-charta (letzter Zugriff: 20.7.2023)."}},{"setting":"Ambulante Langzeitpflege","title":"„Du bist meine kleine Maus“","text":"„Du bist meine kleine Maus“\nIm Rahmen Ihrer Tätigkeit als Pflegefachperson arbeiten Sie im\nambulanten Pflegedienst „Helfende Hände“ im Dresdner Raum.\nSie betreuen die 45-jährige Mia Götlich. Sie wohnt mit ihren\nEltern am Rand von Dresden in einem kleinen Haus mit großem\nGarten. Frau Götlich hat das Down-Syndrom. Sie ist in ihrer\nverbalen Kommunikation sehr eingeschränkt, da sie aufgrund\nihrer vergrößerten Zunge nur recht undeutlich sprechen kann.\nZudem hat Frau Götlich leicht deformierte Füße, die
