nehmung\nder durch eine fehlt. Wichtig ist, dass dies nicht im Sinne\ntatsächliche oder eines exakten Zeitpunktes verstanden wird,\ndrohende sondern der Übergang von akutem zu\nGewebeschädigung chronischem Schmerz als fließend und am\nverursacht wird. Er individuellen Schmerz- und\nnimmt eine Krankheitserleben ausgerichtet erkannt\nlebenserhaltende wird. Eine kontinuierliche Betrachtung der\nWarn- und Kriterien ‚Intensität der Pathologie‘ und\nSchutzfunktion ein, die ‚Dauer‘ sowie das wechselseitige und\nsich auch durch dynamische Zusammenspiel physiologischer\nphysiologische und psychologischer Faktoren werden als\nBegleiterscheinungen wichtige Besonderheit der Chronifizierung\nzeigt. Dazu gehören u. identifiziert.“\na. der Anstieg des\nBlutdrucks, des Pulses\nund der Atemfrequenz.“\nProzesskriterien:\n• Die Pflegefachperson ermittelt mithilfe geeigneter Assessments die…","10":"• Linderung des Juckreizes durch bedarfsorientierte Gabe von\nAntipruriginosa, z. B. Fenistil®, nach ärztlicher Anordnung\n• Ablenkung.","11":"Gelungene Kommunikation:\nZuerst dreht die Pflegefachperson langsam das Gesicht von Walli in ihr\nBlickfeld, um ganz sicherzugehen, dass er auch hinschaut und ihr zuhört.\nDann äußert sie folgenden Satz „Dann machen wir eine Monster-AG auf.\nIch zeige dir gleich noch, wie du dich vor einem Verbandwechsel\nentspannen kannst.“ Durch die kindgerechte Sprache erreicht sie, dass\nWalli ihr zuhört und sich trotz seiner Narben erstmals sicher fühlt. Durch\ndas Lächeln und den dankbaren Blick von Walli ist diese\nKommunikationssituation gelungen.\nDie zweite gelungene Beziehungsgestaltung und\nKommunikationssituation zeigt sich durch das gemeinsame\n„Powerposing“ von Walli und der Pflegefachperson. Mithilfe von\nPowerposing kann man sich bei Nervosität oder Ängsten selbst stärken.\nDie beiden Betroffenen stellen sich wie Helden hin und sagen laut: „Wir\nschaffen das!“. Dadurch werden Selbstwirksamkeit und das\nSelbstwertgefühl gestärkt.\nKommunikationsbarrieren:\nDie Mutter startet an dem Tag in der Pflegesituation mit folgendem\nSatz: „Nun machen Sie schon, er hat Schmerzen. Und bringen Sie direkt\ndas richtige Medikament.“ Die Anspielung, dass die Pflegefachperson ein…","13":"Berufsgruppe:\n• Orthopädietechniker\n• Sanitätsfachangestellte\n• Physiotherapeuten\nPflegerische Maßnahmen:\n• Kompressionsanzüge müssen maßgefertigt sein\n• Kompressionsbanzüge müssen gut sitzen\n• Oben genanntes Fachpersonal misst den Kompressionsanzug aus\n• Der Kompressionsanzug muss immer getragen werden (außer zur\nKörperpflege, Narbenmassage)\n• Erst wenn die Narben ausgereift sind, Kompressionstherapie\nlangsam reduzieren\n• Mind. zwei passende Garnituren anfertigen lassen, um einen\nWechsel der Garnitur zu ermöglichen\n• Anpassungen je nach Wachstum frühzeitig dem Fachpersonal\naufzeigen\n\n1. Cordes C. Verbrennungen bei Kindern und Jugendlichen.\nProCare, 2021; 5: 30–23.\n2. Deutsche Gesellschaft für Verbrennungsmedizin e. V. (DGV e.\nV.) (Hrsg.). AWMF-S2k-Leitlinie: Leitlinie zur Behandlung\nbrandverletzter Kinder – Thermische Verletzungen im\nKindesalter (Verbrennung, Verbrühung). 2015. Aus:\nhttps://register.awmf.org/assets/guidelines/006-\n128l_S2K_Thermische_Verletzungen_Kinder_2015-\n04-abgelaufen.pdf (letzter Zugriff: 08. April 2023).\n3. Deutsches Netzwerk für Qualitätsentwicklung in der Pflege\n(DNQP) (Hrsg.). Expertenstandard Schmerzmanagement in…"}}]},{"num":15,"title":"Zwölftes Prüfungsbeispiel","tag":"tag1","cases":[{"setting":"Stationäre Langzeitpflege","title":"„Werde ich jemals wieder auf die Beine kommen?“","text":"„Werde ich jemals wieder auf die Beine kommen?“\nHans Böhm ist 97 Jahre alt und lebt seit 10 Jahren im Wällerstift.\nSein Gesundheitszustand hat sich in den letzten vier Wochen\ndeutlich verschlechtert. Die Muskelkraft von Herrn Böhm hat\nstark nachgelassen und er hat bedingt durch die Appetitlosigkeit\nviel Gewicht verloren. Hinzu kommen vermehrte Infekte. Seine\nLeidenschaft, dass Schreiben von Gedichten, fällt ihm durch die\nKonzentrationsschwäche immer schwerer. Zudem fällt ihm des\nÖfteren der Stift aus der Hand. Sie als Pflegefachkraft haben das\nFrailty-Syndrom erkannt und wollten gerade neue pflegerische\nMaßnahmen einleiten, als Herr Böhm stürzt und sich dabei eine\nschwere Fraktur am Oberschenkelknochen zuzieht. Diese wurde\ndirekt in der stationären Akutpflege versorgt und nun kam Herr\nBöhm bettlägerig in Ihre Einrichtung zurück. Das rechte Bein\nkann Herr Böhm kaum noch bewegen und er hat sehr starke\nSchmerzen. Aus diesem Grund wurde er in der stationären\nAkutpflege nicht mobilisiert. Da er sich im Liegen beim Essen oft\nbekleckert, verweigert er zunehmend das Mittagessen, dabei isst er\nam liebsten Spaghetti Bolognese. Auch mit der Verdauung hat er\nnun Probleme. Für Herrn Böhm ist die Benutzung des\nSteckbeckens äußert unangenehm, dadurch hält er vermehrt den\nStuhlgang zurück, was nun zu Obstipationen und Bauchschmerzen\nführt.\nSeine Tochter Ute Meier kümmert sich seit Jahren liebevoll um\nIhren Vater und besucht ihn dreimal pro Woche. Das Herr Böhm\nnun nicht mehr aufstehen kann und nur noch im Bett liegt, macht\nihr große Sorgen. Von einer Nachbarin wurde ihr vom Konzept der\nbasalen Stimulation erzählt. Als Sie heute wieder Ihren Vater\nbesucht, kommt Sie zunächst zu Ihnen ins Büro, wo Sie gerade die\nPflegeplanung von Herrn Böhm überarbeiten. Sie haben heute\nVormittag bereits das geriatrische Assessment bei Herrn Böhm\neingesetzt und passen nun die Pflegeplanung an die neu\nentstandenen Pflegeprobleme an. Als Sie Frau Meier entdecken,…","questions":[{"num":1,"points":15,"text":"Erarbeiten Sie für Herrn Böhm eine Pflegeplanung mit\ndrei Pflegeproblemen (3 P.), jeweils einer Ressource (3 P.),\neinem Pflegeziel (3 P.) und zwei Pflegemaßnahmen (6 P.)."},{"num":2,"points":6,"text":"Nennen Sie drei Ressourcen von Herrn Böhm (3 P.).\nBewerten Sie zudem die Ressourcen bezogen auf die\nFallsituation (3 P.)."},{"num":3,"points":4,"text":"Begründen Sie mit zwei Aspekten, warum es aktuell\nsinnvoll ist, dass Pflegefachfrau Anita eine Evaluation der\nPflegeprozessplanung bei Herrn Böhm durchführt (4 P.)."},{"num":4,"points":4,"text":"Nennen Sie vier mögliche Pflegeprobleme, welche durch\ndie neu aufgetretene Bettlägerigkeit entstehen können,\nwenn Sie an den Schwerpunkt „Prophylaxen“ denken (4\nP.)."},{"num":5,"points":8,"text":"Wählen Sie für Herrn Böhm ein (in Aufgabe 4) genanntes\nPflegeproblem aus, welchem Sie die höchste Priorität\neinräumen (1 P.). Begründen Sie Ihre Auswahl (3 P.).\nNennen Sie anschließend vier Pflegemaßnahmen, welche\ndas Pflegeproblem minimieren können (4 P.)."},{"num":6,"points":6,"text":"Definieren Sie den Begriff Frailty-Syndrom (2 P.) und\narbeiten Sie vier Pflegemaßnahmen heraus, welche das\nSyndrom verhindern können (4 P.)."},{"num":7,"points":4,"text":"Erklären Sie den Unterschied zwischen Bettruhe (2 P.) und\nBettlägerigkeit (2 P.). Stellen Sie die verschiedenen\nMerkmale tabellarisch gegenüber."},{"num":8,"points":15,"text":"Nennen Sie die fünf Phasen der Entstehung der\nBettlägerigkeit (5 P.). Ermitteln Sie anschließend zu jeder\nPhase zwei konkrete Pflegemaßnahmen im Rahmen der\nPrävention (10 P.)."},{"num":9,"points":4,"text":"Listen Sie vier Folgen oder Komplikationen auf, welche\ndurch eine Bettlägerigkeit entstehen können (4 P.)."},{"num":10,"points":6,"text":"Zeigen Sie anhand von drei Aspekten, wieso die korrekte\nUmsetzung der Sprache in einem Informationsgespräch so\nwichtig ist, um die Bezugspersonen zu erreichen (6 P.)."},{"num":11,"points":6,"text":"Beschreiben (3 P.) und begründen (3 P.) Sie, warum das\nKonzept der basalen Stimulation® für Herrn Böhm\ngeeignet ist."},{"num":12,"points":12,"text":"Erläutern Sie Ute Meier vier\nWahrnehmungs-/Kommunikationsangebote der basalen\nStimulation®. Nutzen Sie zur Ausarbeitung jeweils die\nfolgenden drei Aspekte: Erläuterung, Sinnesorgan und ein\nkonkretes Beispiel (12 P.)."},{"num":13,"points":5,"text":"Definieren Sie den Begriff geriatrisches Assessment (2 P.)\nund nennen Sie drei Assessments, welche in diesem\nBereich eingesetzt werden können (3 P.)."},{"num":14,"points":3,"text":"Erarbeiten Sie drei Besonderheiten im Umgang mit\ngeriatrisch zu pflegenden Menschen (3 P.)."},{"num":15,"points":2,"text":"„Anita, werde ich jemals wieder auf die Beine kommen?“\n(Zeile 42). Interpretieren Sie diese Aussage (2 P.)"}],"answers":{"1":"Verwendung einfacher Sprache\nIn einem Informationsgespräch ist es wichtig, dass Sie eine\neinfache Sprache für die Bezugspersonen wählen, sodass sie\nIhre Informationen auch verarbeiten und aufnehmen können.\nSomit ist es wichtig, dass Sie die Muttersprache verwenden und\ndie medizinischen Begriffe mit Umgangssprache umschreiben.\nVerwendung prägnanter Sprache\nIm Gespräch nutzen Sie prägnante, kurze und eindeutige Sätze.\nVon Redundanz ist Abstand zu nehmen.\nZielgruppenorientierte Sprache\nDas Informationsgespräch wird so vorbereitet, dass es auf den\nAdressaten zugeschnitten wird. Das bedeutet, Sie schauen\nvorher, wer beim Gespräch anwesend ist. Kennt sich die\nPerson, mit der Sie das Gespräch führen, mit dem Thema\nbereits aus oder ist es neu?\nAufbau und Gliederung des Gespräches\nIn einem Informationsgespräch wird dieses so aufgebaut, dass\ndie Informationen sinnvoll aufeinander aufbauen und im\nGespräch ein roter Faden zu erkennen ist.","2":"Ressource Fallbezug\nGedichte\n• Die Ressource kann er aktuell durch die\nschreiben\nKonzentrationsschwäche und dem Stift-\nfallen-Lassen nur bedingt einsetzen.\n• Hier könnte man die Tochter einbinden,\nwelche die Gedichte für ihren Vater bei den\nBesuchen aufschreibt, sodass dieser nur\ndiktieren muss.\nLieblingsgericht\n• Das Lieblingsgericht von Herrn Böhm hat\nSpaghetti\nsich nicht geändert.\nBolognese\n• Durch eine korrekte Positionierung im Bett\nund eine ausreichende Bedeckung seiner\nKleidung kann sein Lieblingsgericht\nweiterhin angeboten werden.\n• Alternative Speisen anbieten, die er gerne\nisst.\nTochter Ute\n• Seine Tochter Ute Meier besucht ihn dreimal\nMeier\npro Woche.\n• Diese Ressource wird trotz seiner\nBettlägerigkeit und Veränderungen im\nAllgemeinzustand weiterhin genutzt.\n• Die Tochter ist gewillt, neue pflegerische\nKonzepte anzuwenden, um ihren Vater\netwas Gutes zu tun.\nRessource Fallbezug\nLavendel\n• Diese Ressource kann im Alltag von Hans\nBöhm neu eingesetzt werden.\n• Je nach Bedarf kann Lavendelduft im\nZimmer eingesetzt werden.","3":"Das Frailty-Syndrom führte bei Hans Böhm zu einer deutlichen\nVeränderungen sowie Reduzierung des Allgemeinzustandes. Es sind\nneue Pflegeprobleme aufgetreten, welche eine Überarbeitung der\nPflegeprozessplanung notwendig machen.\nNach einem Aufenthalt in einer anderen\nGesundheitseinrichtung (z. B. stationäre Akutpflege) ist es\nimmer sinnvoll, die Pflegeplanung anzupassen. Aus dem\nVerlegungsbericht können neue Informationen und Veränderungen\ndes Gesundheitszustandes gewonnen und eingearbeitet werden.","4":"• Dekubitus\n• Kontrakturen\n• Pneumonie\n• Thrombose\n• Intertrigo\n• Obstipation","5":"Die höchste Priorität hat das mögliche Pflegeproblem des\nDekubitus.\nBegründung:\nHerr Böhm ist seit dem Sturz bettlägerig und in seiner Bewegung\nstark eingeschränkt. Zudem kann er sein rechtes Bein kaum\nbewegen, sodass er vor allem an der rechten Ferse stark\ndekubitusgefährdet ist.\nPflegemaßnahmen:\n• Weichlagerungsmatratze nach ärztlicher Anordnung\norganisieren.\n• Zunächst passive, dann im weiteren Verlauf aktive\nBewegungsübungen durchführen. Dabei Kontraindikationen\nbeachten.\n• Bewegungsförderungsplan erstellen.\n• Die Eigenbewegungen von Herrn Böhm fördern.\n• Mikropositionierungen anwenden.","6":"Definition:\n„Die Altersschwäche wird auch als Frailty-Syndrom – von engl.\nfrailty ≈ „Gebrechlichkeit“ – bezeichnet“ (Amboss 2023).","7":"Bettruhe Bettlägerigkeit\n• Bettruhe ist • Bettlägerigkeit ist häufig\nvorübergehend langfristiger\n• Wird zur körperlichen • Der zu pflegende Mensch liegt\nSchonung angewendet die meiste Zeit im Bett\n• Die Bettruhe wird von den • Selbst das Sitzen findet\nÄrzten deutlich weniger vermehrt im Bett mit\nund immer kürzer verschiedenen\nverordnet Positionsmöglichkeiten statt","8":"Phase der Präventive Pflegemaßnahmen\nBettlägerigkeit","11":"Beschreibung des Konzeptes:\nDie Basale Stimulation® ist ein therapeutisches, pflegerisches\nsowie pädagogisches Konzept. Das Konzept fördert zu\npflegende Menschen mit einer ganzheitlichen körperbezogenen\nKommunikation. Durch verschiedene Angebote wird die\nOrientierung, (um sich selbst und/oder um die Abgrenzung des\nKörpers und seiner Umgebung) wieder spürbar gemacht.\nBegründung:\n• Es fördert beeinträchtigte Menschen mit Wahrnehmungs-,\nKommunikations- und Bewegungsveränderungen. Bei Herrn\nBöhm trifft der letzte Schwerpunkt zu.\n• Autonomie und Verantwortung erleben und fördern. Bedingt\ndurch die neu entstandene Bettlägerigkeit ist die Möglichkeit\nder Autonomieförderung in andern Bereichen für Herrn\nBöhm wichtig.\n• Leben erhalten und Entwicklung erfahren. Die Tochter von\nHerrn Böhm möchte weiterhin ihren Vater unterstützen und\nihn bei Positionsveränderungen im Bett fördern. Mit diesem\nKonzept kann sie ihn weiterhin unterstützen und das Leben\n(auch im Bett) weiter unterstützen.","12":"Angebot Erläuterung, Sinnesorgan und\nBeispiel\nAuditive/akustische\n• Erfahrungen hören lassen\nStimulation\n• Hörsinn (z. B. Geräusche, Musik hören,\nSingen, Vorlesen)\nGustatorische/orale\n• Erfahrungen schmecken lassen\nStimulation\n• Geschmackssinn (z.B. Kausäckchen,\nFlüssigkeiten, Fruchtsauger,\nLieblingsessen)\nOlfaktorische\n• Erfahrungen riechen lassen\nStimulation\n• Geruchsinn (z.B. Aromatherapie,\nHeimatgerüche, Düfte)\nTaktil-haptische\n• Erfahrungen tasten lassen\nStimulation\n• Tastsinn (z.B. Betasten/Greifen von\nGegenständen, die sich in Form, Größe\nund Oberflächenbeschaffenheit\nunterscheiden)\nVisuelle\n• Erfahrungen sehen lassen\nStimulation\n• Sehsinn (z.B. Bilder, Filme, Fotos)","13":"• Ältere Menschen können in neuer Umgebung verunsichert\nsein. Daher sollten immer wiederkehrende und gleiche\nHandlungsabläufe in die Versorgung geriatrischer zu\npflegender Menschen eingebaut und durchgeführt werden.\n• Auch geriatrisch zu pflegende Menschen haben Ressourcen\nund Fördermöglichkeiten. Daher ist eine aktivierende und\nfördernde Pflege angesagt.\n• Geriatrisch zu pflegende Menschen sind in hohem Maß von\nder Umgebung beeinflusst. Ein angenehmes Umfeld\nunterstützt die Situation und das Wohlbefinden.\n• Geriatrisch zu pflegende Menschen brauchen in besonderem\nMaß soziale Kontakte. Diese sollten ermöglicht und\nBezugspersonen eingebunden werden.\n\n1. Amboss. Übersicht Geriatrie. Aus:\nhttps://www.amboss.com/de/wissen/%C3%9Cb\nersicht_Geriatrie (letzter Zugriff: 28.04.2023).\n2. Bienstein C, Fröhlich A. Basale Stimulation® in der\nPflege – Die Grundlagen. 8. Aufl. Bern: Hogrefe, 2016.\n3. Deutsches Netzwerk für Qualitätsentwicklung in der\nPflege (DNQP) (Hrsg.). Expertenstandard\nDekubitusprophylaxe in der Pflege. 2. Akt. Osnabrück:\nDNQP, 2017."}}]}],"tag2":[{"num":4,"title":"Erstes Prüfungsbeispiel","tag":"tag2","cases":[{"setting":"Stationäre Langzeitpflege","title":"„Wie soll es nur weitergehen?“","text":"„Wie soll es nur weitergehen?“\nSie sind in der Seniorenresidenz „Zur Sonne“ im Raum Fürth als\nPflegefachperson tätig. Seit letzter Woche betreuen Sie auch den\n72-jährigen Bernhard Müller, der zu Ihnen aus einer\nneurologischen Rehaeinrichtung kam. Herr Müller erlitt vor\nwenigen Wochen einen Schlaganfall. Nach einer Lysetherapie im\nKrankenhaus und anschließender Überwachung auf der Stroke-\nUnit kam er auf die neurologische Reha, um dort, wie die Ärzte\nsagten, wiederhergestellt zu werden. Herr Müller lebte bislang\nzusammen mit seiner Ehefrau im Eigenheim. Er war gesund und\nfit trotz seines Diabetes mellitus Typ 2 und erhöhter Blutdruck-\nund Cholesterinwerte, die mit Tabletten behandelt wurden.\nAufgrund der körperlichen Einschränkungen nach dem\nSchlaganfall traut sich die Ehefrau die Versorgung zu Hause nicht\nzu; zudem hat sie Angst, ihr Mann könnte erneut einen\nSchlaganfall bekommen. Herr Müller kann seine rechte\nKörperhälfte bislang nur eingeschränkt aktivieren. Seinen rechten\nArm kann er aus der Schulter heraus bewegen und bis etwa zur\nHälfte anheben. Es fällt ihm jedoch schwer, Gegenstände wie eine\nZahnbürste in die Hand zu nehmen und fest zu umgreifen. Auch\nseine Insulininjektionen kann er aufgrund fehlender Sensibilität in\nder rechten Hand kaum durchführen und ist auf Unterstützung\nangewiesen. Bei der Mobilisation kann Herr Müller das rechte\nBein gut einsetzen. Es gelingt ihm, sein Körpergewicht weitgehend\neigenständig zu übernehmen. Dabei kann er die Stabilität teilweise\nhalten und Bewegungsübergänge mit Hilfsmitteln durchführen.\nDa er die Bewegungen aber immer sehr schnell ausführt, ist der\nTransfer meist wackelig, was ihn verunsichert. Deshalb ist eine\nHilfestellung durch die Pflegefachpersonen notwendig.\nAls Sie Herrn Müller heute Morgen bei der Vorbereitung seines\nFrühstücks unterstützten, wirkte er sehr niedergeschlagen:\n„Schauen Sie mich doch an, nichts ist wie früher. Jetzt sitze ich im\nAltenheim, und nicht einmal zum Rauchen kann ich allein gehen.…","questions":[{"num":1,"points":10,"text":"Verfassen Sie eine Pflegeplanung für Herrn Müller und\nberücksichtigen Sie dabei seine individuellen\nPflegeprobleme (2 P.) und Ressourcen (2 P.). Formulieren\nSie problemorientierte Pflegeziele (2 P.) und geeignete\nPflegemaßnahmen (4 P.). Legen Sie Ihren Schwerpunkt\ndabei auf die Mobilisation und die Körperpflege."},{"num":2,"points":6,"text":"Erklären Sie Herrn Müller die Notwendigkeit des\nAufenthalts auf der Stroke-Unit. Nennen Sie ihm die\nwesentlichen Vitalparameter, die auf einer Stroke-Unit\nüberwacht werden (3 P.) und begründen Sie, warum diese\nerhoben werden (3 P.)."},{"num":3,"points":4,"text":"Erklären Sie Frau Müller, anhand welcher Merkmale es ihr\nals Laiin möglich ist, einen weiteren Schlaganfall bei ihrem\nMann zu erkennen."},{"num":4,"points":7,"text":"Geben Sie die zwei Formen eines Schlaganfalls an und\ndifferenzieren Sie diese (4 P.). Begründen Sie, welche\nForm bei Herrn Müller (2 P.) vorliegt. Nennen Sie\nanschließen das diagnostische Verfahren, welches die\nBestimmung des Krankheitsbilds ermöglicht (1 P.)."},{"num":5,"points":5,"text":"Herr Müller erhielt im Krankenhaus eine Lysetherapie.\nBeschreiben Sie das Verfahren einer Lysetherapie und\ngeben Sie das Zeitfenster, das zu beachten ist, an (2 P.).\nErläutern Sie, welche pflegerischen Maßnahmen nach\neiner Lyse indiziert sind (3 P.)."},{"num":6,"points":6,"text":"Sie wollen das Ehepaar über Herrn Müllers Risiken und\npräventive Maßnahmen informieren. Zeigen Sie zwei\nRisikofaktoren (2 P.) von Herrn Müller mit der jeweils\ngeeigneten Präventionsmaßnahme auf (2 P.). Benennen Sie\nzudem die jeweilige Präventionsform (2 P.)."},{"num":7,"points":9,"text":"Herr Müller möchte bald wieder nach Hause. Nennen Sie\nein therapeutisch aktivierendes Bewegungskonzept (1 P.),\nmit welchem Herr Müller seine Selbstständigkeit\nwiedererlangen kann. Skizzieren Sie die Ziele dieses\nKonzepts (3 P.) und leiten Sie daraus konkrete\nHandlungen ab, die Sie bei der Pflege von Herrn Müller\nanwenden (3 P.). Analysieren Sie anschließend den Begriff\n24-Stunden-Konzept (2 P.)."},{"num":8,"points":3,"text":"Herr Müller möchte gern wieder nach Hause, seine Frau\nbestärkt ihn darin. Formulieren Sie\nUnterstützungsmöglichkeiten, um die häusliche\nVersorgung zu gewährleisten."}],"answers":{"1":"Mobilisation\n• Pflegeproblem: Herr Müller hat eine Hemiparese der rechten Körperhälfte.\nDie Lähmung betrifft sowohl den Arm als auch das rechte Bein, deshalb\nbraucht Herr Müller Unterstützung beim Transfer.\n• Ressource: Herr Müller kann den Muskeltonus im rechten Bein gut\nregulieren und für eine kurze Zeit sein Gewicht auf dieses Bein verlagern.\n• Pflegeziel:\n– Nahziel: Herr Müller wird in der Früh- und in der Spätschicht in den\nRollstuhl mobilisiert.\n– Fernziel: Herr Müller kann bis zum XX.XX.XXXX allein den Transfer in\nden Rollstuhl durchführen.\n• Pflegemaßnahmen:\n– Herr Müller wird mit Unterstützung der Pflegefachperson und den\ngeeigneten Hilfsmitteln (z. B. einem Hocker) am Morgen in den Rollstuhl\ntransferiert.\n– Der Transfer erfolgt langsam und in Ruhe, um die Unsicherheit zu\nminimieren.\nKörperpflege\n• Pflegeproblem: Herr Müller hat eine Hemiparese der rechten Körperhälfte.\nDie Lähmung betrifft sowohl den Arm als auch das rechte Bein, weshalb Herr\nMüller Unterstützung bei der Körperpflege braucht.\n• Ressource: Herr Müller kann seinen rechten Arm bis zur Hälfte anheben\nund somit seinen Oberkörper großteils selbst waschen.\n• Pflegeziel:…","2":"Stroke-Unit\nDie Stroke-Unit ist eine auf Schlaganfall spezialisierte Abteilung. Herr Müller\nmusste auf der Stroke-Unit (Schlaganfallstation) aufgrund des Schlaganfalls\nüberwacht werden.\nÜberwachungsmaßnahmen auf einer Stroke-Unit (Monitoring)\n• Blutdruck: Bis zu 70 % der Schlaganfallpatienten haben in der Akutphase\nhypertensive Blutdruckwerte.\n• Herzfrequenz: Ausschluss von Rhythmusstörungen.\n• Körpertemperatur: Bereits ein Anstieg der Körpertemperatur von 1 °C\nerhöht das Risiko für weitere zerebrale Schäden.\n• Neurologischer Status: Verschlechterungen frühzeitig erkennen.","3":"Formen eines Schlaganfalls\n• Hirninfarkt:\n– Bei etwa 85 % aller Schlaganfälle.\n– Entsteht durch einen Verschluss oder Verengung (Stenose) einer\nHirnarterie bzw. einer das Gehirn versorgenden Arterie, z. B. Arteria\ncarotis communis, mit der Folge einer Minderdurchblutung\n(Sauerstoffunterversorgung) des betroffenen Gehirnareals.\n• Hirnblutung (hämorrhagischer Schlaganfall): Entsteht durch ein\nruptiertes Blutgefäß. Im angrenzenden Gebiet kommt es dadurch zu einer\nSauerstoffunterversorgung.\nFolge beider Formen des Schlaganfalls sind aufgrund der Minderversorgung der\nHirnareale Zellschäden/Zelluntergänge der betroffenen Gebiete. Die Symptome sind\nje nach betroffenem Areal unterschiedlich.\nFallbezug\nHerr Müller hatte einen Hirninfarkt. Dies ist an der Lysetherapie festzumachen.\nDiagnostisches Verfahren\nKranielle Computertomografie (CCT): Wird als Erstdiagnostik durchgeführt, um\neine Differenzierung zwischen einer Blutung oder einem Infarkt zu ermöglichen.\nTipp\nEine Blutung ist im CCT an einem weißen Schatten erkennbar.","5":"Lysetherapie\nBei der (Thrombo-)Lysetherapie soll der Thrombus, der den Gefäßverschluss\nverursacht, beseitigt werden. Das Zeitfenster für eine Lyse ist auf 4,5 Stunden\nfestgelegt.\nPflegerische Maßnahmen\n• Auf Blutungszeichen achten.\n• Vitalzeichen kontrollieren.\n• Keine Maßnahmen ergreifen, die eine Verletzung nach sich ziehen könnten (z.\nB. Nägel schneiden usw.).\n• Aufgrund der Bewegungseinschränkung sind verschiedene Prophylaxen\ndurchzuführen.\nTipp\nBei einer systemischen Lyse werden gerinnungshemmende\nMedikamente über die Vene verabreicht. Damit wirkt die Lyse\nim gesamten Organismus.\nBei der lokalen Lyse wird mittels eines Katheters das\ngerinnungshemmende Medikament direkt in das verschlossene\nGefäß indiziert.","6":"Risikofaktor Präventionsmaßnahme Präventionsform\nBluthochdruck Sekundäre\n• Salzarme Kost\nPrävention\n• Steigerung der Bewegung\n(Maßnahmen zum\n• Regelmäßige Blutdruckkontrollen\nSenken des\nRisikofaktors)\nDiabetes mellitus Typ Tertiäre\n• Patientenschulung\n2 Prävention\n• Ernährungsberatung\n• Konsequente Therapie\nSekundäre\n• Kontrolle des HbA1c-Werts alle 3\nPrävention\nMonate\n(Maßnahmen zum\nSenken des\nRisikofaktors)\nHypercholesterinämie Sekundäre\n• Fettarme Kost\nPrävention\n• Regelmäßige Kontrolle des\n(Maßnahmen zum\nCholesterinwerts (LDL)\nSenken des\nRisikofaktors)\nTertiäre\n• Ernährungsberatung\nPrävention\nRauchen Sekundäre\n• Rauchverbot/Raucherentwöhnung\nPrävention\n(Maßnahme zum\nSenken des\nRisikofaktors)\nTipp\nPrimärprävention zielt darauf ab, Krankheitsentstehungen\nzu verhindern.\nSekundärprävention richtet sich auf die Früherkennung\nvon Krankheiten.\nTertiärprävention hat das Ziel, die Folgen einer Krankheit\nzu vermeiden bzw. so gering wie möglich zu halten. Sie ist\nidentisch mit der medizinischen Rehabilitation.","7":"Bewegungskonzept\nBei der Diagnose Schlaganfall wird häufig das Bobath-Konzept angewendet. Die zu\npflegende Person wird in den Aktivitäten des täglichen Lebens unterstützt mit dem\nZiel, ihre Selbstständigkeit zu fördern.\nZiele und Pflegehandlungen\n• Anbahnung von normalen Bewegungsabläufen für Alltagshandlungen:\nErkennen und gezieltes Einsetzen von Ressourcen des Patienten, z. B. Üben\ndes Transfers, da Herr Müller auf dem rechten Bein stehen kann. Ihn dabei\nmotivieren und anhalten, die Bewegung so langsam wie nötig auszuführen,\ndamit er das Gleichgewicht gut halten kann.\n• Normalisierung des Muskeltonus: Auf Herrn Müller eingehen, d. h., ihm die\nZeit geben, die er für die Ausführung der Bewegung braucht, und ihm ein\nAngebot an physiologischen Bewegungsabläufen machen.\n• Förderung der Körperwahrnehmung: z. B. Mitführen des linken Arms beim\nAn- und Auskleiden, der Körperpflege etc., Unterstützung des linken Beins\nbeim Transfer, Einsatz von rauen Waschlappen und Handtüchern bei der\nKörperpflege, Durchführen von basal stimulierender Waschung, belebender\nGanzkörperwaschung.\n24-Stunden-Konzept\nDie Behandlung des zu pflegenden Menschen nach diesem Konzept erfolgt…","8":"• Versorgungskonzepte wie Tagespflege, Kurzzeitpflege oder ambulanter\nPflegedienst\n• Ambulante Ergo- und Physiotherapie\n• Schulung (für pflegende Angehörige) von Frau Müller\n• Information über Hilfsmittel (Rollator, Rollstuhl, Badewannenlifter,\nHaltestangen usw.)\n• Umgestaltung des Wohnraums:\n– Rutschfester Bodenbelag\n– Handläufe\n– Ggf. Umbaumaßnahmen z. B. Badezimmer\n• Selbsthilfegruppen auch für Angehörige\nTipp\nPflegeversicherung (SGB XI): Finanzierung benötigter\nUnterstützung, z. B. durch Pflegesachleistungen (§ 36 SGB XI)\nund Pflegegeld (§ 37 SGB XI) oder eine Kombinationsleistung\naus Geld- und Sachleistungen (§ 38 SGB XI).\nLiteratur\n1. Bundesministerium für Gesundheit. Prävention. 2019. Aus:\nwww.bundesgesundheitsministerium.de/service/begriffe-von-\na-z/p/praevention.html (letzter Zugriff: 22.6.2023).\n2. Dammshäuser B. Bobath-Konzept in der Pflege. Grundlagen,\nProblemerkennung und Praxis. 2. A. München: Elsevier, 2012.\n3. Fachredaktion Thieme et al. Pflege von Menschen mit Erkrankungen des\nNervensystems. In: I care. Pflege. 2. A. Stuttgart: Thieme, 2020. S. 1226–\n1279.\n4. Fiedler C, Körmann M, Kollmar R (Hrsg.). Pflegewissen Stroke Unit. Für…"}},{"setting":"Ambulante Langzeitpflege","title":"„eingesperrt“","text":"Zu Hause „eingesperrt“\nSie arbeiten als Pflegefachperson bei „Pflege ohne Grenzen“,\neinem ambulanten Pflegedienst in Neuendettelsau, und sind auf\ndem Weg zu dem 25-jährigen Stefan Wiesinger. Sie versorgen\nHerrn Wiesinger schon seit einigen Jahren und wissen daher\nFolgendes:\nStefan Wiesinger kam vor 6 Jahren bei einem Motorradausflug\nmit Freunden in einer Kurve von der Straße ab und schleuderte\ngegen einen Lastwagen. Er erlitt ein Schädel-Hirn-Trauma und\nzahlreiche Begleitverletzungen, sodass er bis heute\nschwerstbehindert ist. Er wohnt mit seiner Mutter und seinem\nVater in einem Einfamilienhaus.\nHerr Wiesinger kann sich sprachlich zwar verständlich machen,\nhat aber Schwierigkeiten, sich klar zu artikulieren. Seine Mutter\nversteht ihn am besten. Er hat spastische Lähmungen, vor allem\nder unteren Extremitäten. Er kann nicht gehen und sitzt tagsüber\nim Rollstuhl. Die Lähmungen betreffen auch seine Kau- und\nSchluckmotorik, sodass ihm nach einer perkutanen\nendoskopischen Gastrostomie (PEG) eine Sonde gelegt wurde.\nSchon mehrfach musste er wegen einer Aspirationspneumonie\nstationär behandelt werden.\nHerrn Wiesingers Tagesablauf ist strukturiert durch feste Zeiten\nfür die Körperpflege, die Physiotherapie und die\nNahrungsaufnahme. Seine Mutter versucht, ihm zusätzlich selbst\ngekochte Gerichte einzugeben. Er sieht gern fern und spielt am\nComputer. Er entwickelt und programmiert auch selbst.\nFür Herrn Wiesinger gibt es immer wieder Zeiten, in denen er\nsich ernsthaft die Frage stellt, ob sein Leben so überhaupt noch\neinen Sinn ergibt. Er hat Sie auch schon einmal gebeten, ihm\netwas zu geben, damit er nicht mehr weiterleben muss.\nAls Sie heute mit ihren Tätigkeiten bei Herrn Wiesinger fertig\nsind, unterhalten Sie sich noch ein wenig mit ihm. Es kommt, wie\nschon des Öfteren, die Möglichkeit eines Umzugs in ein betreutes\nWohnen zur Sprache, da Herr Wiesinger nach Meinung einiger\nIhrer Kollegen lernen sollte, mit anderen Menschen mit…","questions":[{"num":1,"points":14,"text":"Nennen Sie vier Prophylaxen, die Sie in die Durchführung\nder Körperpflege bei Herrn Wiesinger integrieren können,\nund wählen Sie zwei aus, für welche Sie im Rahmen einer\nPflegeplanung ein Problem, eine Ressource, ein Ziel und je\nzwei Maßnahmen ermitteln."},{"num":2,"points":8,"text":"Geben Sie Herrn Wiesingers Mutter fünf hilfreiche Tipps\nfür den Umgang mit Herrn Wiesingers Schluckstörungen\nund nennen Sie ihr drei Sofortmaßnahmen im Falle eines\nVerschluckens."},{"num":3,"points":8,"text":"Vergleichen Sie Herrn Wiesingers derzeitige\nWohnsituation mit dem betreuten Wohnen hinsichtlich\nder Vor- und Nachteile."},{"num":4,"points":5,"text":"Erläutern Sie Herrn Wiesinger den Begriff „assistierter\nSuizid“ und dessen aktuelle rechtliche Grundlage in\nDeutschland."},{"num":5,"points":5,"text":"Interpretieren Sie die Störung der Familiengesundheit von\nFamilie Wiesinger anhand der Theorie der „familien- und\numweltbezogenen Pflege“ von Marie-Luise Friedemann."},{"num":6,"points":6,"text":"Skizzieren Sie die UN-Behindertenrechtskonvention und\nderen Ziel."},{"num":7,"points":4,"text":"Definieren Sie den European Accessibility Act (2 P.) und\nbeurteilen Sie dessen Bedeutung für Herrn Wiesinger (2\nP.)."}],"answers":{"2":"• Vorteile des Einfamilienhauses und Wohnen bei den Eltern:\n– Familiäre Einbindung bleibt erhalten.\n– Gewohnte Umgebung.\n– Kostengünstiges Wohnen.\n• Nachteile des Einfamilienhauses und Wohnen bei den Eltern:\n– Es besteht keine Möglichkeit, sich von den Eltern abzulösen.\n– Herrn Wiesinger ist es nur schwer möglich, neue Bekanntschaften zu\nmachen und neue Beziehungen aufzubauen.\n– Eltern als Ressourcen sind endlich.\n• Vorteile des betreuten Wohnens:\n– Herr Wiesinger bekommt Kontakt zu ebenfalls Betroffenen.\n– Herr Wiesinger kann neue Beziehungen aufbauen und sich von den\nEltern ablösen.\n– Herr Wiesinger wird professionell versorgt.\n• Nachteile des betreuten Wohnens:\n– Der finanzielle Aufwand für die Versorgung ist hoch.\n– Das Pflege- und Betreuungspersonal wechselt, Herr Wiesinger muss sich\nauf wechselndes Fachpersonal einstellen.\n– Herr Wiesinger muss sich mit seinen Mitbewohnern und\nMitbewohnerinnen arrangieren.","4":"Assistierter Suizid\nUnter einem assistierten Suizid versteht man die „Beihilfe zur Selbsttötung“. Der\nSterbewillige nimmt selbstständig eine Substanz zur Selbsttötung ein. Eine andere\nPerson, d. h. ein Angehöriger oder nahestehender Mensch, ein Arzt oder eine\nSterbehelferin hat hierzu einen Beitrag geleistet, z. B. die tödliche Substanz zur\nVerfügung gestellt.\nRechtslage\n• In Deutschland ist die Selbsttötung nicht strafbar, also auch die Beihilfe zur\nSelbsttötung nicht.\n• Dies hat das Bundesverfassungsgericht mit Urteil vom 26.02.2020\nausdrücklich bestätigt und das strafrechtliche Verbot geschäftsmäßiger\nSuizidassistenz für verfassungswidrig erklärt.\n• Aktuell wird in Politik und Gesellschaft über den sich aus dem Urteil\nergebenden gesetzgeberischen Handlungsbedarf diskutiert.","5":"• Eine Familie ist gesund, wenn in allen vier Prozessdimensionen gehandelt\nwird, Kongruenz innerhalb der Familie und zwischen der Familie und der\nUmwelt besteht, die Familienmitglieder wenig Angst empfinden und mit der\nFamilie im Großen und Ganzen zufrieden sind.\n• Die Familie Wiesinger ist nicht mehr kohärent: Die Mutter hat Angst um ihren\nSohn, Herr Wiesinger hat Angst, sich nicht von seinen Eltern lösen zu\nkönnen. Dies führt sogar so weit, dass er Suizidgedanken hat.\n• Herr Wiesinger scheint mit seiner Familiensituation nicht zufrieden zu sein.\n• Aufgrund dieser Störung kann sich die Familie nicht in die Umwelt\neingliedern, weshalb eine Systemänderung der Familie vonnöten wäre.\n• Aus diesem Grund ist die Systemerhaltung der Familie Wiesinger gefährdet.","6":"UN-Behindertenrechtskonvention\n• 2006 wurde bei der Generalversammlung der Vereinten Nationen (UN) das\nÜbereinkommen über die Rechte von Menschen mit Behinderung\n(Behindertenrechtskonvention, BRK) verabschiedet.\n• Dieses trat 2008 in Deutschland in Kraft und ist ein abgeschlossener Vertrag\nvon derzeit 187 Staaten weltweit [6].\n• Um die Position und insbesondere Teilhabe an der Gesellschaft von Menschen\nmit Behinderung zu verbessern, wurde das Konzept der Inklusion entwickelt.\n• Inklusion beinhaltet u. a. eine unabhängige Lebensführung und die\nEinbeziehung in die Gesellschaft.\nZiel\nDie UN-Behindertenrechtskonvention hat drei Hauptziele, um die Rechte von\nMenschen mit Behinderung zu fördern, zu schützen und zu gewährleisten, sodass\nihnen die gleichberechtigte Teilhabe bzw. die Teilnahme am gesellschaftlichen Leben\nermöglicht wird.\n• Gleichberechtigung und Nichtdiskriminierung: Menschen mit\nBehinderung sollen in allen Lebensbereichen gleichberechtigt sein und keine\nBenachteiligung (rechtlich oder sozial) aufgrund ihrer Behinderung erfahren.\n• Teilhabe und Inklusion: Menschen mit Behinderung sind in die\nGesellschaft zu integrieren durch Ermöglichung von gleichberechtigtem…","7":"Definition\n• Der European Accessibiltiy Act ist eine europäische Richtlinie.\n• Sie ist Aufforderung an die nationalen Gesetzgeber, neue Gesetze zu\nverabschieden und ggf. alte zu ändern, um das Ziel der Richtlinie – in diesem\nFall die Barrierefreiheit – zu erfüllen.\n• Die nationalen Gesetze für Barrierefreiheit, wie vom European Accessibility\nAct gefordert, sollten spätestens ab Juli 2025 angewandt werden.\nBedeutung der Barrierefreiheit für Herrn Wiesinger\n• Hardware-Produkte (Computer, Smartphones, Notebooks und Weiteres):\nHerr Wiesinger verbringt sehr viel Zeit am Computer, die Arbeit würde ihm\nhier erleichtert werden. Gegebenenfalls könnte er auch wieder einem Beruf\nnachgehen."}}]},{"num":5,"title":"Zweites Prüfungsbeispiel","tag":"tag2","cases":[{"setting":"Stationäre Langzeitpflege","title":"„Alpenhof“","text":"Atemtraining statt Urlaub\nSie arbeiten als Pflegefachperson im Seniorenzentrum „Alpenhof“.\nSeit heute Vormittag wohnt der 92-jährige Karl-Heinz Wagner bei\nIhnen im „gelben Bereich“. Der geistig fitte Bewohner kennt sich\nim Seniorenzentrum gut aus. Seit einigen Jahren durfte er hier im\nSommer, wenn seine Tochter verreiste, „Urlaub machen“, wie er es\nselbst nannte. Dann spielte er am liebsten mit Herrn Bayer\nSchach. Zu Spaziergängen musste Herr Wagner dagegen stets\nüberredet werden, wobei er mit seinem Rollator sicher mobil ist.\nUm Herrn Wagners Pflege planen zu können, suchen Sie für das\nAufnahmegespräch Herrn Wagner in seinem Zimmer auf. Seine\nTochter hat bereits einen Sessel und eine Kommode von zu Hause\ngebracht. Auch ein paar Bilder, das Schachspiel und einige\nGegenstände hat sie im Zimmer verteilt, sodass es wohnlich und\ngemütlich wirkt. Auf dem Tisch steht ein Atemtrainer.\nHerr Wagner hat bislang allein in seiner Wohnung gelebt. Die\nTochter wohnt im gleichen Haus und musste ihn im Alltag kaum\nunterstützen. Gelegentlich ging sie für ihren Vater einkaufen,\nübernahm die Wäsche und unterstützte ihn, wenn er baden wollte.\nDann aber zog sich Herr Wagner eine Rippenfraktur beim\nApfelpflücken zu. Er erzählt: „Meine Tochter hat sehr mit mir\ngeschimpft. Und in der folgenden Nacht hatte ich solche\nSchmerzen, die wünscht man niemandem. Mein Hausarzt, Dr.\nBär, hat mir dann Tabletten verschrieben, die haben mich\numgehauen, sag‘ ich Ihnen. Da war ich im Niemandsland. Die\nwaren einfach zu stark. Und als ich dann wieder bei Sinnen war,\nhatte ich so einen Husten, wissen Sie. Wenn ich richtig\ndurchgeatmet habe, dann hatte ich wieder so starke Schmerzen, so\nals wenn einem jemand ein Messer in die Brust rammt. Die\nCharlotte, also meine Tochter, hat mich dann ins Krankenhaus\ngebracht. Das war auch gut so. Das mit der Luft ist einfach immer\nnoch nicht gut!“\nSie nehmen eine Atembeobachtung vor und fordern Herrn\nWagner aufgrund seiner Aussage auf, mit seinem Atemtrainer zu…","questions":[{"num":1,"points":6,"text":"Geben Sie die Kriterien an, die Sie bei der\nAtembeobachtung von Herrn Wagner berücksichtigen."},{"num":2,"points":12,"text":"Beschreiben Sie Herrn Wagner die Wirkweisen des\nMEDIFLO®-Duo-Atemtrainers (4 P.) und schildern Sie den\nAblauf der Anwendung (8 P.)."},{"num":3,"points":6,"text":"Belegen Sie anhand der Fallsituation die Ursachen, die bei\nHerrn Wagner möglicherweise zu einer Pneumonie\nführten (3 P.). Geben Sie neben der Atemübung mit dem\nAtemtrainer drei weitere konkrete Pflegemaßnahmen an,\ndie Sie bei Herrn Wagner aufgrund seiner Pneumonie\ndurchführen (3 P.)."},{"num":4,"points":6,"text":"Skizzieren Sie, was unter dem Konzept des\nStrukturmodells zu verstehen ist."},{"num":5,"points":10,"text":"Ermitteln Sie im Rahmen des Aufnahmegesprächs Herrn\nWagners Pflegesituation anhand der Strukturierten\nInformationssammlung (SIS)."},{"num":6,"points":6,"text":"Erläutern Sie den dynamischen Gesundheitsbegriff von M.\nKrohwinkel auf der Grundlage der Fallsituation."},{"num":7,"points":4,"text":"„Tu doch nicht so! Du hast doch den Sauerstoff in der Nase,\nda bekommst du doch genügend Luft!“ Nehmen Sie zu\ndieser Aussage der Tochter kritisch Stellung."}],"answers":{"1":"• Die WHO beschreibt den Gesundheitsbegriff als Vollkommenheit des\ngesamten menschlichen Umfelds. Diese Bedingungen sind jedoch in\nVollkommenheit bei kaum einen Menschen zu finden, deshalb sieht M.\nKrohwinkel diese Definition als utopisch, d. h. unerreichbar, an.\nTipp\nGesundheitsbegriff der WHO\n„Gesundheit ist der Zustand des vollständigen körperlichen,\ngeistigen und sozialen Wohlbefindens und nicht nur das\nFreisein von Krankheit und Gebrechen. Das Erreichen des\nhöchstmöglichen Gesundheitsniveaus ist eines der Grundrechte\njedes Menschen, ohne Unterschied der ethnischen\nZugehörigkeit [original: ‚race‘], der Religion, der politischen\nÜberzeugung, der wirtschaftlichen oder sozialen Stellung.“ [4]\n• Aus dieser Illusion entwickelte M. Krohwinkel einen dynamischen und\numfassenden Gesundheitsbegriff. Dabei liegt der Fokus nicht auf den\nDefiziten, sondern auf den Fähigkeiten.\n• Nach diesem Verständnis kann sich Herr Wagner mit der Pneumonie als\ngesund begreifen, wenn er und sein soziales Umfeld lernen, das Defizit mit\nseinen Fähigkeiten zu kompensieren, er sich wohlfühlt und als unabhängig\nerfährt.\nTipp\nDynamischer Gesundheitsbegriff nach M. Krohwinkel…","2":"Wirkweisen\nDer MEDIFLO® duo ist ein Atemtrainer für die inspiratorische (SMI) sowie die\nexspiratorische (PEP) Atemtherapie.\n• Exspiratorische Atemtrainer (PEP-Trainer) erzeugen einen Widerstand\nbei der Ausatmung (Positive Expiratory Pressure, PEP), was die Atemwege\nstabilisiert und erweitert und die Atemmuskulatur trainiert. Der entstehende\npositive Druck dient der Verhinderung eines Bronchialkollapses\n(Zusammenfallen der Bronchialwände beim Ausatmen), und das\nAusatemtraining mobilisiert vor allem die Atemwegssekrete und unterstützt\nderen Abtransport.\n• Inspiratorische Atemtrainer (SMI-Trainer) trainieren eine gleichmäßige,\ntiefe Einatmung (Sustained Maximal Inspiration) mit dem Ziel, das\nLungenvolumen verstärkt auszunutzen.\nAnwendung\n• Im Sitzen oder mit erhöht positioniertem Oberkörper und Rückenstütze\ntrainieren.\n• Atemtrainer für das entsprechende Training vorbereiten:\n– Schlauch ggf. umstecken.\n– Stärke einstellen.\n• Eine Hand hält den Atemtrainer, die andere das Mundstück.\n• Mundstück mit den Lippen dicht umschließen, dabei Atemtrainer aufrecht\nhalten.\n• PEP-Training:\n– Tief einatmen.\n– In das Gerät langsam und gleichmäßig ausatmen, dabei bleibt der…","3":"Ursachen Maßnahmen\n• Ungünstige Positionierung → • Mobilisation im Stuhl, statt im Bett\nHerabrutschen im Bett bei erhöhter sitzend (wirkt einem Abknicken und\nOberkörperpositionierung im einer Kompression des Thorax\nKrankenhaus entgegen)\n• Erschöpfung, Störungen des • Mobilisation mit Rollator\nAtemzentrums (Opiate) durch zu • Effektive Schmerzmitteltherapie\nhoch dosierte Morphintabletten (nach ärztlicher Anordnung) →\n• Schmerzbedingte Schonatmung → Einnahme nach der Uhr!\nRippenfraktur • Atemübungen und Atemtraining, z. B.\ndosierte Lippenbremse\n• Atemunterstützende Positionen:\n– Oberkörperhochposition mit\n„Rutschbremse“ unter\nSitzbeinhöckern\n– Kutschsitz\n– Torwartstellung\n– Stuhllehnensitz\n– V-A-T-I-Positionen\n– Dreh- und Dehnpositionen\n• Einreibung mit ätherischem Öl, z. B.\nEukalyptus\n• Sauerstoffverabreichung (nach\närztlicher Anordnung)\n• Frischluftzufuhr durch Stoßlüften des\nZimmers","4":"Das Strukturmodell besteht aus vier Elementen, die den Pflegeprozesses sowie die\nDokumentationselemente bilden:\n• Element 1: Strukturierte Informationssammlung (SIS) → fachliche\nEinschätzung des Pflege- und Betreuungsbedarfs anhand von fünf\nThemenfeldern\n• Element 2: Individuelle Maßnahmenplanung → aus SIS dokumentierte\nErkenntnisse\n• Element 3: Durchführung/Dokumentation von Abweichungen\n• Element 4: Evaluation","5":"Die fachliche Einschätzung der Pflegesituation erfolgt anhand von fünf (oder sechs)\nThemenfeldern.\nThemenfelder der SIS Informationssammlung","7":"• Dyspnoe ist eine subjektiv empfundene Atemnot bzw. erschwerte Atmung.\n• Herr Wagner hat das Gefühl, nicht ausreichend Luft zu bekommen. Das\nResultat ist eine verstärkte Atmung und erhöhte Atemfrequenz in Ruhe oder\nin Belastungssituationen.\n• Es ist falsch von der Tochter zu behaupten, dass ihr Vater wegen der\nSauerstoffgabe ausreichend Luft bekomme. Bei einer Pneumonie kann das\nLungengewebe so stark entzündet sein, dass der Gasaustausch beeinträchtigt\nist und der Patient Atemnot verspürt.\n• Die Äußerung eines Patienten bezüglich einer Dyspnoe sind immer ernst zu\nnehmen, denn es handelt sich um ein subjektives Empfinden, das nur der\nPatient selbst beschreiben kann.\nLiteratur\n1. Bundesministerium für Gesundheit. Strukturierte\nInformationssammlung (SIS) als Element des Strukturmodells. 2016.\nAus: www.bundesgesundheitsministerium.de/service/begriffe-\nvon-a-z/s/strukturierte-informationssammlung-sis-als-\nelement-des-strukturmodells.html (letzter Zugriff 22.6.2023)\n2. Bundesministerium für Gesundheit. Entbürokratisierung in der\nPflegedokumentation. 2023. Aus:\nwww.bundesgesundheitsministerium.de/themen/pflege/entbu\nerokratisie rung.html (letzter Zugriff 22.6.2023)…"}},{"setting":"Stationäre Akutpflege","title":"(Fallsituation)","text":"Jetzt ist Zeit zum Kuscheln!\nSie arbeiten als Pflegefachperson auf der Wöchnerinnenstation F1\ndes Klinikums Oldenburg. Seit heute betreuen Sie auch die 36-\njährige Nina Rosenthal und ihre Tochter Eleni, die gestern Abend\nper Notsektio zur Welt kam.\nEleni musste in der 37.+1 SSW aufgrund der schlechten\nBlutwerte von Frau Rosenthal schnell geholt werden. In den\nletzten Tagen war es Frau Rosenthal immer übel gewesen, und sie\nhatte über Rücken- und Bauchschmerzen geklagt. Beim\nGynäkologen war dann auch der Blutdruck sehr hoch, weshalb der\nGynäkologe sie sofort in die Klinik überwies. Dort wurde Frau\nRosenthal nochmals untersucht, und nachdem sie den Blutbefund\ngesehen hatte, zögerte die Ärztin nicht lange und leitete eine\nNotsektio ein.\nElenis Apgar-Score war 8–9–10, sie hatte ein Geburtsgewicht\nvon 2955 g, eine Körperlänge von 49 cm und einen Kopfumfang\nvon 34 cm. Da Frau Rosenthal nach der Notsektio in den\nAufwachraum musste, übernahm ihr Mann Theo das Bonding mit\nEleni im Kreißsaal. Frau Rosenthal kam etwa 2 Stunden später\ndazu und konnte ihre Tochter endlich zu sich nehmen und auch\nanlegen.\nAls Sie am Morgen das Zimmer betreten, sitzt Frau Rosenthal\nweinerlich im Bett: „Mir geht es heute einfach nicht so gut! Ich\nweiß auch nicht … Ich habe solche Angst, dass ich was falsch\nmache – endlich hat es funktioniert mit der Schwangerschaft,\nnach drei Abgängen. Schauen Sie sich die kleine Maus nur an, wie\nhübsch sie da auf dem Bauch liegt und an ihren Fingern lutscht.\nWas, wenn ich nicht genug Milch habe? Ich glaube, da kommt\neinfach nicht genug.“ Sie hören Frau Rosenthal aufmerksam zu\nund nehmen die kleine Eleni mit einer Infant-Handling-gemäßen\nDrehbewegung auf. Anschließend unterstützen Sie Frau Rosenthal\ndabei, Eleni an die Brust anzulegen, was schon gut klappt.\nSie vereinbaren mit der frischgebackenen Mutter später am Tag\nein Beratungsgespräch, um ihre Ängste zu minimieren. Bis dahin\ndarf Frau Rosenthal mit ihrer Tochter nachbonden – jetzt ist Zeit\nzum Kuscheln!","questions":[{"num":1,"points":8,"text":"Erläutern Sie den Apgar-Wert, der für Eleni dokumentiert\nist. Gehen Sie dabei auf die einzelnen Parameter (5 P.) ein\nund bewerten Sie Elenis Werte (3 P.)."},{"num":2,"points":8,"text":"Definieren Sie den Begriff Bonding (2 P.) und legen Sie\nFrau Rosenthal drei konkrete Maßnahmen dar, wie sie aus\nSicht der Bindungstheorie zu ihrem neugeborenen Kind\n„Bindung“ aufbauen kann (6 P.). Begründen Sie diese\nMaßnahmen."},{"num":3,"points":7,"text":"Beschreiben Sie, was unter dem Begriff des Nachbondings\nzu verstehen ist (2 P.), und analysieren Sie die\nFallsituation, also, weshalb dieses bei Frau Rosenthal\nindiziert ist (1 P.). Skizzieren Sie die Durchführung eines\nNachbondings (4 P.)."},{"num":4,"points":12,"text":"Beschreiben Sie Frau Rosenthal die Anzeichen, an denen\nsie erkennen kann, dass Eleni hungrig ist (6 P.), und\nführen Sie Frau Rosenthal auf (6 P.), was sie selbst tun\nkann, damit das Stillen von Eleni gut gelingt."},{"num":5,"points":6,"text":"Führen Sie sechs Vorteile des Stillens aus kindlicher (3 P.)\nund aus mütterlicher Sicht (3 P.) auf."},{"num":6,"points":7,"text":"Analysieren Sie Elenis potenzielle SIDS-Gefahr (Sudden\nInfant Death Syndrome) (2 P.) und informieren Sie Frau\nRosenthal anschließend über diese Gefahr (5 P.)."},{"num":7,"points":2,"text":"Erläutern Sie das Grundprinzip des Konzepts Kinästhetik\nInfant Handling."}],"answers":{"2":"Bonding\n• Der Begriff Bonding bedeutet Verbindung.\n• Er beschreibt die prägende Phase der beginnenden emotionalen Bindung\nzwischen dem Neugeborenen und seinen Eltern.\n• In den ersten 2 Stunden nach der Geburt wird, ausgelöst durch Hormone und\nden Vorgang der Geburt, die Bindung installiert.\nMaßnahmen\nBindungsaufbau durch\n• Hautkontakt: Ermöglicht dem Säugling, den Herzschlag der Eltern\nwahrzunehmen und sich den Körpergeruch einzuprägen.\n• Wärme: Durch die Körperwärme der Eltern fühlt sich das Neugeborene\ngeborgen. Beim Känguruhen kann der Säugling eine Mütze tragen.\n• Stillen: Fördert die Ausschüttung des Hormons Oxytocin, das die\nBindungsfähigkeit steigert. Beim Stillen bekommt der Säugling Nähe,\nGeborgenheit, Wärme und Nahrung.\n• Tragen: Säuglinge sind Traglinge. Neben dem Körperkontakt und der Wärme\nder Eltern regulieren sie sich durch den Geruch, den Herzschlag, die Stimmen\nder Eltern und die Schaukelbewegungen.\n• Blickkontakt: Zum intuitiven Elternverhalten gehört auch der vermehrte\nBlickkontakt zum Kind. Nach kurzer Zeit können diese die Gesichter ihrer\nEltern erkennen und fühlen sich geborgen.\n• Reizreduzierung: Eine reizarme Umgebung wie ein ruhiges, warmes…","3":"Nachbonding\nBonding wird grundsätzlich bei der Geburt initiiert. Jedoch ist die Bindung ein\nProzess, der über viele Momente und Stunden stattfindet. Nachbonding ist eine\nMethode, um den Moment nach der Geburt (welcher verpasst wurde)\nnachzuempfinden. Durch die Berührung wird zudem das Hormon Oxytocin\n(Bindungshormon) produziert.\nFallbezug\nFrau Rosenthal erhielt eine Notsektio, weshalb das „direkte“ Bonding nach der\nGeburt nicht möglich war.\nDurchführung\n• Bonding-Bad\n– Neugeborenes wird gebadet und\n– im Anschluss der Mutter feucht auf die Brust gelegt.\n– Neugeborenes und Mutter werden in eine warme Decke eingehüllt.\n– Soll Mutter und Kind ermöglichen, den Moment der „Ankunft“ (Geburt)\ngemeinsam nachzuempfinden.\n– Mutter und Kind sind dabei Ruhe und Zeit zu gewähren.\nalternativ:\n• Känguruhen\n– Neugeborenes wird ggf. gebadet.\n– Neugeborenes wird der Mutter nackt auf die Brust gelegt.\n– Neugeborenes und Mutter werden in eine warme Decke eingehüllt.\n– Soll Mutter und Kind ermöglichen, den Moment der „Ankunft“ (Geburt)\ngemeinsam nachzuempfinden.\n– Mutter und Kind sind dabei Ruhe und Zeit zu gewähren.","4":"Vorteile für das Kind Vorteile für die Mutter\n• Schutz vor • Vermehrte Ausschüttung von Oxytocin →\nDehydrierung physiologische Unterstützung der Plazentalösung\n• Förderung der • Förderung der physiologischen Rückbildung des\nMutter-Kind- Uterus → Minimierung des Blutverlustrisikos\nBeziehung • Anregung der Milchbildung\n• Vorbeugung eines • „Praktisch“ (bedarf keiner großen Vorbereitung)\nIkterus • Nahrung immer dem kindlichen Bedarf angepasst\n• Vorbeugung einer\nHypoglykämie\n• Vermeidung einer\nUnterkühlung\n• Angepasste Nahrung","6":"Fallbezug\n• Eleni ist in Bauchlage positioniert. Es ist unklar, ob die Mutter über SIDS\naufgeklärt ist.\n• Bei Eleni besteht kein erhöhtes Risiko für SIDS, da sie aufgrund der Geburt in\nder 37.+1 SSW nicht als frühgeborenes Kind gilt."}}]},{"num":6,"title":"Drittes Prüfungsbeispiel","tag":"tag2","cases":[{"setting":"Stationäre Akutpflege","title":"„Ich habe Angst um mein Kind!“","text":"„Ich habe Angst um mein Kind!“\nSie arbeiten als Pflegefachperson auf der Kinderstation K1 und\nsind zum Spätdienst in dem Bereich eingeteilt, in dem auch Nils\nPechinger liegt.\nBei der Übergabe erfahren Sie, dass der achtjährige Nils gestern\nwährend des Fußballtrainings einen akuten Asthmaanfall hatte,\nweshalb er in die Klinik eingeliefert wurde. Die Mutter wurde\nbenachrichtigt und kam in der Notaufnahme dazu. Nils wurde\nanschließend zusammen mit seiner Mutter auf Station\naufgenommen.\nPflegefachfrau Maria übergibt: „Im Moment inhaliert Nils alle 4\nStunden trocken mit Sultanol (Bronchospasmolytika, β2-\nSympathomimetika), was so mittelmäßig gut funktioniert. Alleine\nschafft er es nicht, zu drücken und gleichzeitig einzuatmen. Heute\nMorgen habe ich ihm auf ärztliche Anordnung deshalb einen\nSpacer mit ins Zimmer gegeben. Für den akuten Anfall hat er ein\nbronchienerweiterndes Spray auf dem Nachttisch. Die\nAsthmatherapie soll mit dem Peak-Flow-Meter überwacht werden.\nNils und seine Mutter müssen grundsätzlich den Umgang mit den\nGeräten und alles andere erst noch lernen. Frau Pechinger hat uns\nheute Morgen erzählt, dass Nils eine Katzenallergie hat. Und für\nheute ist noch ein ärztliches Aufklärungsgespräch mit Frau Dr.\nLöwe geplant.“\nNach der Übergabe gehen Sie und der Pflege-Azubi Max Gleim\nzur Bestimmung des Peak Flow in Nils’ Zimmer. Auch die Mutter\nist anwesend. Frau Pechinger wirkt auf Sie aufgelöst und nervös.\nNils sitzt verweint im Bett. Sie begrüßen die beiden und stellen\nsich kurz vor, und auf einmal sprudelt es aus Frau Pechninger nur\nso heraus: „Ich bin fix und fertig, ich wollte gerade schnell eine\nrauchen gehen. Wissen Sie, zuerst werde ich in die Notaufnahme\ngerufen und habe Todesangst um mein Kind, weil es keine Luft\nbekommt, und jetzt diese Informationsflut und die ganzen neuen\nSachen hier. Ein Notfallmedikament haben sie uns heute Morgen\nins Zimmer gebracht und noch so ein Teil. Gestern hat Frau Dr.…","questions":[{"num":1,"points":6,"text":"Erklären Sie Frau Pechinger die Pathogenetik des\nKrankheitsbilds ihres Sohns, Asthma bronchiale, (2 P.)\nund gehen Sie anschließend auf die Pathophysiologie ein (4\nP.)."},{"num":2,"points":10,"text":"Informieren Sie Frau Pechinger und Nils über das korrekte\nVerhalten bei einem akuten Asthmaanfall (6 P.). Gehen Sie\nhier auch auf vier mögliche Hauptsymptome ein, an denen\nNils und seine Mutter einen Asthmaanfall überhaupt\nerkennen können (4 P.)."},{"num":3,"points":12,"text":"Sie leiten Nils und seine Mutter zur eigenständigen\nMessung mit dem Peak-Flow-Meter an. Beschreiben Sie\ngrundsätzlich den Zweck der Messung (2 P.) und die\nHandhabung des Geräts (6 P.). Erklären Sie Frau\nPechinger und Nils zudem das Ampelschema des Peak-\nFlow-Meters, damit sie die Atemsituation auch einschätzen\nkönnen (4 P.)."},{"num":4,"points":4,"text":"Am Morgen wurde Nils ein Spacer ins Zimmer gebracht.\nErläutern Sie den möglichen Grund dafür (2 P.) und geben\nSie zwei mögliche Vorteile für Nils an (2 P.)."},{"num":5,"points":12,"text":"Ein wichtiger Aspekt in der Pflege von chronisch Kranken\nwie Nils ist die Patientenedukation. Definieren Sie diesen\nBegriff (3 P.) und planen Sie eine an Nils’ Bedarf\nangepasste Patientenedukation unter Berücksichtigung der\ndrei Strategien (3 P.) mit zwei individuellen Maßnahmen je\nStrategie (6 P.)"},{"num":6,"points":6,"text":"„Mama, sag jetzt endlich, ob ich noch kicken kann! Ich\nhabe solche Angst, dass das wieder passiert!“ Nehmen Sie\nzu Nils’ Befürchtung Stellung. Berücksichtigen Sie bei\nIhrer Ausführung die Lebensgestaltung zu Hause (3 P.)\nund den Aspekt Asthma und Sport (3 P.)."}],"answers":{"1":"Pathogenetik/Auslöser\n• Generell kann unterschieden werden zwischen\n– allergisch-bedingtem Asthma (Extrinsic Asthma), ausgelöst durch\nAllergene, und\n– nicht allergisch bedingtem Asthma (Intrinsic Asthma), ausgelöst durch\nInfekte oder psychische Faktoren.\n• Nils hat eine Katzenhaarallergie. Im Kindes- und Jugendalter sind Allergien\nHauptauslöser von Asthmaanfällen.\nPathophysiologie\n• Entzündliche Reaktionen der Bronchialschleimhaut werden durch externe\nReize (z. B. Allergene oder Infekte) ausgelöst.\n• Die entzündliche Reaktion (aufgrund von Entzündungsmediatoren) führt zur\nÖdembildung der Bronchialschleimhaut.\n• Es kommt zur Verdickung der Bronchialschleimhaut und Sekretion von zähem\nSchleim und zur Kontraktion der Bronchialmuskulatur (Bronchospasmus).\nDurch das Zusammendrücken der Bronchien werden die Atemwege\nzusätzlich verengt (Bronchoobstruktion).\n• Alle Asthmatiker haben eine Überempfindlichkeit der Atemwege (bronchiale\nHyperreaktivität).\nTipp\nPathogenetik: Beschäftigt sich mit der Entstehung der\nKrankheit und deren Auslöser.\nPathophysiologie: Lehre von den Krankheitsvorgängen\nund Funktionsstörungen.","2":"Hauptsymptome\n• Starke exspiratorische Dyspnoe.\n• Festsitzender Husten.\n• Atemgeräusch → Pfeifen→ exspiratorisches Giemen → Bronchialobstruktion.\n• Erschwerte Ausatemphase (verlängertes Exspirium).\n• Abfall des Peak-Flow-Werts um 20 % (des durchschnittlichen Werts).\n• Blasses Hautkolorit, ggf. Zyanose.\n• Nils nimmt von selbst eine entlastende Körperhaltung ein (z. B.\nTorwartstellung).\n• Nils setzt die Atemhilfsmuskulatur ein.\nErstmaßnahmen\n• Nils auffordern, eine atemunterstützende Position, z. B. Torwartstellung,\nKutschersitz, einzunehmen\n• Falls Nils (im Bett) liegt, ihn dabei unterstützen, eine Position mit erhöhtem\nOberkörper (atemerleichternde Position) einzunehmen\n• Nils auffordern, beim Ausatmen die Lippenbremse einzusetzen","3":"Zweck der Messung\n• Die Peak-Flow-Messung ist eine Selbstkontrolle für den zu pflegenden\nMenschen zur Überprüfung der Lungenfunktion.\n• Sie ist eine schnelle Krankheitskontrolle. (Liegen Veränderungen vor?)\n• Mit dem Peak-Flow-Meter kann der individuelle Spitzenfluss der Ausatmung\nbestimmt werden. Der Bestwert ist der Richtwert.\n• Gemessene Werte können in ein Ampelschema eingeordnet und so beurteilt\nwerden.\n• Auf Grundlage der ermittelten Werte kann der Behandlungsplan evaluiert und\nangepasst werden.\nHandhabung des Peak-Flow-Meters\n• Die Messung wird im Stehen durchgeführt.\n• Der Zeiger des Geräts wird auf null gestellt.\n• Das Gerät waagrecht vor den Mund halten, tief einatmen und Luft kurz\nanhalten.\n• Das Mundstück fest mit den Lippen umschließen und mit aller Kraft schnell\nausatmen (kurzer Ausatemstoß).\n• Messwert anhand des Zeigers (oder digital) ablesen.\n• Zeiger erneut auf null stellen und den gleichen Vorgang noch zweimal\nwiederholen. Höchsten erreichten Wert im Protokoll notieren.\n• Anschließend „Ampelfarbe“ ermitteln, in welche der höchste erreichte Wert\nfällt, und Ergebnis beurteilen.\nAmpelschema\n• Rot: Peak-Flow-Wert < 50 % des persönlichen Bestwerts…","4":"Tipp\nAls Spacer wird eine Inhalationshilfe bezeichnet, die einem\nDosieraerosol als Reservoir vorgeschaltet ist.\nMögliche Gründe\n• Nils wurde eine Inhalationshilfe in das Zimmer gebracht, da er selbst noch\nnicht die Einatmung und das Auslösen des Sprühstoßes koordinieren kann.\n• Intention der Ärztin bzw. der Pflegefachperson ist, durch die Bereitstellung\nder Inhalationshilfe die Selbstständigkeit von Nils zu fördern. Mit einer\nInhalationshilfe kann der Sprühstoß der Dosieraerosole ausgelöst werden, die\nerst anschließend inhaliert werden müssen. Die Gleichzeitigkeit von Auslösen\nund Inhalieren ist hier nicht notwendig.\nVorteile für Nils\n• Er kann das Asthmaspray selbstständig einsetzen, was bei\nNotfallmedikamenten besonders wichtig ist!\n• Die Inhalationshilfe erleichtert die Koordination von Einatmung und Auslösen\ndes Sprühstoßes.\n• Da Nils Einatmung und Auslösen des Sprühstoßes noch nicht koordinieren\nkann, ermöglicht die Inhalationshilfe, dass effektiv mehr Wirkstoff in die\nLunge kommt.","5":"Patientenedukation\nUnter Patientenedukation wird eine Patientenschulung verstanden, die aus\npädagogischen und psychologischen Maßnahmen (Informieren, Schulen [Anleiten],\nBeraten) besteht. Die Maßnahmen sind den individuellen Bedürfnissen und\nSituationen des zu pflegenden Menschen so gut wie möglich angepasst. Ziel der\nPatientenedukation ist es, durch Wissensvermittlung und Förderung praktischer\nKompetenzen den zu pflegenden Menschen zur Krankheitsbewältigung und zum\naktiven und eigenverantwortlichen Managen der Krankheitssituation zu befähigen.","6":"Lebensgestaltung\n• Eine auf das Asthma ausgerichtete Lebensgestaltung kann weiteren\nAsthmaanfälle vorbeugen.\n• Dabei sollte auf eine rauchfreie Umgebung geachtet werden. Die Mutter\n(Eltern) sollten auf das Rauchen zu Hause verzichten.\n• Grundsätzlich sollte Nils Katzen meiden, da er gegen ihre Haare allergisch ist.\nNils’ Mutter sollte z. B. sein Fußballtrikot selbst waschen, um zu vermeiden,\ndass es mit Katzenhaaren aus einem anderen Haushalt in Kontakt kommt.\n• Die Familie sollte Urlaubsreisen ans Meer oder ins Hochgebirge gegenüber\nStädtereisen bevorzugen.\n• Um stressigen Situationen entgegenwirken zu können, sollte Nils\nEntspannungstechniken erlernen.\n• Selbsthilfegruppen, Asthmaschulungen, Asthmacamps unterstützen die\nKrankheitsbewältigung.\nAsthma und Sport\n• Nils sollte am Schulsport und am Fußballtraining teilnehmen. Es ist sinnvoll,\ndass jedes Kind mit Asthma am Schulsport teilnimmt und seinen Fähigkeiten\ngemäß gefördert wird. Zudem stärkt Sport die Persönlichkeitsentwicklung.\n• Ausdauersportarten können grundsätzlich Nils’ Gesamtsituation verbessern\nund zur sozialen Integration beitragen (Verbesserung von Nils’ psychischer\nSituation).…"}},{"setting":"Ambulante Langzeitpflege","title":"„Es ist nichts mehr, wie es war“","text":"„Es ist nichts mehr, wie es war“\nSie arbeiten im Rahmen ihrer Tätigkeit als Pflegefachperson im\nambulanten Pflegedienst „Vital“ im Raum Regensburg und pflegen\ndort vorwiegend ältere Menschen. Der Pflegebedarf ihrer Klienten\nist sehr unterschiedlich, wobei die meisten multimorbid sind.\nEiner Ihrer Klienten ist der 84-jährige Josef Kirsch, den Sie seit\netwa 2 Jahren bei grundpflegerischen Tätigkeiten unterstützen.\nBislang konnte er gut mithelfen, nahm zuverlässig seine\nMedikamente und bewältigte den Alltag ohne Probleme. Ab und\nan schien er leichte Gedächtnisstörungen zu haben und vergaß z.\nB., dass seine Tochter erst am Vortag zu Besuch gewesen war.\nHerr Kirsch hat eine bekannte COPD, die 2 × täglich mit einem\nβ2-Sympathikomimetika-Spray behandelt wird. Außerdem hat er\naufgrund einer Herzinsuffizienz Unterschenkelödeme, die mit\nTorem® 1–1/2–0 ausgeschwemmt werden. Zur Behandlung der\nHerzinsuffizienz nimmt Herr Kirsch Ramipril® 5 mg 1-0-0 und\nAldactone® 50 mg 1-0-1. Gegen die anhaltenden Schmerzen in\nden Beinen und im Rücken wurde ihm 4 × täglich Ibuprofen®\n600 mg verordnet.\nVor ein paar Wochen zog sich Herr Kirsch eine\nSchenkelhalsfraktur zu und wurde operiert. Nach dem\nKrankenhausaufenthalt lag er 3 Wochen auf der geriatrischen\nReha. Seit er in seine Wohnung zurückgekehrt ist, wird er von\nseiner Tochter Anne Kirsch und den Pflegenden des Pflegediensts\n„Vital“ versorgt.\nHeute fahren Sie im Spätdienst zum ersten Mal nach seinem\nKrankenhausaufenthalt zu Herrn Kirsch. Die kleine Zwei-Zimmer-\nWohnung liegt im dritten Stock eines Mehrfamilienhauses in der\nRegensburger Altstadt. Als Sie in der üppig eingerichteten\nWohnung ankommen, empfängt Sie die Tochter und berichtet\nIhnen sichtlich genervt: „Seit sich mein Vater das Bein gebrochen\nhat, ist nichts mehr, wie es war. Gerade habe ich ihm noch die\nMittagstabletten gegeben, die hat er schon wieder vergessen. Er\nredet immer wieder vom Haus, dem Garten und den Hühnern,…","questions":[{"num":1,"points":3,"text":"Erklären Sie den Begriff Multimorbidität am Beispiel von\nHerrn Kirsch."},{"num":2,"points":8,"text":"Bestimmen Sie die verschiedenen Dimensionen der\nOrientierung (4 P.) und begründen Sie jeweils Herrn\nKirschs Situation (4 P.)."},{"num":3,"points":6,"text":"Beschreiben Sie drei nicht medikamentöse pflegerische\nInterventionen, die Sie bei Herrn Kirsch anwenden\nkönnen, damit dieser nachts besser zur Ruhe kommt."},{"num":4,"points":13,"text":"Ermitteln Sie Herrn Kirschs Sturzrisiko unter\nBerücksichtigung der Risikoeinteilung im\nExpertenstandard „Sturzprophylaxe in der Pflege“ und\nbegründen Sie Ihre Einschätzung."},{"num":5,"points":18,"text":"Der professionelle pflegerische Beratungsprozess erfolgt in\nmehreren Schritten. Bestimmen Sie die fünf Phasen des\nBeratungsprozesses und beschreiben Sie deren Inhalte in\nBezug auf Herrn Kirsch und seine Tochter (5 P.). Ermitteln\nSie den Beratungsbedarf anhand der Fallsituation und\nleiten Sie vier mögliche Ziele ab (5 P.). Beraten Sie Herrn\nKirsch und seine Tochter zu zwei Punkten ausführlich (8\nP.)."},{"num":6,"points":2,"text":"„Vielleicht hat er ja Alzheimer?“ Interpretieren Sie diese\nAussage."}],"answers":{"2":"• Situative Orientierung: Desorientiert. Herr Kirsch erkennt den\nSinnzusammenhang – Besuch der Pflegefachperson – nicht.\n• Zeitliche Orientierung: Desorientiert. Dies zeigt sich an Herrn Kirschs\nFrage nach dem Frühstück. Ihr Besuch bei Herrn Kirsch findet jedoch im\nSpätdienst statt.\n• Örtliche Orientierung: Desorientiert. Herr Kirsch meint nach Aussage der\nTochter, dass er sich in einem Haus mit Garten und Hühnern befände.\n• Personelle Orientierung: (Teilweise) desorientiert. Herr Kirsch spricht die\nTochter mit „Mutti“ wie früher die Ehefrau an. Die Tochter sagt, zuletzt hätte\ner sie vorgestern verwechselt.","3":"• Atemstimulierende Einreibung (ASE): zur Einschlafförderung und\nBeruhigung von Herrn Kirsch. Dafür wird Herr Kirsch bequem positioniert,\nsodass der Rücken frei zugänglich ist, z. B. sitzend mit aufgestützten Armen\nund dem Kopf in den Händen oder in Seitenlage. Die Pflegefachperson reibt\nden Rücken von oben nach unten mit einem fetten Öl oder einer Wasser-in-\nÖl-Emulsion ein und achtet darauf, dass sie immer Hautkontakt hat, d. h., sie\nnimmt nicht beide Hände gleichzeitig von Herrn Kirschs Körper. Zudem\nstimmt die Pflegefachperson ihre Bewegungen auf Herrn Kirschs Atmung ab.\nWährend Herr Kirsch ausatmet, beginnt die Pflegefachperson die Einreibung\nmit kreisenden Bewegungen. Dabei übt sie mit den Händen links und rechts\nder Wirbelsäule einen etwas intensiveren Druck aus. Wenn Herr Kirsch\neinatmet, gleiten ihre Hände mit leichtem Druck in einer kreisförmigen\nBewegung zurück zur Wirbelsäule. Diese Bewegungsabfolge führt die\nPflegefachperson etwa 4- bis 8-mal (5–10 Minuten lang) vom Nacken bis zum\nunteren Rippenrand durch. Abschließend streicht sie mit beiden Händen\ngleichzeitig von oben nach unten neben der Wirbelsäule entlang.…","4":"Tipp\nDer Expertenstandard „Sturzprophylaxe in der Pflege“ des\nDeutschen Netzwerks für Qualitätsentwicklung in der Pflege\n(DNQP) empfiehlt eine zweischrittige Risikoeinschätzung [2]:\nSchritt 1 – Initialscreening\nDie Einschätzung des Sturzrisikos bei der Aufnahme oder\ndem Erstbesuch basiert auf der fachlichen Expertise der\nPflegefachperson. Dabei befragt sie den zu pflegenden\nMenschen und/oder die Angehörigen.\nDas DNQP schlägt folgende Fragen vor:\n• Sind Sie in den letzten 12 Monaten gestürzt?\n• Haben Sie Schwierigkeiten beim Gehen, Stehen oder\nSitzen?\n• Haben Sie Probleme mit Ihrem Gleichgewicht oder Ihrer\nKoordination?\n• Haben Sie Schwierigkeiten mit Ihrem Seh- oder\nHörvermögen?\n• Nehmen Sie Medikamente ein, die das Sturzrisiko erhöhen\nkönnen?\nBei einem oder mehr Anhaltspunkten wie z. B. mehr als drei\nMedikamenten, Gangstörung … sollte ein ausführliches\nAssessment erfolgen.\nSchritt 2 – weiterführendes Assessment\n• Biografisches Assessment: Erhebung persönlicher und\nfamiliärer Hintergründe (Alter, Geschlecht,\nLebenssituation), medizinische Vorgeschichte,\nMedikamente und Sturzerfahrungen\n• Medizinisches Assessment: Erfassung von\nkörperlichen/geistigen Beeinträchtigungen und…"}}]},{"num":7,"title":"Viertes Prüfungsbeispiel","tag":"tag2","cases":[{"setting":"Stationäre Langzeitpflege","title":"(Fallsituation)","text":"Aus dem Tritt gekommen\nSie arbeiten als Pflegefachperson in einem Alten- und Pflegeheim\nin Halle und sind heute im Frühdienst eingesetzt. Seit 3 Tagen\nwohnt Herr Matthias Reese bei Ihnen im Wohnbereich. Er ist 76\nJahre alt und leidet an Morbus Parkinson. Herr Reese ist vom\nbetreuten Wohnen in den Wohnbereich gezogen, da sich seine\nKrankheitssituation so verschlechtert hat, dass er auf mehr\nUnterstützung im Alltag angewiesen ist. Sie sind heute das erste\nMal für Herrn Reese zuständig.\nVon Ihrer Kollegin haben Sie erfahren, dass Herr Reese nicht\nglücklich über seinen Umzug ist und bisher noch nicht länger aus\nseinem Zimmer herausgekommen ist. Die meiste Zeit sitzt er im\nSessel und schaut aus dem Fenster. Von sich aus sucht er kaum\ndas Gespräch und antwortet nur einsilbig.\nAls Sie in Herrn Reeses Zimmer kommen, versucht dieser\ngerade aufzustehen. Er bemerkt Sie und fängt gleich an zu\nschimpfen: „Stehen Sie nicht so da rum, sondern helfen Sie mir.\nSie sehen doch, dass ich nicht allein hochkomme. Alles fühlt sich\nso steif an, und ich komme mit meinen Füßen nicht an meine\nSchuhe heran.“\nSie helfen Herrn Reese dabei, aufzustehen und sich seine\nHausschuhe anzuziehen. Dabei fällt Ihnen auf, dass seine Hände\nbeim Festhalten weniger zittern als beim Sitzen an der Bettkante.\nAuf die Frage, ob er gleich ins Bad zum Waschen gehen möchte,\nentgegnet Herr Reese: „Ich muss noch meine Medikamente\nnehmen. Der Nachtdienst wollte mir die schon geben, aber früh\num sechs kann ja keiner was essen. Sie können mir wieder einen\nJoghurt hinstellen, der reicht mir als Frühstück und damit kann\nich auch die Tabletten immer gut schlucken.“ Mit diesen Worten\nläuft Herr Reese langsam in Richtung Esstisch und schimpft dabei\nleise vor sich hin: „Bis ich da ankomme, kann ich ja schon Mittag\nessen … Scheiß-Parkinson, vor einer Woche bin ich noch zügig bis\nin den Speisesaal gekommen.“\nNach dem Frühstück kontrollieren Sie, ob Herr Reese seine\nTabletten genommen hat. Auf dem Weg ins Bad stößt Herr Reese…","questions":[{"num":1,"points":9,"text":"Herr Reese leidet an Morbus Parkinson. Definieren Sie die\nErkrankung (3 P.), nennen Sie drei Kardinalsymptome\n(Fachbegriffe; 3 P.) dieser Erkrankung und erklären Sie\ndiese anhand Ihrer Beobachtungen bei Herrn Reese (3 P.)."},{"num":2,"points":12,"text":"Morbus Parkinson ist eine chronische Erkrankung.\nErklären Sie den phasenweisen Verlauf einer chronischen\nErkrankung anhand des Trajekt-Modells nach Corbin und\nStrauss (10 P.) und belegen Sie anhand der Fallsituation, in\nwelcher Phase sich Herr Reese im Moment befindet (2 P.)."},{"num":3,"points":4,"text":"Während der Körperpflege bemerken Sie, dass Herr Reese\nsehr dünn ist. Beschreiben Sie, wie Sie weiter vorgehen,\num Ihre pflegerische Beobachtung zu sichern (2 P.) und\nHerrn Reeses Ernährungssituation festzustellen (2 P.)."},{"num":4,"points":7,"text":"Die Auszubildende Maria fragt Sie, was die Pflegediagnose\nRelokationssyndrom bedeutet. Erklären Sie ihr die\nPflegediagnose (3 P.) und verdeutlichen Sie diese anhand\nvon vier Symptomen, welche Herr Reese aufweist (4 P.)."},{"num":5,"points":10,"text":"Beim Medikamentenmanagement der Parkinson-\nMedikamente passieren zwei Pflegefehler. Erklären Sie die\nFehler (4 P.), deren Auswirkungen auf die Erkrankung (4\nP.) und welche Konsequenzen sich daraus für Herrn Reese\nergeben haben (2 P.)."},{"num":6,"points":8,"text":"Patientenedukation gehört zu den Aufgaben einer\nPflegefachperson. Verdeutlichen Sie anhand zweier von\nIhnen gewählter Bereiche, welche Inhalte für Herrn Reese\nwichtig sind (4 P.), und erklären Sie begründet, welche\nMethode Sie für welchen Edukationsinhalt nutzen würden\n(4 P.)."}],"answers":{"1":"Definition\nMorbus Parkinson ist eine fortschreitende neurodegenerative Krankheit des\nzentralen Nervensystems. Sie resultiert hauptsächlich aus dem schrittweisen\nAbsterben von Nervenzellen in der Substantia nigra, einem Gehirnbereich. Diese\nZellen sind normalerweise für die Dopaminproduktion zuständig, was Bewegung und\nKoordination beeinflusst. Die Krankheit zeigt vielfältige motorische und nicht\nmotorische Symptome. Die Kardinalsymptome sind alle motorische Symptome.\nKardinalsymptome\n• Bradykinese, Akinese (Bewegungsverlangsamung): […] und schimpft\ndabei leise vor sich hin: „Bis ich da ankomme, kann ich ja schon Mittag essen\n…“\n• Rigor (Steifheit): „[…] Alles fühlt sich so steif an, und ich komme mit meinen\nFüßen nicht an meine Schuhe heran.“\n• Ruhetremor (Zittern in Ruhe): […] dass seine Hände beim Festhalten\nweniger zittern als beim Sitzen an der Bettkante.\n• Posturale Instabilität (Haltungsinstabilität): […] stößt Herr Reese beim\nUmdrehen gegen den Tisch und fällt Ihnen direkt in die Arme.\nTipp\nNicht motorische Symptome reichen von Geruchsstörungen\nüber Schlafprobleme und Depressionen bis zu\nVerdauungsproblemen und kognitiven Beeinträchtigungen.","2":"Trajekt-Modell\n• Vor-Trajekt: Phase vor der Manifestation und Diagnose. Hier sind meist\nkeine Krankheitsanzeichen sichtbar, es können erstmalig unspezifische,\nschwer zuordenbare Symptome auftreten. Diese werden meist kognitiv\nvermieden und zu normalisieren versucht. Wenn sie irgendwann\nvordergründig sind, erfolgt (in der Regel) eine Kontaktaufnahme mit dem\nVersorgungssystem.\n• Trajekt-Beginn: Mit der Kontaktaufnahme mit dem Versorgungssystem\nund/oder der Diagnose beginnt die Verlaufskurve.\n• Krise/Akute Phase: Diese hat oft lebensbedrohlichen Charakter. Sie kann\nnicht mehr autonom bewältigt werden und bedarf Maßnahmen des\nGesundheitssystems. Die Krise betrifft nicht nur die körperlichen\nGegebenheiten des Menschen, sondern sein Umfeld genauso wie seine Psyche\n(Akutphase). Es handelt sich um immer wieder auftretende Phasen, in denen\nsich die Krankheitssituation zuspitzt und/oder sich neue\nSymptome/Komplikationen einstellen, sodass eine umgehende Behandlung\nnotwendig wird.\n• Restabilisierung: Krankheitssymptome/-komplikationen werden wieder\nunter Kontrolle gebracht. Die erkrankte Person versucht, ihr gesundheitliches\nGleichgewicht wiederzufinden.…","3":"• Größe/Gewicht, Gewichtsverlauf, BMI bei Herrn Reese feststellen.\n• Anhand eines Assessmentinstruments zum Thema Ernährung, z. B. NRS,\nMUST, MNA, SGA, Ernährungstagebuch und Essprotokoll die Ist-Situation\nerheben.","4":"Definition\nDie Pflegediagnose Relokationssyndrom bezieht sich auf Situationen, in der – vor\nallem ältere – Menschen aufgrund von einem Umzug, einer Veränderung der\nLebensumgebung o. Ä. negative physische, emotionale oder kognitive Reaktionen\nzeigen, z. B. Stress, Angst, Verwirrung oder Verhaltensveränderungen. Das\nRelokationssyndrom tritt oft auf, wenn ältere Menschen ihre vertraute Umgebung\nverlassen müssen, was mit dem Verlust von Vertrautem wie Räumlichkeiten, sozialen\nKontakten und Routinen einhergeht.\nHerrn Reeses Symptome\n• Frustration: […] und fängt gleich an zu schimpfen […], […] schimpft dabei\nleise vor sich hin […].\n• Depression: Die meiste Zeit sitzt er im Sessel und schaut aus dem Fenster.\nVon sich aus sucht er kaum das Gespräch und antwortet nur einsilbig.\n• Rückzug: […] bisher noch nicht länger aus seinem Zimmer herausgekommen\nist.\n• Entfremdung: […] wisse nichts mehr mit seinem kaputten Körper\nanzufangen.\n• Verunsicherung: Er wisse auch nicht, wie das weitergehen solle.","5":"• Keine zeitlich exakte Einnahme der Parkinsonmedikamente:\nParkinsonmedikamente müssen zeitlich exakt eingenommen werden, da\nWirkungsschwankungen/Wirkungsverluste vermieden werden sollen, um die\ndauerhafte Bewegungs- und Handlungsfähigkeit sicherzustellen: „Ich muss\nnoch meine Medikamente nehmen. Der Nachtdienst wollte mir die schon\ngeben, aber früh um sechs kann ja keiner was essen.“\nKonsequenzen für Herrn Reese: Wirkungsschwankung → erhöhte Steifheit: „Sie\nsehen doch, dass ich nicht allein hochkomme. Alles fühlt sich so steif an […]“\n• Parkinsonmedikamente dürfen nicht mit eiweißreichen Nahrungsmitteln\neingenommen werden: „Sie können mir wieder einen Joghurt hinstellen, der\nreicht mir als Frühstück und damit kann ich auch die Tabletten immer gut\nschlucken.“\nDas Parkinsonmedikament L-Dopa ist eine Aminosäure. Wird zu einer\nTabletteneinnahme eiweißreiche Nahrung aufgenommen, kommt es zu einer\nKonkurrenzsituation an den Aminosäuretransportern im Dünndarm. Die\nNahrungseiweiße sind in der Überzahl, dementsprechend kann L-Dopa nicht\nausreichend aufgenommen werden.\nKonsequenzen für Herrn Reese: Verschlechterung der Krankheitssituation: „[…]…","6":"Medikamentenmanagement\nZeitlich exakte Einnahme der Parkinsonmedikamente. Herr Reese ist sich\nanscheinend nicht der Dringlichkeit/Notwendigkeit der zeitlich exakten Einnahme\nseiner Medikamente bewusst und welche Folgen das für seine Krankheitssituation\nhat. Hier ist ein Informationsgespräch mit schriftlichem Informationsmaterial z. B.\neiner Fachgesellschaft oder Selbsthilfegruppe möglich, um zu den schriftlichen\nInformationen noch individuelle Ergänzungen/Anpassungen zu geben. Herr Reese\nhat keine kognitiven Einschränkungen, sodass ein Gespräch gut möglich ist.\nErnährung\nHerr Reese ist zu dünn. Er berichtet über Appetitverlust und einseitige Ernährung\nmit Joghurt und Milchpudding. Dies bedingt nicht nur eine einseitige Ernährung und\ndamit eine mangelhafte Versorgung mit Nährstoffen, sondern darüber hinaus auch\neine Verschlechterung seiner Krankheitssituation. Hier ist die Beratung eine gute\nMethode, um in einem ergebnisoffenen Gespräch herauszufinden, worin die\nAppetitlosigkeit begründet ist (Fremde Umgebung? Alleine essen? Schämt sich, mit\nanderen zu essen? Nebenwirkungen der Medikamente? …), um dann gezielt beratend\nauf diesen Bereich eingehen zu können.\nLiteratur…"}},{"setting":"Ambulante Langzeitpflege","title":"„Kann das wieder weg?“","text":"„Kann das wieder weg?“\nSie arbeiten als Pflegefachperson in der ambulanten\nLangzeitpflege. Heute haben Sie auf Ihrer Tour eine neue Klientin\nzu versorgen. Ihr Name ist Daniela Bach, und sie ist 45 Jahre alt.\nBei der gestrigen Übergabe haben Sie erfahren, dass Frau Bach ein\nKolonkarzinom hat und Hilfe bei der Versorgung ihres Kolostomas\nsowie Wundverbandwechsel an der OP-Wunde am Bauch und am\nPort benötigt. In Frau Bachs Arztbrief stehen folgende Diagnosen:\n• Anlage eines temporären Kolostomas\n• Kolonkarzinom T3, N1, M0\nAls Frau Bach auf Ihr Klingeln die Tür öffnet, begrüßt sie Sie mit\ndem Satz: „Gut, dass Sie da sind, ich glaube, ich bin wieder\nundicht.“ Sie stellen sich vor und begleiten Frau Bach ins Bad, wo\nsie schon alle Utensilien vorbereitet hat. Sie helfen Frau Bach\ndabei, die Versorgung ihres Kolostomas zu wechseln. Dabei fällt\nIhnen auf, dass sie das Stoma nicht anschaut und zudem alle\nFenster im Bad und in der restlichen Wohnung geöffnet oder\ngekippt sind. Die Wundnähte an Bauch und Port sind unauffällig.\nIn den nächsten zwei Wochen ändert sich wenig an Frau Bachs\nVerhalten während des Wechsels der Stomaversorgung. Sie\nkönnen jedoch ein gutes Verhältnis zu Frau Bach aufbauen, da sie\nein gemeinsames Hobby, nämlich das Tanzen im Verein, haben.\nAm Ende Ihres letzten Besuchs sprechen Sie Frau Bach auf ihr\nVerhalten an. Sie berichtet Ihnen, dass sie ständig den Geruch von\nStuhlgang in der Nase habe und deswegen immer die Fenster offen\nseien. Darüber hinaus sagt Sie: „Ich kann mich gar nicht mehr\nansehen. Dieses unförmige Teil, das da an meinem Bauch hängt …\nIch will mich gar nicht damit beschäftigen, zum Glück kommt es\nirgendwann wieder weg. Jetzt fallen mir langsam auch noch die\nHaare wegen der Chemotherapie aus, so will mich doch kein Mann\nansehen. Und zum Tanzen kann ich so ja auch nicht gehen,\nobwohl mir der Verein sehr fehlt. Ich bin immer so kaputt und\nkann dann doch nicht schlafen. Bei jeder kleinsten Anstrengung…","questions":[{"num":1,"points":3,"text":"Frau Bach spricht davon, dass das Stoma irgendwann\nwieder wegkomme. Erklären Sie, was Frau Bach damit\nmeint (2 P.), und woher Sie wissen können, ob diese\nAussage stimmt (1 P.)."},{"num":2,"points":6,"text":"Frau Bach hat ein Kolonkarzinom T3, N1, M0. Erklären Sie\nstichpunktartig die Situation ihrer Erkrankung anhand\ndieser Beschreibung."},{"num":3,"points":5,"text":"Im Rahmen Ihres Besuchs führen Sie bei Frau Bach die\nStomaversorgung, den Portverbandwechsel und die\nWundnahtversorgung am Bauch durch. Stellen Sie dar, in\nwelcher Reihenfolge Sie die Versorgung planen und\nwarum."},{"num":4,"points":4,"text":"Frau Bach hat einen Port. Erklären Sie, was dies ist (2 P.)\nund warum eine Portanlage bei Frau Bach notwendig war\n(2 P.)."},{"num":5,"points":2,"text":"Bei der Durchführung des Portverbandwechsel halten Sie\ndas „Non-Touch-Prinzip“ ein. Beschreiben Sie, was\ndarunter zu verstehen ist."},{"num":6,"points":12,"text":"In der Pflegedokumentation halten Sie fest, dass Sie die\nPflegediagnose Körperbildstörung bei Frau Bach\nvermuten. Erklären Sie, was eine Pflegediagnose ist (3 P.).\nDefinieren Sie, was eine Körperbildstörung ist (3 P.), und\nerklären Sie, welche bestimmenden Merkmale der\nPflegediagnose auf den Verdacht einer Körperbildstörung\nbei Frau Bach hinweisen (6 P.)."},{"num":7,"points":6,"text":"Sie vermuten ebenso, dass Frau Bach die Pflegediagnose\nFatigue aufweist. Definieren Sie, was eine Fatigue ist (2 P.)\nund was unter dem „Teufelskreis Fatigue“ zu verstehen ist\n(4 P.)."},{"num":8,"points":6,"text":"Sie möchten Frau Bach hinsichtlich ihrer Fatigue beraten.\nNennen Sie sechs Maßnahmen, welche Frau Bach zum\nUmgang und zur Verhinderung einer Verschlechterung\nihrer Fatigue ergreifen könnte."},{"num":9,"points":6,"text":"Neben der Beratung ist auch die Schulung ein wesentlicher\nBestandteil der Patientenedukation. Nennen Sie zuerst\ndrei von Ihnen gewählte Schritte im\nMikroschulungsprozess (3 P.). Führen Sie dann mögliche\nInhalte bezüglich der Stomaversorgung in den von Ihnen\ngewählten Schritten auf, welche für die Planung einer\nSchulung von Frau Bach zielführend sind (3 P.)."}],"answers":{"2":"Erklärung Einschätzung\nT3\nT für Tumor – Ausdehnung des 3 = Größe/lokale\nPrimärtumors Ausdehnung des\nPrimärtumors\nN1\nN für Nodulus – Fehlen oder Vorhandensein 1 = Befall regionaler\nvon Lymphknotenmetastasen Lymphknoten\nM0\
