sie in ihrer\nBewegung einschränken. Lange Strecken und schnelles Laufen\nvermeidet sie daher. Frau Götlich wurde bislang von ihren Eltern\nsehr liebevoll betreut. Allerdings sind diese aufgrund ihres\nfortgeschrittenen Alters nicht mehr in der Lage, sich\nvollumfänglich um ihre Tochter zu kümmern. Der Pflegedienst hat\nvor Kurzem die morgendliche Grundpflege und\nBlutzuckermessung übernommen.\nHeute werden Sie im Frühdienst diese Aufgaben durchführen.\nFrau Götlich ist 150 cm groß und wiegt 75 kg. Sie isst\nleidenschaftlich gern Süßes. Die Eltern berichteten der\nHausärztin, dass Mia in letzter Zeit öfter müde sei, sehr viel trinke,\noft zur Toilette müsse und auch gelegentlich Bauchschmerzen\nhabe. Aufgrund dieser Angaben, des erhöhten BMI und der BZ-\nWerte am oberen Grenzbereich ging die Hausärztin von einem\nbeginnenden Diabetes mellitus Typ 2 aus und ordnete tägliche BZ-\nMessungen im nüchternen Zustand an. Informationen zu\ngesundem Essen versteht Frau Götlich aufgrund ihrer geistigen\nBehinderung nicht.\nFrau Götlich ist sehr zugewandt und anhänglich, sie hat die\nPflegekräfte ins Herz geschlossen. Auch heute begrüßt sie Sie\nlächelnd mit einer festen Umarmung und den undeutlichen\nWorten „Hallo! Du bist meine kleine Maus.“ Frau Götlichs Gesicht\nist stark gerötet und Ihnen fällt auf, dass ihre Hände mit klebriger\nZuckermasse beschmiert sind. „Mama backt Kuchen. Lecker!“, ruft\nFrau Götlich begeistert, nimmt Ihre Hand und zieht Sie in die…","questions":[{"num":1,"points":10,"text":"Erklären Sie, warum eine Hyperglykämie einen Notfall\ndarstellt (5 P.). Beschreiben Sie Ihr weiteres Vorgehen\nwährend des Notfalls (5 P.)."},{"num":2,"points":10,"text":"Nennen Sie die typischen Symptome einer Hyperglykämie\n(5 P.). Erklären Sie weitere mögliche Strategien im\nUmgang mit der Erkrankung Diabetes mellitus Typ 2, wie\nsie bei Frau Götlich entstehen kann. (5 P.)."},{"num":3,"points":10,"text":"Erklären Sie die Ziele einer BZ-Messung (5 P.).\nBeschreiben Sie die fachgerechte Durchführung einer BZ-\nMessung (5 P.)."},{"num":4,"points":10,"text":"Begründen Sie die Notwendigkeit der interprofessionellen\nZusammenarbeit z. B. mit der Hausärztin (5 P.). Arbeiten\nSie heraus, welche Professionen zur Gesundheitsförderung\nvon Frau Götlich hinzugezogen werden sollten, und stellen\nSie dies übersichtlich dar (5 P.)."},{"num":5,"points":10,"text":"Reflektieren Sie, wie die speziellen Wünsche und\nBedürfnisse der Klientin mit der Gesundheitsprävention\neinhergehen. Beachten Sie dabei die ethischen Prinzipien\nund gehen Sie darauf ein."}],"answers":{"2":"Symptome\nTypische Symptome sind bei Frau Götlich Müdigkeit, Erschöpfung, vermehrtes\nWasserlassen, verstärktes Durstgefühl und Bauchschmerzen. Grundsätzlich können noch\nfolgende Symptome auftreten: trockene Haut und Juckreiz, Kraftlosigkeit, Sehstörungen,\nAnfälligkeit für Infektionen, schlechte Wundheilung, Übelkeit, Erbrechen, Appetitlosigkeit,\ntiefer Atem mit Azetongeruch.\nStrategien\nFrau Götlich sollte einem Diabetologen vorgestellt werden, der ggf. eine medikamentöse\nBehandlung einleitet. Diese ist dann entsprechend einzuhalten bzw. zu kontrollieren.\nZudem ist eine Nahrungsumstellung zu ausgewogener und vitaminreicher Kost zu\nempfehlen. Frau Götlich sollte zu mehr Bewegung im Rahmen ihrer Möglichkeiten angeregt\nwerden. Da Frau Götlich aufgrund ihrer geistigen Einschränkung kaum in der Lage ist, diese\nMaßnahmen vollumfänglich zu verstehen, müssen die Eltern involviert und angeleitet\nwerden.","3":"Ziele\nEine Blutzuckermessung wird nach ärztlicher Anordnung durchgeführt, um die jeweilige\nStoffwechsellage darzustellen und damit einschätzen zu können. Sie dient zudem der\nTherapiekontrolle, ob eingeleitete Maßnahmen auch adäquat wirken.\nStoffwechselschwankungen können somit erfasst und Gegenmaßnahmen eingeleitet\nwerden. Die Darstellung der Werte unterstützt zudem bei der Änderung von Gewohnheiten.\nDas Erreichen bzw. Halten des angestrebten HbA1c-Werts kann ebenfalls ein Ziel der\nregelmäßigen BZ-Messung sein, da die Werte über einen längeren Zeitraum dokumentiert\nwerden und somit nachweisbar sind.\nDurchführung\nEine fachgerechte BZ-Messung beginnt mit der Kontrolle der ärztlichen Anordnung und\nerfolgt nach jeweiligem Hausstandard. Die Erlaubnis zur Messung wird vom zu pflegenden\nMenschen eingeholt, da ohne Einwilligung die Verletzung der Haut eine Körperverletzung\ndarstellt. Alle benötigten Materialien werden bereitgelegt. Dazu zählen: Desinfektionsmittel,\nMessgerät, Teststreifen, Stechhilfe mit Lanzette, Tupfer, Dokumentationsbogen. Vorab\nwerden alle Materialien auf eine unversehrte Verpackung und Haltbarkeit überprüft. Es…","4":"Notwendigkeit interprofessioneller Zusammenarbeit\nMit interprofessioneller Zusammenarbeit ist gemeint, dass alle Professionen\nzusammenarbeiten und Informationen zum jeweiligen Patienten untereinander\naustauschen. Dies ist notwendig, um z. B. sich doppelnde Diagnostiken zu vermeiden und\nTherapieziele miteinander in Verbindung zu bringen. Maßnahmen können gebündelt\nwerden und somit effektiver wirken. Medikamente können z. B. besser aufeinander\nabgestimmt werden und so Neben- bzw. Wechselwirkungen minimiert werden.\nMögliche Professionen\nFolgende Professionen können an der Gesundheitsförderung von Frau Götlich beteiligt\nsein:\n• Hausarzt, Diabetologe, ggf. Urologe, Psychiater bzw. Neurologe als mögliche\nmedizinische Versorger\n• Pflegedienst für die Umsetzung ärztlicher Anordnungen und pflegerischer\nMaßnahmen\n• Ergotherapeuten und Physiotherapeuten für die ganzheitliche Betreuung der\nKlientin, um die geistige Einschränkung zu kompensieren und die Mobilität\nhinsichtlich der deformierten Füße zu fördern\n• Logopäden, um das aufgrund der vergrößerten Zunge erschwerte Sprechen zu\nfördern\n• Ernährungsberater/Ökotrophologen für eine Anpassung der Ernährung und damit u.…","5":"• Frau Götlich vermeidet lange Strecken und schnelles Laufen, da ihre Füße leicht\ndeformiert sind. Dem gegenüber steht die Notwendigkeit der täglichen Bewegung,\num ihren BMI zu senken. Zudem besteht der Verdacht auf Diabetes mellitus. Ein\nBaustein der Therapie ist ausreichend Bewegung. Dem Prinzip der Autonomie\nstehen die Prinzipien der Schadensvermeidung und Fürsorge entgegen. Die Eltern,\nTherapeuten und Pflegefachpersonen kümmern sich um die Klientin, können ihr\ndennoch nicht allen Willen lassen, damit sie keinen Schaden nimmt. Bewegung ist\nnicht zwangsläufig mit Laufen verbunden. Auch andere Bewegungsübungen können\ndie Mobilität verbessern.\n• Frau Götlich redet gern und viel. Sie ist durch ihre große Zunge in ihrer verbalen\nKommunikation eingeschränkt, da sie dadurch nur undeutlich sprechen kann.\nDurch die Logopädie kann Frau Götlich hier gut unterstützt werden. Haben zudem\nalle Beteiligten Geduld, der Klientin zuzuhören, gibt es keine Konflikte bezüglich der\nethischen Prinzipien.\n• Die Klientin isst leidenschaftlich gern süße Speisen. Aufgrund ihrer geistigen\nBehinderung versteht sie die Notwendigkeit des Verzichts darauf nicht. Ihr BMI ist…"}}]},{"num":5,"title":"Zweites Prüfungsbeispiel","tag":"tag3","cases":[{"setting":"Stationäre Langzeitpflege","title":"„Durch die Gürtelrose ist sie ganz anders“","text":"„Durch die Gürtelrose ist sie ganz anders“\nSie arbeiten als Pflegefachperson im Pflegeheim „Herbstsonne“. In\nIhrem Wohnbereich versorgen Sie im Konzept der persönlichen\nBetreuungspflege vier Bewohnerinnen und Bewohner. Allerdings\nmüssen in letzter Zeit immer öfter aushilfsweise\nPflegefachpersonen aus anderen Wohnbereichen hinzugezogen\nwerden, da krankheitsbedingt ein erheblicher Personalmangel\nbesteht. Manchmal herrscht gefühlt ein richtiges Chaos. Dennoch\nbehalten Sie weitestgehend den Überblick und haben ein Auge auf\ndie von Ihnen zu versorgenden Menschen, unter ihnen die 81-\njährige Marieluise Weigelt. Frau Weigelt ist trotz ihrer\nbeginnenden Demenz eine lebensfrohe Dame, die immer für einen\nSpaß zu haben ist.\nIn den letzten 3 Tagen gibt sich Frau Weigelt aber zunehmend\nmürrisch, kratzt sich vermehrt im Bereich der linken Schläfe und\nKopfhaut, und heute Morgen entdeckten Sie Bläschen in diesem\nBereich. Nach einer Notfallbehandlung im Klinikum kehren Sie\nmit Frau Weigelt am frühen Nachmittag zurück ins Pflegeheim\nund übergeben die Untersuchungsergebnisse an Ihre Kolleginnen.\nSie berichten: „Frau Weigelt hat eine Gürtelrose. Sie hat vom Arzt\nein Akutmittel gegen die Zoster-Infektion bekommen und ein\nopioidhaltiges Schmerzmittel mit Fentanyl gegen die\nNervenschmerzen. Das ist aber nur für den Bedarfsfall gedacht\nund soll als transdermales Pflaster (TTS) verabreicht werden. Ich\ndokumentiere das sofort in der Akte. Eigentlich hat Frau Weigelt\nja meistens gute Laune, aber irgendetwas scheint ihr gerade nicht\nso richtig zu passen. Durch die Gürtelrose ist sie ganz anders.“\nFrau Weigelt klagt in den folgenden Tagen immer wieder über\nSchmerzen. Gemäß der ärztlichen Anordnung bekommt sie das\nFentanyl-Pflaster aufgeklebt, wenn auch nicht von Ihnen als\nBezugspflegekraft, sondern von Aushilfspflegekräften. Am\nWochenende nach der Diagnosestellung habe Sie verlängert frei\nund kommen erst am Dienstag wieder in Ihren Wohnbereich. Ihr…","questions":[{"num":1,"points":10,"text":"Stellen Sie übersichtlich die wichtigsten Schritte des\nNotfallvorgehens beim Auffinden von Frau Weigelt mit der\nangenommenen Opioid-Überdosis dar."},{"num":2,"points":10,"text":"Beschreiben Sie jeweils fünf Hinweise, die beim Umgang\nmit Betäubungsmitteln im Allgemeinen (5 P.) und mit\ntransdermalen Schmerzpflastern im Speziellen (5 P.)\nberücksichtigt werden müssen."},{"num":3,"points":6,"text":"Beschreiben Sie mögliche Probleme, die aufgrund des\nbeschriebenen Personalmangels im Pflegeheim\n„Herbstsonne“ auftreten können."},{"num":4,"points":9,"text":"Begründen Sie, warum es gerechtfertigt ist, dass Frau\nWeigelt isoliert untergebracht wird, und beraten Sie sie\nhinsichtlich der einzuhaltenden Maßnahmen der Isolation.\nGeben Sie hierfür zehn Isolationsmaßnahmen an."},{"num":5,"points":15,"text":"Erklären Sie das WHO-Stufenschema zur Behandlung von\nSchmerzen, indem Sie die einzelnen Stufen benennen, zu\njeder Stufe zwei weiterführende Hinweise geben, jeweils\nkonkrete Beispiele für Wirkstoffe aufzählen und wichtige\nInformationen zur kombinierten Verabreichung\ndarstellen."}],"answers":{"1":"• Grundsatz: Während einer Opioid-Überdosis kann die Atmung innerhalb von\nwenigen Minuten aussetzen. Wichtig ist, als Pflegefachperson Ruhe zu bewahren\nund schnell vorzugehen. Insbesondere eine frühzeitige Erhöhung der\nSauerstoffzufuhr kann dazu beitragen, Frau Weigelts Leben zu retten.\n• Die Pflegefachperson prüft zuerst, ob Frau Weigelt noch reagiert. Dazu schüttelt sie\nsie und ruft ihren Namen. Wenn Frau Weigelt darauf nicht reagiert, reibt die\nPflegefachperson Frau Weigelts Brustbein 10 Sekunden lang so fest wie möglich, um\neine Reaktion auf diesen Schmerzreiz hervorzurufen.\n• Ist Frau Weigelt bewusstlos, bringt sie die Pflegefachperson in die stabile Seitenlage.\n• Fehlt die Atmung, beginnt die Pflegefachperson mit der Notfallbeatmung oder\nReanimation.\n• Die Pflegefachperson ruft oder veranlasst, dass der Rettungsdienst gerufen wird.\nDabei gibt die alarmierende Person die erforderlichen Informationen (Antworten\nauf die Fragen: Wo ist es passiert? Was ist passiert? Wie viele sind betroffen?\nWelche Art von Verletzungen/Veränderungen?) an und wartet die Antwort des\nRettungsdienstes ab. Währenddessen ist eine Pflegefachperson bei Frau Weigelt.","2":"Durch den Mangel an ausreichend Personal muss der einzelne Arbeitnehmer das zu\nerfüllende Arbeitspensum durch Mehrleistung abfangen. Dies führt zu Mehrarbeit und\nÜberstunden. Hinzu kommen erschwerte Arbeitsbedingungen durch den Versuch,\nfehlendes Personal durch schnelleres Arbeiten auszugleichen. Bestimmte Tätigkeiten, die\nbei regulärer Besetzung zu zweit ausgeführt werden würden, müssen allein umgesetzt\nwerden. Auch ein Austausch mit den anderen Mitarbeitern wird aufgrund des erhöhten\nArbeitsaufkommens sehr viel schwerer. Insgesamt leidet auch die Arbeitsqualität, was sich\nsowohl auf die Behandlung der zu pflegenden Menschen wie auch auf die eigene\nZufriedenheit auswirkt. Das hohe Arbeitspensum führt zu einem erhöhten Stresslevel.\nDurch die körperliche und psychische Überlastung kommt es eher zu Krankheiten des\nPersonals und Arbeitsunfähigkeit, was wiederum die Situation des Personalmangels noch\nverschärft. Es ist auch möglich, dass Pflegeeinrichtungen aufgrund des Personalmangels\ngewisse Mindestanforderungen nicht mehr erfüllen können. Im schlimmsten Fall droht die\nSchließung von Einrichtungen oder zumindest von Stationen oder Wohnbereichen oder die\nReduzierung der Bettenzahl.","4":"Begründung der Isolation\nFrau Weigelt muss zwingend isoliert werden, da der Inhalt der Herpes-zoster-Bläschen\ninfektiös ist und eine Ansteckung weiterer Personen durch direkte bzw. indirekte\nKontaktinfektion verhindert werden soll.\nIsolationsmaßnahmen\n• Die Unterbringung erfolgt in einem Einzelzimmer mit eigenem Bad.\n• Das Zimmer darf von Frau Weigelt nur verlassen werden, wenn sie entsprechende\nSchutzkleidung trägt und bestimmte Maßnahmen beachtet.\n• Wäsche und Abfall werden im Zimmer gesammelt und täglich entsorgt.\n• Benutztes Geschirr wird direkt in den Essenswagen entsorgt.\n• Ein Schild an der Tür weist auf die besonderen Hygienemaßnahmen hin, die\neinzuhalten sind.\n• Pflegeutensilien werden nur pflegeempfängerbezogen genutzt, täglich\nwischdesinfiziert und verbleiben im Zimmer.\n• Jeder, der das Zimmer von Frau Weigelt betreten will, muss auf eine persönliche\nSchutzausrüstung achten. Hierzu gehören Schutzkittel und Handschuhe.\n• Jeden Tag muss eine Wischdesinfektion von Nachtkästchen, Rufanlage, Türgriffen\nund Bad erfolgen.\n• Die Anzahl der Kontaktpersonen, auch Besucher, sollte so gering wie möglich\ngehalten werden. Das Isolationszimmer sollte möglichst nur von einer…"}},{"setting":"Stationäre Akutpflege","title":"„Hat das alles überhaupt noch einen Sinn?“","text":"„Hat das alles überhaupt noch einen Sinn?“\nBei Helmut Nitschke, 56 Jahre, verheiratet und Vater einer\nerwachsenen Tochter, wurde Prostatakrebs diagnostiziert. Im\nVorfeld gab es nur wenige Symptome, die auf die Erkrankung\nhinwiesen. Allerdings nahm Herr Nitschke in kurzer Zeit\nungewöhnlich viel Gewicht ab, und es kam immer wieder zu\nBlutabgängen während des Urinierens. Sein Hausarzt überweis\nihn deshalb vor einigen Wochen in die urologische Abteilung des\nKrankenhauses.\nMithilfe der bildgebenden Diagnostik erfuhr Herr Nitschke, dass\nsich der Krebs bereits im fortgeschrittenen Stadium befindet, was\ndas Einsetzen der Symptome erklärte. Der behandelnde Onkologe\nDr. Seibt sah deshalb nur eine Möglichkeit der kurativen Therapie\ngegeben: eine radikale Prostatektomie (komplette Entfernung der\nProstata und der Samenblasen) mit anschließender Bestrahlung.\nDie Erkrankung verlangte schnelles Handeln, und Herr Nitschke\nstimmte der Operation zu. Kurz vor dem geplanten Eingriff\nwandte er sich an Sie als Pflegefachperson und fragte: „Was, wenn\nich trotz OP sterbe? Was wird dann aus meiner Familie? Hat das\nalles überhaupt noch einen Sinn?“\nEinige Zeit nach der Operation hat sich Herr Nitschke\nweitgehend erholt, allerdings ist er immer noch bettlägerig, fühlt\nsich schwach, klagt über Inappetenz, und in den letzten 2 Tagen\nwirkte er zunehmend schläfrig und übermäßig dehydriert. Seit\nheute Vormittag hat er außerdem mit Bewusstseinsstörungen zu\nkämpfen. Sie informieren sofort Dr. Seibt, da die Gefahr eines\nKomas durch Hyperkalzämie besteht.","questions":[{"num":1,"points":3,"text":"Nennen Sie drei generelle Ursachen für eine Hämaturie."},{"num":2,"points":2,"text":"Erklären Sie kurz die Unterschiede zwischen einer Mikro-\nund einer Makrohämaturie."},{"num":3,"points":10,"text":"Beschreiben Sie jeweils fünf relevante pflegerische prä-\nund postoperative Maßnahmen bei der bei Herrn Nitschke\ngeplanten Prostatektomie."},{"num":4,"points":10,"text":"Erklären Sie unter Angabe typischer Symptome (5 P.), was\nman unter einer Hyperkalzämie versteht, und leiten Sie\npflegerische Sofortmaßnahmen in der Notfallsituation von\nHerrn Nitschke ab (5 P.)."},{"num":5,"points":10,"text":"Analysieren Sie die vorliegende Fallsituation hinsichtlich\nfünf wesentlicher, notwendig gewordener\ngrundpflegerischer Prophylaxen (5 P.) und geben Sie eine\nkausale Begründung an, weshalb diese Prophylaxen aktuell\npflegerelevant sind (5 P.)."},{"num":6,"points":15,"text":"Ordnen Sie jeder Prophylaxe überblicksartig drei\nallgemeine oder spezifische pflegerische Maßnahmen zu.\nProphylaxe Maßnahmen"}],"answers":{"2":"Bei der Mikrohämaturie ist der Urin makroskopisch unauffällig und normal gefärbt, aber\nmittels Urinteststreifen lässt sich eine erhöhte Erythrozytenzahl nachweisen. Dagegen\nbesteht bei der Makrohämaturie eine sichtbare Rotfärbung des Urins durch\nBlutbeimengung.","3":"Präoperative Maßnahmen\n• Im Vorfeld der Operation werden nach ärztlicher Anordnung Labor- und apparative\nUntersuchungen durchgeführt, z. B. Blutuntersuchung/Blutgruppenbestimmung\nund Urinstatus.\n• Am Vortag der OP erhält der Patient mittags Wunschkost und abends zwei Teller\nSuppe, dann setzt die Nahrungskarenz ein. Die Pflegefachperson überwacht diesen\nKostabbau.\n• In Abhängigkeit vom Hausstandard muss am Vortag der OP abgeführt werden. Die\nPflegefachperson führt die entsprechenden Maßnahmen durch.\n• Je nach Hausstandard werden im OP-Gebiet die Haare entfernt.\n• Es empfiehlt sich, bereits präoperativ postoperative Fähigkeiten einzuüben, in\ndiesem Fall Übungen der Beckenbodengymnastik zur Förderung der Kontinenz.\nPostoperative Maßnahmen\n• Die Pflegefachperson kontrolliert in den ersten 4 Stunden nach der OP alle 30\nMinuten, dann für die Dauer des OP-Tags stündlich Puls und Blutdruck sowie die\nTemperatur, um frühzeitige Wundinfektionen zu erkennen.\n• Nach ca. 6 Stunden postoperativ unterstützt die Pflegefachperson bei der Erst- und\nFrühmobilisation.\n• Die Pflegefachperson überwacht den langsamen Kostaufbau und übernimmt\ninsbesondere die Katheterpflege und die Obstipationsprophylaxe.…","4":"Hyperkalzämie\nUnter Hyperkalzämie versteht man einen erhöhten Kalziumspiegel im Blut. Kalzium\ngehört zu den Elektrolyten im Körper, der die Menge des im Blut zirkulierenden Kalziums\ngenau kontrolliert. Unter anderem Krebserkrankungen können für einen Anstieg des\nKalziumwerts sorgen. Zuerst treten symptomatisch Verdauungsprobleme auf, gefolgt von\neinem Durstgefühl und häufigem Wasserlassen. Ein schwerer Kalziumüberschuss führt zu\nVerwirrung und schließlich zum Koma. Die Hyperkalzämie kann lebensbedrohlich sein,\nwenn sie nicht erkannt und behandelt wird.\nNotfallsituation von Herrn Nitschke\nZuerst muss schnellstmöglich der diensthabende Arzt (Dr. Seibt) informiert werden.\nAnschließend wird mit der Rehydratation von Herr Nitschke begonnen, d. h., es erfolgt eine\nerhöhte Flüssigkeitsgabe, in der Regel intravenös. Herr Nitschke wird dabei von einer\nPflegefachperson psychisch betreut. Auf ärztliche Anordnung erfolgt die Gabe von\nhochpotenten Kortikoiden und Bisphosphonaten. Auch Diuretika (harntreibende Mittel)\nkönnen auf ärztliche Anordnung zur Verstärkung der Ausscheidung und zum Abbau des\nKalziums intravenös gegeben werden.","5":"• Herr Nitschke ist nach seiner vorangegangenen Prostatektomie körperlich sehr\nangeschlagen. Er ist seit der Operation bettlägerig und fühlt sich schwach.\nAufsetzen, aufstehen und laufen scheinen ihm seit der Operation nur mit\nUnterstützung, wenn überhaupt, möglich zu sein. Herr Nitschke hat folglich ein\nerhöhtes Sturzrisiko. Verstärkt wird das Ganze durch die seit dem Vormittag\nbestehenden Bewusstseinsstörungen. Neben einer guten Sturzprophylaxe scheinen\nauch eine Kontraktur-, Dekubitus- und Thromboseprophylaxe sinnvoll, denn Herr\nNitschke bewegt sich wenig, er fühlt sich schwach und Spontanbewegungen\nscheinen aktuell ausgeschlossen. Hier muss also pflegerisch angesetzt werden, um\nliegebedingte Komplikationen zu verhindern.\n• Die bereits erwähnte fehlende Fähigkeit zum aufrechten Sitzen wird über kurz oder\nlang auch Herrn Nitschkes Aspirationsrisiko, d. h. das unabsichtliche Einatmen von\nNahrung oder Flüssigkeiten bei der Atmung, vergrößern. Auch hier muss\nprophylaktisch gehandelt werden. Vergrößert wird dieses Risiko durch die bereits\nbestehende Flüssigkeitskarenz („[…] wirkte er […] übermäßig dehydriert“) und die\nbeginnende Bewusstseinsstörung.…","6":"Prophylaxe Maßnahmen\nSturzprophylaxe\n• Gehhilfsmittel anpassen, z. B. Rollstuhl für Herrn\nNitschke\n• In Absprache mit Physiotherapie Übungen bezüglich\nKraft, Ausdauer und Balance durchführen\n• Auf adäquates Schuhwerk, gute Lichtverhältnisse und\nBarrierefreiheit achten\nKontrakturprophylaxe\n• Ressourcen des Pflegeempfängers nutzen\n• Aktive, assistierte bzw. passive Bewegungsübungen\neinplanen und bei Bedarf in Absprache mit der\nPhysiotherapie umsetzen\n• Krafttraining je nach Herrn Nitschkes tagesaktuellen\nMöglichkeiten\nDekubitusprophylaxe\n• Ein regelmäßiger Positionswechsel, z. B. alle 4 Stunden –\nnicht nur zu den Mahlzeiten – ist bei der\nDekubitusprophylaxe von Herrn Nitschke wichtig.\nPositionierungshilfen sind bei Bedarf anzuwenden\n• Bei der Grundpflege auf nicht wegdrückbare Rötungen\neines lokalen Bereichs, insbesondere über einem\nknöchernen Vorsprung, achten. Fingertest bei Bedarf\n• Angepasste Bewegungsförderung organisieren, z. B. in\nAbsprache mit der Physiotherapie\nThromboseprophylaxe\n• Mobilisation nach Herrn Nitschkes individuellen\nMöglichkeiten\n• Physikalische Thromboseprophylaxe durch\nVenenkompression mithilfe von Kompressionsstrümpfen\noder -verbänden…"}}]},{"num":6,"title":"Drittes Prüfungsbeispiel","tag":"tag3","cases":[{"setting":"Stationäre Akutpflege","title":"(Fallsituation)","text":"„Meine arme Kleine! Kann ich wenigstens bei ihr\nbleiben?“\nSie arbeiten direkt im Anschluss an Ihre Pflegefachausbildung auf\nder Kinderstation einer Bielefelder Klinik, der auch eine\nKindernotaufnahme angeschlossen ist.\nAm heutigen Tag nehmen Sie die kleine Annabell Bianchi auf,\ndie von ihrer besorgten Mutter in die Kindernotaufnahme\nbegleitet wird. Das fünfjährige Mädchen macht der Mutter seit\ndem Vorabend große Sorgen. Sie konnte aufgrund starker\nBauchschmerzen nicht einschlafen. Heute Morgen wollte sie\nnichts essen und gab phasenweise wieder Bauchschmerzen an.\nNachdem Annabell erbrochen hatte und Frau Bianchi bei ihr eine\nTemperatur von 38,7 °C gemessen hatte, ging sie mit Annabell\nzum Kinderarzt. Dieser empfahl ihnen nach der Untersuchung den\nGang ins Krankenhaus.\nNach weiteren Untersuchungen in der Notaufnahme steht fest,\ndass Annabell eine Blinddarmentzündung hat und im\nKrankenhaus bleiben muss. Frau Bianchi ist im ersten Moment\ngeschockt und möchte von Ihnen mehr über das Krankheitsbild\nwissen und wie sie und ihre Tochter sich nun verhalten müssen.\nAn ihrem Arbeitsplatz hat sie bereits Bescheid gesagt, dass sie\nheute nicht kommen kann, weil sie sich um ihre Tochter kümmern\nmuss. Sie erzählt Ihnen: „Wir waren doch noch nie über Nacht\ngetrennt. Ich mach’ mir solche Sorgen um meine kleine Annabell.\nMeine arme Kleine! Kann ich wenigstens bei ihr bleiben? Wie geht\nes weiter? Muss sie operiert werden?“\nNach Auswertung der durchgeführten Untersuchungen\nempfiehlt die Ärztin dringend eine operative Entfernung des\nBlinddarmwurmfortsatzes, um ein Aufplatzen und dadurch eine\nInfektion im Bauchbereich zu verhindern. Sie erhalten den\nAuftrag, Frau Bianchi einen Aufklärungsbogen über die\nBlinddarmoperation zu geben, vor dem ärztlichen\nAufklärungsgespräch erste Fragen zu beantworten und sie über die\npflegerische OP-Vorbereitung für Annabell zu informieren.\nAnnabell krümmt sich noch immer aufgrund der Schmerzen, die\ninzwischen in den rechten Oberbauch gewandert und stärker…","questions":[{"num":1,"points":8,"text":"Fassen Sie die bei Annabell auftretenden Symptome der\nAppendizitis zusammen (4 P.) und geben Sie weitere\nSymptome an, die bei einer Blinddarmentzündung\nauftreten können (4 P.)."},{"num":2,"points":6,"text":"Begründen Sie Annabells Mutter die Notwendigkeit des\noperativen Eingriffs."},{"num":3,"points":10,"text":"Beraten Sie Annabells Mutter hinsichtlich des Umgangs\nmit den aktuellen Schmerzen und der Nahrungsaufnahme\nnach der Blinddarmoperation."},{"num":4,"points":6,"text":"Erklären Sie, warum die akuten Bauchschmerzen bei\nAnnabell einen Notfall darstellen."},{"num":5,"points":10,"text":"Beschreiben Sie Maßnahmen der prä- und postoperativen\nPflege bei Annabell."},{"num":6,"points":10,"text":"Verdeutlichen Sie die Vorteile der Unterbringung im\nKrankenhaus (5 P.) und benennen Sie die Inhalte der\nEACH-Charta, die bei Annabells Versorgung im\nKrankenhaus von Bedeutung sind (5 P.)."}],"answers":{}},{"setting":"Ambulante Langzeitpflege","title":"„Pflege aktiv“","text":"Wenn es nicht mehr geht\nSie arbeiten als Pflegefachperson beim ambulanten Pflegedienst\n„Pflege aktiv“ in Wuppertal und sind heute auf dem Weg zu Frau\nSinan. Aus ihrer Akte haben Sie erfahren: Frau Sinan ist 68 Jahre\nalt und wohnt seit dem Tod ihres Mannes vor 2 Jahren in einer\nkleinen Mietwohnung im 5. Stock eines Hochhauses. Ihre beiden\nSöhne leben schon seit Jahren wieder in der Türkei, sodass sie auf\nfremde Hilfe angewiesen ist.\nVor einigen Monaten wurde bei Frau Sinan ein\nHarnblasenkarzinom mit Lymphknotenbefall festgestellt. Bei\nihrem letzten Krankenhausaufenthalt vor 6 Wochen erhielt sie\neine Zystektomie sowie ein Ileumconduit mit liegendem Splint\nund zweiteiligem System. Da sich inzwischen Metastasen in der\nLeber gebildet haben, empfahl man Frau Sinan eine systemische\nChemotherapie, welche sie allerdings ablehnte.\nHinzu kommt, dass Frau Sinan aufgrund der Lebermetastasen\ninzwischen einen Ikterus entwickelte und an einem starken\nPruritus leidet. Durch das ständige Kratzen ist Frau Sinans Haut\nstark beeinträchtigt, und weil sie sich wegen ihres Hautbilds\nschämt, verlässt sie ihre Wohnung nicht mehr.\nFrau Sinan wurde im Rahmen der Pflegeüberleitung angeboten,\nsich um einen Platz in einer betreuten Wohneinrichtung zu\nkümmern. Doch Frau Sinan wollte trotz ihrer Prognose, welche\neine palliative Versorgung impliziert, nach Hause und sich dort\nselbst versorgen. Einzig einer Unterstützung durch den\nPflegedienst stimmte sie zu. Nun sollen die Mitarbeitenden von\n„Pflege aktiv“ Frau Sinan bei der Körperpflege und\nStomaversorgung unterstützen. Frau Sinan spricht allerdings nicht\ngut Deutsch und sieht auch nicht immer die Notwendigkeit der\nUnterstützung.\nAls Sie Frau Sinans Wohnung betreten, finden Sie sie\nschmerzgekrümmt in ihrem Sessel im Wohnzimmer vor. Die\nWohnung ist unaufgeräumt und schmutzig. Benutztes Geschirr\nsteht herum, Müll liegt auf dem Boden, und es riecht nach Urin.\nBei genauerem Hinsehen stellen Sie fest, dass der Beutel des…","questions":[{"num":1,"points":8,"text":"Ordnen Sie Frau Sinans Äußerung in das\nKommunikationsmodell von Schulz von Thun ein."},{"num":2,"points":4,"text":"Erläutern Sie Ursachen für Frau Sinans starke Schmerzen."},{"num":3,"points":10,"text":"Erklären Sie Frau Sinan die korrekte Stomaversorgung\nihres Ileumconduits."},{"num":4,"points":5,"text":"Bewerten Sie den Vorschlag der Pflegeüberleitung, Frau\nSinan einen Platz in einer betreuten Wohneinrichtung zu\norganisieren."},{"num":5,"points":8,"text":"Beschreiben Sie die drei Formen der Palliativversorgung\nsowie deren Ziele (6 P.) und empfehlen Sie Frau Sinan eine\ngeeignete Form (2 P.)."},{"num":6,"points":8,"text":"Definieren Sie das Leitsymptom Ikterus und nennen Sie\nFrau Sinan sieben Maßnahmen zur Linderung ihres\nPruritus."},{"num":7,"points":7,"text":"Beurteilen Sie, in welcher Phase des Modells von Kübler-\nRoss sich Frau Sinan befindet und wie sich dies bei ihr\nbemerkbar macht."}],"answers":{"2":"• Eine häufig auftretende Komplikation des Iluemconduits mit liegendem Splint ist die\naufsteigende Harnwegsinfektion.\n• Es besteht die Gefahr, dass Urin nicht richtig abfließen kann und sich dieser bis in\ndie Nieren zurückstaut.\n• Dadurch ist die Nierenfunktion stark beeinträchtigt, es können sich Nierensteine\nbilden, die starke Schmerzen auslösen.\n• Es besteht außerdem die Gefahr des akuten Nierenversagens.\n• Die Rötung der Stoma-Umgebung lässt auf eine Infektion schließen, welche ebenfalls\nSchmerzen verursacht.\nTipp\nViel wichtiger als das Ableiten von Ursachen für eine\nSchmerzsymptomatik ist das Schmerzmanagement. Neben dem\nArzt kommt den Pflegefachpersonen dabei eine zentrale Rolle zu.\nZum Schmerzmanagement gehören:\n• Feststellung, dass Schmerzen vorhanden sind (Screening)\n• Beobachtung und Einschätzung von Schmerzen (Assessment)\n• Schmerztherapie (medikamentös und nicht medikamentös,\nBeratung)\n• Verlaufskontrolle (Wirkung und Nebenwirkungen)\n• Evaluierung der Schmerzsituation","3":"• Die stomaumgebende Haut muss bei Anbringen der Hautschutzplatte trocken sein.\n• Den Versorgungswechsel möglichst früh nach dem Aufstehen durchführen, da durch\ndie reduzierte nächtliche Trinkmenge morgens weniger Urin abgeht.\n• Zur Reinigung des Stomas und der peristomalen Haut unsterile Kompressen\nverwenden, die mit Leitungswasser angefeuchtet werden.\n• Es wird von innen nach außen in kreisrunden Bewegungen so lange gewischt, bis alle\nSchleimreste entfernt sind.\n• Anschließend wird mit einer trockenen Kompresse die Haut abgetupft und eine\nweitere trockene Kompresse auf das Stoma gelegt, um kleine Mengen austretenden\nUrins aufzufangen.\n• Nach der Reinigung der peristomalen Haut erfolgt eine Kontrolle des Splints, des\nUrins und der Haut.\n• Der Splint wird auf die richtige Lokalisation, stabile Fixierung und freie\nDurchgängigkeit geprüft.\n• Sollte festgestellt werden, dass sich die Splintlage verändert hat, ist umgehend der\nbehandelnde Urologe zu kontaktieren.\n• Bei einem zweiteiligen System sind Basisplatte und Beutel getrennt und werden mit\neinem Schließmechanismus verbunden.\n• Die Basisplatte muss alle 2–3 Tage gewechselt werden, da sie aus einem besonderen…","4":"Betreutes Wohnen ist für Frau Sinan nicht das Richtige, da\n• betreutes Wohnen oder „Service-Wohnen“ Wohnformen sind, bei denen die\nBewohner zusätzliche Hilfestellungen in den Bereichen Haushalt und Betreuung\nerhalten können,\n• es zwar betreute Wohnformen gibt, in denen auch pflegerische Unterstützung\nangeboten wird, allerdings müssen die Bewohner noch weitestgehend in der Lage\nsein, sich selbst zu pflegen,\n• betreutes Wohnen sich meist an ältere Menschen richtet, die nicht oder nur in\ngeringem Umfang pflegebedürftig sind,\n• Frau Sinan mehr pflegerische Unterstützung benötigt und auch nicht mehr in der\nLage ist, ihren Haushalt selbstständig zu führen.\nDaher wäre für Frau Sinan eine stationäre Pflegeeinrichtung die bessere Variante.","5":"Formen der Palliativversorgung\n• Allgemeine ambulante Palliativversorgung (AAPV): Hier kann ein einzelner\nAkteur (z. B. der Hausarzt) die erforderliche palliativmedizinische Leistung\nerbringen.\nZiel: Menschen und ihre Angehörigen so zu versorgen, dass in der vertrauten\nUmgebung ein würdevolles Sterben möglich ist.\n• Spezielle ambulante Palliativversorgung (SAPV): Hier sind für die Linderung\nder Schmerzen und/oder Symptome spezifische palliativmedizinische und/oder\npalliativpflegerische Kenntnisse und Erfahrungen, eine 24-Stunden-Rufbereitschaft\nsowie eine besondere Zusammenarbeit der verschiedenen Akteure nötig.\nZiel: Menschen und ihre Angehörigen so zu versorgen, dass in der vertrauten\nUmgebung trotz der Intensität der Symptome und Schmerzen ein würdevolles\nSterben möglich ist.\n• Palliativmedizin in Krankenhäusern: Hier sind spezialisierte\npalliativmedizinische Leistungen notwendig, die zum einen spezielles Fachwissen\nund zum anderen einen ganzheitlichen Behandlungsansatz erfordern.\nZiel: Stabilisierung der Krankheitssymptome, damit die Betroffenen in die ambulante\nPalliativversorgung – also zurück in ihr vertrautes Umfeld – oder in ein stationäres\nHospiz entlassen werden können.…","6":"Definition\nAls Ikterus bezeichnet man eine Gelbfärbung von Haut, Schleimhäuten und inneren\nOrganen infolge einer Hyperbilirubinämie. Bei Frau Sinan wird diese von Lebermetastasen\nausgelöst.\nMaßnahmen\n• Milde, nicht alkalische Seifen, rückfettende Dusch- und Badeöle und Cremes\nbenutzen\n• Lauwarmes oder kühles Wasser verwenden\n• Regelmäßig feuchte und kühlende Umschläge anwenden\n• Aromapflege mit gerbenden Ölen wie Lavendel- oder Antijucköl\n• Weiche, luftige Kleidung, z. B. aus Baumwolle oder Seide, tragen\n• Räume kühl halten\n• Fingernägel kurz halten\n• Nachts Baumwollhandschuhe zur Reduktion von Kratzverletzungen tragen","7":"Phase, in der sich Frau Sinan befindet\n• Frau Sinan befindet sich in der letzten Phase des Modells von Frau Kübler-Ross, der\nAkzeptanzphase.\n• In dieser Phase haben Betroffene ihr Schicksal angenommen und es tritt ein ruhiger,\nfast gefühlsloser Zustand ein.\n• Der Gesprächsbedarf nimmt ab, der Blick ist nach innen gerichtet und das\nVerlangen, Besuch zu bekommen, nimmt ab.\nErsichtlich an folgenden Punkten\n• Ablehnung der systemischen Chemotherapie\n• Beharren auf der Entlassung nach Hause statt in eine betreute Wohnform\n• Ablehnung der Hilfe des Pflegedienstes\n• Einsamkeit, Desinteresse an Aktivität\nLiteratur\n1. Bayerisches Staatsministerium für Gesundheit und Pflege. Palliativversorgung.\nAus:\nwww.stmgp.bayern.de/gesundheitsversorgung/sterbebegleitung/pa\nlliativversorgung (letzter Zugriff: 24.7.2023).\n2. DGIM Innere Medizin. Leitsymptom: Ikterus. e.Medpedia. Aus:\nwww.springermedizin.de/emedpedia/dgim-innere-\nmedizin/leitsymptom-ikterus?epediaDoi=10.1007%2F978-3-642-\n54676-1_266 (letzter Zugriff: 24.7.2023).\n3. Doll A. Ikterus: wenn die Haut gelb wird. Friedrich +. 2020: Aus:\nwww.friedrich-verlag.de/pflegen-demenz-palliativ/symptome-…"}}]},{"num":7,"title":"Viertes Prüfungsbeispiel","tag":"tag3","cases":[{"setting":"Stationäre Langzeitpflege","title":"(Fallsituation)","text":"Wenn die Gelenke schmerzen\nHelga Hansen ist 69 Jahre alt und lebt seit Kurzem mit ihrem Mann\nRudolf in einem Hamburger Pflegeheim. Mittlerweile ist das Ehepaar seit\n40 Jahren verheiratet und hat zwei Kinder. Ihre Tochter wohnt im\ngleichen Ort, ihr Sohn jedoch mit seiner Familie 300 km entfernt. Er\nbesucht seine Eltern nur zu besonderen Anlässen.\nObwohl Frau Hansen seit 25 Jahren an rheumatoider Arthritis leidet,\nkonnte sie bis kurz vor ihrem Umzug ins Heim ihren Haushalt gut allein\nführen. Auch die beginnende Demenz ihres Ehemanns konnte sie nicht in\nihrer Unabhängigkeit bremsen. Hatte Frau Hansen zu Beginn\ninsbesondere unter geschwollenen Finger- und Handgelenken zu leiden,\nhat sich in den letzten 2 Jahren ihr Gesundheitszustand sehr\nverschlechtert. Mittlerweile sind die Fingergelenke größtenteils versteift,\ninsbesondere am Morgen hat sie unerträgliche Schmerzen. Ihr Hobby,\nHandarbeiten, kann sie schon lange nicht mehr ausüben, und die\nHausarbeit konnte sie zum Schluss nur noch mit großer Mühe bewältigen,\nweshalb sie auch die Entscheidung traf, mit ihrem Mann in ein Pflegeheim\nzu ziehen. Für das Ehepaar spielten auch Reisen eine große Rolle, und für\nbeide ist es traurig, dass dies nun nicht mehr möglich ist.\nHeute übernimmt Pflegefachmann Alexander Holst gemeinsam mit der\nAuszubildenden Nina Baumann die grundpflegerische Versorgung bei\nFrau Hansen und erklärt Nina vor Betreten des Zimmers: „Therapeutisch\nwar Frau Hansen vor dem Heimeinzug unzureichend eingestellt, sodass\nsich die Beschwerden akut verschlimmert haben. Sie bekommt deshalb\nmomentan hochdosierte NSAR (Gruppe von Medikamenten, die\nschmerzlindernd, entzündungshemmend und fiebersenkend wirken).\nAuch ihre Beinmotorik ist stark eingeschränkt, und ihr Pflegebedarf hat\nsich deutlich erhöht. Das müssen wir unbedingt berücksichtigen, wenn\nwir sie mobilisieren, damit sie nicht stürzt.“ Nina nickt zustimmend und\ngemeinsam betreten sie das Zimmer. Hier erwartet sie schon Herr…","questions":[{"num":1,"points":10,"text":"Begründen Sie, warum Pflegefachmann Alexander Holst sofort\nnach Feststellung der Symptome bei Frau Hansen Nina Baumann\nlosschickt, um einen Notarzt zu rufen (3 P.). Gehen Sie darauf\nein, auf welche Akutsituation Frau Hansens Symptome hinweisen\n(1 P.), und beschreiben Sie, welche Maßnahmen der\nPflegefachmann ergreifen sollte, bis der Arzt eintrifft (6 P.)."},{"num":2,"points":5,"text":"Nennen Sie fünf typische Symptome der rheumatoiden Arthritis."},{"num":3,"points":8,"text":"Zählen Sie acht häufig von einer rheumatoiden Arthritis\nbetroffene Gelenke auf."},{"num":4,"points":5,"text":"Erklären Sie drei Wirkungsweisen (3 P.) und zwei häufig\nauftretende Nebenwirkungen von nicht steroidalen\nAntirheumatika (NSAR) (2 P.)."},{"num":5,"points":12,"text":"Ordnen Sie den aufgeführten Aktivitäten mindestens zwölf\nHilfsmittel zu, die u. a. in der Rheumatherapie Anwendung\nfinden können.\nGehen und Stehen\nEssen und Trinken\nAnziehen\nKörperpflege\nArbeiten und Hobby\nGreifen"},{"num":6,"points":10,"text":"Leiten Sie mithilfe der vier ethischen Prinzipien der Pflege ab,\nwie Pflegefachpersonen Herrn Hansens Würde trotz\nfortschreitender Demenzerkrankung wahren können und warum\ndas auch für sie selbst von Bedeutung ist."}],"answers":{"1":"Begründung und Interpretation der Symptome\nBlasse Haut, Kaltschweißigkeit, Apathie und Tachypnoe deuten auf einen\nhypovolämischen Schock infolge eines massiven Blutverlusts hin. Unbehandelt kann\ndieser zum lebensbedrohlichen Zustand des Kreislaufschocks führen. Da pflegerisch nur\nbegrenzte Behandlungsmaßnahmen zur Verfügung stehen, muss umgehend ein Arzt\ninformiert werden.\nVorgehen bis zum Eintreffen des Arztes\nPflegefachmann Alexander Holst muss Erste-Hilfe-Maßnahmen ergreifen.\n• Eine der wichtigsten Maßnahmen ist eine angemessene Positionierung der\nbetroffenen Person, deshalb positioniert Alexander Holst Frau Hansen bequem mit\nerhöhten Beinen, um den Rückfluss des Bluts zu verbessern.\n• Des Weiteren überwacht er die wichtigsten Vitalzeichen, um schnell auf\nVeränderungen des Herz-Kreislauf-Systems reagieren zu können. Neben dem\nFeststellen des Bewusstseins fühlt er den Puls und kann – bei greifbarem\nBlutdruckmessgerät – auch den Blutdruck bestimmen.\n• Bei der Überwachung der Atmung werden neben dem Fakt, dass Frau Hansen\nüberhaupt noch atmet, die Atemfrequenz, Atemrhythmus und Atemgeräusche\neingeschätzt. Atmet Frau Hansen zu flach oder sehr unregelmäßig, macht Alexander…","2":"• Warme, geschwollene und schmerzende Gelenke\n• Steife Gelenke morgens nach dem Aufstehen\n• Kraftlosigkeit\n• Erschöpfung\n• Rheumaknoten\nTipp\nFolgende pflegerisch relevante Besonderheiten ergeben sich bei den\naufgeführten Symptomen einer rheumatoiden Arthritis:\n• Die morgendliche Steifheit der Gelenke klingt in der Regel nach\neiner Stunde ab, erst nach diesem Zeitraum sind die Gelenke\nwieder beweglich.\n• Da schmerzende, steife Gelenke oft weniger bewegt werden,\nkommt neben einer Kraftlosigkeit auch die Gefahr hinzu, dass\ndie Muskeln mit der Zeit schwächer werden.\n• Da Rheuma eine den Körper ganzheitlich betreffende\nErkrankung ist, führt dies oft zu Müdigkeit und allgemeinem\nSchwächegefühl.\n• Wenn die Erkrankung fortschreitet, bilden sich manchmal\nkleine, feste Knötchen unter der Haut, die sogenannten\nRheumaknoten. Sie sind meist unempfindlich gegenüber Druck\noder Berührungen.","3":"• Schultergelenke\n• Ellbogengelenke\n• Handgelenke\n• Fingergelenke\n• Hüftgelenke\n• Kniegelenke\n• Sprunggelenke\n• Zehengelenke","4":"Wirkungsweisen\nNSAR greifen über die Hemmung der Cyclooxygenase in den sehr komplexen\nEntzündungsprozess ein. Es werden weniger Prostaglandine gebildet, was folgende\nWirkungen hat:\n• NSAR wirken entzündungshemmend (antiphlogistisch) und werden demnach bei\nentzündlichen Erkrankungen eingesetzt, um durch Entzündungen verursachte\nSymptome zu reduzieren. Dies spielt auch beim Rheuma eine wichtige Rolle.\n• NSAR wirken fiebersenkend (antipyretisch) und sind damit in der Lage, eine erhöhte\nKörpertemperatur zu reduzieren. Dies spielt bei Rheuma insbesondere in akuten\nPhasen eine Rolle, weil Fieber eine Belastung für das Herz-Kreislauf-System sein\nkann.\n• NSAR wirken schmerzlindernd (analgetisch) und können somit Schmerzrezeptoren\nblockieren, was zu einer zentralen Schmerzdämpfung führt. Da Menschen mit\nRheuma unter erheblichen Schmerzen leiden können, ist die Schmerzreduzierung\neine wichtige therapeutische Säule.\nHäufige Nebenwirkungen\n• Die Wirkstoffe der NSAR greifen häufig die Schleimhäute von Magen und Darm an.\nDamit kommt es zu Magen-Darm-Störungen und im schlimmsten Fall zu\nMagengeschwüren. Deshalb sollen sie möglichst nicht auf nüchternen Magen\neingenommen werden.…","5":"Gehen und Schuhe, Einlagen, Gehhilfe, Rollator\nStehen\nEssen und Spezielle Trinkgefäße (Schnabeltasse/Schnabelbecher), Messer, Gabel\nTrinken und Löffel mit Schaumstoffgriff, speziell geformte Flaschen- und\nDosenöffner\nAnziehen Anziehhilfen, Knöpfhilfen\nKörperpflege Duschhocker, Badewannenlifter, Haltegriffe, spezielle Bürsten und\nHaarkämme mit langen Griffen\nArbeiten Spezielle Tastaturen und Schreibhilfen, Keilkissen für den\nund Hobby (Schreibtisch-)Stuhl, Halterung für Spielkarten\nGreifen Griffaufsätze und -verlängerungen, rutschfeste Unterlagen","6":"Wahrung von Herrn Hansens Würde\n• Das Prinzip der Gerechtigkeit geht von der Gleichheit aller Menschen aus und\nleitet daraus die Pflicht zur Gleichbehandlung aller Pflegebedürftigen ab. Herr\nHansen ist infolgedessen schon durch seine Eigenschaft des Menschseins davor\ngeschützt, seine Würde zu verlieren. Auch Artikel 1 des Grundgesetzes führt dazu\naus, dass „die Würde des Menschen unantastbar“ ist und jeder Mensch wertvoll ist,\nallein weil er ein Mensch ist. Da Herr Hansen niemals diese Eigenschaft verliert,\nergibt sich daraus folgerichtig, dass das Prinzip der Gerechtigkeit Gültigkeit hat und\ner entsprechend an allen Maßnahmen der Pflege und der Alltagsgestaltung in dem\nUmfang partizipieren (teilhaben) kann wie alle anderen nicht an Demenz\nerkrankten Menschen auch.\n• Das Prinzip des Respekts vor der Autonomie bedeutet, dass der Wille des zu\npflegenden Menschen und sein Selbstbestimmungsrecht gewahrt werden müssen,\nindem Pflegefachpersonen diese pflegerisch respektieren und keine Maßnahmen\nergreifen, die dessen Willen zuwiderlaufen. Das heißt grundsätzlich, dass Herr\nHansen Pflegemaßnahmen und -interventionen zustimmen, diese aber auch\nablehnen kann.…"}},{"setting":"Ambulante Langzeitpflege","title":"(Fallsituation)","text":"Herr Lehmann und seine Mutter\nHeiko Lehmann, ein 53-jähriger Junggeselle, wird von Ihnen als\nPflegefachperson in der Häuslichkeit pflegerisch versorgt, nachdem er\ngestern aus dem Krankenhaus zurückgekehrt ist. Dort wurde er aufgrund\neines entgleisten Diabetes mellitus Typ 2 behandelt, wobei der Diabetes\nselbst schon seit 10 Jahren besteht. Außerdem leidet Herr Lehmann seit\ngeraumer Zeit an einem Ulcus cruris am linken Unterschenkel. Die Haut\nist mazeriert und das Ulkus mit Fibrin belegt. Herr Lehmann leidet\nzusätzlich an Adipositas per magna, sodass seine Bewegung sehr\neingeschränkt ist. Auch seine kognitive Leistungsfähigkeit scheint\nbeeinträchtigt zu sein, auch wenn Sie dazu keine konkrete Diagnose in den\nDokumenten finden können.\nHerr Lehmann lebt gemeinsam mit seiner 88-jährigen Mutter, die\nebenfalls einen erhöhten Unterstützungsbedarf hat, in einer Wohnung.\nBisher haben sich die beiden gegenseitig unterstützt. Da Herr Lehmann\nseit vielen Jahren arbeitslos ist, sitzt er die meiste Zeit in seinem Zimmer\nund kümmert sich um seine Modelleisenbahn. Wenn seine Mutter zum\nEssen ruft, geht er in die Küche, um gemeinsam mit ihr die Mahlzeiten\neinzunehmen. Meist gibt es deftige deutsche Küche mit viel Fleisch und\nköstlicher Soße. Nach dem Essen räumen Herr Lehmann und seine\nMutter gemeinsam die Küche auf und sehen anschließend gemeinsam\nfern. Einmal die Woche fahren Mutter und Sohn einkaufen.\nVon Frau Lehmann erfahren Sie, dass bei der Entlassung aus dem\nKrankenhaus die Frage thematisiert wurde, wer die regelmäßige\nWundversorgung in der Häuslichkeit übernimmt. Bis zu Herrn Lehmanns\nKrankenhausaufenthalt hatten weder er noch seine Mutter einen Antrag\nauf einen Pflegegrad gestellt noch wurden die beiden extern unterstützt.\nAuch jetzt wollte Herr Lehmann der Beauftragung eines ambulanten\nPflegediensts, der die regelmäßigen Wundkontrollen durchführt, zunächst\nnicht zustimmen. Er war der Auffassung, dass er und seine Mutter mit…","questions":[{"num":1,"points":10,"text":"Erklären Sie Herrn Lehmann und seiner Mutter die Entstehung\neines Diabetes mellitus Typ 2 (5 P.) und nennen Sie fünf typische\nKomplikationen (5 P.)."},{"num":2,"points":12,"text":"Geben Sie die Lebensbereiche entsprechend dem Neuen\nBegutachtungsassessment (NBA) an, das zur Feststellung der\nPflegebedürftigkeit genutzt wird (6 P.), und ordnen Sie jedem\nLebensbereich jeweils ein Problem von Herrn Lehmann zu (6 P.)."},{"num":3,"points":8,"text":"Herr und Frau Lehmann sind mit der neuen pflegerischen\nSituation sichtlich überfordert. Benennen Sie passend zu den\nBereichen der Pflege jeweils zwei bei Herrn Lehmann notwendige\nMaßnahmen.\nGrundpflege Behandlungspflege Beratung Hauswirtschaftliche\nund Versorgung\nAnleitung"},{"num":4,"points":10,"text":"Reflektieren Sie ethisch, wodurch in der aktuellen Situation\nProbleme aus Sicht der einzelnen Beteiligten bestehen (5 P.), und\nerarbeiten Sie in diesem Zusammenhang Lösungsmöglichkeiten\n(5 P.)."},{"num":5,"points":10,"text":"Beschreiben Sie die kapillare Blutzuckermessung bei Herrn\nLehmann (8 P.) und nennen Sie Gründe, die dafür sprechen, dass\ndiese Maßnahme nicht von Herrn Lehmann selbst durchgeführt\nwerden sollte (2 P.)."}],"answers":{"2":"Lebensbereich Probleme\nMobilität\n• Mobilisiert sich fast nur noch in der\nWohnung, hält sich viel in seinem\nZimmer auf\n• Bewegungseinschränkungen durch\nAdipositas\nKognitive und kommunikative Fähigkeiten\n• Intelligenzminderung ohne Diagnose\n• Hat Schwierigkeiten, Dinge richtig zu\nbegreifen und einzuschätzen, z. B. die\nFähigkeiten seiner Mutter\nVerhaltensweisen und psychische\n• Intelligenzminderung ohne Diagnose\nProblemlagen\n• Ist schnell gereizt, wenn etwas nicht\nso funktioniert, wie er will\nSelbstversorgung\n• Kann seine Wunde nicht selbstständig\nversorgen\n• Geht nicht allein einkaufen\n• Bekommt sein Essen von seiner\nMutter zubereitet\n• Ist nicht in der Lage, sein Zimmer\nsauber zu halten\nBewältigung und selbstständiger Umgang\n• Ist sich des Ausmaßes seiner\nmit krankheits- und therapiebedingten\ngesundheitlicher Einschränkungen\nAnforderungen oder Belastungen\nnicht bewusst\n• Krankheitsbilder: Diabetes mellitus,\nUlcus cruris, Intelligenzminderung\nGestaltung des Alltagslebens und sozialer\n• Hat nur Kontakt zu seiner Mutter;\nKontakte\nFreunde sind nicht bekannt\n• Isolation in der Wohnung","3":"Grundpflege Behandlungspflege Beratung und Hauswirtschaftliche\nAnleitung Versorgung und\nBetreuung\n• • BZ-Messung • Anleitung zur • Einkäufe und\nUnterstützun • Insulininjektion Körperpflege Besorgungen\ng bei der • Verband-wechsel • Beratung zur • Unterstützung bei\nKörperpflege diabetesgerechten der\n• Ernährung Essensversorgung\nUnterstützun • Beratung für (z. B. Essen auf\ng bei der pflegende Rädern)\nErnährung Angehörige • Wäschepflege\n• Förderung • Beratung zur • Spaziergänge\nder Mobilität Hilfsmittelnutzung • Begleitung zu\n• Beratung zu kulturellen\nPflegeleistungen Angeboten","4":"Ethische Reflexion – Vorgehen\n• Wahrnehmung der Situation\n• Analyse (beteiligte Personen)\n• Moralische und ethische Bewertung\n• Ermittlung von Handlungspositionen\n• Auswahl der bestmöglichen Handlungsoption\nEthische Reflexion der Situation\nGleich mehrere Probleme sind erkennbar:\n• Ein wichtiges ethisches Problem besteht in der widersprüchlichen Vorstellung, wo\nHerr Lehmann zukünftig gepflegt werden soll. In diese Konfliktsituation sind Herr\nLehmann, seine Mutter und die Mitarbeitenden des Pflegedienstes involviert.\nWährend Herr Lehmann gern alles so belassen würde, meint seine Mutter, dass es\naus ihrer Sicht die beste Lösung sei, wenn beide in ein Pflegeheim ziehen würden.\nAuch aus pflegerischer Sicht muss die Situation geändert werden, da erkennbar ist,\ndass Frau Lehmann sich nicht mehr so um ihren Sohn kümmern kann wie bisher.\nEs gibt verschiedene Lösungsmöglichkeiten: Die Unterbringung im Heim\nkönnte eine Lösung sein, genau wie eine ausgeweitete pflegerische Unterstützung\ndurch den ambulanten Pflegedienst. Allein wird Herr Lehmann nicht\nzurechtkommen, da er an die ausgeprägte Unterstützung seiner Mutter gewohnt ist.…","1":"BZ-Messung\nDie Blutzuckermessung ist eine kapillare Blutentnahme zur Feststellung der\nGlukosemenge im Blut. Die Werte einer interstitiellen Messung über Sensoren in der Haut\nsind vergleichbar. Die Blutzuckermessung ist wichtig für die korrekte Insulineinstellung und\num Folgeschäden durch dauerhaft zu hohe BZ-Werte zu vermeiden. In einigen Fällen gibt es\nInsulinschemen, wo die Dosierung des Insulins am BZ-Wert orientiert ist. Aus diesen\nGründen ist es wichtig, die BZ-Messung vor der Insulingabe durchzuführen.\nDie Häufigkeit der BZ-Messung wird ärztlich angeordnet, gleichzeitig kann im Notfall\naber auch ohne Anordnung der BZ-Wert mit Zustimmung des zu pflegenden Menschen\nermittelt werden. Die Durchführung der Messung findet unter möglichst aseptischen\nBedingungen statt. Meist gibt es einen Einrichtungsstandard, der zu beachten ist.\nFür die BZ-Messung werden folgende Materialien benötigt: BZ-Messgerät mit passenden\nTeststreifen, Lanzette oder Stechhilfe, Händedesinfektionsmittel, Sprühdesinfektion, Tupfer\nund Abwurf. Herr Lehmann soll sich in eine angenehme Position bringen (bevorzugt\nsitzend) und sich bei Blutentnahme an den Fingerkuppen zuvor die Hände gewaschen…"}}]},{"num":8,"title":"Fünftes Prüfungsbeispiel","tag":"tag3","cases":[{"setting":"Stationäre Akutpflege","title":"„Und sie fand die Worte nicht“","text":"„Und sie fand die Worte nicht“\nSie sind Pflegefachperson auf einer neurologischen Station in\nSchwerin und übernehmen die pflegerische Versorgung der 85-\njährigen Agnes Neumann. Die Pflegefachfrau Marie Baake vom\nFrühdienst übergibt Ihnen folgende Informationen:\n„Wir haben heute von der Intensivstation Frau Neumann\nübernommen. Sie ist im Bahnhof gestürzt und hat dabei mehrere\nHirnblutungen erlitten. Das Kontroll-CT des Kopfs hat ergeben,\ndass die Blutungen rückläufig sind, und damit haben die Ärzte\nentschieden, dass keine Operation nötig sei. Am auffälligsten ist\nbei Frau Neumann eine stark ausgeprägte Aphasie. Aufgrund der\ndadurch entstehenden Schwierigkeiten bei der Kommunikation\nwird Frau Neumann immer wieder unruhig und ungeduldig.\nAußerdem fallen Koordinations- und Orientierungsstörungen auf.\nMehrfach am Tag muss Frau Neumann zur Toilette, da sie\nDurchfall hat. Sie kann je nach Tagesform mit Rollator oder\nRollstuhl dorthin mobilisiert werden. Auch beim Essen wird sie\nschnell unruhig. Nun haben die Angehörigen berichtet, dass sie\neinen sehr empfindlichen Darm habe und viele Lebensmittel nicht\nvertragen würde. Vor ihrem Sturz habe sie sich noch vollständig\nselbst versorgen können und mit ihrem Lebensgefährten\nzusammen in einer Einrichtung des betreuten Wohnens gelebt.\nAktuell ist sie in vielen Bereichen unterstützungsbedürftig, und\nder Sozialdienst versucht gerade, eine Anschluss-Reha zu\norganisieren. Vor ihrem Sturz hat Frau Neumann keine\nMedikamente eingenommen, nun erhält sie sowohl orale\nMedikamente als auch eine Elektrolytinfusion. Von den\nAngehörigen kommt jeden Nachmittag jemand und unterhält sich\nmit ihr und bringt Essen mit, das sie verträgt.“\nAls Sie nach der Übergabe zu Frau Neumann ins Zimmer gehen,\nsitzt diese schon aufrecht im Bett und versucht Ihnen sehr unruhig\nmit Händen und Füßen deutlich zu machen, dass sie ganz\ndringend zur Toilette muss. Sie begleiten Frau Neumann mit\neinem Rollator ins Bad, wo sie kurz vor der Toilette plötzlich…","questions":[{"num":1,"points":9,"text":"Erfassen Sie drei zentrale pflegerische Probleme bei Frau\nNeumann (3 P.) und ordnen Sie jeweils zwei gezielte\nPflegemaßnahmen zu (6 P.)."},{"num":2,"points":6,"text":"Erläutern Sie die Bedeutung von sozialen Netzwerken und\nfunktionierenden Familiensystemen am Beispiel von Frau\nNeumann und ihrer Familie."},{"num":3,"points":15,"text":"Beschreiben Sie die Vorbereitung einer Elektrolytinfusion\nentsprechend den geltenden Regeln (8 P.). Geben Sie\nzudem Beobachtungsschwerpunkte bei laufenden\nInfusionen an (7 P.)."},{"num":4,"points":6,"text":"Aufgrund ihrer Sprachstörung kann Frau Neumann ihre\nWünsche und Bedürfnisse nicht richtig äußern. Geben Sie\ndrei Situationen an, in denen eine ungestörte\nKommunikation mit Frau Neumann die Pflege erleichtern\nwürde (3 P.), und ordnen Sie diesen jeweils einen\nLösungsvorschlag zu (3 P.)."},{"num":5,"points":14,"text":"Geben Sie Maßnahmen der Ersten Hilfe nach Frau\nNeumanns Zusammenbruch an und begründen Sie diese."}],"answers":{"1":"Pflegeproblem Pflegemaßnahmen\nVerständnisprobleme durch\n• Zeit geben bei Gesprächen, immer nur ein\nstark ausgeprägte Sprachstörung\nGesprächspartner\n(Aphasie)\n• Blickkontakt beim Sprechen herstellen\n• Alle Maßnahmen gut verständlich ankündigen\n• Einfache Sprache verwenden (kurze Sätze,\neinfache Wörter)\n• Wichtige Wörter wiederholen\n• Sprachhilfsmittel einsetzen (z. B. Bilder)\n• Sprech- und Sprachübungen in Absprache mit\ndem Logopäden durchführen\nDurchfallartige Stuhlgänge →\n• Reichlich Flüssigkeit anbieten\nExsikkosegefahr/erhöhter\n• Flüssigkeitsbilanzierung bzw. Einfuhrkontrolle\nFlüssigkeitsbedarf\n• Bedarfsmedikation bei Durchfall laut ärztlicher\nAnordnung\n• Nahrungszufuhr anpassen: leicht verdauliche\nLebensmittel anbieten\n• Unverträglichkeiten erfragen und beachten\nOrientierungsstörungen\n• Zeitliche Orientierungshilfen geben (Uhr,\nKalender)\n• Örtliche Orientierungshilfen geben (Zimmer\nmarkieren, wiederholt darauf hinweisen, dass sie\nim Krankenhaus ist)\n• Situative Orientierungshilfen geben (Situation\nerklären, Maßnahmen genau ankündigen)\nSturzgefahr durch Unruhe und\n• Stoppersocken für bessere Bodenhaftung anziehen\nGangunsicherheit\n• Schuhe bereitstellen und anziehen…","2":"Vorbereitung einer Elektrolytinfusion\nAls Erstes muss die Anordnung für die Infusion in der Dokumentation geprüft werden.\nZudem ist zu klären, ob Frau Neumann der Infusion zustimmt. Entsprechend der ärztlichen\nAnordnung ist die passende Elektrolytlösung auszuwählen. Dabei ist darauf zu achten, dass\ndie Lösung noch nicht abgelaufen ist, nicht getrübt ist und keine Beimengungen aufweist.\nDas Vorbereiten der Infusion findet in einem reinen Arbeitsraum statt.\nAuf einer desinfizierten Arbeitsfläche werden die benötigten Materialien vorbereitet.\nDazu gehören die Infusionsflasche, das Infusionssystem, Abfalleimer und Abwurf für spitze\nGegenstände. Zudem werden Infusionsständer, Händedesinfektionsmittel und ggf.\nHandschuhe benötigt.\nDie Vorbereitung der Infusion erfolgt entsprechend dem Hausstandard und unter\naseptischen Bedingungen. Beim Vorbereiten wird die 6-R-Regel unter Berücksichtigung der\nAnordnung beachtet.\nDer Gummistopfen wird mit einem Sprühdesinfektionsmittel benetzt, das 30 Sekunden\neinwirken muss. Die Desinfektion des Gummistopfens ist insbesondere bei Glasflaschen\nwichtig.\nDen Dorn des Infusionssystems durch den desinfizierten Gummistopfen stechen und die…","4":"Situation Lösungsvorschlag\nInformationen zu Gespräch mit den Verwandten, um die nötigen\nUnverträglichkeiten geben Informationen zu erhalten\nund damit den Durchfall\nverhindern\nStuhldrang und der Wunsch, Zur Nutzung des Patientenrufsystems anhalten. Schild\ndie Toilette aufzusuchen, mit der Aufschrift „WC“ bereitlegen, auf das Frau\nmitteilen Neumann nur zeigen muss\nOrientierungsprobleme, Orientierungshilfsmittel zur Verfügung stellen und in die\nBedarf, bei der Orientierung Pflege einbauen, z. B. Kalender, große Uhr, Übersicht mit\nunterstützt zu werden Terminen; Frau Neumann wiederholt darauf hinweisen,\nwo sie sich befindet\nDarauf hinweisen, dass sie Regelmäßige Vitalzeichenkontrollen, nach dem Befinden\nsich nicht gut fühlt, ihr fragen, Allgemeinzustand mittels Krankenbeobachtung\nschwindlig ist etc., z. B. bei einschätzen\nKreislaufproblemen\nTipp\nEine möglichst uneingeschränkte Kommunikation ermöglicht eine\noptimale und individuelle pflegerische Versorgung. Das Einbeziehen\nund Berücksichtigen der Patientenwünsche verbessert die Adhärenz\ndes zu pflegenden Menschen und fördert die Heilung.\nDoch Kommunikation findet nicht nur über Worte statt. Ist ein…","5":"• Handeln nach Auffindeschema und damit Bewusstsein und Atmung prüfen →\nFeststellung, welches weitere Vorgehen nötig ist, z. B. stabile Seitenlage oder\nWiederbelebungsmaßnahmen\n• Vitalzeichenkontrollen (Puls, Blutdruck, Atmung, O ) → Parameter geben Auskunft\n2\nüber Allgemeinzustand und weitere notwendige Maßnahmen\n• Psychischer Beistand: Kommunikation, Beruhigen, Orientierungshilfe → dient zur\nEntlastung der Gesamtsituation, verhindert weitere Angst/Unruhe\n• Unterstützung bei Positionswechsel vom Boden aufs Bett oder Stuhl → bessere\nWeiterversorgung/Untersuchungsmöglichkeiten\n• Einschätzung der Bewegungsmöglichkeiten → Einschätzung körperlicher\nEinschränkungen/Frakturen\n• Notrufvorrichtung nutzen und Unterstützung anfordern → falls sich die Situation\nverschlechtert, ist Hilfe sinnvoll\n• Dokumentation – Sturzprotokoll → Info an weiterführende Berufsgruppen (= auch\nrechtliche Absicherung)\n• Arztinformation → Entscheidung weiterer notwendiger Maßnahmen der Diagnostik\nund Therapie\n\n1. Bender A, Keller C. Pflege von Menschen mit Erkrankungen des\nNervensystems. In: Keller C (Hrsg.). PFLEGEN. Gesundheits- und\nKrankheitslehre. 2. A. München: Elsevier, 2021. S. 465–540.…"}},{"setting":"Ambulante Langzeitpflege","title":"(Fallsituation)","text":"Willkommen zu Hause!\nSie erhalten im Rahmen Ihrer Arbeit in der ambulanten\npädiatrischen Pflege im Raum Magdeburg die Aufgabe, Frau Merz\nbei der Pflege ihres Sohns Finn zu unterstützen. Finn ist ein\nDrillingskind und kam zehn Wochen zu früh zur Welt. Während\nsich seine beiden Schwestern recht gut entwickelten, verbrachte\nFinn aufgrund von immer wiederkehrenden Pneumonien,\nschlechter Sauerstoffsättigung und einer nötigen Überwachung\nder Herztätigkeit die ersten 5 Monate seines Lebens im\nKrankenhaus auf der Kinderstation.\nIhre pflegerische Unterstützung soll unverzüglich nach der\nEntlassung aus dem Krankenhaus stattfinden, und Sie machen\nsich bereits Gedanken, welche Situation Sie im häuslichen Umfeld\nvon Familie Merz vorfinden werden, welcher Beratungsbedarf\nbesteht und welche Hilfsmittel ggf. noch benötigt werden. Da Sie\ndie Familie und insbesondere Finn bisher noch nicht\nkennenlernen konnten, ist ihr primäres Ziel, eine vertrauensvolle\nBeziehung aufzubauen. Bei Ihrem Eintreffen erleben Sie eine\nrelativ unruhige Familie Merz samt Großeltern, die dem Einzug\nvon Finn schon lange entgegengefieberte. Diese Unruhe übertrug\nsich auch auf Finn, der nun weinend in seinem Kinderwagen liegt\nund noch immer an den Monitor angeschlossen ist. Sie bitten die\nGroßeltern, mit den beiden anderen Kindern einen Spaziergang zu\nmachen, um Finn kennenlernen und erste wichtige Dinge mit\nseiner Mutter besprechen zu können. Finn ist weiterhin unruhig,\nzappelt mit den Beinen und sieht blass und kränklich aus. Sie\nbemerken, dass seine Atmung trotz Sauerstoffgabe über eine\nSauerstoffbrille angestrengt und brodelnd ist. Die Mutter\nberichtet, dass sie versucht hatte, Finn etwa 100 ml Milch über\nden Sauger zu geben, die er teilweise wieder hochwürgte. Die\nangelegte Magensonde hatte die Mutter absichtlich nicht benutzt,\nda sie hofft, dass Finn die Sonde bei Nichtbenutzung schneller\nwieder loswird.\nNach der Pflegeanamnese beschreiben Sie der Mutter Ihre…","questions":[{"num":1,"points":8,"text":"Beschreiben Sie Ursachen für Finns relativ instabile\nVersorgungssituation bei seiner Ankunft zu Hause."},{"num":2,"points":10,"text":"Formulieren Sie fünf konkrete Pflegeziele (5 P.) und\nbegründen Sie jeweils, welche Bedeutung diese für Finns\nEntwicklung haben (5 P.)."},{"num":3,"points":6,"text":"Begründen Sie die Bedeutung der Hygiene bei der\nDurchführung behandlungspflegerischer Maßnahmen bei\nFinn."},{"num":4,"points":6,"text":"Schätzen Sie Finns Selbstbestimmungsfähigkeit ein (3 P.)\nund nennen Sie Möglichkeiten, wie die Pflege in seinem\nInteresse angepasst werden kann (3 P.)."},{"num":5,"points":10,"text":"Formulieren Sie Hinweise, wie die Gesprächsführung mit\nFrau Merz der Situation angepasst werden kann (5 P.), und\nbeziehen Sie dabei ein passendes Kommunikationsmodell\nein (5 P.)."},{"num":6,"points":10,"text":"Beschreiben Sie Ihre Vorgehensweise im Rahmen der\nErsten Hilfe, falls Finn erneut Nahrung aspiriert und\ndadurch seine Atemwege verlegt werden."}],"answers":{"2":"• Finn in der häuslichen Situation stabilisieren → Eine stabile Situation verbessert den\nAllgemeinzustand, was für Finns Entwicklung wichtig ist.\n• Aufbau einer Beziehung zu Finn → Durch den Beziehungsaufbau mit Finn sind\npflegerische Maßnahmen einfacher umsetzbar und seine gesundheitliche Situation\nkann sich eher verbessern.\n• Reduzierung von Finns Unruhe → Die Aufnahme von Nahrung wird verbessert,\nFinns Ernährungs- und Allgemeinzustand verbessert sich.\n• Verbesserung der Atemsituation → Eine stabile Atmung verbessert auch Finns\nNahrungsaufnahme und Entwicklung.\n• Gewichtszunahme → Durch eine Erhöhung der Nahrungszufuhr wird Finns\nErnährungszustand verbessert. Dies hat einen positiven Einfluss auf seine\nEntwicklung.\n• Weitere Familienangehörige in die Pflege einbeziehen → Die Einbeziehung weiterer\nPersonen entlastet die Mutter, deren Unruhe und Überforderung sich sonst auf Finn\nüberträgt.","3":"Behandlungspflegerische Maßnahmen sind grundsätzlich unter möglichst aseptischen\nBedingungen umzusetzen. Insbesondere bei Eingriffen in den menschlichen Körper kann\ndas Einbringen von Erregern schnell zu Infektionen führen. Das Nichtbeachten von\nhygienischen Vorgaben kann zu einer Keimübertragung führen.\nHinzu kommt der Immunstatus des kleinen Finn. Er wurde zu früh geboren, weshalb sein\nKörper und Immunsystem bei der Geburt nicht altersgemäß entwickelt war. Die ersten\nMonate verbrachte er nur in der Klinik und hatte bereits dort mehrere Pneumonien. Dabei\nist das Einhalten hygienischer Regeln im Krankenhaus noch einfacher als in der\nHäuslichkeit.\nWürde es zu einer erneuten Infektion bei Finn kommen, würde sein mangelhaft\nausgeprägtes Immunsystem ihn nicht gut schützen können und er müsste wahrscheinlich\nwieder ins Krankenhaus. Damit wäre seine Entwicklung erneut zurückgeworfen.","4":"Finns Selbstbestimmungsfähigkeit ist stark begrenzt. Er ist noch ein Säugling, der sich nur\nbegrenzt mitteilen kann. Eine eindeutige Kommunikation ist entwicklungstechnisch noch\nnicht möglich. Finn kann sich nur mittels Mimik, Gestik, Verhaltensweisen, Weinen,\nSchreien, Lächeln etc. ausdrücken. Frau Merz ist als Finns Mutter die Person, die am\nehesten erkennen wird, was Finn wünscht. Zudem ist sie als Elternteil der gesetzliche\nVertreter und entscheidet für ihn in seinem Sinne.\nUm die Wünsche von Finn erkennen und berücksichtigen zu können, ist es wichtig, ihn\ngenau zu beobachten und Mimik, Gestik, Verhalten und Emotionen wahrzunehmen.\nPositive Gesichtsausdrücke wie ein Lächeln können ähnlich wie ein ruhiges Verhalten und\ngutes Trink- und Schlafverhalten als Bestätigung von Finn gewertet werden. Gemäß der\nnonverbalen Kommunikation mit Finn können pflegerische Maßnahmen angepasst werden.\nAuch durch Krankenbeobachtung, z. B. bei Erbrechen, brodelnder Atmung oder\nVeränderungen der Ausscheidungen, können entsprechende Maßnahmen eingeleitet\nwerden.","5":"Es eignen sich grundsätzlich mehrere Kommunikationsmodelle, um die Gesprächsführung\nmit Frau Merz anzupassen, z. B.:\n• Kommunikationstheoretischer Ansatz nach Watzlawick (fünf Axiome)\n• Vier-Ohren-Modell (psychologisches Kommunikationsmodell nach Schulz von Thun)\n• Klientenzentrierte Gesprächsführung nach Rogers\n• Gewaltfreie Kommunikation nach Rosenberg\n• Eisbergmodell nach Freud\nKommunikationstheoretischer Ansatz nach Watzlawick (fünf Axiome)\n• Fünf Axiome, die die Grundlagen der Kommunikation beschreiben:","1":"• Eine Aspiration stellt für Finn ein lebensbedrohliches Ereignis dar. Daher sind sofort\nNotfallmaßnahmen einzuleiten.\n• Als Erstes muss die Situation erkannt werden. Symptome einer Aspiration können\nHusten, Würgen oder im weiteren Verlauf eine zyanotische Verfärbung der Haut\n(Blaufärbung) sein.\n• Finn muss sofort aus der Rückenlage in eine andere Position gebracht werden, damit\naufgestoßene und hochgehustete Milch aus dem Mund laufen kann. Deshalb ist\nzumindest eine seitliche Positionierung wichtig, der Vorgang kann in Bauchlage\nverstärkt werden. Je nach Situation ist alternativ das Einnehmen einer aufrechten\nPosition (Sitzen oder Oberkörperhochpositionierung) zielführend. Durch sanftes\nKlopfen auf den Rücken kann der Hustenreiz unterstützt werden.\n• Wenn ein Absauggerät in der Häuslichkeit von Familie Merz zur Verfügung steht,\nkann dieses im Notfall eingesetzt werden, um oberflächlich aspirierte Nahrung\nabzusaugen.\n• Sollte nach den oben ergriffenen Maßnahmen keine Besserung eintreten, ist der\nNotarzt zu rufen.\nLiteratur\n1. Drees S. Hygiene. In: Menche N, Keller C, Teigeler B (Hrsg.). PflegeHeute. 8. A.\nMünchen: Elsevier, 2023. S. 1236–1251.…"}}]},{"num":9,"title":"Sechstes Prüfungsbeispiel","tag":"tag3","cases":[{"setting":"Stationäre Akutpflege","title":"(Fallsituation)","text":"Am Würstchen verschluckt\nSie arbeiten im Spätdienst als Pflegefachperson im\nKreiskrankenhaus Pirna auf der Kinderstation. Sie werden in die\nNotaufnahme gebeten. Soeben wird der zweijährige Paul Gärtner\ntelefonisch vom Rettungsdienst angekündigt. Er wird von seiner\nMutter begleitet. Paul hatte sich beim Abendessen an einem Stück\nWiener Würstchen verschluckt. Die Mutter hatte dies bemerkt, als\nsie aus der Küche zurückkam, wo gerade die Milch am Überkochen\nwar. Paul saß in seinem Hochstuhl und begann plötzlich zu\nwürgen. Sein Gesicht lief rot an. Die Mutter stützte zu ihm, riss ihn\naus dem Stuhl heraus, hielt ihn kopfüber und klopfte so lange auf\nseinen Rücken, bis Paul, der inzwischen im Gesicht blau\nangelaufen war, das Wurststück wieder ausspuckte.\nNachdem das Hindernis beseitigt war, wirkte Paul sehr\nbenommen, weinerlich und hustete unaufhörlich sehr stark.\nDaraufhin informierte die besorgte Mutter den Notarzt. Dieser\nstellte bei Paul einen durch die Aspiration verursachten\nSauerstoffsättigungsabfall fest. Da nicht ausgeschlossen werden\nkonnte, dass sich noch weitere Nahrungsreste im respiratorischen\nTrakt befanden, ordnete der Notarzt die Verlegung ins nahe\nKrankenhaus an.\nKaum angekommen wird Paul in den Schockraum zu weiteren\nUntersuchungen gebracht. Währenddessen kümmern Sie sich um\nPauls Mutter, da diese durch ihr aufgeregtes Verhalten für Unruhe\nsorgt. Mit schriller Stimme fragt Frau Gärtner Sie: „Was passiert\njetzt mit meinem kleinen Paul? Wird er überleben? Warum habe\nich nicht besser aufgepasst? Hätte ich ihm doch nur kein\nWürstchen gegeben, bevor ich in die Küche ging! O, die verflixte\nMilch! Alles muss ich allein machen! Mein armer kleiner Schatz!“\nAufgeregt läuft Frau Gärtner hin und her, während sie sich ständig\nlautstark Selbstvorwürfe macht.\nAls Paul nach den Untersuchungen zu Frau Gärtner\nzurückgebracht wird, wirkt er erleichtert, als er seine Mutter sieht\nund wird unruhig, um in ihre Arme zu kommen. Sie bekommen…","questions":[{"num":1,"points":10,"text":"Analysieren Sie die Handlungssituation hinsichtlich des\naktuellen Notfalls. Beziehen Sie die vorangegangenen\nMaßnahmen der Mutter mit ein."},{"num":2,"points":10,"text":"Arbeiten Sie für die aktuelle Notfallsituation einen\nNotfallplan aus (5 P.) und koordinieren Sie die Aufgaben\nbis zum Eintreffen des Arztes (5 P.)."},{"num":3,"points":10,"text":"Stellen Sie relevante Informationen für den Arzt dar (5 P.).\nBegründen Sie die Bedeutung der interprofessionellen\nKommunikation (5 P.)."},{"num":4,"points":10,"text":"Beurteilen Sie aus ethischer Sicht die Tatsache, dass Pauls\nMutter bei den Untersuchungen nicht bei ihrem Kind sein\ndurfte."},{"num":5,"points":10,"text":"Beschreiben Sie, in welchem Dilemma sich Frau Gärtner\nbefand, als sie in die Küche ging und Paul unbeaufsichtigt\nließ (5 P.). Arbeiten Sie in diesem Zusammenhang\nHinweise für die Mutter für den weiteren Umgang mit\nihrem Kind heraus (5 P.)."}],"answers":{"1":"Der zweijährige Paul verschluckt sich zu Hause an einem Stück Würstchen, als\ndie Mutter gerade nicht im Raum ist. Er beginnt zu würgen und zu husten. Sein\nGesicht läuft rot an. Als sie es bemerkt, reißt sie Paul aus seinem Stuhl, hält ihn\nkopfüber und klopft so lange auf seinen Rücken, bis er das Wurststück wieder\nausspuckt. Paul hat ein blau angelaufenes Gesicht, wirkt benommen und\nweinerlich. Er hustet immer wieder sehr stark. Die Mutter ruft den Notdienst.\nWährend des Transports auf Station wird das Gesicht von Paul rot. Er\nbeginnt extrem zu husten. Seine Augen sind weit aufgerissen. Mit seinen\nArmen fuchtelt er in der Luft herum. Er keucht und gibt giemende Laute von\nsich.","2":"Notfallplan\n• Ruhe bewahren, um alle Aufgaben angemessen erfüllen zu können. Die\nRuhe strahlt auch auf Paul und seine Mutter aus.\n• Situation einschätzen. Da Paul um Luft ringt, besteht akute\nLebensgefahr.\n• Notruf absetzen, damit schnell ärztliche Hilfe erfolgen kann. Dazu wird\ndie Notrufvorrichtung gedrückt, ggf. auch das Telefon unter Angabe\ndes Standorts genutzt.\n• Sollte es möglich sein, unverzüglich die nächste Station aufsuchen,\ndamit die Erstversorgung nicht auf dem Gang erfolgen muss.\n• Wenn möglich Pauls Mund nach Fremdkörpern absuchen. Sofern\nvorhanden, diese entfernen.\n• Paul zum Abhusten auffordern. Dazu Paul auffordern, sich nach vorn zu\nbeugen, und ihm auf den Rücken klopfen. Dabei weiter beruhigend mit\nihm sprechen.\n• Sollte es zum Atemstillstand kommen, Paul beatmen.\n• Dem eintreffenden Arzt oder Notfallteam über das Geschehen\ninformieren. Paul diesem übergeben und weitere Anweisungen\nausführen.\nZu koordinierende Aufgaben\nUm konzentriert und zielgerichtet handeln zu können, ist es notwendig, dass\ndie Mutter beruhigt wird. Sollte sie sich nicht beruhigen, muss sie beiseite\ngenommen und von einer weiteren Person betreut werden. Eventuelle weitere…","3":"Relevante Informationen für den Notarzt\nDer Junge ist 2 Jahre alt. Er hatte sich zu Hause an einem Stückchen Wurst\nverschluckt. Daraufhin hatte er einen starken Hustenreiz, der nicht produktiv\nwar. Erst das Kopfüberhalten und das Auf-den-Rücken-Klopfen der Mutter\nbrachte das Wurststück wieder hervor. Der herbeigerufene Notarzt stellte\neinen Abfall der Sauerstoffsättigung fest. Im Krankenhaus weitere\nUntersuchungen laut Akte. Während des Transports erneuter Hustenanfall mit\ndeutlicher Erstickungsnot.\nBedeutung der interprofessionellen Kommunikation\nUnter interprofessioneller Kommunikation ist zu verstehen, dass sich\nPflegefachpersonen, ärztliches Personal bzw. Vertreter der unterschiedlichsten\nProfessionen, die gemeinsam am bzw. mit dem Patienten arbeiten, über diesen\nverständigen. Dies kann z. B. in Übergabegesprächen, Visiten,\nFallbesprechungen etc. erfolgen. Patienten und Angehörige sollen in diese\nKommunikation eingebunden werden, damit eine gute Adhärenz bzw.\nZusammenarbeit gefördert wird. Dazu müssen Sachverhalte den Patienten und\nihren Angehörigen transparent und verständlich dargestellt werden.\nIm Notfall wie in diesem Beispiel benötigt der Notarzt/das Notfallteam die…","4":"Frau Gärtners Dilemma\nPauls Mutter erledigt mehrere Aufgaben parallel. Damit kann sie sich nicht\nauf die effiziente Erledigung einer Aufgabe konzentrieren. In der Küche brennt\ndie Milch an, während Paul in seinem Hochstuhl ein Würstchen isst. Die\nMutter ist sich der möglichen Gefahr nicht bewusst. Sie verletzt dabei ihre\nAufsichtspflicht ihrem Sohn gegenüber.\nHinweise für den weiteren Umgang mit Paul\nFrau Gärtner soll zukünftig …\n• darauf achten, dass Paul kleine Bissen zu sich nimmt und die Nahrung\nvor dem Schlucken gut kaut,\n• bei den Mahlzeiten für eine ruhige Atmosphäre sorgen,\n• sich dazusetzen und keine anderen Tätigkeiten nebenbei erledigen,\n• sich ihrer Vorbildwirkung bewusst sein,\n• eine Esskultur einführen,\n• sich auf eine Sache konzentrieren,\n• Paul beim Essen nicht allein lassen.\nLiteratur\n1. Pasch W. Pflegeethik – Wenn Pflege rationiert wird. Bibliomed\nPflege. 2016 Aus: www.bibliomed-pflege.de/news/29652-\npflegeethik-wenn-pflege-rationiert-wird (letzter Zugriff:\n7.8.2023).\n2. PQSG. Notfallstandard „Verhalten bei Aspiration“. Version 1.05.\nAus: https://pqsg.de/seiten/openpqsg/hintergrund-\nstandard-notfall-aspiration.htm. (letzter Zugriff: 7.8.2023).…"}},{"setting":"Stationäre Langzeitpflege","title":"„Ich mag nicht mehr“","text":"„Ich mag nicht mehr“\nIm Rahmen Ihrer Tätigkeit als Pflegefachperson arbeiten Sie im\nbrandenburgischen Pflegewohnheim „Lindengarten“. Hier wohnt\nseit gestern Richard Braun. Er ist 91 Jahre alt und hat keine\nAngehörigen. Bislang lebte er allein. Nach einem Suizidversuch\nvor 2 Wochen wurde von seinem Betreuer der Umzug in die\nstationäre Langzeitpflege angeregt.\nWährend der morgendlichen Übergabe erfahren Sie, dass Herr\nBraun sehr zurückgezogen und wenig an seiner Umgebung\ninteressiert wirkt. Am Vortag hatte er sein Abendessen kaum\nangerührt, zur Grundpflege am Abend war er nicht zu bewegen.\nIhre Kollegin berichtet: „Er spricht nicht, er isst nicht, er lässt sich\nnicht waschen und reagiert kaum. Na, das kann ja heiter werden\nmit ihm. Ich befürchte, er will wirklich sterben.“ Sie wollen sich\nnach der Dienstübergabe selbst ein Bild von Herrn Braun machen.\nVorher lesen Sie den ärztlichen Bericht. Die Diagnosen lautet\nMajor Depression seit 15 Jahren, und es wird auf den\nSuizidversuch vor 2 Wochen hingewiesen. Herr Braun war von\nBeruf Tischler und arbeitete gern mit Holz. Bis zur Rente leitete er\nseine eigene Firma. Seine Ehefrau starb vor 5 Jahren. Kinder hat\nHerr Braun keine. Sein Betreuer und Ansprechpartner für die\nPflegefachpersonen ist der Sohn seines besten Freunds, der vor 2\nWochen verstarb. Nach dessen Beerdigung hat Herr Braun\nversucht, sich das Leben zu nehmen. Dieser Versuch scheiterte, da\nihn dessen Sohn, der Herrn Braun regelmäßig besucht, fand und\nsofort den Notdienst verständigte. Noch während Herr Braun im\nKrankenhaus lag, veranlasste sein Betreuer den Umzug ins\nPflegewohnheim.\nDie ärztlich angeordnete Medikation umfasst 45 mg\nMirtazapin® oral, als Tablette am Morgen und bei Bedarf ein\nSchlafmittel. Sie stellen das Medikament und gehen zu Herrn\nBraun. Freundlich begrüßen Sie ihn, stellen sich vor und\nerkundigen sich nach seinem Befinden. Herr Braun schaut Sie\nlangsam an und antwortet sehr leise und monoton: „Guten…","questions":[{"num":1,"points":10,"text":"Erklären Sie Ihr Vorgehen in dieser Akutsituation,\ninsbesondere was Erstmaßnahmen und die Koordination\nder Aufgaben bis zum Eintreffen des Rettungsdienstes\nbetrifft."},{"num":2,"points":10,"text":"Erläutern Sie, wie Sie die in der Pflege-Charta formulierten\nRechte bei der Pflege von Herrn Braun berücksichtigen (5\nP.). Erklären Sie dabei die Bedeutung der\nSelbstbestimmung und Selbstverwirklichung (5 P.)."},{"num":3,"points":10,"text":"Beschreiben Sie Ziele und Maßnahmen entsprechend\neinem Pflegeprozessmodell."},{"num":4,"points":10,"text":"Erstellen Sie eine Übersicht, wie Sie Herrn Braun bei der\nBewältigung seiner Situation unterstützen können.\nBeziehen Sie dabei auch externe Möglichkeiten zur\ninterprofessionellen Zusammenarbeit ein."},{"num":5,"points":10,"text":"Führen Sie eine Regel für das Stellen und Verabreichen\nvon Arzneimitteln auf (6 P.). Begründen Sie, welche\nBesonderheiten beim Verabreichen der Medikamente bei\nHerrn Braun zu beachten sind (4 P.)."}],"answers":{"2":"Berücksichtigung der in der Pflege-Charta formulierten Rechte\n• In Artikel 1 der Charta der Rechte für hilfe- und pflegebedürftige\nMenschen wird das Recht auf ein möglichst selbstbestimmtes und\nselbstständiges Leben benannt. Jeder Mensch, auch Herr Braun, hat\ndas Recht so zu leben, wie er möchte.\n• Dennoch hat auch jeder hilfe- und pflegebedürftige Mensch das Recht\ndarauf, dass Leib und Seele vor Gefahren geschützt werden (Artikel 2).\nSomit muss Herrn Braun verdeutlicht werden, welche Konsequenzen\nseine Weigerung haben können.\n• Da Herr Braun auf seiner Weigerung besteht, ist es eine Möglichkeit,\nihn entsprechend Artikel 5 zu beraten und aufzuklären. Da\nPflegefachpersonen keine Psychologen oder Psychiater sind, sollten\ndiese als Spezialisten hinzugezogen werden.\n• Eine grundsätzliche Haltung und nicht nur in Artikel 6 verankert, ist die\nWertschätzung, die jedem zu pflegenden Menschen entgegengebracht\nwerden soll. Wertschätzung kann Vertrauen wecken und damit\nvielleicht auch neuen Lebensmut, indem dem zu pflegenden Menschen\nvermittelt wird, dass es jemanden gibt, der ihm zuhört und ihn ernst\nnimmt. In Gesprächen wird versucht, Herrn Braun die Sinnhaftigkeit…","3":"Im Folgenden werden die Ziele und Maßnahmen nach dem\nPflegeprozessmodell von Fiechter und Meier aufgeführt und für eine gute\nÜbersichtlichkeit nach den 13 ABEDL von Monika Krohwinkel strukturiert.\n(Alternativ wäre z. B. auch die Zuordnung ATL nach L. Juchli möglich. Die\nSIS stellt hingegen KEIN Pflegeprozessmodell dar!)\nABEDL Pflegeziel Pflegemaßnahmen\n1 – Herr Braun Regelmäßig werden Gespräche\nKommunizieren kommuniziert im angeboten. Grundlage dafür ist\nkönnen Rahmen seiner Herrn Brauns Biografie. Themen\nMöglichkeiten können z. B. Holzarbeiten sein\n2 – Sich bewegen Herr Braun ist Herrn Braun werden tägliche,\nkönnen mobil witterungsabhängige\nSpaziergänge angeboten\n4 – Sich pflegen Herr Braun fühlt Bei der Grundpflege erhält Herr\nkönnen sich sauber und Braun Anleitung und ggf.\ngepflegt. Er legt teilweise Unterstützung. Gepflegt\nWert auf sein wird nach seinen Wünschen und\näußeres Bedürfnissen, die vorher erfragt\nErscheinungsbild und dokumentiert werden\n5 – Sich kleiden Herr Braun ist in Entsprechend seinen Vorlieben\nkönnen einem guten werden Herrn Braun Nahrung\nErnährungszustand und Getränke appetitlich\nangerichtet angeboten\n7 – Essen und Herr Braun hat Die bisherigen…","4":"• Medizinische Unterstützung erhält Herr Braun durch Ärzte wie z. B.\nHausarzt, Neurologen und Psychiater. Durch die Einstellung mit\nentsprechenden Medikamenten kann seine Stimmung aufgehellt\nwerden.\n• Ein Psychologe bzw. Psychotherapeut führt eine individuell\nausgerichtete Psychotherapie mit Herrn Braun durch, um Gründe und\nLösungsmöglichkeiten herauszufinden.\n• Pflegerische und seelische Unterstützung erhält Herr Braun durch die\nMitarbeiter der Einrichtung. Eine saubere und gepflegte Erscheinung\nträgt zu mehr Wohlbefinden bei. Die Lebensqualität nimmt zu, was\nlebensbejahend wirken kann.\n• Soziale Unterstützung erhält Herr Braun durch den Sozialdienst bzw.\ndie Pflegedienstleitung der Einrichtung. Ebenfalls kann Herrn Brauns\nBetreuer ihm unterstützend zur Seite stehen und in seinem Namen die\nDinge regeln, für die er bevollmächtigt ist.\n• Für die tägliche Betreuung und Aktivierung des Bewohners arbeiten\nAlltagsgestalter und Ergotherapeuten zusammen. Sie können Herrn\nBraun gezielt eine sinnvolle Aufgabe anbieten, sodass er sich gebraucht\nfühlt und neuen Lebensmut schöpfen kann.\n• Physiotherapeuten tragen zu Herrn Brauns Aktivierung und…","5":"Regeln\n6-R-Regel 10-R-Regel\n• Rich
